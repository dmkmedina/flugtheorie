<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="description" content="Swiss paragliding theory exam (SHV/FSVL) study trainer - 331 flashcards, mock exam, study guide, and cheat sheet." />
<meta name="theme-color" content="#0284c7" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='84' font-size='90'%3E%E2%9C%88%EF%B8%8F%3C/text%3E%3C/svg%3E" />
<title>Flugtheorie — Swiss Paragliding Theory Trainer</title>
<style>
/* ============================================================================
   Flugtheorie — Swiss Paragliding Theory Trainer
   ============================================================================ */

:root {
  /* Light mode (default) */
  --bg: #f5f7fa;
  --bg-elev: #ffffff;
  --bg-card: #ffffff;
  --bg-hover: #f1f5f9;
  --bg-soft: #f8fafc;
  --border: #e2e8f0;
  --border-strong: #cbd5e1;
  --text: #0f172a;
  --text-soft: #475569;
  --text-dim: #94a3b8;
  --text-faint: #cbd5e1;
  --accent: #0284c7;
  --accent-hover: #0369a1;
  --accent-soft: #e0f2fe;
  --accent-text: #ffffff;
  --good: #16a34a;
  --good-soft: #dcfce7;
  --bad: #dc2626;
  --bad-soft: #fee2e2;
  --warn: #d97706;
  --warn-soft: #fef3c7;
  --info: #0284c7;
  --info-soft: #e0f2fe;
  --shadow-sm: 0 1px 2px rgba(15,23,42,0.04);
  --shadow: 0 4px 12px rgba(15,23,42,0.06);
  --shadow-lg: 0 8px 32px rgba(15,23,42,0.10);
  --radius: 10px;
  --radius-lg: 14px;
}

[data-theme="dark"] {
  --bg: #0b1220;
  --bg-elev: #131c2e;
  --bg-card: #131c2e;
  --bg-hover: #1c2640;
  --bg-soft: #0f1729;
  --border: #1e293b;
  --border-strong: #334155;
  --text: #e2e8f0;
  --text-soft: #94a3b8;
  --text-dim: #64748b;
  --text-faint: #475569;
  --accent: #38bdf8;
  --accent-hover: #0ea5e9;
  --accent-soft: rgba(56,189,248,0.15);
  --accent-text: #0b1220;
  --good: #4ade80;
  --good-soft: rgba(74,222,128,0.15);
  --bad: #f87171;
  --bad-soft: rgba(248,113,113,0.15);
  --warn: #fbbf24;
  --warn-soft: rgba(251,191,36,0.15);
  --info: #38bdf8;
  --info-soft: rgba(56,189,248,0.15);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --shadow: 0 4px 12px rgba(0,0,0,0.35);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.45);
}

@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --bg: #0b1220;
    --bg-elev: #131c2e;
    --bg-card: #131c2e;
    --bg-hover: #1c2640;
    --bg-soft: #0f1729;
    --border: #1e293b;
    --border-strong: #334155;
    --text: #e2e8f0;
    --text-soft: #94a3b8;
    --text-dim: #64748b;
    --text-faint: #475569;
    --accent: #38bdf8;
    --accent-hover: #0ea5e9;
    --accent-soft: rgba(56,189,248,0.15);
    --accent-text: #0b1220;
    --good: #4ade80;
    --good-soft: rgba(74,222,128,0.15);
    --bad: #f87171;
    --bad-soft: rgba(248,113,113,0.15);
    --warn: #fbbf24;
    --warn-soft: rgba(251,191,36,0.15);
    --info: #38bdf8;
    --info-soft: rgba(56,189,248,0.15);
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
    --shadow: 0 4px 12px rgba(0,0,0,0.35);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.45);
  }
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.55;
  min-height: 100vh;
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ============================================================================ Layout */
.shell {
  display: flex;
  min-height: 100vh;
}
.sidebar {
  width: 240px;
  flex-shrink: 0;
  background: var(--bg-elev);
  border-right: 1px solid var(--border);
  position: sticky;
  top: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 18px 12px;
  overflow-y: auto;
}
.sidebar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 8px 18px;
  font-weight: 700;
  font-size: 17px;
  letter-spacing: -0.01em;
  color: var(--text);
}
.sidebar-brand .logo {
  width: 28px; height: 28px;
  background: linear-gradient(135deg, #0ea5e9, #6366f1);
  border-radius: 8px;
  display: grid; place-items: center;
  font-size: 16px;
}
.sidebar-brand .sub {
  display: block;
  font-size: 11px;
  font-weight: 400;
  color: var(--text-dim);
  margin-top: 2px;
  letter-spacing: 0;
}
.nav-section {
  font-size: 10px;
  text-transform: uppercase;
  font-weight: 700;
  color: var(--text-dim);
  letter-spacing: 0.06em;
  padding: 14px 10px 6px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 10px;
  border-radius: 8px;
  color: var(--text-soft);
  font-weight: 500;
  font-size: 14px;
  cursor: pointer;
  border: none;
  background: transparent;
  width: 100%;
  text-align: left;
  font-family: inherit;
  transition: background 0.12s, color 0.12s;
}
.nav-item:hover { background: var(--bg-hover); color: var(--text); }
.nav-item.active { background: var(--accent-soft); color: var(--accent); }
.nav-item .nav-icon { font-size: 16px; width: 18px; text-align: center; flex-shrink: 0; }
.nav-item .nav-badge {
  margin-left: auto;
  font-size: 10px;
  background: var(--bg-hover);
  color: var(--text-dim);
  padding: 2px 7px;
  border-radius: 999px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.nav-item.active .nav-badge { background: var(--accent); color: var(--accent-text); }

.sidebar-footer {
  margin-top: auto;
  padding-top: 18px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.sidebar-footer .theme-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border-radius: 8px;
  background: transparent;
  border: none;
  color: var(--text-soft);
  cursor: pointer;
  font-size: 13px;
  font-family: inherit;
  width: 100%;
  text-align: left;
}
.sidebar-footer .theme-toggle:hover { background: var(--bg-hover); color: var(--text); }

.content {
  flex: 1;
  min-width: 0;
}
.content-inner {
  max-width: 900px;
  margin: 0 auto;
  padding: 28px 36px 80px;
}

/* ============================================================================ Mobile */
.mobile-bar {
  display: none;
  background: var(--bg-elev);
  border-bottom: 1px solid var(--border);
  padding: 10px 14px;
  position: sticky;
  top: 0;
  z-index: 20;
  align-items: center;
  gap: 10px;
}
.mobile-bar .brand {
  font-weight: 700;
  flex: 1;
  display: flex;
  align-items: center;
  gap: 8px;
}
.mobile-bar .menu-btn {
  border: 1px solid var(--border);
  background: var(--bg-card);
  border-radius: 8px;
  padding: 6px 10px;
  font-family: inherit;
  font-size: 18px;
  cursor: pointer;
  color: var(--text);
}

@media (max-width: 820px) {
  .sidebar {
    position: fixed;
    left: 0; top: 0; bottom: 0;
    z-index: 30;
    width: 260px;
    transform: translateX(-100%);
    transition: transform 0.2s;
  }
  .sidebar.open { transform: translateX(0); box-shadow: var(--shadow-lg); }
  .sidebar-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 25;
  }
  .sidebar-backdrop.show { display: block; }
  .mobile-bar { display: flex; }
  .content-inner { padding: 18px 16px 80px; }
}

/* ============================================================================ Typography */
h1 { font-size: 26px; font-weight: 700; margin: 0 0 4px; letter-spacing: -0.02em; line-height: 1.2; }
h2 { font-size: 19px; font-weight: 700; margin: 28px 0 12px; letter-spacing: -0.01em; }
h3 { font-size: 16px; font-weight: 700; margin: 20px 0 8px; }
h4 { font-size: 14px; font-weight: 700; margin: 14px 0 6px; }
.page-subtitle { color: var(--text-soft); margin: 0 0 24px; font-size: 14px; }
.page-header { margin-bottom: 24px; }
.muted { color: var(--text-soft); }
.dim { color: var(--text-dim); }
.tabnum { font-variant-numeric: tabular-nums; }
code, .mono { font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 13px; }

/* ============================================================================ Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 8px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.12s;
  white-space: nowrap;
}
.btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn.primary {
  background: var(--accent);
  color: var(--accent-text);
  border-color: var(--accent);
}
.btn.primary:hover:not(:disabled) {
  background: var(--accent-hover);
  border-color: var(--accent-hover);
  color: var(--accent-text);
}
.btn.ghost { background: transparent; border-color: transparent; color: var(--text-soft); }
.btn.ghost:hover:not(:disabled) { background: var(--bg-hover); color: var(--text); border-color: transparent; }
.btn.danger { color: var(--bad); border-color: var(--border); }
.btn.danger:hover:not(:disabled) { border-color: var(--bad); color: var(--bad); }
.btn.large { padding: 12px 20px; font-size: 15px; }
.btn.small { padding: 5px 10px; font-size: 12px; }

/* ============================================================================ Cards */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 22px;
  box-shadow: var(--shadow-sm);
}
.card.elevated { box-shadow: var(--shadow); }
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 14px;
  gap: 12px;
  flex-wrap: wrap;
}
.card-title { font-size: 15px; font-weight: 700; margin: 0; }

/* ============================================================================ Badges & Pills */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 999px;
  background: var(--bg-hover);
  color: var(--text-soft);
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}
.badge.good { background: var(--good-soft); color: var(--good); }
.badge.bad { background: var(--bad-soft); color: var(--bad); }
.badge.warn { background: var(--warn-soft); color: var(--warn); }
.badge.info { background: var(--info-soft); color: var(--info); }

/* ============================================================================ Stats grid (dashboard) */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.stat {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
}
.stat .stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; }
.stat .stat-value { font-size: 28px; font-weight: 700; margin-top: 6px; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
.stat .stat-sub { font-size: 12px; color: var(--text-soft); margin-top: 4px; }
.stat.accent .stat-value { color: var(--accent); }
.stat.good .stat-value { color: var(--good); }
.stat.warn .stat-value { color: var(--warn); }
.stat.bad .stat-value { color: var(--bad); }

/* ============================================================================ Progress bar */
.progress {
  height: 8px;
  background: var(--bg-hover);
  border-radius: 999px;
  overflow: hidden;
  margin-top: 6px;
}
.progress .progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 999px;
  transition: width 0.3s;
}
.progress.good .progress-fill { background: var(--good); }
.progress.warn .progress-fill { background: var(--warn); }
.progress.bad .progress-fill { background: var(--bad); }
.progress-row {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.progress-row:last-child { border-bottom: none; }
.progress-row .pr-label { font-size: 14px; font-weight: 500; }
.progress-row .pr-meta { font-size: 12px; color: var(--text-soft); margin-top: 2px; font-variant-numeric: tabular-nums; }
.progress-row .pr-track {
  grid-column: 1 / -1;
  margin-top: 4px;
}

/* ============================================================================ Tabs (sub-nav) */
.subtabs {
  display: flex;
  gap: 4px;
  margin-bottom: 20px;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.subtabs::-webkit-scrollbar { display: none; }
.subtab {
  padding: 10px 14px;
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--text-soft);
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  margin-bottom: -1px;
  transition: color 0.12s, border 0.12s;
}
.subtab:hover { color: var(--text); }
.subtab.active { color: var(--accent); border-bottom-color: var(--accent); }
.subtab .count {
  font-size: 11px;
  color: var(--text-dim);
  font-weight: 500;
  margin-left: 6px;
  font-variant-numeric: tabular-nums;
}
.subtab.active .count { color: var(--accent); opacity: 0.7; }

/* Pill toggle (mode switch) */
.pill-toggle {
  display: inline-flex;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 3px;
  gap: 2px;
}
.pill-toggle .pill {
  border: none;
  background: transparent;
  padding: 6px 14px;
  border-radius: 999px;
  color: var(--text-soft);
  font-family: inherit;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.12s;
}
.pill-toggle .pill:hover { color: var(--text); }
.pill-toggle .pill.active { background: var(--accent); color: var(--accent-text); }

/* ============================================================================ Flashcard */
.flashcard {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
  min-height: 320px;
  padding: 28px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}
.flashcard .fc-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  color: var(--text-dim);
}
.flashcard .fc-question {
  font-size: 19px;
  font-weight: 600;
  line-height: 1.4;
  color: var(--text);
}
.flashcard .fc-question .q-de {
  display: block;
  font-size: 14px;
  color: var(--text-soft);
  font-weight: 400;
  font-style: italic;
  margin-top: 8px;
  line-height: 1.5;
}
.flashcard .fc-answer {
  background: var(--bg-soft);
  border-left: 3px solid var(--accent);
  padding: 16px 18px;
  border-radius: 8px;
  font-size: 15px;
  line-height: 1.6;
  white-space: pre-wrap;
}
.flashcard .fc-answer .a-de {
  display: block;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px dashed var(--border);
  font-style: italic;
  color: var(--text-soft);
  font-size: 13px;
  white-space: pre-wrap;
}
.lang-tag {
  display: inline-block;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 700;
  color: var(--text-dim);
  margin-right: 6px;
  background: var(--bg-hover);
  padding: 1px 5px;
  border-radius: 3px;
  vertical-align: middle;
}
.reveal-btn {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  background: var(--accent);
  color: var(--accent-text);
  border: none;
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.12s;
}
.reveal-btn:hover { background: var(--accent-hover); }

.nav-controls {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 16px;
}

.srs-controls {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin-top: 12px;
}
.srs-btn {
  padding: 12px 8px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text);
  font-family: inherit;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: 2px;
  align-items: center;
  transition: all 0.12s;
}
.srs-btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); }
.srs-btn .srs-emoji { font-size: 18px; }
.srs-btn .srs-sub { font-size: 9px; color: var(--text-dim); font-weight: 500; }
.srs-btn.srs-again:hover { border-color: var(--bad); color: var(--bad); }
.srs-btn.srs-hard:hover { border-color: var(--warn); color: var(--warn); }
.srs-btn.srs-good:hover { border-color: var(--good); color: var(--good); }
.srs-btn.srs-easy:hover { border-color: var(--accent); color: var(--accent); }

/* ============================================================================ Quiz choices */
.choices { display: flex; flex-direction: column; gap: 10px; }
.choice {
  text-align: left;
  padding: 14px 16px;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 10px;
  font-family: inherit;
  font-size: 14px;
  line-height: 1.5;
  cursor: pointer;
  transition: all 0.12s;
  white-space: pre-wrap;
  position: relative;
}
.choice:hover:not(:disabled) { border-color: var(--accent); background: var(--bg-hover); }
.choice:disabled { cursor: default; }
.choice.correct {
  background: var(--good-soft);
  border-color: var(--good);
}
.choice.incorrect {
  background: var(--bad-soft);
  border-color: var(--bad);
}
.choice .marker {
  display: inline-block;
  width: 22px;
  height: 22px;
  line-height: 22px;
  text-align: center;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-weight: 700;
  margin-right: 10px;
  font-size: 11px;
  color: var(--text-soft);
}
.choice.correct .marker { background: var(--good); color: white; border-color: var(--good); }
.choice.incorrect .marker { background: var(--bad); color: white; border-color: var(--bad); }
.choice .check-icon {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 16px;
  font-weight: 700;
}

/* ============================================================================ Inputs */
.input, .textarea {
  width: 100%;
  padding: 12px 14px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 10px;
  font-size: 14px;
  font-family: inherit;
}
.textarea { min-height: 120px; line-height: 1.5; resize: vertical; }
.input:focus, .textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

.feedback {
  padding: 12px 14px;
  border-radius: 10px;
  font-size: 13px;
  line-height: 1.5;
  margin-top: 12px;
}
.feedback.good { background: var(--good-soft); color: var(--good); border: 1px solid currentColor; }
.feedback.bad { background: var(--bad-soft); color: var(--bad); border: 1px solid currentColor; }
.feedback.warn { background: var(--warn-soft); color: var(--warn); border: 1px solid currentColor; }

/* ============================================================================ Mock Exam */
.exam-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 18px;
  margin-bottom: 16px;
  position: sticky;
  top: 0;
  z-index: 5;
}
.exam-timer {
  font-family: "SF Mono", Menlo, Consolas, monospace;
  font-size: 18px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: var(--text);
  background: var(--bg-soft);
  padding: 6px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);

<script id="data-cards" type="application/json">[{"id":"law-1","category":"Legislation","original_id":1,"q_de":"Welche Publikation gibt Auskunft über den genauen Verlauf der Trennlinie zwischen den beiden Gebieten Jura/Mittelland und Alpen?","a_de":"Segelflugkarte (GLDK)","q_en":"Which publication shows the exact boundary line between the two regions Jura/Mittelland and the Alps?","a_en":"The Glider Map (GLDK / Segelflugkarte)."},{"id":"law-2","category":"Legislation","original_id":2,"q_de":"Was bedeutet die grüne Trennlinie auf der Segelflugkarte?","a_de":"Trennlinie auf Segelflugkarte in grün ist Trennung Mittelland/Jura (Jura & Flachland darf bis 3050m geflogen werden) & den Alpen bis 4550m - C Grenze (wenn Militär nicht aktiv - sonst MIL-ON, nur bis 3950 in Alpen). In den Alpen darf man höher fliegen, weil Grund (Alpen) höher - deswegen auf Luftraum höher. Jedes Jahr neue Segelflugkarte im März.","q_en":"What does the green dividing line on the Glider Map mean?","a_en":"It separates the Mittelland/Jura region (Jura & lowlands, ceiling 3050 m) from the Alps (ceiling 4550 m — the lower limit of airspace C, when military is off; with MIL-ON only up to 3950 m in the Alps). You can fly higher in the Alps because the ground itself is higher, so the airspace above is raised. A new Glider Map is published every year in March."},{"id":"law-3","category":"Legislation","original_id":3,"q_de":"Wie hoch darf man in den Alpen über die Berge fliegen?","a_de":"Eigentlich nur bis 4550 - aber wenn Berg z.B. 4200M hoch ist, dann darf man nochmals 600 Meter darüber fliegen, also ca. 4800. MIL-ON: 3950 / MIL-OFF: 4550","q_en":"How high may you fly over the mountains in the Alps?","a_en":"Normally up to 4550 m — but if a peak is e.g. 4200 m high, you may fly another 600 m above it (≈ 4800 m). With MIL-ON: 3950 m. With MIL-OFF: 4550 m."},{"id":"law-4","category":"Legislation","original_id":4,"q_de":"Zeiten von MIL-ON?","a_de":"Bei MIL-ON (in Alpen) bis auf 3950m fliegen. Zeiten: Mo-Fr Vormittag: 7:30 - 12.05, Nachmittag: 13.15 - 17.05","q_en":"What are the MIL-ON times (Swiss military airspace activation)?","a_en":"During MIL-ON (in the Alps) you may only fly up to 3950 m. Times: Monday–Friday, mornings 07:30–12:05 and afternoons 13:15–17:05."},{"id":"law-5","category":"Legislation","original_id":5,"q_de":"LSR","a_de":"Restricted Luftraum","q_en":"What does LS-R stand for?","a_en":"LS-R = Restricted airspace (Luftraumbeschränkungsgebiet)."},{"id":"law-6","category":"Legislation","original_id":6,"q_de":"Welches ist der Unterschied zwischen grünen und roten LS-R auf der Segelflugkarte?","a_de":"Je nach Aktivierungszustand und Benützungsbedingungen darf in die rote LS-R Zone nicht eingeflogen werden. (in GLDK ersichtlich - Aktualität in DABS checken, aktiv = verboten). Die grünen LS-R Zonen stellen je nach Aktivierungszustand eine Erleichterung dar.","q_en":"What's the difference between green and red LS-R zones on the Glider Map?","a_en":"Red LS-R zones cannot be entered when active — check the DABS for current status (active = forbidden). Green LS-R zones, depending on activation status, actually represent a relaxation of the normal rules (\"LS-R for gliders\")."},{"id":"law-7","category":"Legislation","original_id":7,"q_de":"Grüne LSR — Regeln?","a_de":"In den LSR for gliders (ehemalige Segelflug zonen) gelten verminderte Wolkenabstände von vertikal 50 m und horizontal 100 m. Die Flugsicht bleibt indessen unverändert 5 km resp. 8 km. Obwohl LSR for gliders eine Erleichterung darstellen, werden sie als LS-R (Luftraumbeschränkungsgebiet) qualifiziert. Die Einschränkungen beziehen sich auf den darin verbotenen IFR-Verkehr. Sie sind vom 1. März bis 31. Oktober von Sonnenaufgang bis Sonnenuntergang aktiv. Achtung: NUR WOLKENABSTÄNDE - betrifft nie Flughöhe. Spezialfall LSR grün mit \"MO\" = Nur aktiv bei Mill-Off. Spezialfall LSR grün mit \"MA\" = kann auch bei Mill-On aktiv sein, nachfragen.","q_en":"What rules apply in green LS-R zones (\"LSR for gliders\")?","a_en":"Inside an LSR for gliders (former glider zones) reduced cloud clearances apply: 50 m vertical, 100 m horizontal. Flight visibility stays the same (5 km / 8 km). They're classified as LS-R because IFR traffic is forbidden inside them. Active 1 March – 31 October from sunrise to sunset.\n\nIMPORTANT: This only affects cloud clearance, never altitude limits.\n• \"MO\" suffix = only active when MIL-OFF.\n• \"MA\" suffix = may also be active during MIL-ON — check by radio/phone."},{"id":"law-8","category":"Legislation","original_id":8,"q_de":"Regeln bei LSR for Gliders?","a_de":"Spezial von Wolke Abstand 50 M Vertikal und 100 Horizontal - ab 2500 wieder die grossen Wolkenabstände","q_en":"Special rules in LSR for Gliders?","a_en":"Reduced cloud clearance: 50 m vertical, 100 m horizontal. From 2500 m AMSL upward the normal larger cloud clearances apply again."},{"id":"law-9","category":"Legislation","original_id":9,"q_de":"LSD","a_de":"Danger im Luftraum, Vorsicht - z.B. Schiessübungen, nicht empfohlen dort reinzufliegen","q_en":"What does LS-D stand for?","a_en":"LS-D = Danger area. Caution — e.g. live firing exercises. Strongly recommended not to fly into it."},{"id":"law-10","category":"Legislation","original_id":10,"q_de":"NOTAM","a_de":"Nachrichten für Luftfahrer (Notice to Airmen) - täglich aktualisiert über Hindernisse (sollte man rechtlich auch täglich checken, DABS reicht aber \"eigentlich\")","q_en":"What is a NOTAM?","a_en":"Notice to Airmen — daily updates on hazards and obstacles. Legally you should check it daily; in practice the DABS usually suffices for free-flight pilots."},{"id":"law-11","category":"Legislation","original_id":11,"q_de":"DABS — Daily Airspace Bulletin Switzerland","a_de":"Das DABS (Daily Airspace Bulletin Switzerland) stellt Luftraumeinschränkungen in der Schweiz graphisch dar. Achtung: Zeit ist wichtig - UTC im Winter 1h dazu rechnen und Sommer 2h dazurechnen. Auf www.skybriefing.com täglich um 16.00 Uhr für den Folgetag. Bsp: WEF auf zweiter Seite nur schriftlich z.B. Militärzeiten ausgedehnt.","q_en":"What is the DABS (Daily Airspace Bulletin Switzerland)?","a_en":"The DABS shows Swiss airspace restrictions graphically. Times are in UTC — add 1 h in winter, 2 h in summer for local time. Published daily at 16:00 on www.skybriefing.com for the following day. Note: special items (e.g. extended military hours during WEF) appear in text on page 2."},{"id":"law-12","category":"Legislation","original_id":12,"q_de":"AIP","a_de":"Luftfahrthandbuch","q_en":"What is the AIP?","a_en":"Aeronautical Information Publication — the official aviation handbook."},{"id":"law-13","category":"Legislation","original_id":13,"q_de":"CTR","a_de":"Controlled Traffic Region (Kontrollzone) - Luftraumklasse nicht G obwohl ab Boden - Kontrollzonen (CTR), welche bis zum Boden reichen. CTR's werden mit gestrichelten Linien und einer transparenten blauen Füllung dargestellt. Sie reichen vom Boden (GND) bis zu einer bestimmten Höhe, welche im dazugehörigen Kästchen (tag) ersichtlich ist.","q_en":"What is a CTR?","a_en":"Control Zone (Kontrollzone). Although it starts at the ground it is NOT Class G — it's a controlled airspace. CTRs are shown on the map with dashed lines and transparent blue fill; they extend from ground (GND) up to a specific altitude listed in the box."},{"id":"law-14","category":"Legislation","original_id":14,"q_de":"Eine CTR …","a_de":"erstreckt sich um Flughafen, von Boden bis Segelflugkartehöhe","q_en":"A CTR…","a_en":"…surrounds an airport and extends from the ground up to the altitude given on the Glider Map."},{"id":"law-15","category":"Legislation","original_id":15,"q_de":"TMA","a_de":"Terminal Maneuvering Area (Nahkontrollbezirk / Anflugsschneisen, um grosse Flugplätze) Klasse C (nur Zürich, Bern, Basel, Genf) oder D. Verlaufen nie bis zu Boden, können unterflogen werden. Jura - gilt Untergrenze auf Karte. Alpen: Untergrenze Karte oder 300AGL (jeweils höheres).","q_en":"What is a TMA?","a_en":"Terminal Maneuvering Area — approach corridors around major airports. Class C (Zürich, Bern, Basel, Geneva) or D. Never extends all the way to ground, so you can fly underneath. In the Jura: respect the lower limit on the map. In the Alps: the lower limit is whichever is higher — the limit on the map OR 300 m AGL."},{"id":"law-16","category":"Legislation","original_id":16,"q_de":"Welches ist die minimale Untergrenze einer TMA im Alpenraum?","a_de":"300 AGL oder die angegebene Untergrenze - je nachdem was mehr Höhe ergibt. Nördlich der Trennlinie: immer angegebene Untergrenze","q_en":"What is the minimum lower limit of a TMA in the Alpine region?","a_en":"300 m AGL or the published lower limit — whichever gives the greater altitude. North of the dividing line (Jura/Mittelland): always the published lower limit."},{"id":"law-17","category":"Legislation","original_id":17,"q_de":"Eine TMA (Höhenangaben)?","a_de":"Befindet sich im *weiteren* Bereich eines Flugplatzes. Ausdehnung und Untergrenze sind in der Segelflugkarte ersichtlich (in Alpen darf man 300m unterfliegen). Tiefer wäre CTR, bis Boden - und Airway Verbindung der Flughäfen, mit Grenzen Angaben Karte)","q_en":"A TMA (altitude data)?","a_en":"Located in the wider area around an airport. Extent and lower limit are shown on the Glider Map (in the Alps you may fly 300 m below the published limit). Below a TMA would be the CTR (down to ground), and connecting them between airports are the Airways — limits shown on the map."},{"id":"law-18","category":"Legislation","original_id":18,"q_de":"Was bedeutet die Abkürzung „HX\"?","a_de":"Keine Betriebszeiten, Aktivierung jederzeit möglich. Die TMA's und CTR's der Landesflughäfen Zürich, Genf und Basel sind permanent, also 24 Stunden (H24) täglich aktiv. Die meisten CTR's und TMA's aber tragen den Zusatz «HX», was bedeutet, dass diese über keine bestimmten Betriebszeiten verfügen, sondern sehr kurzfristig aktiviert werden können. Dies bedeutet für uns, dass wir grundsätzlich davon ausgehen müssen, dass sie aktiv sind. Es gibt aber Möglichkeiten via Flugfunk und teilweise via Telefontonband zu erfahren, ob und wie lange sie aktiv sind oder nicht. Sind sie es nicht, gelten die Benutzungsbedingungen des umgebenden Luftraums der Klassen G und E.","q_en":"What does the abbreviation \"HX\" mean?","a_en":"No fixed operating times — can be activated at any time. The TMAs/CTRs of Zürich, Geneva and Basel are permanent (H24). Most other CTRs/TMAs carry an \"HX\" suffix, meaning they have no scheduled hours and can be activated on short notice. We must assume they are active by default. You can check actual status via radio or recorded phone messages. If inactive, the rules of the surrounding airspace (G or E) apply."},{"id":"law-19","category":"Legislation","original_id":19,"q_de":"HX =","a_de":"Zu unbestimmten Zeiten aktiviert. - per Telefonband abfragen oder Funk (Frequenz immer aufgeführt) - 30 Min Regel. Falls nichts steht = HX24 - immer aktiv. (z.B. LSZH). Temporäre: Sind im NOTAM / DABS (nur Alpnach und Sion - sind dünner eingezeichnet auf Karte)","q_en":"HX =","a_en":"Activated at unscheduled times. Check by phone recording or radio (frequency is always listed). 30-minute rule applies. If nothing is noted = H24 (always active, e.g. LSZH). Temporary activations appear in NOTAM/DABS (only Alpnach and Sion — drawn with thinner lines on the map)."},{"id":"law-20","category":"Legislation","original_id":20,"q_de":"kein HX =","a_de":"Info über Aktivierung im DABS (temporär)","q_en":"No HX label =","a_en":"Information about (temporary) activation can be found in the DABS."},{"id":"law-21","category":"Legislation","original_id":21,"q_de":"AWY","a_de":"Airway (Luftstrasse) - längere Lufträume und Hauptverbindungsstrecken von grossen Flughäfen. Auf der GLDK sehen wir nur eine, die zwischen Zürich und Milano. Sie ist der Luftraumklasse C zugeteilt und ist permanent in Betrieb.","q_en":"What is an AWY?","a_en":"Airway (Luftstrasse) — long, narrow corridors connecting major airports. On the Glider Map only one is visible: Zürich–Milan. Class C airspace, permanently active."},{"id":"law-22","category":"Legislation","original_id":22,"q_de":"FIZ steht für","a_de":"Fluginformationszone (nur in Samedan - Funkkontakt obligatorisch - MA gibt Auskunft)","q_en":"FIZ stands for…","a_en":"Flight Information Zone. In Switzerland only at Samedan — radio contact is mandatory; the flight information officer provides traffic information."},{"id":"law-23","category":"Legislation","original_id":23,"q_de":"In einer FIZ gelten folgende Regeln:","a_de":"Einflug nur nach vorgängig erstellten Funkkontakt auf der entsprechenden Frequenz. Um den Flugplatz Samedan ist eine Fluginformationszone (FIZ) eingerichtet. In dieser ist Funkverkehr mit dem Fluginformationsdienst am Flugplatz Samedan erforderlich. Der Luftraum erfährt deswegen aber keine Klassenänderung (bleibt G und E) und der Mitarbeiter am Funk darf auch keine Freigaben erteilen, sondern nur Verkehrshinweise geben. Trotzdem muss man sich vor dem Einflug in eine FIZ per Funk anmelden. Im Gegensatz dazu wird in einer RMZ (Radio Mandatory Zone) niemand antworten. Dort muss der einfliegende Pilot seine Position und Absichten auf der entsprechenden Frequenz melden (Blindmeldungen), um andere Luftfahrtteilnehmer entsprechend zu informieren.","q_en":"What rules apply in a FIZ?","a_en":"Entry only after establishing radio contact on the appropriate frequency. Around Samedan airfield there is a FIZ where radio contact with the flight information service is required. The airspace class itself does not change (stays G or E), and the FIS operator cannot issue clearances — only traffic advisories. Still, you must announce yourself before entry.\n\nContrast with RMZ (Radio Mandatory Zone): no-one answers there. The entering pilot must blind-broadcast position and intentions on the published frequency to inform other traffic."},{"id":"law-24","category":"Legislation","original_id":24,"q_de":"In einer RMZ gelten folgende Regeln","a_de":"Einflug nur mit Hörbereitschaft und Blindmeldungen auf der entsprechenden Frequenz","q_en":"What rules apply in an RMZ?","a_en":"Entry only with listening watch and self-announcement (blind broadcasts) on the appropriate frequency."},{"id":"law-25","category":"Legislation","original_id":25,"q_de":"FL 150 ist (Alpen auf MIL-OFF)","a_de":"4550 Meter über Meer","q_en":"FL 150 corresponds to (Alps with MIL-OFF)?","a_en":"≈ 4550 m above sea level."},{"id":"law-26","category":"Legislation","original_id":26,"q_de":"Auf welcher Höhe befindet sich FL 100 ca.?","a_de":"3050 Meter über Meer","q_en":"At what altitude is FL 100 approximately?","a_en":"≈ 3050 m above sea level."},{"id":"law-27","category":"Legislation","original_id":27,"q_de":"FL - Flightlevel wird immer nach Druck angepasst","a_de":"1013.25 hPa (Standartdruck). Grund: Höhenmesser misst Druck - schwankt jeden Tag - Druck wird Höhe zugeordnet. Druck verändert sich auch während dem Tag, auch wenn Höhenmesser am Morgen kalibriert wurde. Deshalb Lösung = Flight Level, also nach Standartdruck messen.","q_en":"FL — Flight Level is always referenced to which pressure?","a_en":"1013.25 hPa (standard pressure). Why: altimeters measure pressure, but pressure varies day-to-day and even within a day. Even if you calibrate in the morning it will drift. Solution = Flight Level: a uniform reference based on standard pressure."},{"id":"law-28","category":"Legislation","original_id":28,"q_de":"Bei Hochdruck darf wie viel höher geflogen werden?","a_de":"Über 1037: +200M / 1032-1036: +150M / 1026-1031: +100M / 1020-1025: +50M / 1010-1019: 0M. Tiefdruck würde abgezogen, aber da fliegen wir eh eher nicht :) Hohes Hoch also bspw. +200M Spielraum. AMSL stimmen nur bei Standartatmosphäre.","q_en":"How much higher may you fly in high-pressure conditions?","a_en":"Above 1037 hPa: +200 m  •  1032–1036: +150 m  •  1026–1031: +100 m  •  1020–1025: +50 m  •  1010–1019: 0 m. (In low pressure you'd subtract — but we generally don't fly in low pressure anyway.) AMSL altitudes are exact only under standard atmosphere; high-pressure days give you extra headroom (up to +200 m)."},{"id":"law-29","category":"Legislation","original_id":29,"q_de":"Die schweizerischen Gesetzesbestimmungen, welche den Hängegleitersport betreffen, finden sich insbesondere…","a_de":"Verordnungs Luftfahrzeuge besonderer Kategorie VLK 24. Nov 1994","q_en":"The Swiss legal provisions covering hang-gliding / paragliding are found especially in…","a_en":"The Ordinance on Aircraft of Special Categories (VLK / OACS), 24 November 1994."},{"id":"law-30","category":"Legislation","original_id":30,"q_de":"In der Schweiz relevante Luftraumklassen sind:","a_de":"7 Luftraumklassen = A, B, C, D, E, F, G - 4 davon in der Schweiz. Schweiz: G + E = Einflug frei. Schweiz: C + D nur mit Freigabe und Funkkontakt. G: Grund bis 600m - unkontrolliert. Bis 300AGL: 1.5km Sicht, ausserhalb Wolken / ab 300AGL 5km Sicht, 1.5km Wolkenabstand horizontal, 300 vertikal. E: bis 3050 / 3950 & 4550 AMSL - bis 3050: 5km Sicht, 1.5km Wolkenabstand horizontal und 300 vertikal. Oberhalb 3050 AMSL: 8km Sicht, 1.5 Wolkenabstand horizontal, 300 vertikal. C: Untergrenze 3050/3950/4550 AMSL - Obergrenze: 18'300 AMSL (kontrolliert, 8km Sicht, 1.5 Wolken horizontal, 300 vertikal). D: Vor allem bei Flugplätzen.","q_en":"Which airspace classes are relevant in Switzerland?","a_en":"7 classes globally (A–G), 4 used in Switzerland.\n• G & E — entry is free.\n• C & D — entry only with clearance and radio contact.\n\nG: ground to 600 m AGL, uncontrolled. Below 300 AGL: 1.5 km visibility, clear of cloud. From 300 AGL: 5 km vis, 1.5 km horizontal / 300 m vertical cloud clearance.\n\nE: up to 3050 / 3950 / 4550 m AMSL. Below 3050: 5 km vis, 1.5/300 cloud clearance. Above 3050: 8 km vis, 1.5/300 cloud clearance.\n\nC: lower limit 3050/3950/4550 AMSL — upper limit 18,300 AMSL (controlled; 8 km vis, 1.5/300).\n\nD: mostly around airports."},{"id":"law-31","category":"Legislation","original_id":31,"q_de":"In welchen Luftraumklassen ist kein ständiger Funkkontakt vorgeschrieben?","a_de":"G & E","q_en":"In which airspace classes is continuous radio contact NOT required?","a_en":"G and E."},{"id":"law-32","category":"Legislation","original_id":32,"q_de":"Die obere Begrenzung der Luftraumklasse G ist in der Schweiz auf","a_de":"600 AGL (Beispiel Berg 4200 Meter + 600M)","q_en":"The upper limit of airspace class G in Switzerland is set at…","a_en":"600 m AGL (example: a 4200 m peak + 600 m = up to 4800 m on top)."},{"id":"law-33","category":"Legislation","original_id":33,"q_de":"Von Grund bis 300 AGL gelten Regeln: (Luftraum G)","a_de":"1.5km Sicht, ausserhalb Wolken","q_en":"From ground up to 300 AGL the rules are: (airspace G)","a_en":"1.5 km visibility, clear of cloud."},{"id":"law-34","category":"Legislation","original_id":34,"q_de":"Regeln für Fliegen bis 300m?","a_de":"Bis zu 300 Meter (nicht 600 Meter wie im G), gibt es kein Abstand (Dabei muss man immer den Boden sehen und 1.5km horizontal)","q_en":"Rules for flying up to 300 m AGL?","a_en":"Up to 300 m (not 600 m as in the rest of G), no cloud-clearance distances apply — but you must always have ground in sight and at least 1.5 km horizontal visibility."},{"id":"law-35","category":"Legislation","original_id":35,"q_de":"Welche Distanzen bezüglich Sicht und Wolkenabstand gelten grundsätzlich mittwochs um 14.30 Uhr in den Alpen auf 200 m AGL / 3'800 m AMSL? Sicht / Abstand horizontal / Abstand vertikal","a_de":"1.5km und Bodensicht / ausserhalb / ausserhalb (weil 200 über Grund)","q_en":"What visibility and cloud-clearance distances apply on a Wednesday at 14:30 in the Alps at 200 m AGL / 3800 m AMSL?","a_en":"1.5 km visibility with ground in sight / clear of cloud horizontally / clear of cloud vertically (because still below 300 AGL)."},{"id":"law-36","category":"Legislation","original_id":36,"q_de":"Ab 300 AGL gelten Regeln: (Luftraum G)","a_de":"5km Sicht, 1.5km Wolkenabstand horizontal, 300 vertikal","q_en":"From 300 AGL upward the rules are: (airspace G)","a_en":"5 km visibility, 1.5 km horizontal cloud clearance, 300 m vertical cloud clearance."},{"id":"law-37","category":"Legislation","original_id":37,"q_de":"Regeln fliegen über 300m?","a_de":"Die Sicht muss 5 Km sein. Wolkenabstand: 300 / 300 sowie 1.5 horizontal","q_en":"Rules for flying above 300 m AGL?","a_en":"Visibility must be 5 km. Cloud clearance: 300 m vertical, 1.5 km horizontal."},{"id":"law-38","category":"Legislation","original_id":38,"q_de":"Bis 3050 AGL gelten Regeln: (Luftraum E)","a_de":"5km Sicht, 1.5km Wolkenabstand horizontal und 300 vertikal.","q_en":"Up to 3050 AMSL the rules are: (airspace E)","a_en":"5 km visibility, 1.5 km horizontal cloud clearance, 300 m vertical."},{"id":"law-39","category":"Legislation","original_id":39,"q_de":"Ab 3050 AGL gelten Regeln: (Luftraum E)","a_de":"8km Sicht, 1.5 Wolkenabstand horizontal, 300 vertikal","q_en":"From 3050 AMSL upward the rules are: (airspace E)","a_en":"8 km visibility, 1.5 km horizontal cloud clearance, 300 m vertical."},{"id":"law-40","category":"Legislation","original_id":40,"q_de":"Ab 4550 AGL gelten Regeln: (Luftraum C)","a_de":"Achtung kontrolliert: 8km Sicht, 1.5 Wolken horizontal, 300 vertikal (nur mit Freigabe und Funkkontakt)","q_en":"From 4550 AMSL upward the rules are: (airspace C)","a_en":"Caution — controlled airspace. 8 km visibility, 1.5 km horizontal / 300 m vertical cloud clearance. Entry only with clearance and radio contact."},{"id":"law-41","category":"Legislation","original_id":41,"q_de":"Lufträume mit TAGS","a_de":"Unter und Obergrenze - gerade Zahl über Grund AGL - Kursiv über Meer AMSL - obere Zahl ist blau, Höhe nach Standartatmosphäre - weil auf Meereshöhe gleicher Druck. - Weisse Zahl ist effektive Höhe z.B. GPS - rot hinterlegt: nach STD, kann schwanken)","q_en":"Airspace tags on the map — how to read them?","a_en":"Lower and upper limit are stacked in the box.\n• Plain numbers = AGL.\n• Italic numbers = AMSL.\n• Blue upper number = altitude per standard atmosphere (because at sea level pressure is constant).\n• White number = effective altitude (e.g. GPS).\n• Red-shaded = standard pressure-based, may vary."},{"id":"law-42","category":"Legislation","original_id":42,"q_de":"LS","a_de":"Lower Europe Switzerland - Beispiel: LSZR - ALTENRHEIN, LSZH- Zürich","q_en":"\"LS\" prefix in ICAO codes?","a_en":"Switzerland (Lower Europe — Switzerland). Examples: LSZR Altenrhein, LSZH Zürich."},{"id":"law-43","category":"Legislation","original_id":43,"q_de":"VFR","a_de":"Visual Flight Rules (Sichtflugregeln Gleitschirm)","q_en":"VFR?","a_en":"Visual Flight Rules — what paragliders fly under."},{"id":"law-44","category":"Legislation","original_id":44,"q_de":"IFR","a_de":"Instrument Flight Rules - für Flugobjekte mit ganzer Ausrüstung, die wir nicht haben (Gleitschirm hier nicht reinfliegen)","q_en":"IFR?","a_en":"Instrument Flight Rules — for aircraft equipped to fly without outside visual references. Paragliders should never enter IFR conditions."},{"id":"law-45","category":"Legislation","original_id":45,"q_de":"Regeln bei Heliports:","a_de":"Radius 2.5 km / 5km bei Flugplätzen - 600 Meter oberhalb okay (manchmal lokale Bestimmungen Ausnahmen - hilft bei Streckenflügen)","q_en":"Rules around heliports?","a_en":"Stay 2.5 km away (5 km for airfields). Above 600 m over the reference point is OK. Local exceptions sometimes apply — useful to know for XC flights."},{"id":"law-46","category":"Legislation","original_id":46,"q_de":"Welche 5 Fragen stelle ich mir bei der Planung in einem Fluggebiet?","a_de":"- Jahreszeit (März - Oktober = Wolkenabstände)? - Wochentag und Uhrzeit wegen Militär? - Nördlich oder Südlich von Trennlinie? - Höhe? - Standort: Heliport in Nähe?","q_en":"Which 5 questions do I ask when planning a flight in a region?","a_en":"1. Season? (March–October → glider-cloud-clearance rules apply)\n2. Day of week and time? (military activity?)\n3. North or south of the dividing line?\n4. Altitude limits?\n5. Location — is there a heliport nearby?"},{"id":"law-47","category":"Legislation","original_id":47,"q_de":"Im Fluggebiet, was mache ich als Vorbereitung?","a_de":"Landeplatzbesichtigung, Landevolte, Hindernisse. Flugplanung, Notlandeplätze, Turbulenzen, Überlegungen Umwelt, Wild, etc. Lokale Begebenheiten beachten. Info Tafel lesen","q_en":"On site at the flying area, what's your preparation?","a_en":"Inspect the landing field, plan the landing circuit, note obstacles. Plan the flight, emergency landing options, expected turbulence. Consider environment and wildlife. Respect local rules. Read the info board."},{"id":"law-48","category":"Legislation","original_id":48,"q_de":"1 Feet / Fuss für Umrechnung sind","a_de":"30.5 Zentimeter","q_en":"1 foot (for conversion) equals…","a_en":"≈ 30.5 cm."},{"id":"law-49","category":"Legislation","original_id":49,"q_de":"Flugplätze & Heliports Abstände:","a_de":"Heliport Radius: 2.5km (violett, Kreis und H) Flugplatz Zivil: 5km (violett, 1 Kreis und Strich) Flugplatz MIL & Zivil: 5km (violett, zwei Kreise und Strich) Flugplatz MIL: 5km (rot, zwei Kreise und Strich). Mindesthöhe beim Überlfiegen 600M - über Bezugspunkt","q_en":"Distances around airfields and heliports?","a_en":"• Heliport: 2.5 km radius (violet, circle + H).\n• Civil airfield: 5 km (violet, one circle + line).\n• Joint civil/military: 5 km (violet, two circles + line).\n• Military airfield: 5 km (red, two circles + line).\nMinimum altitude when overflying: 600 m above the reference point."},{"id":"law-50","category":"Legislation","original_id":50,"q_de":"Welcher minimale horizontale Abstand muss zu den Pisten eines für Flugzeuge bestimmten militärischen Flugplatzes ohne Kontrollzone (CTR) und bei Flugplätzen mit CTR, wenn diese inaktiv ist, bis 600 über dem Platz eingehalten werden?","a_de":"5km, aber nur während militärischen Betriebszeiten","q_en":"What minimum horizontal distance must you keep from the runways of a military airfield (no CTR, or with CTR but inactive) below 600 m above the field?","a_en":"5 km — but only during military operating hours."},{"id":"law-51","category":"Legislation","original_id":51,"q_de":"Menschenansammlungen im Freien, Gebäude, öffentliche Strassen und Skipisten, öffentliche Transportanlagen sowie elektrische Freileitungen und andere Kabel…","a_de":"sind mit einem Abstand zu umfliegen oder überfliegen, der genügend Sicherheit gewährt.","q_en":"Outdoor crowds, buildings, public roads, ski slopes, public transport infrastructure, overhead power lines and other cables…","a_en":"…must be flown around or over at a distance that provides sufficient safety."},{"id":"law-52","category":"Legislation","original_id":52,"q_de":"Gemäss Verordnung über Luftfahrzeuge besonderer Kategorie (VLK) muss die Lufttüchtigkeit eines Hängegleiters…","a_de":"von keiner Instanz geprüft werden - ich als Pilotin bin selbst dafür verantwortlich (regelmässiger Check empfohlen).","q_en":"According to the VLK ordinance, the airworthiness of a hang-glider/paraglider must…","a_en":"…not be checked by any official body — I as the pilot am personally responsible. Regular inspections are recommended."},{"id":"law-53","category":"Legislation","original_id":53,"q_de":"Das Schleppen von Hängegleitern mit Winden oder Fahrzeugen","a_de":"bis 150m erlaubt, danach Bewilligung","q_en":"Towing hang-gliders/paragliders with winches or vehicles","a_en":"Permitted up to 150 m AGL; above that requires authorisation."},{"id":"law-54","category":"Legislation","original_id":54,"q_de":"Starts und Landungen auf öffentlichen Gewässern","a_de":"Bewilligung von kantonalem Schifffahrtamt","q_en":"Take-offs and landings on public waters?","a_en":"Authorisation from the cantonal navigation office is required."},{"id":"law-55","category":"Legislation","original_id":55,"q_de":"Ausbildungsflüge dürfen nur unter der unmittelbaren Aufsicht von Personen ausgeführt werden,","a_de":"gültiger Fluglehrerausweis","q_en":"Training flights may be conducted only under the direct supervision of persons holding…","a_en":"…a valid flight-instructor license."},{"id":"law-56","category":"Legislation","original_id":56,"q_de":"Welche Art von Versicherung ist während Hängegleiterflügen gesetzlich vorgeschrieben?","a_de":"Hängegleiterhaftpflicht (deckt 1Mio.)","q_en":"Which type of insurance is legally required during hang-glider/paraglider flights?","a_en":"Free-flight liability insurance (minimum cover CHF 1 million)."},{"id":"law-57","category":"Legislation","original_id":57,"q_de":"Kommerzielle Flüge mit einer Begleitperson ohne fliegerische Vorkenntnisse im Bereich des Hängegleitens","a_de":"Doppelsitzer 3 Ausweis","q_en":"Commercial tandem flights with a passenger having no flying background — what license is required?","a_en":"Tandem license (Doppelsitzer 3 / License A)."},{"id":"law-58","category":"Legislation","original_id":58,"q_de":"Die Abkürzung \"FL\" steht für","a_de":"Flugfläche","q_en":"The abbreviation \"FL\" stands for…","a_en":"Flight Level (Flugfläche)."},{"id":"law-59","category":"Legislation","original_id":59,"q_de":"Wie gross ist der Durchmesser des Zielkreises anlässlich der praktischen Teilprüfung zum Erwerb des Hängegleiterpilotenausweis?","a_de":"Gleitschirm 30 / Delta 80","q_en":"What is the diameter of the target circle in the practical exam for the paragliding pilot license?","a_en":"Paraglider: 30 m. Hang glider (delta): 80 m."},{"id":"law-60","category":"Legislation","original_id":60,"q_de":"Wer kann gesetzliche Bestimmungen über die Benützung des schweizerischen Luftraums erlassen?","a_de":"Nur Bund","q_en":"Who can issue legal provisions on the use of Swiss airspace?","a_en":"Only the Confederation (federal government)."},{"id":"law-61","category":"Legislation","original_id":61,"q_de":"Welche Flugfunkfrequenz ist speziell für die Hängegleiterschulung reserviert?","a_de":"123.430","q_en":"Which radio frequency is reserved for hang-gliding training?","a_en":"123.430 MHz."},{"id":"law-62","category":"Legislation","original_id":62,"q_de":"Welche Flugfunkfrequenz ist speziell für die Funkverbindung zwischen Hängegleitern im Flug reserviert?","a_de":"130.930","q_en":"Which radio frequency is reserved for hang-glider/paraglider air-to-air communication?","a_en":"130.930 MHz."},{"id":"law-63","category":"Legislation","original_id":63,"q_de":"Zur Benützung des Flugfunks auf der Frequenz 130.930 MHz","a_de":"Keine Ausbildung erforderlich","q_en":"To use the 130.930 MHz radio frequency…","a_en":"…no training/certification is required."},{"id":"law-64","category":"Legislation","original_id":64,"q_de":"Wieviel Zeit darf gemäss den Weisungen über die Fähigkeitsprüfung für Hängegleiterpiloten höchstens zwischen theoretischer und praktischer Teilprüfung liegen?","a_de":"36 Monate","q_en":"What is the maximum time allowed between the theory and practical parts of the pilot exam?","a_en":"36 months."},{"id":"law-65","category":"Legislation","original_id":65,"q_de":"Gemäss den Weisungen über die Fähigkeitsprüfung für Hängegleiterpiloten kann eine nichtbestandene theoretische und praktische Teilprüfung frühestens nach einer erneuten Vorbereitungszeit von","a_de":"12 Tagen wiederholt werden","q_en":"How long after failing the theory or practical part of the exam may you re-sit it?","a_en":"At the earliest after 12 days of further preparation."},{"id":"law-66","category":"Legislation","original_id":66,"q_de":"Wo kann ein Prüfungsteilnehmer rekurrieren, wenn er der Meinung ist, dass der Prüfungsentscheid des Sachverständigen nicht weisungskonform zustande gekommen ist?","a_de":"Bundesverwaltungsgericht","q_en":"Where can an examinee appeal if they believe the examiner's decision was not in line with the regulations?","a_en":"The Federal Administrative Court (Bundesverwaltungsgericht)."},{"id":"law-67","category":"Legislation","original_id":67,"q_de":"Hängegleiter fliegen nach welchen Regeln?","a_de":"ausschliesslich unter VFR (Sichtflug) Richtlinien","q_en":"Hang-gliders/paragliders fly under which flight rules?","a_en":"Exclusively under VFR (visual flight rules)."},{"id":"law-68","category":"Legislation","original_id":68,"q_de":"Hängegleiter mit Elektroantrieb dürfen","a_de":"Nur auf Flugfeldern starten","q_en":"Hang-gliders/paragliders with electric propulsion may…","a_en":"…only take off from airfields."},{"id":"law-69","category":"Legislation","original_id":69,"q_de":"Hängegleiter dürfen nur benützt werden, wenn eine Haftpflichtversicherung Schäden deckt,","a_de":"die Unbeteiligten auf der Erde (nur Boden, nicht Luft) zugefügt werden","q_en":"Hang-gliders/paragliders may only be used if liability insurance covers damage…","a_en":"…caused to uninvolved third parties on the ground (ground only — not in the air)."},{"id":"law-70","category":"Legislation","original_id":70,"q_de":"Jeder Hängegleiter muss in der Schweiz wie folgt beschriftet sein:","a_de":"SHV Kennzeichen (6677X) & Herstellerschild","q_en":"Every hang-glider/paraglider in Switzerland must be marked with:","a_en":"The SHV identification number (e.g. 6677X) and the manufacturer's plaque."},{"id":"law-71","category":"Legislation","original_id":71,"q_de":"Innerhalb welcher Frist hat ein Prüfungsteilnehmer das Rekursrecht wahrzunehmen…?","a_de":"30 Tage","q_en":"Within what deadline must an examinee file an appeal?","a_en":"30 days."},{"id":"law-72","category":"Legislation","original_id":72,"q_de":"Sofern keine Waren, aber die erforderlichen Papiere mitgeführt werden, ist es mit einem Hängegleiter…","a_de":"Laut VLK gestattet (in CH rein und raus - Achtung Rechte / Regeln im Ausland!)","q_en":"Provided no goods are carried but the necessary documents are, with a hang-glider/paraglider it is…","a_en":"…permitted under the VLK to cross the Swiss border. Note: laws in other countries may differ — respect them."},{"id":"law-73","category":"Legislation","original_id":73,"q_de":"Durch wen lässt der Bund die direkte Aufsicht über den zivilen Luftverkehr ausüben?","a_de":"BAZL (Reihenfolge ist: 1. Bund - Gesetze, 2. BAZL - Aufsicht, 3. SHV - Ausführung. Zusätzlich VLK - Gesetzesbestimmungen für Luftfahrzeuge besonderer Kategorien)","q_en":"Through whom does the Confederation exercise direct supervision of civil aviation?","a_en":"BAZL (Federal Office of Civil Aviation). Chain: 1. Confederation — makes laws  •  2. BAZL — supervises  •  3. SHV — implements. The VLK adds the legal provisions for special-category aircraft."},{"id":"law-74","category":"Legislation","original_id":74,"q_de":"Unterscheidung Lufträume auf GLDK?","a_de":"Dunkelblaue Linien stehen für permanente, hellblau und dünnere für temporäre Lufträume.","q_en":"How are airspaces visually distinguished on the Glider Map?","a_en":"Dark-blue lines = permanent airspaces. Light-blue / thinner lines = temporary airspaces."},{"id":"law-75","category":"Legislation","original_id":75,"q_de":"Hängegleiter sind mit gut sichtbarem Schild zu versehen mit:","a_de":"Hersteller, Baumuster, Baujahr, Hersteller Info zu minimaler und maximaler Zuladung.","q_en":"Hang-gliders/paragliders must carry a clearly visible plaque showing:","a_en":"Manufacturer, type/model, year of manufacture, manufacturer's information on minimum and maximum load."},{"id":"law-76","category":"Legislation","original_id":76,"q_de":"LSP","a_de":"Sperrgebiete (in der CH aktuell keine auf der Segelflugkarte","q_en":"What does LS-P mean?","a_en":"Prohibited area (Sperrgebiet). Currently none are shown on the Swiss Glider Map."},{"id":"law-77","category":"Legislation","original_id":77,"q_de":"Welche Publikation macht Angaben über die militärischen Flugdienstzeiten?","a_de":"DABS","q_en":"Which publication shows military flight-service hours?","a_en":"The DABS."},{"id":"law-78","category":"Legislation","original_id":78,"q_de":"Eine LS-R for gliders mit dem Zusatz „MA\" ist von März bis zum 31. Oktober","a_de":"Bei Mil-off aktiv. Bei MIL-ON kann sie auf Anfrage bei der entsprechenden Stelle aktiviert werden","q_en":"An LS-R for gliders with suffix \"MA\" — what's its activation status March–31 Oct?","a_en":"Active when MIL-OFF. When MIL-ON, it can be activated on request with the relevant agency."},{"id":"law-79","category":"Legislation","original_id":79,"q_de":"Welche Personengruppe darf selbständig gelegentliche Hängegleiterflüge im schweizerischen Luftraum absolvieren, ohne im Besitz des schweizerischen amtlichen Hängegleiterpilotenausweises zu sein?","a_de":"Hängegleiterpiloten mit Wohnsitz im Ausland, welche Inhaber eines gleichwärtigen ausländischen Ausweises sind","q_en":"Which group may occasionally fly hang-gliders/paragliders in Swiss airspace without holding the Swiss license?","a_en":"Pilots resident abroad who hold an equivalent foreign license (or international IPPI)."},{"id":"law-80","category":"Legislation","original_id":80,"q_de":"Der Inhalt der Prüfungen zum Erwerb von amtlichen Ausweisen","a_de":"festgelegt vom Bundesamt für Zivilfahrt genehmigten Weisungen des SHV","q_en":"The content of the exams for official pilot licenses is…","a_en":"…laid down in the SHV directives, approved by BAZL (Federal Office of Civil Aviation)."},{"id":"law-81","category":"Legislation","original_id":81,"q_de":"Eine AWY","a_de":"verbindet verschiedene Flughäfen miteinander und hat klar definierte Seiten- und Untergrenzen","q_en":"An AWY (Airway)…","a_en":"…connects different airports and has clearly defined lateral and lower limits."},{"id":"law-82","category":"Legislation","original_id":82,"q_de":"Welche Publikation macht Angaben über die militärischen Flugdienstzeiten?","a_de":"GLDK","q_en":"Which publication shows the framework for military flight-service hours (alongside DABS)?","a_en":"The Glider Map (GLDK) lists the standard times; the DABS shows daily activation."},{"id":"law-83","category":"Legislation","original_id":83,"q_de":"5 Punkte Check für praktische Prüfung","a_de":"1. Gurtzeug & persönliche Ausrüstung: a) Beingurten geschlossen und angezogen, b) Bauch - und Brustgurt geschlossen, Helm geschlossen c) Rettungsschirm check, d) Beschleuniger check, e) Karabiner geschlossen und verriegelt. 2. Tragegurte/Leinen: Tragegurte nicht verdreht, korrekter Verlauf aller Leinen vorgängig gecheckt, mindestens die mittleren A-Leinen liegen frei und spannen sich, freier Verlauf der Bremsleinen. 3. Schirm: Eintrittskante offen. Die Kalotte liegt wunschgemäss. 4. Wind: Stimmen Windrichtung und Windstärke. 5. Start/Luftraum frei: Rundumblick, ob am Boden und in der Luft alles frei ist. Letzte Startabbruchmöglichkeit nochmals in Erinnerung rufen.","q_en":"The 5-point pre-launch check for the practical exam:","a_en":"1. Harness & personal gear: leg straps fastened and tight, belly+chest strap closed, helmet closed, reserve checked, speedbar checked, carabiners locked.\n\n2. Risers/lines: risers not twisted, line layout pre-checked, at least the middle A-lines lying free and under tension, brake lines run freely.\n\n3. Wing: leading edge open, canopy laid out as desired.\n\n4. Wind: correct direction and acceptable strength.\n\n5. Take-off / airspace clear: 360° look-around — ground and air clear. Mentally rehearse last possible abort point."},{"id":"eq-1","category":"Equipment","original_id":1,"q_de":"Basics über die verschiedenen Schirme","a_de":"Schirm A (Schulungsschirm, kompakt und nicht stark gestreckt, Sicherheit Prio - etwas passiert, Pilot lässt los, Schirm stabilisiert sich wieder, Gleitleistung weniger wichtig - 8km weit), B Schirme - haben die meisten Piloten, C und D wird mit Prüfungen festgelegt - Accroschirme, sehr robust für G Kräfte. Speedflyer: Klein und leicht, mit Ski","q_en":"Basics about the different paraglider classes","a_en":"• A — school glider: compact, low aspect ratio, safety first. If something happens and the pilot lets go, it self-stabilises. Glide performance secondary (~8 km).\n• B — what most pilots fly.\n• C / D — certified through dedicated tests; includes acro wings, very robust against G-loads.\n• Speedflyer: small and light, used with skis."},{"id":"eq-2","category":"Equipment","original_id":2,"q_de":"Wie werden Schirme geprüft?","a_de":"Gütesiegel nach EN Norm für Schirme: Geprüft auf - Schockbelastungstest 2x mit Auto auf 8G, Minimum - meist 12-16 G mittlerweile im Angebot, Leinenfestigkeitstest und Knickprüfung = Briefbericht, danach Flugtest - Bremsweg - 0 bis 30/60 Meter. Manöver werden geflogen, Experte und Testpilot bewerten, Manöver wird 5 Mal geflogen. Kann 4 Mal B sein, einmal A - dann A","q_en":"How are paragliders tested?","a_en":"EN-standard quality certification: shock-load test (twice, dragged by a car) at minimum 8 G — modern gliders are usually tested at 12–16 G. Line-strength and kink tests are documented in a paper report. Then a flight test: brake travel measured from 0 to 30/60 m. Manoeuvres are flown 5 times each, judged by an expert and a test pilot. If 4 of 5 are B and one is A → the wing is rated A (worst-case rules)."},{"id":"eq-3","category":"Equipment","original_id":3,"q_de":"Material am Schirm?","a_de":"- Schirme sind aus Nylon - Barrieren im Tuch, Ribstop (damit es nicht reisst) - Gewicht Tuch 49gramm Quadratmeter (Blatt A4 hat 80g), 17gramm sind die Leichten Schirme - Karabiner aus Aluminium oder Stahl, müssen alle 5 Jahre gewechselt werden - Obersegel robuster als Untersegel (wegen Schutz, Sonne / Regen)","q_en":"What material is a paraglider made of?","a_en":"• Canopy: nylon, with ripstop barriers to prevent tear propagation.\n• Cloth weight ~49 g/m² (an A4 sheet of paper is 80 g); lightweight wings use 17 g/m².\n• Carabiners: aluminium or steel — must be replaced every 5 years.\n• Upper sail is more robust than the lower sail (sun/rain protection)."},{"id":"eq-4","category":"Equipment","original_id":4,"q_de":"Material der Leinen?","a_de":"Leine aus Polyester - ist ummantelt als Schutz vor mechanischer Belastung (Stein etc.) und für farbige Trennung vor allem bei Schulschirmen. Macht Leinen jedoch dicker. Gibt auch nicht ummantelte Leinen für weniger Widerstand. Dyneema - ist ein Kunsstoff (Innenteil der Leine). Dehnt bei Belastung - 80% der Belastung A & B Ebene. Bei C & D manchmal schrumpfen. Aramid Leine wird weniger gedehnt, ist bräunlich, knickempfindlich. Meist Mix Dyneema & Aramid für Dehnung im Griff behalten. UV- Belastung ist heikel - deshalb Ummantelung gut. Leinen können schrumpfen oder dehnen über die Jahre","q_en":"What material are the lines made of?","a_en":"Outer sheath: polyester — protects against mechanical wear (stones etc.) and allows colour coding (used on school wings). Makes the line thicker; unsheathed lines have lower drag.\n\nCore: Dyneema — stretches under load (A & B classes ~80% load tolerance). Dyneema can sometimes shrink on C/D wings.\n\nAramid lines stretch less, are brownish, and kink-sensitive. Most modern wings use a Dyneema/Aramid mix to balance properties.\n\nUV exposure is critical → the sheath helps. Lines can shrink or stretch over the years."},{"id":"eq-5","category":"Equipment","original_id":5,"q_de":"Material & Infos zu Notschirm?","a_de":"Notschirm (auch Nylon, dünner gewebt, darf dehnen) - Kreuzkappe (aktuell, pendelstabil), Rundkappe (älter, Pendel) und Dreieck Notschirm ist steuerbar (für Profis). Wenn man Notschirm zieht sinkt man mit 5.5m in der Sekunde = 1.5 - 2.3 m springen (Haben viel Gewicht dabei, mit Ausrüstung). Notschirm Landung: Beine, nicht auf Protektor!","q_en":"Material & info on reserve parachutes?","a_en":"Reserves are also nylon — woven thinner, allowed to stretch.\n• Square (cruciform) — current standard, pendulum-stable.\n• Round — older design, prone to pendulum motion.\n• Triangular (steerable) — for experienced users.\n\nAfter deployment you descend at ~5.5 m/s — equivalent to jumping from 1.5–2.3 m (and you carry a lot of weight with all the gear).\n\nLanding under a reserve: land on your legs, NOT on the back protector!"},{"id":"eq-6","category":"Equipment","original_id":6,"q_de":"Infos zu Gurtzeugs:","a_de":"Gurtzeug: Airbags (füllt mit Luft, aber beim Start kein Schutz), Schaumstoff - schwer aber schon gefüllt, Wendegurtzeug: Wird stark beanstrucht. Gurtzeug zum Aufblasen beim Start. Liegegurtzeug: Aerodynamischer, bequemer, Platz für Elektronik, manövrierunfähiger, kein direkter Blick nach unten. Hike & Fly Gurtzeug ist Leichtgurtzeug ohne Schutz.","q_en":"Harness information?","a_en":"• Airbag harness: protector inflates during flight — no protection during launch.\n• Foam protector: always inflated, but heavier.\n• Reversible (convertible) harness: takes a lot of stress; pre-inflate on launch.\n• Reclined (pod) harness: more aerodynamic, comfortable, room for instruments — but less manoeuvrable and no direct view straight down.\n• Hike & Fly harness: ultralight, no protection."},{"id":"eq-7","category":"Equipment","original_id":7,"q_de":"Zusatzinfos zu Material (Leinenverlängerung, Lagerung, Luftdurchlässigkeit, Alterung):","a_de":"Bei Leinenverlängerung: Wir bei Messverfahren geprüft und dann korrigiert (nachgetrimmt). Wenn man viel G Kräfte fliegt, wird der Schirm schneller alt. UV Strahlung in der Luft nicht vermeidbar, am Boden verpacken und in Schatten stellen. Leinen schrumpfen wenn viel nass - Schirm trocknen lassen wenn nass, trocken wieder verpacken (schlimm nasser Schirm in heissem Auto). Poröser (ohne Beschichtung) mehr Luftdurchlässig = weniger Leistung. Beschichtung schützt auch.","q_en":"Extra info: line stretch, storage, porosity, ageing","a_en":"• Line stretch is checked by measurement and corrected (re-trimmed).\n• Flying lots of G-forces ages the wing faster.\n• UV exposure in flight is unavoidable — on the ground, pack the wing and keep it in the shade.\n• Lines shrink when very wet — let the wing dry before packing (a wet wing in a hot car is bad).\n• Porous fabric (uncoated) = more air leakage = less performance. The coating also protects."},{"id":"eq-8","category":"Equipment","original_id":8,"q_de":"Profilnase & Hinterkante","a_de":"Profilnase vorn. Hinterkante (dort wo Bremsen sind)","q_en":"Leading edge & trailing edge?","a_en":"Leading edge = front (Profilnase). Trailing edge = rear, where the brake lines attach (Hinterkante)."},{"id":"eq-9","category":"Equipment","original_id":9,"q_de":"Folgen einer Verkürzung der D-Leinen?","a_de":"Der Anstellwinkel wird grösser, das Profil und das Flugverhalten werden verändert.","q_en":"What's the consequence of shortening the D-lines?","a_en":"Angle of attack increases; profile shape and flight behaviour are altered."},{"id":"eq-10","category":"Equipment","original_id":10,"q_de":"Der Altimeter erhält seine Informationen durch?","a_de":"atmosphärischen Druck","q_en":"An altimeter gets its information from…","a_en":"…atmospheric pressure."},{"id":"eq-11","category":"Equipment","original_id":11,"q_de":"Gurtzeuge mit hohen Aufhängepunkten lassen die Turbulenzen…","a_de":"weniger spüren, behindern aber beim Starten das Beschleunigen mit Vorlage","q_en":"Harnesses with high attachment points let turbulence be…","a_en":"…felt less, but they hamper acceleration during launch when leaning forward."},{"id":"eq-12","category":"Equipment","original_id":12,"q_de":"Das Nähen der Schlaufen an den Leinenenden…","a_de":"kann vor allem bei Aramidleinen zu einem Festigkeitsverlust von 40% führen","q_en":"Sewing loops at the line ends…","a_en":"…can cause up to a 40% loss of strength, especially with aramid lines."},{"id":"eq-13","category":"Equipment","original_id":13,"q_de":"Vorteil bei Leinen geschlauft anstatt genäht?","a_de":"Einfacher zu warten, ohne grossen Aufwand ersetzt","q_en":"Advantage of looped (spliced) lines vs. sewn?","a_en":"Easier to service and replace without much effort."},{"id":"eq-14","category":"Equipment","original_id":14,"q_de":"Was sind Alterserscheinungen beim Tuch?","a_de":"- Porösität nimmt zu - Strömung reisst bei höherer Geschwindigkeit ab - sackfluganfälliger","q_en":"Signs of fabric ageing?","a_en":"• Porosity increases.\n• Airflow separates (stalls) at higher speeds.\n• More prone to parachutal stall (Sackflug)."},{"id":"eq-15","category":"Equipment","original_id":15,"q_de":"Qualität der Beschichtung leidet wenn…","a_de":"Packen auf Teer oder Betonfläche","q_en":"The coating quality suffers when…","a_en":"…you pack the wing on tarmac or concrete."},{"id":"eq-16","category":"Equipment","original_id":16,"q_de":"Welche Anforderungen werden an die Gesamtkonstruktion eines Rettungsschirms gestellt?","a_de":"Hohe Festigkeit und Elastizität im umschriebenen Rahmen","q_en":"What overall design requirements apply to a reserve parachute?","a_en":"High strength and elasticity, within the specified design envelope."},{"id":"eq-17","category":"Equipment","original_id":17,"q_de":"Liegt der Befestigungspunkt der Hauptleine eines Rettungsschirms am Gurtzeug nahe am Körperschwerpunkt so…","a_de":"…muss der Körper vor der Landung bewusst aufgerichtet werden","q_en":"If the reserve's main attachment is near the body's centre of gravity, then…","a_en":"…you must consciously sit up before landing to land on your feet."},{"id":"eq-18","category":"Equipment","original_id":18,"q_de":"Ein Gurtzeug mit stark diagonal verstrebter Aufhängung lässt die Turbulenzen…","a_de":"weniger spüren, hindert aber am Steuern mittels Gewichtsverlagerung","q_en":"A harness with heavily diagonal cross-bracing lets turbulence be…","a_en":"…felt less, but hinders steering through weight-shift."},{"id":"eq-19","category":"Equipment","original_id":19,"q_de":"Zu welchem Zweck werden diagonale V-Rippen / Zellwände in die Gleitschirmkalotte eingebaut?","a_de":"Dadurch werden Zugkräfte des Obersegels auf weniger Leinen übertragen, um Luftwiderstand klein zu halten","q_en":"Why are diagonal V-ribs / cell walls built into a paraglider canopy?","a_en":"They transfer the load of the upper sail to fewer lines — minimising drag."},{"id":"eq-20","category":"Equipment","original_id":20,"q_de":"Wird ein Material mit seinem maximalen Zugfestigkeit belastet, so kann davon ausgegangen werden…","a_de":"dass das Material nach der Belastung bezüglich Dimension und Zugfestigkeit nicht mehr dem ursprünglichen Zustand entspricht","q_en":"If a material is loaded to its maximum tensile strength, then…","a_en":"…afterward its dimensions and tensile strength will no longer match the original state."},{"id":"eq-21","category":"Equipment","original_id":21,"q_de":"Trimmtabs oder Trimmer gestatten es…","a_de":"die Traggurtlänge und damit das Flugverhalten zu ändern. Ein Gerät mit Trimmern gilt nur als typengeprüft anerkannt, wenn es mit Trimmern homologiert wurde.","q_en":"Trim tabs/trimmers allow you to…","a_en":"…change the riser length and therefore the flight behaviour. A wing with trimmers is only considered type-tested if it was homologated WITH the trimmers."},{"id":"eq-22","category":"Equipment","original_id":22,"q_de":"Trimmtabs oder Trimmer variieren in der Regel die Länge des…","a_de":"hinterstes Tragegurts","q_en":"Trim tabs/trimmers usually vary the length of the…","a_en":"…rearmost riser (the back riser)."},{"id":"eq-23","category":"Equipment","original_id":23,"q_de":"Die Länge der Brems- und Steuerleinen sollte so eingestellt sein, dass…","a_de":"der ganze Geschwindigkeitsbereich des Geräts problemlos erfolgen werden kann","q_en":"Brake/steering-line length should be set so that…","a_en":"…the wing's entire speed range can be flown without issues."},{"id":"eq-24","category":"Equipment","original_id":24,"q_de":"Die Belastung der Zellwände ist am grössten im Bereich","a_de":"der Leinenbefestigungspunkte der vorderen Flügelhälfte","q_en":"Cell-wall stress is greatest in the area of…","a_en":"…the line attachment points on the front half of the wing."},{"id":"eq-25","category":"Equipment","original_id":25,"q_de":"Die Anerkennung der Typenprüfung gemäss der EN-Normen sagt etwas über…","a_de":"Strukturfestigkeit und Flugverhalten eines bestimmten Gleitschirmmodells in Neuzustand","q_en":"EN-standard type certification tells you about…","a_en":"…the structural strength and flight behaviour of a specific paraglider model when new."},{"id":"eq-26","category":"Equipment","original_id":26,"q_de":"Durch das beschichten des Gleitschirmtuches wird…","a_de":"deren Elastizität verringert","q_en":"Coating the paraglider fabric…","a_en":"…reduces its elasticity."},{"id":"eq-27","category":"Equipment","original_id":27,"q_de":"Wer bestimmt die Normen für die SHV Typenprüfung?","a_de":"CEN","q_en":"Who sets the norms for SHV type certification?","a_en":"CEN (European Committee for Standardisation)."},{"id":"eq-28","category":"Equipment","original_id":28,"q_de":"Wer legt fest, in welchen Intervallen der Pilot den Gleitschirm vom Hersteller oder seinem Vertreter überprüfen lassen sollte?","a_de":"Hersteller","q_en":"Who specifies the inspection intervals for the wing?","a_en":"The manufacturer."},{"id":"eq-29","category":"Equipment","original_id":29,"q_de":"Das Variometer informiert den Piloten während dem Flug über…","a_de":"vertikale Geschwindigkeit","q_en":"The variometer tells the pilot in flight about…","a_en":"…vertical speed (climb/sink rate)."},{"id":"eq-30","category":"Equipment","original_id":30,"q_de":"Bester Helm gegen Kopfverletzungen","a_de":"Integralhelm","q_en":"Best helmet against head injuries?","a_en":"Full-face (integral) helmet."},{"id":"eq-31","category":"Equipment","original_id":31,"q_de":"Welche der folgenden Faktoren können die Öffnungszeit des Rettungssystems verlängern:","a_de":"Lange Packintervalle, statische Aufladung, zu lange Verbindungsleine.","q_en":"Which factors can prolong reserve deployment time?","a_en":"Long repack intervals, static charge, an overly long connecting line (bridle)."},{"id":"eq-32","category":"Equipment","original_id":32,"q_de":"Die Druckausgleichsöffnungen (Crossports) in den Zellwänden…","a_de":"ermöglichen das Füllen von Zellen, deren Eintrittsöffnung eingeklappt oder nicht vorhanden ist","q_en":"Pressure-equalisation openings (crossports) in the cell walls…","a_en":"…allow cells whose intake is collapsed (or absent) to still inflate from neighbouring cells."},{"id":"eq-33","category":"Equipment","original_id":33,"q_de":"In welchem Fall können Zellwände unten einer auftretenden Belastung leiden?","a_de":"B-Stall","q_en":"In which manoeuvre can cell walls suffer downward loads?","a_en":"B-line stall."},{"id":"eq-34","category":"Equipment","original_id":34,"q_de":"Welche Traggurte werden bei einem stabilen Geradeausflug am wenigsten belastet?","a_de":"D-Gurte","q_en":"Which risers are least loaded in stable straight-and-level flight?","a_en":"The D-risers."},{"id":"eq-35","category":"Equipment","original_id":35,"q_de":"Das Hoch über Mitteleuropa wird allmählich flach. In der Schweiz muss damit gerechnet werden, dass die Anzeige eines am Morgen justierten Altimeters am Nachmittag…","a_de":"zu hoch ist","q_en":"The high over central Europe is gradually weakening. In Switzerland, the reading of an altimeter calibrated in the morning will, by afternoon, read…","a_en":"…too high."},{"id":"eq-36","category":"Equipment","original_id":36,"q_de":"Trimmtabs oder Trimmer werden im Schnellflug gelöst…","a_de":"damit sich der Anstellwinkel verkleinert und sich das Profil im hinterem Bereich nach oben biegt.","q_en":"Trimmers are released in fast flight…","a_en":"…so the angle of attack decreases and the trailing edge of the profile bends upward."},{"id":"eq-37","category":"Equipment","original_id":37,"q_de":"Rettungsschirme sind aus?","a_de":"Polyamid (Nylon)","q_en":"Reserves are made of?","a_en":"Polyamide (nylon)."},{"id":"eq-38","category":"Equipment","original_id":38,"q_de":"Wofür dienen Zellwände und Zellzwischenwände?","a_de":"Zur gleichmässigen Übertragung der Last von Leinen auf das Obersegel","q_en":"What is the purpose of cell walls and inter-cell walls?","a_en":"To evenly distribute the load from the lines onto the upper sail."},{"id":"eq-39","category":"Equipment","original_id":39,"q_de":"Mit welcher Technik können die Leinenenden nicht ummantelter Leinen mit Schlaufen versehen werden, ohne die Festigkeit einer Aramid-Leine merklich in Mitleidenschaft zu ziehen?","a_de":"Fingertreppen / Spleissen","q_en":"How can you fit loops to unsheathed aramid line ends without significantly weakening them?","a_en":"By splicing (\"finger-trapping\" technique)."},{"id":"eq-40","category":"Equipment","original_id":40,"q_de":"Gewebe werden für den Gebrauch im Gleitschirmbereich beschichtet weil…","a_de":"Porosität und Elastizität zu verringern","q_en":"Paraglider fabrics are coated because…","a_en":"…it reduces porosity and elasticity."},{"id":"eq-41","category":"Equipment","original_id":41,"q_de":"Werden Trimmer im stabilen Geradeausflug gelöst, so…","a_de":"vergrössert sich die Tendenz zum Einklappen und die Steuerwege werden länger","q_en":"Releasing trimmers in stable straight-and-level flight…","a_en":"…increases the tendency to collapse, and brake travel becomes longer."},{"id":"eq-42","category":"Equipment","original_id":42,"q_de":"Grundsatz für Platzierung des Rettungssystems…","a_de":"Auslösegriff muss für Piloten gut sichtbar und leicht erreichbar sein","q_en":"Principle for reserve-handle placement?","a_en":"The handle must be clearly visible and easily reachable for the pilot."},{"id":"eq-43","category":"Equipment","original_id":43,"q_de":"Wird der Abstand zwischen den beiden Aufhängepunkten eines Gurtzeugs vermindert so lässt dies die Turbulenzen…","a_de":"…weniger spüren, aber erhöht die Gefahr des Twistens","q_en":"Reducing the distance between the two harness attachment points lets turbulence be…","a_en":"…felt less, but increases the risk of twisting (twister)."},{"id":"eq-44","category":"Equipment","original_id":44,"q_de":"Anemometer misst…","a_de":"Geschwindigkeit gegenüber Umgebungsluft","q_en":"An anemometer measures…","a_en":"…speed relative to the surrounding air."},{"id":"eq-45","category":"Equipment","original_id":45,"q_de":"Welche Flächenbelastung im Gleitschirmbereich an modernen intermediate Schirmen ist (bezogen auf ausgelegte Fläche)… zu tief? normal? am oberen Limit?","a_de":"zu tief: 2 kg/m2 / normal: 3.5 kg/m2 / am oberen Limit: 4.5 kg/m2","q_en":"Typical wing loading values for a modern intermediate paraglider (referred to projected area)?","a_en":"Too low: 2 kg/m²  •  Normal: 3.5 kg/m²  •  Upper limit: 4.5 kg/m²."},{"id":"eq-46","category":"Equipment","original_id":46,"q_de":"A-Leinen verkürzt: / A-Leinen verlängert:","a_de":"A-Leinen verkürzt: Anstellwinkel verkleinert, fliegt schneller, Flugverhalten und Profil wird verändert, lässt sich leichter aufziehen, Frontklapper Tendenz ja, Sackflug Neigung nimmt ab. A-Leinen verlängert: grösserer Anstellwinkel, langsamer, Schwerer aufzuziehen, Frontklapper Tendenz nein, Neigung zum Sackflug nimmt zu","q_en":"Effect of shortening / lengthening the A-lines?","a_en":"A-lines SHORTENED: smaller angle of attack, faster flight, profile and behaviour altered, easier to launch, MORE prone to frontal collapses, LESS prone to parachutal stall.\n\nA-lines LENGTHENED: larger angle of attack, slower, harder to launch, no frontal-collapse tendency, MORE prone to parachutal stall."},{"id":"eq-47","category":"Equipment","original_id":47,"q_de":"D-Leinen verkürzt: / D-Leinen verlängert:","a_de":"D-Leinen verkürzt: Schwerer aufzuziehen, grösserer Anstellwinkel, langsamer, Frontklapper Tendenz nein, Neigung zum Sackflug nimmt zu. D-Leinen verlängert: leichter aufziehen, kleinerer Anstellwinkel, schneller, Frontklapper Tendenz ja, Sackflug Neigung nimmt ab","q_en":"Effect of shortening / lengthening the D-lines?","a_en":"D-lines SHORTENED: harder to launch, larger angle of attack, slower, no frontal tendency, MORE prone to parachutal stall.\n\nD-lines LENGTHENED: easier launch, smaller angle of attack, faster, MORE prone to frontal collapses, LESS prone to parachutal stall."},{"id":"eq-48","category":"Equipment","original_id":48,"q_de":"Wird ein Gerät mässi
