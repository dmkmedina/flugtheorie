g angebremst geflogen, so können D-Leinen evtl. nicht unter Zug sein und lose durchhängen - was heisst das?","a_de":"Brems- und Steuerleinen entlasten die D-Leinen was in mässig angebremsten Flug normal sein kann","q_en":"With moderate brake input, the D-lines may not be under tension and sag — what does that mean?","a_en":"The brake/control lines are unloading the D-lines, which can be normal in moderately braked flight."},{"id":"eq-49","category":"Equipment","original_id":49,"q_de":"Verkürzung der B-Leinen bei Schulschirm kann…","a_de":"Anstellwinkel bleibt gleich. Profil und Flugverhalten wird verändert","q_en":"Shortening the B-lines on a school wing…","a_en":"Angle of attack stays the same. Profile and flight behaviour are altered."},{"id":"met-1","category":"Meteorology","original_id":1,"q_de":"Windstärke auf Druckkarte interpretieren","a_de":"Kleiner als die Schweiz = Stark. Grösser als die Schweiz schwach. Gleiche Grösse = Mittelstark","q_en":"Reading wind strength from a pressure map (isobar spacing)?","a_en":"Reference scale: Switzerland on the map.\n• Isobar cells smaller than Switzerland → strong wind.\n• Larger than Switzerland → weak wind.\n• Roughly the same size → moderate wind."},{"id":"met-2","category":"Meteorology","original_id":2,"q_de":"Windrichtungen in Grad?","a_de":"Nordwind/Föhn 360 Grad, Bise 90 Grad, Süd 180 Grad, 270 Westwind","q_en":"Wind directions in degrees?","a_en":"North (incl. Nordföhn) = 360°/0°  •  Bise (E) = 90°  •  South (Südföhn) = 180°  •  West = 270°."},{"id":"met-3","category":"Meteorology","original_id":3,"q_de":"Knoten berechnen (Windstärke in seltenen Fällen)? Bsp. 10 Kt.","a_de":"10 x 2 = 20 - 10% = 18kmh (Verdoppeln dann -10%)","q_en":"How to convert knots to km/h quickly? E.g. 10 kt.","a_en":"Double, then subtract 10%. Example: 10 kt × 2 = 20, −10% = 18 km/h."},{"id":"met-4","category":"Meteorology","original_id":4,"q_de":"Was ist ein Venturi Effekt?","a_de":"Wind wird stärker bei einer Verengung in einem Tal oder wenn der Wind über Bergspitze / Kamm weht.","q_en":"What is the Venturi effect?","a_en":"Wind accelerates where its path narrows — e.g. in a narrowing valley, or as it crosses a peak or ridge."},{"id":"met-5","category":"Meteorology","original_id":5,"q_de":"Wie lange und wie schnell: Warmfront?","a_de":"Warmfront ca. 15-25 km/h. 12h bis 24h bis über gesamte CH. Weniger gefährlich. Kommt als Keil - zuerst oben, dann am Boden. Auf Karte mit Halbkreisen","q_en":"Warm front — how long and how fast?","a_en":"Warm front moves at ~15–25 km/h. Takes 12–24 h to cross all of Switzerland. Less dangerous than a cold front. It moves as a wedge — arriving aloft first, then at the surface. On charts: half-circles (semicircles)."},{"id":"met-6","category":"Meteorology","original_id":6,"q_de":"Was sieht man 1h vor Eintreffen einer Warmfront?","a_de":"Schlechte Sicht, Regen, gleichmässiger Wind, tiefe Wolkenbasis.","q_en":"What do you see one hour before a warm front arrives?","a_en":"Poor visibility, rain, steady wind, low cloud base."},{"id":"met-7","category":"Meteorology","original_id":7,"q_de":"Wie lange und wie schnell: Kaltfront?","a_de":"Kaltfront ca. 40-70kmh. Gefährlicher weil viel schneller. Kann Warmfront einholen = Okklusion (eine Mischfront). braucht 6-12h über die Schweiz. Auf Karte mit Dreieck. Kommt zuerst am Boden, dann in der Höhe","q_en":"Cold front — how long and how fast?","a_en":"Cold front moves at ~40–70 km/h — more dangerous because faster. Can catch up to a warm front → occlusion (mixed front). Takes only 6–12 h to cross Switzerland. On charts: triangles. Arrives at the surface first, then aloft."},{"id":"met-8","category":"Meteorology","original_id":8,"q_de":"Okklusion","a_de":"Wenn Kaltfront die Warmfront einholt und der Strich der auf Skizze an Boden geht dominiert = Okklusion mit Warm- oder Kaltfront Charakter. Auf Karte mit Dreieck und Halbkreisen","q_en":"Occlusion?","a_en":"Occurs when a cold front catches up to a warm front. Depending on which surface line dominates, it has either warm-front or cold-front character. On charts: triangles AND half-circles on the same line."},{"id":"met-9","category":"Meteorology","original_id":9,"q_de":"Wolkenübersicht","a_de":"1: Höhe von xx Cirro = Cirrocumulus oder Cirrostratus / 2: Höhe von xx Alto = Altostratus oder Altocumulus / 3: Höhe von xx = Cumulus oder Stratos (auch Nimbostratos - Gewitterwolke). Cirrus = (Schleierstreifen). Lenticularis = Linsenwolke, viel Wind, bleibend. Cumulus Congestus & Cumulusnimbus = Hagelschlag. Stratus: Schichtung (auch Nebel, geschlossene Decke). Cumulus: Häufchen Wolken (Info zu 8/8 geschlossen, 2/8 Cumulus wenig Wolken, 3-4/8 ideal für Thermikflüge)","q_en":"Cloud overview — types and altitude levels?","a_en":"3 altitude levels:\n1. High (\"Cirro-\") — Cirrocumulus, Cirrostratus\n2. Mid (\"Alto-\") — Altostratus, Altocumulus\n3. Low — Cumulus, Stratus (also Nimbostratus → storm clouds)\n\nKey types:\n• Cirrus = wispy streaks\n• Lenticularis = lens-shaped, lots of wind, stationary (lee wave!)\n• Cumulus Congestus / Cumulonimbus = potential hail\n• Stratus = layered (also fog, full overcast)\n• Cumulus = puffy. 8/8 coverage = overcast; 2/8 = sparse; 3–4/8 = ideal for thermal flying."},{"id":"met-10","category":"Meteorology","original_id":10,"q_de":"Warum gibt es Bodeninversion?","a_de":"Durch die nächtliche Abstrahlung des Bodens bei klarem Himmel.","q_en":"Why does ground (radiation) inversion form?","a_en":"Due to nocturnal radiative cooling of the ground under a clear sky."},{"id":"met-11","category":"Meteorology","original_id":11,"q_de":"Inversion","a_de":"Oben wärmer als unten - z.B. Nebelmeer in den Bergen. Unten kalt und grau, oben warm und sonnig (klassische Höheninversion)","q_en":"Inversion?","a_en":"Warmer air above, cooler below — e.g. a sea of fog in the mountains. Cold and grey below, warm and sunny above (classic altitude inversion)."},{"id":"met-12","category":"Meteorology","original_id":12,"q_de":"Isothermie","a_de":"Wenn Temperatur gleich bleibend auf einer Ebene","q_en":"Isothermal layer?","a_en":"A layer in which temperature stays constant with height."},{"id":"met-13","category":"Meteorology","original_id":13,"q_de":"Umkehrthermik","a_de":"Abends, Hänge kühlen aus, Luftmasse - abkühlende Luft unter Warmluft, schiebt sich nach oben","q_en":"Reverse thermal (\"Umkehrthermik\")?","a_en":"In the evening, slopes cool down. Cooled air slides under warmer air and pushes it upward, creating evening lift."},{"id":"met-14","category":"Meteorology","original_id":14,"q_de":"Was bedeutet adiabatisch?","a_de":"Luftmasse kühlt sich ab, aber nicht mit Austausch der Umgebungsluft, nur durch Ausdehnung","q_en":"What does \"adiabatic\" mean?","a_en":"An air mass cools without exchanging heat with its surroundings — only through expansion (and warms through compression)."},{"id":"met-15","category":"Meteorology","original_id":15,"q_de":"Trockenadiabatische Abkühlung","a_de":"1 Grad pro 100 Meter (Abkühlung)","q_en":"Dry adiabatic lapse rate?","a_en":"1 °C cooling per 100 m of ascent."},{"id":"met-16","category":"Meteorology","original_id":16,"q_de":"Feuchtadiabatische Abkühlung","a_de":"0.6-0.9 Grad pro 100 Meter (sehr feucht eher 0.6 - trocken eher 0.9)","q_en":"Moist (wet) adiabatic lapse rate?","a_en":"0.6–0.9 °C per 100 m (closer to 0.6 in very humid air, closer to 0.9 in drier air)."},{"id":"met-17","category":"Meteorology","original_id":17,"q_de":"Höhe Tropopause?","a_de":"Bei uns 11'000 - sonst bis 13'000m","q_en":"Altitude of the tropopause?","a_en":"Over us: about 11,000 m. Globally up to 13,000 m."},{"id":"met-18","category":"Meteorology","original_id":18,"q_de":"Wovon hängt der Temperaturgradient feucht aufsteigender Luft ab?","a_de":"Von der Menge Wasserdampf, die kondensiert","q_en":"What determines the lapse rate of moist rising air?","a_en":"The amount of water vapour that condenses (releasing latent heat)."},{"id":"met-19","category":"Meteorology","original_id":19,"q_de":"Wenn zwei Winde aufeinander treffen ist es eine","a_de":"scherungsbedingte Turbulenz","q_en":"When two winds meet head-on, it's…","a_en":"…shear-induced turbulence (wind-shear turbulence)."},{"id":"met-20","category":"Meteorology","original_id":20,"q_de":"Bei Gebäuden etc. ist es eine","a_de":"mechanische Turbulenz","q_en":"Turbulence caused by buildings etc. is…","a_en":"…mechanical turbulence."},{"id":"met-21","category":"Meteorology","original_id":21,"q_de":"Schwingungen durch Gelände (Berge)","a_de":"orografische oder Föhnturbulenz","q_en":"Wave motion caused by terrain (mountains)?","a_en":"Orographic or Föhn turbulence."},{"id":"met-22","category":"Meteorology","original_id":22,"q_de":"Lufttemperatur Abnahme in Höhe","a_de":"Pro 100 Meter mit ca. 0.65 Grad (je nach Schichtung)","q_en":"Decrease of air temperature with altitude (standard)?","a_en":"About 0.65 °C per 100 m (varies with stratification)."},{"id":"met-23","category":"Meteorology","original_id":23,"q_de":"Isothermie und Inversion sind","a_de":"Sperrschichten für thermisch aufsteigende Luftmassen","q_en":"Isothermal layers and inversions are…","a_en":"…capping layers that block thermally rising air masses."},{"id":"met-24","category":"Meteorology","original_id":24,"q_de":"Sonniges Wetter in höheren Lagen und Nebel in tieferen Lagen sind Anzeichen für…","a_de":"eine grosse Stabilität der Schichtung im unteren Bereich der Troposphäre","q_en":"Sunny weather at altitude with fog in the valleys indicates…","a_en":"…high stability in the lower troposphere."},{"id":"met-25","category":"Meteorology","original_id":25,"q_de":"Eine Luftmasse mit Frontenbildung bezeichnet man als warm wenn die Temperatur…","a_de":"…höher ist als die der benachbarten Luftmasse","q_en":"In frontal formation, an air mass is called \"warm\" when its temperature is…","a_en":"…higher than the adjacent air mass."},{"id":"met-26","category":"Meteorology","original_id":26,"q_de":"Auf gleicher Höhe über Meer ist Luft…","a_de":"…warme Luft weniger dicht als kalte Luft","q_en":"At the same altitude AMSL, air is…","a_en":"…less dense when warm than when cold."},{"id":"met-27","category":"Meteorology","original_id":27,"q_de":"Stabile Schichtungen bedeuten fürs Fliegen…","a_de":"keine Thermik","q_en":"What does stable stratification mean for flying?","a_en":"No thermals."},{"id":"met-28","category":"Meteorology","original_id":28,"q_de":"Was ist ein Outflow?","a_de":"Quasi ein Abfluss. Outflow Gewitter ist gefährlich: schwere kalte Luft geht runter, sehr starke Turbulenzen (neben Gewitter)","q_en":"What is an outflow?","a_en":"Essentially a downdraft/outburst. A thunderstorm outflow is dangerous: heavy cold air rushes down, causing very strong turbulence around the storm."},{"id":"met-29","category":"Meteorology","original_id":29,"q_de":"Wann ist der Talwind stark?","a_de":"Stark & gefährlich im Frühling (Juni am Stärksten) - Rheintal, Rhonetal, (nur bei Talboden, 500 Meter über Boden heikel - Lösung: Top landen)","q_en":"When is the valley wind strongest?","a_en":"Strong and dangerous in spring — peak in June — especially in the Rhine and Rhone valleys. Strongest near the valley floor; gusty up to ~500 m AGL. Solution: top-land instead of bottom-landing."},{"id":"met-30","category":"Meteorology","original_id":30,"q_de":"3 Punkte wenn es heikel ist zum Fliegen?","a_de":"Föhn, Talwind, Gewitter","q_en":"3 conditions that are dangerous to fly in?","a_en":"Föhn, valley wind, thunderstorm."},{"id":"met-31","category":"Meteorology","original_id":31,"q_de":"Was braucht es für Föhn?","a_de":"grosser Gebirgszug & Druckunterschied","q_en":"What is needed for a Föhn (foehn) wind?","a_en":"A large mountain range AND a pressure difference across it."},{"id":"met-32","category":"Meteorology","original_id":32,"q_de":"Für was stehen diese Merkmale? Starker Wind, Luftfeuchtigkeit und braucht Gebirge. Bei Berggipfel oder direkt dahinter (Lee) - ist ein Windalarmzeichen","a_de":"Lenticularis","q_en":"What do these signs indicate? Strong wind, humidity, mountains required; appears at or behind (lee of) peaks — a wind warning sign.","a_en":"Lenticularis (lenticular clouds — lee waves)."},{"id":"met-33","category":"Meteorology","original_id":33,"q_de":"Bei welchen folgenden Wetterlagen ist in den Alpentälern am ehesten mit Südföhn zu rechnen?","a_de":"Die Schweiz befindet sich im Warmsektor, eine Kaltfront erreicht den Jura","q_en":"Under which synoptic situation is Südföhn most likely in Alpine valleys?","a_en":"Switzerland is in the warm sector, and a cold front is approaching the Jura."},{"id":"met-34","category":"Meteorology","original_id":34,"q_de":"Bei welcher Wetterlage ist die Bildung von Bodennebel (Strahlungsnebel) wahrscheinlich?","a_de":"Klarer Himmel, Windstille, kleine Temperatur-Taupunkt-Differenz","q_en":"Under what conditions is ground fog (radiation fog) likely to form?","a_en":"Clear sky, no wind, small temperature–dew-point spread."},{"id":"met-35","category":"Meteorology","original_id":35,"q_de":"Der Begriff Taupunkt steht in der Meteorologie für…","a_de":"die Temperatur, auf welche sich Luft abkühlen muss, damit der enthaltene Wasserdampf zu kondensieren beginnt","q_en":"In meteorology, the dew point is…","a_en":"…the temperature to which air must cool for the water vapour it contains to begin condensing."},{"id":"met-36","category":"Meteorology","original_id":36,"q_de":"Mit welchem Wind muss in den Alpentälern des Tessins gerechnet werden, wenn sich das Azorenhoch gegen Mitteleuropa ausdehnt?","a_de":"Nordföhn","q_en":"Which wind appears in Ticino Alpine valleys when the Azores high extends towards central Europe?","a_en":"Nordföhn (north foehn)."},{"id":"met-37","category":"Meteorology","original_id":37,"q_de":"Welches sind günstige Voraussetzungen für eine Nordföhnlage im Tessin?","a_de":"Die Schweiz befindet sich auf der Rückseite einer Kaltfront, aus Nordwesten wird mässig feuchte Kaltluft gegen die Alpen geführt.","q_en":"Favourable conditions for a Nordföhn situation in Ticino?","a_en":"Switzerland is on the back side of a cold front; moderately humid cold air is pushed from the northwest against the Alps."},{"id":"met-38","category":"Meteorology","original_id":38,"q_de":"Der Talwind nimmt mit abnehmender Höhe…","a_de":"zu. (500 Meter am stärksten).","q_en":"Valley wind with decreasing altitude…","a_en":"…increases (strongest around 500 m above the valley floor)."},{"id":"met-39","category":"Meteorology","original_id":39,"q_de":"Wie verändert sich die Temperatur eines Luftpakets, welches sich vom Boden ablöst und in die Höhe steigt ohne eine Wolke zu bilden?","a_de":"Die Temperatur nimmt pro 100hm 1 Grad ab, da der Druck mit zunehmender Höhe nachlässt.","q_en":"How does the temperature of an air parcel change as it rises from the ground without forming a cloud?","a_en":"It cools by 1 °C per 100 m (dry adiabatic), because pressure decreases with altitude."},{"id":"met-40","category":"Meteorology","original_id":40,"q_de":"Die Bodenwinde wehen über dem Flachland…","a_de":"ungefähr parallel zu den Isobaren vom Hochdruck ind Tiefdruckzentrum.","q_en":"Surface winds over flat terrain blow…","a_en":"…approximately parallel to the isobars, from high pressure toward low pressure."},{"id":"met-41","category":"Meteorology","original_id":41,"q_de":"Altocumulus Castellanus-Wolken zwei Stunden nach Sonnenaufgang sind ein Zeichen für…","a_de":"eine instabile Schichtung auf Höhe der Wolken","q_en":"Altocumulus castellanus clouds two hours after sunrise signal…","a_en":"…unstable stratification at cloud level — often a precursor to thunderstorms later in the day."},{"id":"met-42","category":"Meteorology","original_id":42,"q_de":"Im Hochdruckgebiet bei uns…","a_de":"drehen sich die Luftmassen im Uhrzeigersinn um dessen Zentrum und sinken grossräumig ab","q_en":"In a high-pressure region in our hemisphere…","a_en":"…air masses rotate clockwise around its centre and sink (subsidence) over a wide area."},{"id":"met-43","category":"Meteorology","original_id":43,"q_de":"Welche Veränderung des Aggregatszustandes eines Stoffes setzt Energie in Form von Wärme frei?","a_de":"Übergang von flüssigem in festen Zustand.","q_en":"Which phase change releases energy as heat?","a_en":"Transition from liquid to solid (freezing)."},{"id":"met-44","category":"Meteorology","original_id":44,"q_de":"Wo findet sich typischerweise eine Inversion?","a_de":"An der Grenze zwischen dunstiger Bodenluft und klarer Höhenluft.","q_en":"Where is an inversion typically found?","a_en":"At the boundary between hazy surface air and clear air aloft."},{"id":"met-45","category":"Meteorology","original_id":45,"q_de":"Warum verändert sich die Temperatur eines aufsteigenden Luftpaketes?","a_de":"Weil der Druck in der Atmosphäre in zunehmender Höhe sinkt, dehnt sich das Luftpaket aus, wodurch die Luft Energie in Form von Wärme verliert","q_en":"Why does the temperature of a rising air parcel change?","a_en":"Because atmospheric pressure decreases with altitude, the parcel expands and loses energy in the form of heat."},{"id":"met-46","category":"Meteorology","original_id":46,"q_de":"Wolken entstehen…","a_de":"wenn die Luft, meist durch Hebung, bis zum Erreichen des Taupunktes abgekühlt wird","q_en":"Clouds form when…","a_en":"…air (usually being lifted) cools down to its dew point."},{"id":"met-47","category":"Meteorology","original_id":47,"q_de":"Hat die Tageszeit einen Einfluss auf das Entstehen von Frontgewittern?","a_de":"Nein","q_en":"Does time of day affect the formation of frontal thunderstorms?","a_en":"No (unlike heat thunderstorms, which need solar heating)."},{"id":"met-48","category":"Meteorology","original_id":48,"q_de":"Zu welcher Tageszeit muss in Alpentälern mit einem ausgeprägten Talwindsystem im Juli bei schönem Wetter in der Regel mit thermischen, weniger aber mit mechanischen oder scherungsbedingten Turbulenzen gerechnet werden?","a_de":"Ca. 11.00 Uhr","q_en":"At what time of day in July, in Alpine valleys with strong valley winds and fair weather, do you mainly encounter thermal turbulence (not mechanical or shear)?","a_en":"Around 11:00."},{"id":"met-49","category":"Meteorology","original_id":49,"q_de":"Wodurch wird eine Bodeninversion zum Verschwinden gebracht?","a_de":"Durch die Erwärmung der bodennahen Luftschichten im Verlaufe des Tages","q_en":"What dissolves a ground inversion?","a_en":"Solar heating of the near-ground air layers during the course of the day."},{"id":"met-50","category":"Meteorology","original_id":50,"q_de":"Der Begriff thermische Turbulenz bedeutet","a_de":"Wenn sich Warmluftblasen vom Boden ablösen und aufsteigen","q_en":"What does \"thermal turbulence\" mean?","a_en":"Warm-air bubbles detach from the ground and rise."},{"id":"met-51","category":"Meteorology","original_id":51,"q_de":"Ein Ballon von Volumen 5dm3 steigt ab Meereshöhe auf 5'500 Meter. Welches Volumen hat der Ballon auf 5'500?","a_de":"10dm3 (Volumen dehnt sich in Höhe aus - Druck halbiert sich)","q_en":"A balloon of 5 dm³ rises from sea level to 5500 m. What's its volume at 5500 m?","a_en":"≈ 10 dm³ — the volume doubles because pressure halves at ~5500 m."},{"id":"met-52","category":"Meteorology","original_id":52,"q_de":"Der atmosphärische Druck ist auf Meereshöhe nicht immer gleich…","a_de":"weil auf der Erdoberfläche Temperaturschwankungen auftreten, welche eine Erwärmung ODER Abkühlung der Luft und damit eine unterschiedliche Luftdichte verursachen","q_en":"Atmospheric pressure at sea level is not always the same because…","a_en":"…surface temperature variations cause the air to warm or cool, resulting in different air densities."},{"id":"met-53","category":"Meteorology","original_id":53,"q_de":"Was brauchts für Föhnlage in Alpentälern?","a_de":"Grosses Druckgefälle zwischen Alpensüd und Nordseite","q_en":"What's required for a Föhn situation in Alpine valleys?","a_en":"A large pressure gradient between the south and north sides of the Alps."},{"id":"met-54","category":"Meteorology","original_id":54,"q_de":"Lenticularis können entstehen wenn…","a_de":"… Luftmassen mit einer gewissen Geschwindigkeit über das Relief strömen","q_en":"Lenticularis clouds can form when…","a_en":"…air masses flow over terrain at a certain speed (creating standing lee waves)."},{"id":"met-55","category":"Meteorology","original_id":55,"q_de":"Weshalb kühlt sich feucht aufsteigende Luft weniger schnell ab als trockene?","a_de":"Weil durch die Kondensation freigesetzte Wärme die Temperatur der Luftmasse beeinflusst.","q_en":"Why does moist rising air cool more slowly than dry air?","a_en":"Because the latent heat released by condensation slows the temperature drop of the air mass."},{"id":"met-56","category":"Meteorology","original_id":56,"q_de":"Zeichen aus der Ferne, dass Cumulus Congestus oder Cumulus Nimbus Niederschläge verursacht?","a_de":"Von der Wolkenbasis zieht sich ein grauer Vorhang Richtung Erdoberfläche.","q_en":"Sign from a distance that a Cumulus Congestus or Cumulonimbus is producing precipitation?","a_en":"A grey curtain (\"virga\" or rain shaft) reaches from the cloud base down toward the ground."},{"id":"met-57","category":"Meteorology","original_id":57,"q_de":"Sonniges Wetter in den höheren Lagen und gleichzeitig in tieferen Lagen ist ein Anzeichen für…","a_de":"… eine stabile Schichtung im unteren Bereich der Troposphäre.","q_en":"Simultaneous sunny weather at altitude AND in the valleys signals…","a_en":"…a stable layer in the lower troposphere."},{"id":"met-58","category":"Meteorology","original_id":58,"q_de":"Luftdruck ist eine Folge der…","a_de":"Schwerkraft","q_en":"Air pressure is a result of…","a_en":"…gravity."},{"id":"met-59","category":"Meteorology","original_id":59,"q_de":"Was versteht man in der Meteorologie unter Luftmasse?","a_de":"Ein Luftvolumen mit einheitlichen Merkmalen","q_en":"What is an \"air mass\" in meteorology?","a_en":"A body of air with uniform properties (temperature and humidity)."},{"id":"met-60","category":"Meteorology","original_id":60,"q_de":"Ein Talwind entsteht weil sich die Luft…","a_de":"tagsüber im Gebirge schneller erwärmt als im Flachland","q_en":"A valley wind develops because air…","a_en":"…heats up faster in the mountains than over the flat lowlands during the day."},{"id":"met-61","category":"Meteorology","original_id":61,"q_de":"Mit Blau-Thermik ist zu rechnen wenn…","a_de":"die Temperatur-Taupunkt-Differenz der aufsteigenden Luftmasse so gross ist, dass der Taupunkt nicht erreicht wird","q_en":"\"Blue thermals\" (no cumulus marker) occur when…","a_en":"…the temperature–dew point spread of the rising air mass is so large that the dew point is never reached."},{"id":"met-62","category":"Meteorology","original_id":62,"q_de":"Bei Talwind gibt es im Sommer in den Alpentälern am meisten Turbulenzen um folgende Zeit:","a_de":"15.00 Uhr","q_en":"In summer Alpine valleys with valley winds, turbulence peaks around…","a_en":"15:00."},{"id":"met-63","category":"Meteorology","original_id":63,"q_de":"Welches sind die besten Voraussetzungen für das Entstehen von thermischen Aufwinden über Land?","a_de":"Windgeschützt und trocken","q_en":"What are the best conditions for thermals to form over land?","a_en":"Sheltered from wind, and dry ground."},{"id":"met-64","category":"Meteorology","original_id":64,"q_de":"Die Quellwolkenbasis ist die…","a_de":"Wolkenuntergrenze und befindet sich auf Höhe, bei der die Temperatur aufsteigender Luft ihren Taupunkt erreicht","q_en":"The cumulus cloud base is…","a_en":"…the lower edge of the cloud — at the altitude where rising air cools to its dew point."},{"id":"met-65","category":"Meteorology","original_id":65,"q_de":"Welche Anzeichen deuten auf der Alpennordseite auf Südföhn hin?","a_de":"Die Berge am Horizont sind mit Wolken verhangen, im blauen Teil des Himmels Cumulus und Lenticularis, in bodennähe Wind aus wechselnder Richtungen, auffrischender Südwestwind am Startplatz","q_en":"What signs of Südföhn appear on the north side of the Alps?","a_en":"• Distant mountains covered in cloud.\n• Cumulus and lenticularis clouds against the blue sky.\n• Variable surface winds near the ground.\n• A freshening southwest wind at the launch site."},{"id":"met-66","category":"Meteorology","original_id":66,"q_de":"Der Temperaturgradient einer Isothermie beträgt","a_de":"0 Grad auf 100m (weil gleichbleibend)","q_en":"The lapse rate of an isothermal layer is…","a_en":"0 °C per 100 m (constant temperature)."},{"id":"met-67","category":"Meteorology","original_id":67,"q_de":"Welche Wetterlage begünstigt das Entstehen in grosser Höhe reichender thermischer Aufwinde im Alpenraum stark?","a_de":"Ein flaches Hoch mit Zentrum über dem Alpenraum","q_en":"Which weather situation strongly favours high-reaching thermals over the Alps?","a_en":"A weak (flat) high with its centre over the Alps."},{"id":"met-68","category":"Meteorology","original_id":68,"q_de":"Welche Veränderung des Aggregatszustandes eines Stoffes benötigt Energie in Form von Wärme?","a_de":"von flüssigem in gasförmigen Zustand","q_en":"Which phase change consumes energy (heat)?","a_en":"Liquid → gas (evaporation/vaporisation)."},{"id":"met-69","category":"Meteorology","original_id":69,"q_de":"Wie erwärmt sich die Luft 100 M über Grund während des Tages hauptsächlich?","a_de":"Die bodennahe Luftschicht erwärmt sich und steigt auf, während kühle Höhenluft auf den Boden sinkt, wo sie aufgeheizt wird","q_en":"How does the air 100 m above ground mainly warm up during the day?","a_en":"The near-ground layer heats up and rises, while cooler air aloft sinks to the surface where it is then heated — a convective exchange."},{"id":"met-70","category":"Meteorology","original_id":70,"q_de":"In welchem Monat reichen in den Alpen die thermisch bedingten Aufwinde am höchsten hinauf?","a_de":"August","q_en":"In which month do thermals in the Alps reach the highest altitudes?","a_en":"August."},{"id":"met-71","category":"Meteorology","original_id":71,"q_de":"Welche Veränderung des Aggregatzustandes setzt Energie in Form von Wärme frei?","a_de":"Gasförmig zu flüssig.","q_en":"Which phase change releases energy as heat?","a_en":"Gas → liquid (condensation)."},{"id":"met-72","category":"Meteorology","original_id":72,"q_de":"Welche Veränderung des Aggregatzustandes benötigt Energie in Form von Wärme?","a_de":"fest in flüssig","q_en":"Which phase change consumes energy?","a_en":"Solid → liquid (melting)."},{"id":"met-73","category":"Meteorology","original_id":73,"q_de":"Warmfront =","a_de":"Niederschläge enden mit Front","q_en":"Warm front =","a_en":"Precipitation ENDS with the passage of the front."},{"id":"met-74","category":"Meteorology","original_id":74,"q_de":"Kaltfront =","a_de":"Niederschläge beginnen mit Front","q_en":"Cold front =","a_en":"Precipitation BEGINS with the passage of the front."},{"id":"met-75","category":"Meteorology","original_id":75,"q_de":"Kalte Luft =","a_de":"sinkt an Boden (weil schwerer) = höherer Druck","q_en":"Cold air =","a_en":"Sinks to the ground (because heavier) → higher pressure."},{"id":"met-76","category":"Meteorology","original_id":76,"q_de":"Warme Luft =","a_de":"steigt auf (weil leichter) = weniger Druck","q_en":"Warm air =","a_en":"Rises (because lighter) → lower pressure."},{"id":"met-77","category":"Meteorology","original_id":77,"q_de":"LUV =","a_de":"windzugewandt","q_en":"Luv =","a_en":"Windward (facing into the wind)."},{"id":"met-78","category":"Meteorology","original_id":78,"q_de":"LEE =","a_de":"windabgewandt","q_en":"Lee =","a_en":"Leeward (sheltered side, downwind of an obstacle)."},{"id":"prc-1","category":"Flight Practice","original_id":1,"q_de":"Strecke anhand von Gleitzahl berechnen?","a_de":"Gleitzahl 9 - Höhenmeter 1000 heisst komme 9km weit.","q_en":"How to calculate range from glide ratio?","a_en":"Glide ratio × altitude = distance. Example: glide ratio 9, altitude 1000 m → you can travel ≈ 9 km."},{"id":"prc-2","category":"Flight Practice","original_id":2,"q_de":"Ein Gleitschirmpilot befindet sich auf dem Flug zum Landeplatz, der genau südlich seiner Position liegt. Er bemerkt, dass ein mässiger Westwind von 25 km/h weht. Wie soll er sich verhalten, um möglichst hoch über dem Landeplatz anzukommen?","a_de":"Gerät in Richtung Südwesten orientieren und so schnell als möglich fliegen.","q_en":"You're flying south to your landing field. You notice a moderate west wind of 25 km/h. How do you arrive highest above the landing?","a_en":"Aim southwest (crab into the wind) and fly as fast as possible."},{"id":"prc-3","category":"Flight Practice","original_id":3,"q_de":"Im Startgelände weht ein konstanter Aufwind von 15 km/h. Womit ist bezüglich Startstrecke und -geschwindigkeit zu rechnen?","a_de":"Startstrecke kurz, Laufgeschwindigkeit niedrig.","q_en":"A steady 15 km/h headwind on takeoff. What can you expect for launch run and speed?","a_en":"Short launch run, low running speed."},{"id":"prc-4","category":"Flight Practice","original_id":4,"q_de":"Ein Pilot durchfliegt eine turbulente Zone, wobei der Gleitschirm um Quer- und Längsachse leicht zu pendeln beginnt. Welches ist die richtige Reaktion?","a_de":"Locker im Gurtzeug sitzen, leicht anbremsen, Pendeln nicht ausgleichen wollen","q_en":"You enter turbulence and the glider starts to swing slightly around the pitch and roll axes. Correct reaction?","a_en":"Sit relaxed in the harness, apply light brake, do NOT try to actively counteract the oscillations."},{"id":"prc-5","category":"Flight Practice","original_id":5,"q_de":"Zürich-Kloten meldet einen QNH von 1'015. Was bedeutet diese Angabe?","a_de":"ICAO-Standartatmosphäre berechneter Druck auf Meereshöhe ist 1015 hPa.","q_en":"Zurich-Kloten reports QNH 1015. What does this mean?","a_en":"The pressure reduced to sea level (using ICAO standard atmosphere) is 1015 hPa. Setting an altimeter to this QNH will read sea-level zero."},{"id":"prc-6","category":"Flight Practice","original_id":6,"q_de":"Der Begriff \"Vrille\" steht für","a_de":"schnelles Drehen des Gerätes um die Hochachse, wobei eine Flügelachse vorwärts dreht und die andere rückwärts.","q_en":"What does \"Vrille\" (spin / negative spin) mean?","a_en":"Rapid rotation around the vertical axis: one wing half moves forward while the other moves backward (one side has stalled flow)."},{"id":"prc-7","category":"Flight Practice","original_id":7,"q_de":"Unmittelbar nach dem Start stellt ein Gleitschirmpilot fest, dass er das Gerät rechts stark anbremsen muss, damit es geradeaus fliegt. Welches könnte die Ursache sein?","a_de":"Knoten zwischen Leinen links","q_en":"Just after launch you must brake hard right to fly straight. Probable cause?","a_en":"A knot in the lines on the LEFT side (it shortens the left side, so the glider tries to turn right — you compensate with right brake)."},{"id":"prc-8","category":"Flight Practice","original_id":8,"q_de":"Unmittelbar nach dem Start stellt ein Gleitschirmpilot fest, dass er das Gerät rechts stark anbremsen muss, damit es geradeaus fliegt und entdeckt links einen Knoten zwischen den D-Leinen und Bremsleinen. Welches sind die Folgen für den Weiterflug?","a_de":"Sackfluganfälligkeit gross, bei Rechtsdrehung evtl. Strömungsabriss","q_en":"You have a knot between the D-lines and the brake lines on the left side. Consequences for continued flight?","a_en":"Higher risk of parachutal stall, and a right turn may cause flow separation/stall on the affected side."},{"id":"prc-9","category":"Flight Practice","original_id":9,"q_de":"Aus welcher Position ergibt sich während des Flugs die grösste Kollisionsgefahr zwischen einem Delta und einem Gleitschirm, weil keiner der beiden Piloten den anderen sieht?","a_de":"Delta nähert sich Gleitschirm von hinten / unten","q_en":"From which position is the collision risk between a hang glider (delta) and a paraglider greatest, with neither pilot seeing the other?","a_en":"The delta approaches the paraglider from BEHIND and BELOW (paraglider can't see down/back; delta has limited upward visibility)."},{"id":"prc-10","category":"Flight Practice","original_id":10,"q_de":"Ein am Gleitschirm-Landeplatz ca. 6 x 6 Meter grosses rotes Tuch das über beide Diagonalen ein gelbes Kreuz aufweist bedeutet:","a_de":"Landeverbot für Luftfahrzeuge - anderen Landeplatz suchen.","q_en":"At the landing field, a ~6×6 m red cloth with a yellow X across both diagonals means…","a_en":"…landing is FORBIDDEN. Find another landing site."},{"id":"prc-11","category":"Flight Practice","original_id":11,"q_de":"Welche Konsequenzen kann es haben, wenn ein Gleitschirm im Kurvenflug zu stark angebremst wird?","a_de":"Strömung reisst einseitig ab, Gerät dreht über abgerissene Seite weg und beginnt zu trudeln","q_en":"What can happen if you over-brake the paraglider in a turn?","a_en":"Flow separates on the inside wing; the glider drops over the stalled side and enters a spin (Vrille)."},{"id":"prc-12","category":"Flight Practice","original_id":12,"q_de":"Ein Pilot erreicht unmittelbar vor zwei weiteren mit einem horizontalen Abstand von 50 m fliegenden Hängegleitern den Landeplatz. Es herrscht Windstille, der Anflug ist auf allen Seiten hindernisfrei und es bestehen keine Abmachungen bezüglich Voltendrehrichtung. Wie muss der Landeplatz angeflogen werden?","a_de":"Der zuerst Landende kann die Landerichtung frei wählen, muss aber Linksvolte fliegen","q_en":"You reach the landing field just before two other gliders flying 50 m apart. No wind, no obstacles, no local rule on circuit direction. How do you approach?","a_en":"The first to land chooses the direction freely BUT must fly a LEFT-hand circuit."},{"id":"prc-13","category":"Flight Practice","original_id":13,"q_de":"Welche Konsequenzen kann es haben, wenn an einem Gleitschirm zum Beschleunigen nur die A-Traggurten gezogen werden?","a_de":"Gerät klappt frontal ein, Flügelende überholen Schirmmitte, Gerät klappt zusammen","q_en":"What happens if you accelerate by pulling ONLY the A-risers down?","a_en":"Frontal collapse: the wingtips overshoot the middle of the canopy and the glider folds up."},{"id":"prc-14","category":"Flight Practice","original_id":14,"q_de":"Fliegt ein Hängegleiter mit 32 km/h in einer Luftmasse mit einer Temperatur von 2°C, so ist unter diesen Bedingungen die kühlende Wirkung des Windes auf den Körper gleich gross wie bei ruhiger Luft mit einer Temperatur von","a_de":"-11 Grad","q_en":"At 32 km/h in 2 °C air, the wind-chill on the body equals still air at…","a_en":"−11 °C."},{"id":"prc-15","category":"Flight Practice","original_id":15,"q_de":"Ein Hängegleiterpilot trifft auf eine aufsteigende Luftmasse und versucht darin zu kreisen. Nach 90° zeigt das Vario Sinken. Welches ist das beste Manöver?","a_de":"Nach Drehung von 180°, kurzer Geradeausflug, da sich aufsteigende Luftmasse nun vor Pilot befinden muss, dann neues zentrieren","q_en":"You hit lift, start to circle. After 90° the vario shows sink. Best manoeuvre?","a_en":"Complete a 180° turn, then fly straight briefly — the lift should now be ahead of you. Then re-centre the thermal."},{"id":"prc-16","category":"Flight Practice","original_id":16,"q_de":"Die Grösse des Vorhaltewinkels hängt ab von","a_de":"Fluggeschwindigkeit, Windstärke, Windrichtung","q_en":"The crab angle (Vorhaltewinkel) depends on…","a_en":"…airspeed, wind strength, and wind direction."},{"id":"prc-17","category":"Flight Practice","original_id":17,"q_de":"In einem Tal bei einem Talwind von 25 km/h muss aus der Luft ein geeigneter Landeplatz ausgewählt werden. Welche der folgenden Anforderungen an den Landeplatz ist die wichtigste, um eine sichere Landung zu gewährleisten?","a_de":"Luvseitiges Gelände muss eben sein, frei von Bäumen und Gebäuden","q_en":"Choosing a landing field from the air in a 25 km/h valley wind. Most important requirement for a safe landing?","a_en":"The terrain on the windward (upwind) side must be flat and free of trees and buildings."},{"id":"prc-18","category":"Flight Practice","original_id":18,"q_de":"Welche Konsequenzen kann es haben, wenn ein Gleitschirm über 50% seitlich einklappt und der Pilot das Gerät völlig ungebremst weiterfliegen lässt?","a_de":"immer steiler werdende Spirale","q_en":"Consequence of a >50% asymmetric collapse if the pilot does nothing (no brake input)?","a_en":"An ever-steepening spiral dive."},{"id":"prc-19","category":"Flight Practice","original_id":19,"q_de":"Unmittelbar nach dem Start entdeckt ein Gleitschirmpilot auf der linken Flügelseite einen Knoten in den vorderen Leinen. Welches sind die Folgen für den Weiterflug?","a_de":"Anfälliger für Turbulenzen und klappt links schneller ein","q_en":"Just after launch you find a knot in the front lines on the LEFT side. Consequences?","a_en":"More susceptible to turbulence; the left side will collapse more easily."},{"id":"prc-20","category":"Flight Practice","original_id":20,"q_de":"Wird der menschliche Körper während längerer Zeit einer Luftströmung ausgesetzt, so erhöht sich","a_de":"Flüssigkeitsbedarf","q_en":"Long exposure to airflow increases the body's…","a_en":"…fluid requirements (you dehydrate faster — drink!)."},{"id":"prc-21","category":"Flight Practice","original_id":21,"q_de":"Am Landeplatz weht ein Wind von 25 km/h. Sobald die Füsse des Piloten bei der Landung den Boden berühren,","a_de":"180° Grad drehen, B,C, oder Steuerleinen durchziehen","q_en":"Wind at the landing field is 25 km/h. As soon as your feet touch the ground, you must…","a_en":"…immediately turn 180° (facing the wing) and pull B-, C- or brake lines fully to depower the canopy (prevent being dragged)."},{"id":"prc-22","category":"Flight Practice","original_id":22,"q_de":"Der Vorhaltewinkel wird","a_de":"mit zunehmendem Seitenwind vergrössert","q_en":"The crab angle…","a_en":"…increases with stronger crosswind."},{"id":"prc-23","category":"Flight Practice","original_id":23,"q_de":"Bei einem Start aus einer Waldschneise oder Waldlichtung muss unter Umständen damit gerechnet werden, dass","a_de":"am Boden Windstille herrscht, obwohl auf Wipfelhöhe Wind herrscht, was auf Wipfelhöhe Turbulenzen bedeutet","q_en":"Launching from a forest clearing/gap, you may encounter…","a_en":"…calm at the ground while wind is blowing at treetop height — meaning turbulence at treetop height as you climb out."},{"id":"prc-24","category":"Flight Practice","original_id":24,"q_de":"Hängegleiterpilot A fliegt mit 35 km/h, Hängegleiterpilot B mit 50 km/h. Beide fliegen dieselbe Strecke und sind demselben Seitenwind ausgesetzt.","a_de":"A muss einen höheren Vorhaltewinkel wählen als B","q_en":"Pilot A flies at 35 km/h, Pilot B at 50 km/h. Same route, same crosswind.","a_en":"A must choose a LARGER crab angle than B (slower airspeed needs more crab to compensate for the same crosswind)."},{"id":"prc-25","category":"Flight Practice","original_id":25,"q_de":"Bis zu welcher Höhe vermag sich in der Regel ein gesunder Organismus im Ruhezustand den sich mit zunehmender Höhe ändernden Bedingungen anzupassen?","a_de":"4000 Meter","q_en":"To what altitude can a healthy body at rest typically adapt to the changing conditions?","a_en":"≈ 4000 m."},{"id":"prc-26","category":"Flight Practice","original_id":26,"q_de":"Bei welchen Anzeichen muss am ehesten damit gerechnet werden, dass sich ein Startplatz im Lee befindet?","a_de":"Abrupte Änderungen von Windgeschwindigkeit und Windrichtung","q_en":"Which signs suggest a launch site is in the lee (downwind of an obstacle)?","a_en":"Abrupt changes in wind speed AND wind direction (rotor-like behaviour)."},{"id":"prc-27","category":"Flight Practice","original_id":27,"q_de":"Wie soll sich ein Gleitschirmpilot verhalten, um bei Windstille möglichst lang in der Luft bleiben?","a_de":"20-30% angebremst fliegen","q_en":"How to stay airborne longest in calm air?","a_en":"Fly with 20–30% brake applied (minimum sink speed)."},{"id":"prc-28","category":"Flight Practice","original_id":28,"q_de":"Ein Pilot erreicht unmittelbar vor zwei weiteren mit einem horizontalen Abstand von 50 m fliegenden Hängegleitern den Landeplatz. Es herrscht Windstille. Er entscheidet sich für eine Linksvolte mit Landung Richtung Westen. Im Queranflug stellt er fest, dass am Landeplatz ein leichter Ostwind (2 - 5 km/h) herrscht. Was ist zu unternehmen?","a_de":"Endanflug fortsetzen und Endanflugwinkel flacher planen","q_en":"You're flying a left-hand circuit, landing west. On base leg you notice a light east wind (2–5 km/h) at the field. What do you do?","a_en":"Continue the approach as planned and adjust the final approach for a flatter descent (the slight tailwind doesn't justify changing direction — but you'll come in faster/flatter)."},{"id":"prc-29","category":"Flight Practice","original_id":29,"q_de":"Ein Gleitschirm hängt nach einer Baumlandung in der Krone. Auf welche Weise kann vermieden werden, dass das Gerät beim Heruntenehmen beschädigt wird?","a_de":"Leinenschlösser und Knoten der Bremsschlaufen lösen","q_en":"After a tree landing the glider hangs in the canopy. How do you avoid damaging the glider when retrieving it?","a_en":"Release the line locks and the brake-loop knots so the lines can move freely as you lower it."},{"id":"prc-30","category":"Flight Practice","original_id":30,"q_de":"Beim Absteigen mittels Steilspirale gilt es zu beachten, dass","a_de":"es in turbulenter Luft viel Können von Piloten verlangt und den Körper belastet","q_en":"For descending by spiral dive, note that…","a_en":"…in turbulent air it requires considerable pilot skill, and it puts significant load on the body."},{"id":"prc-31","category":"Flight Practice","original_id":31,"q_de":"Der Begriff \"Wingover\" steht für","a_de":"schneller Kurvenwechsel und kurzzeitige 90° Querneigung","q_en":"What does \"wingover\" mean?","a_en":"Rapid alternating turns with brief 90° bank angles."},{"id":"prc-32","category":"Flight Practice","original_id":32,"q_de":"Beim Ausklappen der Ohren gilt es zu beachten, dass die Ohren","a_de":"in geringer Höhe über Grund nicht aktiv geöffnet werden sollten","q_en":"When releasing big-ears, note that the ears…","a_en":"…should NOT be actively re-opened (pumped open) at low altitude — let them open spontaneously."},{"id":"prc-33","category":"Flight Practice","original_id":33,"q_de":"Ein Gleitschirm befindet sich 500 m über dem Landeplatz im stabilen Sackflug. Wie ist zu reagieren?","a_de":"A-Gurte nach Vorne drücken oder Beschleuniger - bis Normalflug","q_en":"Stable parachutal stall, 500 m above the landing field. How do you react?","a_en":"Push the A-risers forward, or apply the speedbar — until normal flight is restored."},{"id":"prc-34","category":"Flight Practice","original_id":34,"q_de":"Welche Folgen hat es, wenn die Kalotte nass ist?","a_de":"Kalotte lässt sich schwerer füllen und aufziehen, Strömung kann bei weniger als üblichem Bremseinsatz abreissen","q_en":"Consequences of a wet canopy?","a_en":"Harder to inflate and launch; flow can separate at less brake input than normal (higher stall risk)."},{"id":"prc-35","category":"Flight Practice","original_id":35,"q_de":"Beim Absteigen mit eingeklappten Ohren gilt es zu beachten, dass das Gerät","a_de":"mit grösserem Anstellwinkel fliegt und beim Ausleiten höhere Sackflugegefahr besteht","q_en":"When descending with big-ears, note that the glider…","a_en":"…is flying at a larger angle of attack, so there's a higher risk of parachutal stall when exiting the manoeuvre."},{"id":"prc-36","category":"Flight Practice","original_id":36,"q_de":"Das Absteigen mittels Einklappen der Ohren hat den Vorteil, dass","a_de":"der Körper nicht belastet wird und sich auch während der Dauer des Manövers ein bestimmtes Ziel anfliegen lässt","q_en":"Advantage of descending via big-ears?","a_en":"No physical load on the body, and you can keep flying toward a specific target throughout the manoeuvre."},{"id":"prc-37","category":"Flight Practice","original_id":37,"q_de":"Lugano meldet einen QNH von 1'015, Zürich-Kloten einen QNH von 1'007. Was heisst das?","a_de":"Druckgefälle erzeugt starke Südströmung mit Staubbewölkung auf der Alpensüd- und Südföhn auf der Alpennordseite","q_en":"Lugano reports QNH 1015, Zurich-Kloten reports 1007. What does this mean?","a_en":"Strong pressure gradient → strong southerly flow with congested cloud (\"dust cloud\") on the south side of the Alps and Südföhn on the north side."},{"id":"prc-38","category":"Flight Practice","original_id":38,"q_de":"Im Startgelände weht ein konstanter Aufwind von 20 km/h. Welches ist die wichtigste Anforderung an einen geeigneten Startplatz?","a_de":"VIEL WIND = Das Gelände hinter dem Schirm muss frei von Hindernissen sein (Bsp. Fiesch im August 23)","q_en":"Steady 20 km/h headwind at launch. Most important requirement for a suitable launch site?","a_en":"Lots of wind → the terrain BEHIND the wing must be free of obstacles (you can be lifted/dragged backward)."},{"id":"prc-39","category":"Flight Practice","original_id":39,"q_de":"Ein Hängegleiterpilot kreist im thermischen Aufwind. Es herrscht ein Wind von 270°/10 kt, wodurch sich der Aufwindschlauch mit zunehmender Höhe nach Osten neigt. Um den Schlauch nicht zu verlieren, kreist der Hängegleiterpilot im Schlauch…","a_de":"luvseitig","q_en":"Circling in a thermal with 270°/10 kt wind tilting the thermal eastward. Where in the thermal do you circle to stay with it?","a_en":"On the WINDWARD (luv / west) side of the thermal."},{"id":"prc-40","category":"Flight Practice","original_id":40,"q_de":"Wo bauen Steinadler in den Alpen ihre Horste?","a_de":"In steilen Felswänden unterhalb der Waldgrenze","q_en":"Where do golden eagles in the Alps build their nests?","a_en":"In steep rock faces below the treeline (avoid disturbing them)."},{"id":"prc-41","category":"Flight Practice","original_id":41,"q_de":"Welche Konsequenzen kann es haben, wenn an einem Gleitschirm im Geradeausflug abrupt eine Kurve eingeleitet wird?","a_de":"Strömung reisst einseitig ab, das Gerät dreht über die abgerissene Seite weg und beginnt zu trudeln","q_en":"Consequence of an abrupt turn initiation from straight flight?","a_en":"One-sided flow separation → the glider dives over the stalled side and starts to spin (Vrille)."},{"id":"prc-42","category":"Flight Practice","original_id":42,"q_de":"Ein Pilot befindet sich im Endanflug und stellt fest, dass er geringfügig zu hoch fliegt. Welches Verhalten ist korrekt?","a_de":"Das Gerät anbremsen, Gleitleistung vermindern, frühzeitig aufrichten, Luftwiderstand erhöhen","q_en":"On final approach you realise you're slightly too high. Correct action?","a_en":"Apply brake to reduce glide performance, sit up early (and use big-ears or S-turns if needed) to increase drag."},{"id":"prc-43","category":"Flight Practice","original_id":43,"q_de":"Ein Hängegleiterpilot fliegt gegen den Wind und kommt unter einer Cumuluswolke an. Wo kann er einen aufsteigenden Luftstrom erwarten?","a_de":"Luvseite der Cumulus","q_en":"Flying upwind, you reach a cumulus cloud. Where do you expect rising air?","a_en":"On the WINDWARD side of the cumulus."},{"id":"prc-44","category":"Flight Practice","original_id":44,"q_de":"Der Vorhaltewinkel wird verkleinert wenn,","a_de":"die Fluggeschwindigkeit erhöht wird","q_en":"The crab angle decreases when…","a_en":"…airspeed is increased."},{"id":"prc-45","category":"Flight Practice","original_id":45,"q_de":"Mit welchen Folgen muss ein stark erkälteter Hängegleiterpilot mit Ohrenentzündung während des Flugs in erster Linie rechnen?","a_de":"Plötzliche starke Kopfschmerzen","q_en":"A pilot with a heavy cold and middle-ear infection. What's the primary risk in flight?","a_en":"Sudden, severe headaches (pressure inability to equalise through blocked Eustachian tubes)."},{"id":"prc-46","category":"Flight Practice","original_id":46,"q_de":"Der Vorhaltewinkel ist der Winkel zwischen","a_de":"Längsachse Gerät und Flugweg","q_en":"The crab angle is the angle between…","a_en":"…the glider's longitudinal axis and the actual flight path (track over ground)."},{"id":"prc-47","category":"Flight Practice","original_id":47,"q_de":"Während des Fluges klappt der Gleitschirm plötzlich seitlich ein. Welches ist die richtige Reaktion?","a_de":"Gewünschte Flugrichtung durch Gewichtsverlagerung und leichtes anbremsen auf Gegenseite stabilisieren und wenn nötig mitteln Pumpen eingeklappte Seite öffnen","q_en":"The paraglider asymmetrically collapses. Correct reaction?","a_en":"1. Stabilise heading: weight-shift to the open side and apply gentle brake on the open side.\n2. If needed, pump the collapsed side to reinflate it."},{"id":"prc-48","category":"Flight Practice","original_id":48,"q_de":"Ein Hängegleiter kreist während 10 min. in der Thermik. Sein Standort gegenüber dem Boden verschiebt sich während dieser Zeit um 3 km. Welche Aussage lässt sich über die Windstärke machen?","a_de":"18kmh","q_en":"You circle in a thermal for 10 min. Your position over the ground shifts 3 km. What's the wind speed?","a_en":"3 km in 10 min = 18 km/h."},{"id":"prc-49","category":"Flight Practice","original_id":49,"q_de":"Ein Pilot merkt beim Kreisen, dass die Strömung einseitig am Gleitschirm abreisst. Welches ist die richtige Reaktion?","a_de":"Beide Bremsen lösen","q_en":"While circling, you notice one-sided flow separation on the wing. Correct reaction?","a_en":"Release BOTH brakes (let the wing accelerate to restore attached flow)."},{"id":"prc-50","category":"Flight Practice","original_id":50,"q_de":"Wo leben in den Alpen Gemsen und Steinböcke im Winter und Frühling?","a_de":"In Südexponierten Bergflanken","q_en":"Where do chamois and ibex live in the Alps during winter and spring?","a_en":"On south-facing mountain slopes (avoid disturbing them — wildlife protection)."},{"id":"prc-51","category":"Flight Practice","original_id":51,"q_de":"Welches ist ein Anzeichen dafür, dass die Strömung am Gleitschirm einseitig abreisst?","a_de":"Zug der kurveninneren Bremse lässt nach, lässt sich ohne Kraft durchdrücken","q_en":"Sign of one-sided flow separation?","a_en":"The pull on the inside brake suddenly slackens — it can be pulled down with no resistance."},{"id":"prc-52","category":"Flight Practice","original_id":52,"q_de":"Ein Gleitschirmpilot will bei einem Rückenwind von 20 km/h möglichst weit fliegen. Wie soll er sich verhalten?","a_de":"Leicht anbremsen","q_en":"With a 20 km/h tailwind you want to fly as far as possible. What do you do?","a_en":"Apply light brake (better glide ratio is irrelevant — you want to stay aloft longer with the wind pushing you)."},{"id":"prc-53","category":"Flight Practice","original_id":53,"q_de":"Ein Hängegleiterpilot kreist im thermischen Aufwind. Es herrscht ein Wind von 270°/10 kt, wodurch sich der Aufwindschlauch mit zunehmender Höhe nach Osten neigt. Wo in der Umgebung des Schlauchs ist in der Regel der stärkste Abwind zu erwarten?","a_de":"Leeseite","q_en":"Same scenario as before: 270°/10 kt wind tilts the thermal east. Where is the strongest sink expected?","a_en":"On the LEE (downwind / east) side of the thermal."},{"id":"prc-54","category":"Flight Practice","original_id":54,"q_de":"Ein Gleitschirmpilot fliegt in einem grossräumigen Aufwindschlauch, in dem die Luft mit 3 m/s steigt. Wie soll er sich verhalten, um möglichst viel Höhe zu gewinnen?","a_de":"20-30% angebremst fliegen","q_en":"In a large thermal climbing at 3 m/s, how do you fly to gain maximum altitude?","a_en":"With 20–30% brake applied (minimum sink rate)."},{"id":"prc-55","category":"Flight Practice","original_id":55,"q_de":"Die Wahrscheinlichkeit eines einseitigen Strömungsabrisses lässt sich am besten vermindern, indem","a_de":"immer mit genügend Geschwindigkeitsreserve geflogen und mit Gefühl gesteuert wird","q_en":"How best to reduce the chance of one-sided flow separation?","a_en":"Always fly with a sufficient airspeed reserve and pilot with feel/finesse."},{"id":"prc-56","category":"Flight Practice","original_id":56,"q_de":"Ein Pilot ist nach einem äusserst heftigen Bodenkontakt bleich, hat bläuliche Lippen, kalten Schweiss, einen schwachen, schnellen Puls und redet zusammenhangslos.","a_de":"Anzeichen für Schock, Lagerung nach Wunsch, vor Witterungseinflüssen schützen, nichts zu trinken geben","q_en":"After a heavy impact a pilot is pale, has bluish lips, cold sweat, weak rapid pulse, and is incoherent. Actions?","a_en":"Signs of shock: position them as comfortable as possible, protect from weather, do NOT give them anything to drink."},{"id":"prc-57","category":"Flight Practice","original_id":57,"q_de":"Ein Gleitschirm befindet sich im Endanflug 10 m über Grund im stabilen Sackflug. Wie ist zu reagieren?","a_de":"Das Gerät im Sackflug belassen, sich aufrichten und mittels Landefalltechnik landen","q_en":"Stable parachutal stall on final approach, 10 m AGL. Correct reaction?","a_en":"LEAVE it in the stall, sit up, and land using the parachute-landing (PLF) technique. Do NOT try to recover normal flight this low."},{"id":"prc-58","category":"Flight Practice","original_id":58,"q_de":"Ein Gleitschirmpilot will bei Windstille möglichst weit fliegen. Wie soll er sich verhalten?","a_de":"Ungebremst im Trimmspeed fliegen","q_en":"To fly as far as possible in calm air, how should you fly?","a_en":"Hands up, trim speed (best glide ratio is at trim speed)."},{"id":"prc-59","category":"Flight Practice","original_id":59,"q_de":"Ab welcher Druckdifferenz zwischen Zürich und Lugano muss in den Alpentälern in der Regel mit Föhn gerechnet werden?","a_de":"4hPa","q_en":"From what pressure difference between Zurich and Lugano should you generally expect Föhn in Alpine valleys?","a_en":"4 hPa."},{"id":"prc-60","category":"Flight Practice","original_id":60,"q_de":"Bei starkem Wind ist mit Bodenannäherung eine deutlichen Abnahme des Windes (Windgradient) möglich. Falls der Schirm dabei kurz durchsackt,","a_de":"nicht anbremsen, sonst evtl. Strömungsabriss.","q_en":"In strong winds the wind gradient near the ground decreases significantly. If the glider briefly settles back, …","a_en":"…do NOT apply brake — that could trigger a stall."},{"id":"prc-61","category":"Flight Practice","original_id":61,"q_de":"Bei Landung 30 Meter Kreis, wenns knapp wird:","a_de":"Gross machen, schlechteres gleiten, mehr Widerstand. Kleine Ohren - kann man nicht mehr gut steuern. S Kurven","q_en":"Landing in a 30 m target circle, if it's getting tight, options to lose height?","a_en":"• \"Make yourself big\" — increase drag with body posture.\n• Big-ears — but you lose precise steering.\n• S-turns."},{"id":"prc-62","category":"Flight Practice","original_id":62,"q_de":"Was gehört zu einer guten Flugvorbereitung zu Hause?","a_de":"Meine physische und psychische Verfassung. Einholen von Wetterinformationen. Gefahren erkennen FFG Regel. Wahl eines passenden Fluggebietes, Segelflugkarte, Luftraumbeschränkungen, DABS, Militärflugzeiten: MO-FR 07.30-12.05 und 13.15-17.05. Material (Batterien aufgeladen etc.). Verpflegung, Trinken, Trinken, Trinken","q_en":"What belongs to good pre-flight preparation at home?","a_en":"• Self-check: physical and mental state.\n• Gather weather information; identify hazards (FFG rule).\n• Choose a suitable flying area; check the Glider Map, airspace restrictions, DABS, military hours (Mon–Fri 07:30–12:05 and 13:15–17:05).\n• Equipment check (batteries charged, etc.).\n• Food and water — drink, drink, drink."},{"id":"prc-63","category":"Flight Practice","original_id":63,"q_de":"DER FLUG BEGINNT BEIM LANDEPLATZ - was ist wichtig:","a_de":"im Fluggebiet: Landeplatzbesichtigung, Landevolte, Hindernisse. Flugplanung, Notlandeplätze, Turbulenzen, Überlegungen Umwelt, Wild, etc. Lokale Begebenheiten beachten. Info Tafel lesen","q_en":"\"The flight begins at the landing field\" — what's important on site?","a_en":"• Inspect the landing field, plan the landing circuit, note obstacles.\n• Plan the flight itself: emergency landing options, expected turbulence, environmental and wildlife considerations.\n• Respect local rules.\n• Read the info board."},{"id":"aer-1","category":"Aerodynamics","original_id":1,"q_de":"Welche Kraft wirkt im stabilen Gleitflug der Gesamtgewichtskraft entgegen?","a_de":"resultierende Luftkraft","q_en":"In stable glide, which force opposes the total weight?","a_en":"The resultant aerodynamic force (vector sum of lift and drag)."},{"id":"aer-2","category":"Aerodynamics","original_id":2,"q_de":"Der Begriff \"Flügelstreckung\" bezeichnet das Verhältnis zwischen","a_de":"Spannweite und durchschnittliche mittlere Flügeltiefe","q_en":"\"Aspect ratio\" (Flügelstreckung) is the ratio between…","a_en":"…span and mean chord (average wing depth)."},{"id":"aer-3","category":"Aerodynamics","original_id":3,"q_de":"Geräte mit grosser Flügelstreckung haben","a_de":"grosse Spannweite, kleine mittlere Flügeltiefe","q_en":"Wings with a high aspect ratio have…","a_en":"…a large span and small mean chord."},{"id":"aer-4","category":"Aerodynamics","original_id":4,"q_de":"Wird die Strömungsgeschwindigkeit der einen Körper umströmenden Luft vervierfacht, so","a_de":"16x Luftwiderstand","q_en":"If the airflow speed past a body is quadrupled, then…","a_en":"…drag increases 16× (drag is proportional to velocity squared)."},{"id":"aer-5","category":"Aerodynamics","original_id":5,"q_de":"Entfernt sich ein von Luft umströmter Körper von der Erdoberfläche, so","a_de":"vermindert sich sein Luftwiderstand","q_en":"As an air-flown body moves away from Earth's surface…","a_en":"…its drag decreases (lower air density at altitude)."},{"id":"aer-6","category":"Aerodynamics","original_id":6,"q_de":"An einem Hängegleiter heisst eine Bewegung um die Längsachse","a_de":"rollen","q_en":"Motion around the longitudinal axis of a glider is called…","a_en":"…roll."},{"id":"aer-7","category":"Aerodynamics","original_id":7,"q_de":"Berechnung der Flügelstreckung","a_de":"Spannweite² : Fläche","q_en":"Formula for aspect ratio?","a_en":"Aspect ratio = span² ÷ wing area."},{"id":"aer-8","category":"Aerodynamics","original_id":8,"q_de":"Auf einer Höhe von 1'100 m über Meer beträgt der Luftwiderstand eines von Luft umströmten Körpers","a_de":"90% Luftwiderstand auf Meereshöhe","q_en":"At 1100 m AMSL, the drag on an air-flown body is…","a_en":"…about 90% of the drag at sea level."},{"id":"aer-9","category":"Aerodynamics","original_id":9,"q_de":"Die Flächenbelastung eines Hängegleiters errechnet sich wie folgt:","a_de":"Gesamtgewicht : Fläche","q_en":"How is wing loading calculated?","a_en":"Total flight weight ÷ wing area."},{"id":"aer-10","category":"Aerodynamics","original_id":10,"q_de":"Wie heisst die graphische Darstellung des Verhältnisses zwischen Horizontal- und Sinkgeschwindigkeit über den ganzen Geschwindigkeitsbereich eines Hängegleiters hinweg?","a_de":"Geschwindigkeitspolare","q_en":"What's the name of the graph that shows horizontal vs. sink speed across a glider's entire speed range?","a_en":"The polar curve (Geschwindigkeitspolare)."},{"id":"aer-11","category":"Aerodynamics","original_id":11,"q_de":"Auf einer Höhe von 4'400 m über Meer beträgt der Luftwiderstand eines von Luft umströmten Körpers","a_de":"64%","q_en":"At 4400 m AMSL, drag on an air-flown body is…","a_en":"…about 64% of drag at sea level."},{"id":"aer-12","category":"Aerodynamics","original_id":12,"q_de":"Der Begriff \"Ablösepunkt\" bezeichnet","a_de":"Wo sich Strömung vom Flügel löst","q_en":"What does \"separation point\" mean?","a_en":"The point where the airflow detaches from the wing."},{"id":"aer-13","category":"Aerodynamics","original_id":13,"q_de":"Entfernt sich ein von Luft umströmter Körper von der Erdoberfläche, so","a_de":"nimmt Luftwiderstand in unteren Luftschichten schneller ab als in grosser Höhe","q_en":"As an air-flown body rises…","a_en":"…drag decreases more rapidly in the lower atmosphere than at higher altitudes (density drops non-linearly)."},{"id":"aer-14","category":"Aerodynamics","original_id":14,"q_de":"Wird der Widerstand eines Hängegleiters erhöht, so","a_de":"vergrössert sich der Gleitwinkel","q_en":"If drag on a glider is increased…","a_en":"…the glide angle becomes steeper (worse glide ratio)."},{"id":"aer-15","category":"Aerodynamics","original_id":15,"q_de":"Wird ein Hängegleiter mit minimaler Zuladung geflogen, so erfolgt der Strömungsabriss","a_de":"bei tieferer Geschwindigkeit als maximale Zuladung","q_en":"When flown at minimum payload, a glider stalls…","a_en":"…at a LOWER speed than at maximum payload (less mass = less wing-loading = lower stall speed)."},{"id":"aer-16","category":"Aerodynamics","original_id":16,"q_de":"Ob ein Flügel Auftrieb erzeugt oder nicht, hängt massgeblich ab","a_de":"Anstellwinkel","q_en":"Whether a wing generates lift depends primarily on…","a_en":"…the angle of attack."},{"id":"aer-17","category":"Aerodynamics","original_id":17,"q_de":"Welches ist der Wert der mittleren Flügeltiefe eines Geräts mit folgenden technischen Daten? Spannweite: 10m, Fläche: 12.5m²","a_de":"1.25m","q_en":"Mean chord of a wing with 10 m span and 12.5 m² area?","a_en":"1.25 m (12.5 ÷ 10)."},{"id":"aer-18","category":"Aerodynamics","original_id":18,"q_de":"Ein Hängegleiter, der ohne aktives Zutun des Piloten in ruhiger Luft ständig giert, ist nicht","a_de":"richtungsstabil","q_en":"A glider that yaws by itself in calm air without pilot input is not…","a_en":"…directionally stable (Richtungsstabil)."},{"id":"aer-19","category":"Aerodynamics","original_id":19,"q_de":"Von welchen vier Faktoren ist die Grösse des Auftriebs an einem Flügel abhängig?","a_de":"Flügelfläche, Auftriebswert, Luftdichte, Strömungsgeschwindigkeit","q_en":"On which 4 factors does the lift of a wing depend?","a_en":"1. Wing area (S)\n2. Lift coefficient (CL / CA)\n3. Air density (ρ)\n4. Airspeed (v)\n\nFormula: L = ½ ρ v² S CL"},{"id":"aer-20","category":"Aerodynamics","original_id":20,"q_de":"Der Begriff \"Flächenbelastung\" bezeichnet","a_de":"Verhältnis zwischen gesamt Fluggewicht & Flügelfläche","q_en":"\"Wing loading\" is…","a_en":"…the ratio of total flight weight to wing area."},{"id":"aer-21","category":"Aerodynamics","original_id":21,"q_de":"Ein Hängegleiter fliegt mit 54 km/h (15 m/s) und einem Sinken von 2 m/s. Auf seiner Flugroute hat er einen Gegenwind von 18 km/h (5 m/s). Seine Gleitleistung gegenüber Grund beträgt","a_de":"5m pro s. (15-5:2)","q_en":"A glider flies at 54 km/h (15 m/s) with 2 m/s sink, against 18 km/h (5 m/s) headwind. Glide ratio over ground?","a_en":"Ground speed = 15 − 5 = 10 m/s. Glide = 10 ÷ 2 = 5 (i.e. 5 m forward per 1 m down)."},{"id":"aer-22","category":"Aerodynamics","original_id":22,"q_de":"Halbiert sich die Luftdichte, so","a_de":"halbiert sich auch der Luftwiderstand","q_en":"If air density halves, then…","a_en":"…drag also halves (drag is proportional to density)."},{"id":"aer-23","category":"Aerodynamics","original_id":23,"q_de":"Die Luftkraftresultierende in den beiden stabilen Gleitflugzuständen Trimmflug und voll beschleunigtem Flug","a_de":"bleibt gleich","q_en":"The resultant aerodynamic force in stable trim flight vs. fully-accelerated flight…","a_en":"…remains the same (it always equals the total weight, by definition of stable flight)."},{"id":"aer-24","category":"Aerodynamics","original_id":24,"q_de":"Welche Kraft wirkt im stabilen Gleitflug senkrecht zum Auftrieb?","a_de":"Widerstand","q_en":"In stable glide, which force acts perpendicular to lift?","a_en":"Drag."},{"id":"aer-25","category":"Aerodynamics","original_id":25,"q_de":"Das Gesamtgewicht eines Hängegleiters beträgt 100 kg. In einer Kurve mit grosser Querlage wird das Gerät mit 250 kg belastet. Wie gross ist das Lastvielfache?","a_de":"2.5","q_en":"Total flight weight is 100 kg. In a steeply-banked turn the wing is loaded at 250 kg. What's the load factor?","a_en":"2.5 g (250 ÷ 100)."},{"id":"aer-26","category":"Aerodynamics","original_id":26,"q_de":"Wird der Anstellwinkel eines mit der Geschwindigkeit für die beste Gleitzahl fliegenden Hängegleiters um 2° vergrössert, so","a_de":"Erhöht sich der CA-Wert (Auftriebswert)","q_en":"At best-glide speed, increasing the angle of attack by 2°…","a_en":"…increases the lift coefficient (CL/CA)."},{"id":"aer-27","category":"Aerodynamics","original_id":27,"q_de":"Wie ist die ungefähre Verteilung des Auftriebs, der entsteht, wenn ein Flügel mit einem positiven Anstellwinkel von 10° mit der Luft angeströmt wird?","a_de":"2/3 Flügeloberseite & 1/3 Flügelunterseite","q_en":"Approximate lift distribution at +10° angle of attack?","a_en":"2/3 from the upper surface (suction) and 1/3 from the lower surface (pressure)."},{"id":"aer-28","category":"Aerodynamics","original_id":28,"q_de":"Auf einer Höhe von 3'300 m über Meer beträgt der Luftwiderstand eines von Luft umströmten Körpers","a_de":"72%","q_en":"At 3300 m AMSL, drag on a body is…","a_en":"…about 72% of sea-level drag."},{"id":"aer-29","category":"Aerodynamics","original_id":29,"q_de":"Ein Hängegleiter, der im Geradeausflug ohne aktives Zutun des Piloten seine Geschwindigkeit ständig erhöht, hat","a_de":"labile Flugeigenschaften","q_en":"A glider that continuously speeds up in straight flight without pilot input has…","a_en":"…unstable (labile) flight characteristics."},{"id":"aer-30","category":"Aerodynamics","original_id":30,"q_de":"Wovon hängt der Luftwiderstand eines Körpers massgeblich ab? (1)","a_de":"Von der Form des Körpers","q_en":"What does a body's drag depend on primarily? (1)","a_en":"The shape of the body."},{"id":"aer-31","category":"Aerodynamics","original_id":31,"q_de":"Wovon hängt der Luftwiderstand eines Körpers massgeblich ab? (2)","a_de":"Von der Grösse des Körpers","q_en":"What does a body's drag depend on primarily? (2)","a_en":"The size (frontal area) of the body."},{"id":"aer-32","category":"Aerodynamics","original_id":32,"q_de":"Wovon hängt der Luftwiderstand eines Körpers massgeblich ab? (3)","a_de":"Von Strömungsgeschwindigkeit","q_en":"What does a body's drag depend on primarily? (3)","a_en":"The flow velocity (drag ∝ v²)."},{"id":"aer-33","category":"Aerodynamics","original_id":33,"q_de":"Geräte mit kleiner Flügelstreckung haben","a_de":"kleine Spannweite und grosse mittlere Flügeltiefe","q_en":"Wings with low aspect ratio have…","a_en":"…small span and large mean chord."},{"id":"aer-34","category":"Aerodynamics","original_id":34,"q_de":"Wo sind in der Umgebung eines fliegenden Hängegleiters Wirbel anzutreffen?","a_de":"Hinter der Austrittskante","q_en":"Where are vortices found around a flying glider?","a_en":"Behind the trailing edge (wingtip vortices and trailing-edge wake)."},{"id":"aer-35","category":"Aerodynamics","original_id":35,"q_de":"Das Verhältnis zwischen Auftrieb und Widerstand eines Flügels ist vor allem abhängig","a_de":"Anstellwinkel","q_en":"The lift-to-drag ratio of a wing depends primarily on…","a_en":"…the angle of attack."},{"id":"aer-36","category":"Aerodynamics","original_id":36,"q_de":"Die Gleitzahl eines Hängegleiters gibt Auskunft über das Verhältnis zwischen","a_de":"CA & CW Wert eines Flügels","q_en":"The glide ratio of a glider expresses the ratio between…","a_en":"…the CL and CD (CA and CW) of the wing — i.e. lift coefficient over drag coefficient."},{"id":"aer-37","category":"Aerodynamics","original_id":37,"q_de":"Wird der Anstellwinkel eines mit der Geschwindigkeit für die beste Gleitzahl fliegenden Hängegleiters um 2° verkleinert, so","a_de":"vermindert sich der Auftriebswert","q_en":"Reducing the angle of attack by 2° from best-glide speed…","a_en":"…decreases the lift coefficient."},{"id":"aer-38","category":"Aerodynamics","original_id":38,"q_de":"Beim kontinuierlichen Übergang vom stabilen Geradeausflug in den Kurvenflug","a_de":"nimmt Flächenbelastung und minimale Fluggeschwindigkeit zu","q_en":"In a continuous transition from straight flight to turning flight…","a_en":"…the wing loading AND the minimum flight speed both increase (because of load factor / centrifugal force)."},{"id":"aer-39","category":"Aerodynamics","original_id":39,"q_de":"Luftdichte halbiert sich bei","a_de":"6600m","q_en":"Air density halves at approximately…","a_en":"6600 m AMSL."},{"id":"aer-40","category":"Aerodynamics","original_id":40,"q_de":"Luftdruck halbiert sich bei","a_de":"5500m","q_en":"Air pressure halves at approximately…","a_en":"5500 m AMSL."},{"id":"aer-41","category":"Aerodynamics","original_id":41,"q_de":"In Höhe kann man nur mit Geschwindigkeit kompensieren, alles andere bleibt gleich.","a_de":"Gewicht, Schirm etc. Bleibt gleich. In der Höhe muss man also schneller anrennen, weitere Laufstrecke. Vorteil: Es mag bei weniger Luftdichte mehr Wind aushalten, z.B. in Höhe kann ein Start bei 30kmh Wind möglich sein.","q_en":"At altitude you can only compensate with speed — everything else stays the same. What does this mean in practice?","a_en":"Weight, wing area, etc. don't change. At altitude (lower air density) you need to run faster for launch, with a longer takeoff run. Upside: with lower density the wing tolerates more wind — a 30 km/h launch may be possible at altitude that wouldn't be at sea level."},{"id":"aer-42","category":"Aerodynamics","original_id":42,"q_de":"Wenn ich bremse wird Anstellwinkel…","a_de":"… grösser. Kante wird herunter gezogen, weniger Geschwindigkeit, mehr sinken - CW und CA werden grösser, Stall möglich","q_en":"When I brake, the angle of attack…","a_en":"…increases. The trailing edge is pulled down, speed decreases, sink rate increases. Both CL and CD increase — and a stall becomes possible."},{"id":"aer-43","category":"Aerodynamics","original_id":43,"q_de":"Wenn ich beschleunige wird der Anstellwinkel…","a_de":"kleiner, fliege schneller, CW und CA werden kleiner, Frontklapper möglich","q_en":"When I accelerate, the angle of attack…","a_en":"…decreases. I fly faster; both CL and CD drop. A frontal collapse becomes possible (insufficient internal pressure)."},{"id":"aer-44","category":"Aerodynamics","original_id":44,"q_de":"Wo spürt man induzierten Widerstand, 40%?","a_de":"Induzierter Widerstand spürt man vorm vorherigen Gleitschirm wenn in Nähe. Tandem noch grösser als Soloschirm","q_en":"Where do you feel induced drag (~40%)?","a_en":"You feel induced drag (wake / wingtip vortices) directly behind a preceding paraglider when flying close to one. A tandem produces even more than a solo."},{"id":"aer-45","category":"Aerodynamics","original_id":45,"q_de":"Höher beladen:","a_de":"Schneller und wendiger. (Bsp. Schirm Gian)","q_en":"More heavily loaded wing:","a_en":"Faster and more agile."},{"id":"aer-46","category":"Aerodynamics","original_id":46,"q_de":"Weniger beladen:","a_de":"langsamer, sicherer zu fliegen","q_en":"Less heavily loaded wing:","a_en":"Slower and safer to fly."},{"id":"aer-47","category":"Aerodynamics","original_id":47,"q_de":"Zuladung ist…","a_de":"Alles ausser Schirm","q_en":"\"Zuladung\" (payload) is…","a_en":"…everything except the wing itself (pilot + harness + reserve + instruments + clothing)."},{"id":"aer-48","category":"Aerodynamics","original_id":48,"q_de":"Flächenbelastung ist…","a_de":"Inkl. Schirm - mit allem auf die Waage = Gesamt Fluggewicht","q_en":"Wing loading is calculated from…","a_en":"…total flight weight (INCLUDING the wing) ÷ wing area. Stand on the scale with everything you'll fly with."},{"id":"aer-49","category":"Aerodynamics","original_id":49,"q_de":"Grosse Gleitzahl gut =","a_de":"kleinerer Gleitwinkel","q_en":"A high glide ratio means…","a_en":"…a smaller glide angle (flatter descent — better)."},{"id":"aer-50","category":"Aerodynamics","original_id":50,"q_de":"Wenn Gleitwinkel gross ist dann ist die Gleitzahl","a_de":"kleiner","q_en":"If the glide ANGLE is large, then the glide RATIO is…","a_en":"…small (steep descent — bad)."},{"id":"aer-51","category":"Aerodynamics","original_id":51,"q_de":"Wann im besten Gleiten?","a_de":"Wenn Bremsen losgelassen","q_en":"When are you at best glide?","a_en":"At trim speed (hands up, brakes released)."},{"id":"aer-52","category":"Aerodynamics","original_id":52,"q_de":"Bei Rückenwind & Aufwind","a_de":"leicht anbremsen (ausnutzen) = bessere Gleitzahl und weiter mögliche Distanz","q_en":"With tailwind & lift, how to fly?","a_en":"Apply LIGHT brake (use the lift) — gives better glide-over-ground and longer reachable distance."},{"id":"aer-53","category":"Aerodynamics","original_id":53,"q_de":"Bei Gegenwind & Abwind","a_de":"Beschleunigen (schnell weg) - nur bei genügend Hangabstand wegen Klappergefahr = bessere Gleitzahl und weiter mögliche Distanz","q_en":"With headwind & sink, how to fly?","a_en":"ACCELERATE (get through it fast) — only with sufficient terrain clearance because of collapse risk. Gives better glide over ground and reachable distance."},{"id":"aer-54","category":"Aerodynamics","original_id":54,"q_de":"Querachse","a_de":"Nicken (z.b. Längestabilität auch nickstabil)","q_en":"Lateral axis (Querachse)?","a_en":"Pitch (nicken). Stability around it = pitch stability / longitudinal stability."},{"id":"aer-55","category":"Aerodynamics","original_id":55,"q_de":"Längsachse","a_de":"Rollen (z.B. Querstabilität - auch rollstabil)","q_en":"Longitudinal axis (Längsachse)?","a_en":"Roll (rollen). Stability around it = roll/lateral stability."},{"id":"aer-56","category":"Aerodynamics","original_id":56,"q_de":"Hochachse","a_de":"Richtungsstabilität (gieren)","q_en":"Vertical axis (Hochachse)?","a_en":"Yaw (gieren). Stability around it = directional stability."},{"id":"aer-57","category":"Aerodynamics","original_id":57,"q_de":"M pro Sekunde in km/h","a_de":"3.6 (für Umrechnung)","q_en":"Convert m/s to km/h?","a_en":"Multiply by 3.6."},{"id":"aer-58","category":"Aerodynamics","original_id":58,"q_de":"Wie viel G in Geradeausflug? Und wie viel bei 70° Querlage?","a_de":"Geradeaus fliegen = 1 G. 70 Grad = 3 Mal längere Achse = 3G. Im Kurvenflug nimmt Lastenvielfache zu. Minimale Geschwindigkeit nimmt auch zu. Ähnlich wie Soloschirm mit zwei Personen - auch 2G alles wird schneller (wie auch Kurvenflug) - weil Strömungsabriss kann passieren, daher braucht es auch mehr Geschwindigkeit. Trimmgeschwindigkeit nimmt auch zu.","q_en":"How many G in straight flight, and at 70° bank?","a_en":"Straight flight = 1 G.\n70° bank ≈ 3 G (load factor = 1/cos(bank angle)).\n\nIn a turn, load factor INCREASES — so minimum speed also increases (stall speed grows with √load factor). Comparable to flying solo loaded for tandem: at 2 G everything speeds up. The wing can stall, so it needs more speed. Trim speed also increases."}]</script>
<script id="data-guide" type="application/json">{"parts":[{"id":"part1","title":"Aerodynamics and Flight Mechanics","totalPages":35,"chapters":[{"id":"p1-vectors","title":"Vectors","startPage":3,"endPage":6,"text":"A vector is a representation of certain physical phenomena characterized by a magnitude, direction and point of origin. Two examples useful for the paragliding are (1) force and (2) speed. To characterize these two phenomena requires knowledge of the magnitude, for example a force of 10 kg or 16 kg and a speed of 35 km/h, their origin (center of the object that is acted upon) and direction (in 2 or 3 dimensions).\n\nTo graphically represent the two phenomena we use vectors depicted as arrows (or lines).\n\nLength of vector = magnitude of physical phenomenon. If the scale is 1 cm = 10 kg represented graphically, a vector of 3 cm will then correspond to a force of 30 kg.\n\nOrigin of a vector = end without the arrow. For example, this is the point of application of force.\n\nDirection of a vector = shown by the orientation arrow.\n\nExample (Figure A1): In depicting on paper a speed of 30 km/h by a vector V, applied on the object X (center of the object = X ') heading is north west.\n\nWhen two vectors V1 and V2 act on an object, it effect is the same as if it were only acted on by the resultant vector R. This is called adding the two vectors. We cannot simply add up their length because it ignores the directions. Figure A2 shows the technique to add these 2 vectors.\n\nSpecial cases: (1) Two vectors have the same orientation and the same direction, in this case simply add up their magnitudes. (2) Two vectors have the same orientation but opposite directions, then the resultant is the difference of the two vectors.\n\nFor the 5 questions 001 to 005, the same basic chart is used: See Figure A3. On the left there are 5 examples of vectors F1 to F5. On the right there are 4 examples of resultant vectors R1 to R4.\n\nQuestion 001. Addition of F1 and F2. This is the special case where two vectors are parallel in the same orientation. See Figure A4. R corresponds to R3 Figure A3\n\nQuestion 002. Addition of F1 and F3. This is the other special case where two vectors are parallel and in opposite. See Figure A5. R corresponds to R4 of Figure A3.\n\nQuestion 003. Addition of F1 and F4. See Figure A6. R corresponds to R2.\n\nQuestion 004. Addition of F1 to F5. See Figure A7. R corresponds to R1.\n\nQuestion 005. Addition of F4 and F5. See Figure A8. R corresponds to R4.\n\nNote: You can add as vectors of the same type: eg two vectors of \"force\" but not different types, eg. a vector of \"speed\" and vector of \"force\".","key_points":["A vector has 3 properties: magnitude (length), direction (arrow orientation), and origin (point of application).","Add vectors graphically (parallelogram/tip-to-tail) — never just sum lengths, because direction matters.","Same direction: add magnitudes. Opposite direction: subtract magnitudes (take the difference).","Only add vectors of the same type — you can add two forces or two speeds, but never a force with a speed."],"questions":[1,2,3,4,5]},{"id":"p1-drag","title":"Drag","startPage":6,"endPage":10,"text":"Wind: Moving air mass relative to fixed objects (houses, trees ... etc..). In the exam multiple choice questions, this is also referred to as \"airflow\" or \"flow\".\n\nRelative wind: When travelling at a speed V in an air mass moving at the same speed, the sensation is the same if we remained motionless. When an object moves through air, it experiences a relative wind.\n\nDrag: All objects in a wind (normal or relative) are also subject to a force called drag. For any object this force has the same orientation as the wind. For example if you put a hand outside the window of a moving car, you feel a force pushing your hand backwards, in the same direction as the relative wind created by the speed of the car. Drag is expressed in kg or Newtons (N). 10N = approximately 1kg.\n\n4 factors i
