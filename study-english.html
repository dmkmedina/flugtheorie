nds all the way to ground, so you can fly underneath. In the Jura: respect the lower limit on the map. In the Alps: the lower limit is whichever is higher — the limit on the map OR 300 m AGL."},{"id":"law-16","cat":"Legislation","q":"What is the minimum lower limit of a TMA in the Alpine region?","a":"300 m AGL or the published lower limit — whichever gives the greater altitude. North of the dividing line (Jura/Mittelland): always the published lower limit."},{"id":"law-17","cat":"Legislation","q":"A TMA (altitude data)?","a":"Located in the wider area around an airport. Extent and lower limit are shown on the Glider Map (in the Alps you may fly 300 m below the published limit). Below a TMA would be the CTR (down to ground), and connecting them between airports are the Airways — limits shown on the map."},{"id":"law-18","cat":"Legislation","q":"What does the abbreviation \"HX\" mean?","a":"No fixed operating times — can be activated at any time. The TMAs/CTRs of Zürich, Geneva and Basel are permanent (H24). Most other CTRs/TMAs carry an \"HX\" suffix, meaning they have no scheduled hours and can be activated on short notice. We must assume they are active by default. You can check actual status via radio or recorded phone messages. If inactive, the rules of the surrounding airspace (G or E) apply."},{"id":"law-19","cat":"Legislation","q":"HX =","a":"Activated at unscheduled times. Check by phone recording or radio (frequency is always listed). 30-minute rule applies. If nothing is noted = H24 (always active, e.g. LSZH). Temporary activations appear in NOTAM/DABS (only Alpnach and Sion — drawn with thinner lines on the map)."},{"id":"law-20","cat":"Legislation","q":"No HX label =","a":"Information about (temporary) activation can be found in the DABS."},{"id":"law-21","cat":"Legislation","q":"What is an AWY?","a":"Airway (Luftstrasse) — long, narrow corridors connecting major airports. On the Glider Map only one is visible: Zürich–Milan. Class C airspace, permanently active."},{"id":"law-22","cat":"Legislation","q":"FIZ stands for…","a":"Flight Information Zone. In Switzerland only at Samedan — radio contact is mandatory; the flight information officer provides traffic information."},{"id":"law-23","cat":"Legislation","q":"What rules apply in a FIZ?","a":"Entry only after establishing radio contact on the appropriate frequency. Around Samedan airfield there is a FIZ where radio contact with the flight information service is required. The airspace class itself does not change (stays G or E), and the FIS operator cannot issue clearances — only traffic advisories. Still, you must announce yourself before entry.\n\nContrast with RMZ (Radio Mandatory Zone): no-one answers there. The entering pilot must blind-broadcast position and intentions on the published frequency to inform other traffic."},{"id":"law-24","cat":"Legislation","q":"What rules apply in an RMZ?","a":"Entry only with listening watch and self-announcement (blind broadcasts) on the appropriate frequency."},{"id":"law-25","cat":"Legislation","q":"FL 150 corresponds to (Alps with MIL-OFF)?","a":"≈ 4550 m above sea level."},{"id":"law-26","cat":"Legislation","q":"At what altitude is FL 100 approximately?","a":"≈ 3050 m above sea level."},{"id":"law-27","cat":"Legislation","q":"FL — Flight Level is always referenced to which pressure?","a":"1013.25 hPa (standard pressure). Why: altimeters measure pressure, but pressure varies day-to-day and even within a day. Even if you calibrate in the morning it will drift. Solution = Flight Level: a uniform reference based on standard pressure."},{"id":"law-28","cat":"Legislation","q":"How much higher may you fly in high-pressure conditions?","a":"Above 1037 hPa: +200 m  •  1032–1036: +150 m  •  1026–1031: +100 m  •  1020–1025: +50 m  •  1010–1019: 0 m. (In low pressure you'd subtract — but we generally don't fly in low pressure anyway.) AMSL altitudes are exact only under standard atmosphere; high-pressure days give you extra headroom (up to +200 m)."},{"id":"law-29","cat":"Legislation","q":"The Swiss legal provisions covering hang-gliding / paragliding are found especially in…","a":"The Ordinance on Aircraft of Special Categories (VLK / OACS), 24 November 1994."},{"id":"law-30","cat":"Legislation","q":"Which airspace classes are relevant in Switzerland?","a":"7 classes globally (A–G), 4 used in Switzerland.\n• G & E — entry is free.\n• C & D — entry only with clearance and radio contact.\n\nG: ground to 600 m AGL, uncontrolled. Below 300 AGL: 1.5 km visibility, clear of cloud. From 300 AGL: 5 km vis, 1.5 km horizontal / 300 m vertical cloud clearance.\n\nE: up to 3050 / 3950 / 4550 m AMSL. Below 3050: 5 km vis, 1.5/300 cloud clearance. Above 3050: 8 km vis, 1.5/300 cloud clearance.\n\nC: lower limit 3050/3950/4550 AMSL — upper limit 18,300 AMSL (controlled; 8 km vis, 1.5/300).\n\nD: mostly around airports."},{"id":"law-31","cat":"Legislation","q":"In which airspace classes is continuous radio contact NOT required?","a":"G and E."},{"id":"law-32","cat":"Legislation","q":"The upper limit of airspace class G in Switzerland is set at…","a":"600 m AGL (example: a 4200 m peak + 600 m = up to 4800 m on top)."},{"id":"law-33","cat":"Legislation","q":"From ground up to 300 AGL the rules are: (airspace G)","a":"1.5 km visibility, clear of cloud."},{"id":"law-34","cat":"Legislation","q":"Rules for flying up to 300 m AGL?","a":"Up to 300 m (not 600 m as in the rest of G), no cloud-clearance distances apply — but you must always have ground in sight and at least 1.5 km horizontal visibility."},{"id":"law-35","cat":"Legislation","q":"What visibility and cloud-clearance distances apply on a Wednesday at 14:30 in the Alps at 200 m AGL / 3800 m AMSL?","a":"1.5 km visibility with ground in sight / clear of cloud horizontally / clear of cloud vertically (because still below 300 AGL)."},{"id":"law-36","cat":"Legislation","q":"From 300 AGL upward the rules are: (airspace G)","a":"5 km visibility, 1.5 km horizontal cloud clearance, 300 m vertical cloud clearance."},{"id":"law-37","cat":"Legislation","q":"Rules for flying above 300 m AGL?","a":"Visibility must be 5 km. Cloud clearance: 300 m vertical, 1.5 km horizontal."},{"id":"law-38","cat":"Legislation","q":"Up to 3050 AMSL the rules are: (airspace E)","a":"5 km visibility, 1.5 km horizontal cloud clearance, 300 m vertical."},{"id":"law-39","cat":"Legislation","q":"From 3050 AMSL upward the rules are: (airspace E)","a":"8 km visibility, 1.5 km horizontal cloud clearance, 300 m vertical."},{"id":"law-40","cat":"Legislation","q":"From 4550 AMSL upward the rules are: (airspace C)","a":"Caution — controlled airspace. 8 km visibility, 1.5 km horizontal / 300 m vertical cloud clearance. Entry only with clearance and radio contact."},{"id":"law-41","cat":"Legislation","q":"Airspace tags on the map — how to read them?","a":"Lower and upper limit are stacked in the box.\n• Plain numbers = AGL.\n• Italic numbers = AMSL.\n• Blue upper number = altitude per standard atmosphere (because at sea level pressure is constant).\n• White number = effective altitude (e.g. GPS).\n• Red-shaded = standard pressure-based, may vary."},{"id":"law-42","cat":"Legislation","q":"\"LS\" prefix in ICAO codes?","a":"Switzerland (Lower Europe — Switzerland). Examples: LSZR Altenrhein, LSZH Zürich."},{"id":"law-43","cat":"Legislation","q":"VFR?","a":"Visual Flight Rules — what paragliders fly under."},{"id":"law-44","cat":"Legislation","q":"IFR?","a":"Instrument Flight Rules — for aircraft equipped to fly without outside visual references. Paragliders should never enter IFR conditions."},{"id":"law-45","cat":"Legislation","q":"Rules around heliports?","a":"Stay 2.5 km away (5 km for airfields). Above 600 m over the reference point is OK. Local exceptions sometimes apply — useful to know for XC flights."},{"id":"law-46","cat":"Legislation","q":"Which 5 questions do I ask when planning a flight in a region?","a":"1. Season? (March–October → glider-cloud-clearance rules apply)\n2. Day of week and time? (military activity?)\n3. North or south of the dividing line?\n4. Altitude limits?\n5. Location — is there a heliport nearby?"},{"id":"law-47","cat":"Legislation","q":"On site at the flying area, what's your preparation?","a":"Inspect the landing field, plan the landing circuit, note obstacles. Plan the flight, emergency landing options, expected turbulence. Consider environment and wildlife. Respect local rules. Read the info board."},{"id":"law-48","cat":"Legislation","q":"1 foot (for conversion) equals…","a":"≈ 30.5 cm."},{"id":"law-49","cat":"Legislation","q":"Distances around airfields and heliports?","a":"• Heliport: 2.5 km radius (violet, circle + H).\n• Civil airfield: 5 km (violet, one circle + line).\n• Joint civil/military: 5 km (violet, two circles + line).\n• Military airfield: 5 km (red, two circles + line).\nMinimum altitude when overflying: 600 m above the reference point."},{"id":"law-50","cat":"Legislation","q":"What minimum horizontal distance must you keep from the runways of a military airfield (no CTR, or with CTR but inactive) below 600 m above the field?","a":"5 km — but only during military operating hours."},{"id":"law-51","cat":"Legislation","q":"Outdoor crowds, buildings, public roads, ski slopes, public transport infrastructure, overhead power lines and other cables…","a":"…must be flown around or over at a distance that provides sufficient safety."},{"id":"law-52","cat":"Legislation","q":"According to the VLK ordinance, the airworthiness of a hang-glider/paraglider must…","a":"…not be checked by any official body — I as the pilot am personally responsible. Regular inspections are recommended."},{"id":"law-53","cat":"Legislation","q":"Towing hang-gliders/paragliders with winches or vehicles","a":"Permitted up to 150 m AGL; above that requires authorisation."},{"id":"law-54","cat":"Legislation","q":"Take-offs and landings on public waters?","a":"Authorisation from the cantonal navigation office is required."},{"id":"law-55","cat":"Legislation","q":"Training flights may be conducted only under the direct supervision of persons holding…","a":"…a valid flight-instructor license."},{"id":"law-56","cat":"Legislation","q":"Which type of insurance is legally required during hang-glider/paraglider flights?","a":"Free-flight liability insurance (minimum cover CHF 1 million)."},{"id":"law-57","cat":"Legislation","q":"Commercial tandem flights with a passenger having no flying background — what license is required?","a":"Tandem license (Doppelsitzer 3 / License A)."},{"id":"law-58","cat":"Legislation","q":"The abbreviation \"FL\" stands for…","a":"Flight Level (Flugfläche)."},{"id":"law-59","cat":"Legislation","q":"What is the diameter of the target circle in the practical exam for the paragliding pilot license?","a":"Paraglider: 30 m. Hang glider (delta): 80 m."},{"id":"law-60","cat":"Legislation","q":"Who can issue legal provisions on the use of Swiss airspace?","a":"Only the Confederation (federal government)."},{"id":"law-61","cat":"Legislation","q":"Which radio frequency is reserved for hang-gliding training?","a":"123.430 MHz."},{"id":"law-62","cat":"Legislation","q":"Which radio frequency is reserved for hang-glider/paraglider air-to-air communication?","a":"130.930 MHz."},{"id":"law-63","cat":"Legislation","q":"To use the 130.930 MHz radio frequency…","a":"…no training/certification is required."},{"id":"law-64","cat":"Legislation","q":"What is the maximum time allowed between the theory and practical parts of the pilot exam?","a":"36 months."},{"id":"law-65","cat":"Legislation","q":"How long after failing the theory or practical part of the exam may you re-sit it?","a":"At the earliest after 12 days of further preparation."},{"id":"law-66","cat":"Legislation","q":"Where can an examinee appeal if they believe the examiner's decision was not in line with the regulations?","a":"The Federal Administrative Court (Bundesverwaltungsgericht)."},{"id":"law-67","cat":"Legislation","q":"Hang-gliders/paragliders fly under which flight rules?","a":"Exclusively under VFR (visual flight rules)."},{"id":"law-68","cat":"Legislation","q":"Hang-gliders/paragliders with electric propulsion may…","a":"…only take off from airfields."},{"id":"law-69","cat":"Legislation","q":"Hang-gliders/paragliders may only be used if liability insurance covers damage…","a":"…caused to uninvolved third parties on the ground (ground only — not in the air)."},{"id":"law-70","cat":"Legislation","q":"Every hang-glider/paraglider in Switzerland must be marked with:","a":"The SHV identification number (e.g. 6677X) and the manufacturer's plaque."},{"id":"law-71","cat":"Legislation","q":"Within what deadline must an examinee file an appeal?","a":"30 days."},{"id":"law-72","cat":"Legislation","q":"Provided no goods are carried but the necessary documents are, with a hang-glider/paraglider it is…","a":"…permitted under the VLK to cross the Swiss border. Note: laws in other countries may differ — respect them."},{"id":"law-73","cat":"Legislation","q":"Through whom does the Confederation exercise direct supervision of civil aviation?","a":"BAZL (Federal Office of Civil Aviation). Chain: 1. Confederation — makes laws  •  2. BAZL — supervises  •  3. SHV — implements. The VLK adds the legal provisions for special-category aircraft."},{"id":"law-74","cat":"Legislation","q":"How are airspaces visually distinguished on the Glider Map?","a":"Dark-blue lines = permanent airspaces. Light-blue / thinner lines = temporary airspaces."},{"id":"law-75","cat":"Legislation","q":"Hang-gliders/paragliders must carry a clearly visible plaque showing:","a":"Manufacturer, type/model, year of manufacture, manufacturer's information on minimum and maximum load."},{"id":"law-76","cat":"Legislation","q":"What does LS-P mean?","a":"Prohibited area (Sperrgebiet). Currently none are shown on the Swiss Glider Map."},{"id":"law-77","cat":"Legislation","q":"Which publication shows military flight-service hours?","a":"The DABS."},{"id":"law-78","cat":"Legislation","q":"An LS-R for gliders with suffix \"MA\" — what's its activation status March–31 Oct?","a":"Active when MIL-OFF. When MIL-ON, it can be activated on request with the relevant agency."},{"id":"law-79","cat":"Legislation","q":"Which group may occasionally fly hang-gliders/paragliders in Swiss airspace without holding the Swiss license?","a":"Pilots resident abroad who hold an equivalent foreign license (or international IPPI)."},{"id":"law-80","cat":"Legislation","q":"The content of the exams for official pilot licenses is…","a":"…laid down in the SHV directives, approved by BAZL (Federal Office of Civil Aviation)."},{"id":"law-81","cat":"Legislation","q":"An AWY (Airway)…","a":"…connects different airports and has clearly defined lateral and lower limits."},{"id":"law-82","cat":"Legislation","q":"Which publication shows the framework for military flight-service hours (alongside DABS)?","a":"The Glider Map (GLDK) lists the standard times; the DABS shows daily activation."},{"id":"law-83","cat":"Legislation","q":"The 5-point pre-launch check for the practical exam:","a":"1. Harness & personal gear: leg straps fastened and tight, belly+chest strap closed, helmet closed, reserve checked, speedbar checked, carabiners locked.\n\n2. Risers/lines: risers not twisted, line layout pre-checked, at least the middle A-lines lying free and under tension, brake lines run freely.\n\n3. Wing: leading edge open, canopy laid out as desired.\n\n4. Wind: correct direction and acceptable strength.\n\n5. Take-off / airspace clear: 360° look-around — ground and air clear. Mentally rehearse last possible abort point."},{"id":"eq-1","cat":"Equipment","q":"Basics about the different paraglider classes","a":"• A — school glider: compact, low aspect ratio, safety first. If something happens and the pilot lets go, it self-stabilises. Glide performance secondary (~8 km).\n• B — what most pilots fly.\n• C / D — certified through dedicated tests; includes acro wings, very robust against G-loads.\n• Speedflyer: small and light, used with skis."},{"id":"eq-2","cat":"Equipment","q":"How are paragliders tested?","a":"EN-standard quality certification: shock-load test (twice, dragged by a car) at minimum 8 G — modern gliders are usually tested at 12–16 G. Line-strength and kink tests are documented in a paper report. Then a flight test: brake travel measured from 0 to 30/60 m. Manoeuvres are flown 5 times each, judged by an expert and a test pilot. If 4 of 5 are B and one is A → the wing is rated A (worst-case rules)."},{"id":"eq-3","cat":"Equipment","q":"What material is a paraglider made of?","a":"• Canopy: nylon, with ripstop barriers to prevent tear propagation.\n• Cloth weight ~49 g/m² (an A4 sheet of paper is 80 g); lightweight wings use 17 g/m².\n• Carabiners: aluminium or steel — must be replaced every 5 years.\n• Upper sail is more robust than the lower sail (sun/rain protection)."},{"id":"eq-4","cat":"Equipment","q":"What material are the lines made of?","a":"Outer sheath: polyester — protects against mechanical wear (stones etc.) and allows colour coding (used on school wings). Makes the line thicker; unsheathed lines have lower drag.\n\nCore: Dyneema — stretches under load (A & B classes ~80% load tolerance). Dyneema can sometimes shrink on C/D wings.\n\nAramid lines stretch less, are brownish, and kink-sensitive. Most modern wings use a Dyneema/Aramid mix to balance properties.\n\nUV exposure is critical → the sheath helps. Lines can shrink or stretch over the years."},{"id":"eq-5","cat":"Equipment","q":"Material & info on reserve parachutes?","a":"Reserves are also nylon — woven thinner, allowed to stretch.\n• Square (cruciform) — current standard, pendulum-stable.\n• Round — older design, prone to pendulum motion.\n• Triangular (steerable) — for experienced users.\n\nAfter deployment you descend at ~5.5 m/s — equivalent to jumping from 1.5–2.3 m (and you carry a lot of weight with all the gear).\n\nLanding under a reserve: land on your legs, NOT on the back protector!"},{"id":"eq-6","cat":"Equipment","q":"Harness information?","a":"• Airbag harness: protector inflates during flight — no protection during launch.\n• Foam protector: always inflated, but heavier.\n• Reversible (convertible) harness: takes a lot of stress; pre-inflate on launch.\n• Reclined (pod) harness: more aerodynamic, comfortable, room for instruments — but less manoeuvrable and no direct view straight down.\n• Hike & Fly harness: ultralight, no protection."},{"id":"eq-7","cat":"Equipment","q":"Extra info: line stretch, storage, porosity, ageing","a":"• Line stretch is checked by measurement and corrected (re-trimmed).\n• Flying lots of G-forces ages the wing faster.\n• UV exposure in flight is unavoidable — on the ground, pack the wing and keep it in the shade.\n• Lines shrink when very wet — let the wing dry before packing (a wet wing in a hot car is bad).\n• Porous fabric (uncoated) = more air leakage = less performance. The coating also protects."},{"id":"eq-8","cat":"Equipment","q":"Leading edge & trailing edge?","a":"Leading edge = front (Profilnase). Trailing edge = rear, where the brake lines attach (Hinterkante)."},{"id":"eq-9","cat":"Equipment","q":"What's the consequence of shortening the D-lines?","a":"Angle of attack increases; profile shape and flight behaviour are altered."},{"id":"eq-10","cat":"Equipment","q":"An altimeter gets its information from…","a":"…atmospheric pressure."},{"id":"eq-11","cat":"Equipment","q":"Harnesses with high attachment points let turbulence be…","a":"…felt less, but they hamper acceleration during launch when leaning forward."},{"id":"eq-12","cat":"Equipment","q":"Sewing loops at the line ends…","a":"…can cause up to a 40% loss of strength, especially with aramid lines."},{"id":"eq-13","cat":"Equipment","q":"Advantage of looped (spliced) lines vs. sewn?","a":"Easier to service and replace without much effort."},{"id":"eq-14","cat":"Equipment","q":"Signs of fabric ageing?","a":"• Porosity increases.\n• Airflow separates (stalls) at higher speeds.\n• More prone to parachutal stall (Sackflug)."},{"id":"eq-15","cat":"Equipment","q":"The coating quality suffers when…","a":"…you pack the wing on tarmac or concrete."},{"id":"eq-16","cat":"Equipment","q":"What overall design requirements apply to a reserve parachute?","a":"High strength and elasticity, within the specified design envelope."},{"id":"eq-17","cat":"Equipment","q":"If the reserve's main attachment is near the body's centre of gravity, then…","a":"…you must consciously sit up before landing to land on your feet."},{"id":"eq-18","cat":"Equipment","q":"A harness with heavily diagonal cross-bracing lets turbulence be…","a":"…felt less, but hinders steering through weight-shift."},{"id":"eq-19","cat":"Equipment","q":"Why are diagonal V-ribs / cell walls built into a paraglider canopy?","a":"They transfer the load of the upper sail to fewer lines — minimising drag."},{"id":"eq-20","cat":"Equipment","q":"If a material is loaded to its maximum tensile strength, then…","a":"…afterward its dimensions and tensile strength will no longer match the original state."},{"id":"eq-21","cat":"Equipment","q":"Trim tabs/trimmers allow you to…","a":"…change the riser length and therefore the flight behaviour. A wing with trimmers is only considered type-tested if it was homologated WITH the trimmers."},{"id":"eq-22","cat":"Equipment","q":"Trim tabs/trimmers usually vary the length of the…","a":"…rearmost riser (the back riser)."},{"id":"eq-23","cat":"Equipment","q":"Brake/steering-line length should be set so that…","a":"…the wing's entire speed range can be flown without issues."},{"id":"eq-24","cat":"Equipment","q":"Cell-wall stress is greatest in the area of…","a":"…the line attachment points on the front half of the wing."},{"id":"eq-25","cat":"Equipment","q":"EN-standard type certification tells you about…","a":"…the structural strength and flight behaviour of a specific paraglider model when new."},{"id":"eq-26","cat":"Equipment","q":"Coating the paraglider fabric…","a":"…reduces its elasticity."},{"id":"eq-27","cat":"Equipment","q":"Who sets the norms for SHV type certification?","a":"CEN (European Committee for Standardisation)."},{"id":"eq-28","cat":"Equipment","q":"Who specifies the inspection intervals for the wing?","a":"The manufacturer."},{"id":"eq-29","cat":"Equipment","q":"The variometer tells the pilot in flight about…","a":"…vertical speed (climb/sink rate)."},{"id":"eq-30","cat":"Equipment","q":"Best helmet against head injuries?","a":"Full-face (integral) helmet."},{"id":"eq-31","cat":"Equipment","q":"Which factors can prolong reserve deployment time?","a":"Long repack intervals, static charge, an overly long connecting line (bridle)."},{"id":"eq-32","cat":"Equipment","q":"Pressure-equalisation openings (crossports) in the cell walls…","a":"…allow cells whose intake is collapsed (or absent) to still inflate from neighbouring cells."},{"id":"eq-33","cat":"Equipment","q":"In which manoeuvre can cell walls suffer downward loads?","a":"B-line stall."},{"id":"eq-34","cat":"Equipment","q":"Which risers are least loaded in stable straight-and-level flight?","a":"The D-risers."},{"id":"eq-35","cat":"Equipment","q":"The high over central Europe is gradually weakening. In Switzerland, the reading of an altimeter calibrated in the morning will, by afternoon, read…","a":"…too high."},{"id":"eq-36","cat":"Equipment","q":"Trimmers are released in fast flight…","a":"…so the angle of attack decreases and the trailing edge of the profile bends upward."},{"id":"eq-37","cat":"Equipment","q":"Reserves are made of?","a":"Polyamide (nylon)."},{"id":"eq-38","cat":"Equipment","q":"What is the purpose of cell walls and inter-cell walls?","a":"To evenly distribute the load from the lines onto the upper sail."},{"id":"eq-39","cat":"Equipment","q":"How can you fit loops to unsheathed aramid line ends without significantly weakening them?","a":"By splicing (\"finger-trapping\" technique)."},{"id":"eq-40","cat":"Equipment","q":"Paraglider fabrics are coated because…","a":"…it reduces porosity and elasticity."},{"id":"eq-41","cat":"Equipment","q":"Releasing trimmers in stable straight-and-level flight…","a":"…increases the tendency to collapse, and brake travel becomes longer."},{"id":"eq-42","cat":"Equipment","q":"Principle for reserve-handle placement?","a":"The handle must be clearly visible and easily reachable for the pilot."},{"id":"eq-43","cat":"Equipment","q":"Reducing the distance between the two harness attachment points lets turbulence be…","a":"…felt less, but increases the risk of twisting (twister)."},{"id":"eq-44","cat":"Equipment","q":"An anemometer measures…","a":"…speed relative to the surrounding air."},{"id":"eq-45","cat":"Equipment","q":"Typical wing loading values for a modern intermediate paraglider (referred to projected area)?","a":"Too low: 2 kg/m²  •  Normal: 3.5 kg/m²  •  Upper limit: 4.5 kg/m²."},{"id":"eq-46","cat":"Equipment","q":"Effect of shortening / lengthening the A-lines?","a":"A-lines SHORTENED: smaller angle of attack, faster flight, profile and behaviour altered, easier to launch, MORE prone to frontal collapses, LESS prone to parachutal stall.\n\nA-lines LENGTHENED: larger angle of attack, slower, harder to launch, no frontal-collapse tendency, MORE prone to parachutal stall."},{"id":"eq-47","cat":"Equipment","q":"Effect of shortening / lengthening the D-lines?","a":"D-lines SHORTENED: harder to launch, larger angle of attack, slower, no frontal tendency, MORE prone to parachutal stall.\n\nD-lines LENGTHENED: easier launch, smaller angle of attack, faster, MORE prone to frontal collapses, LESS prone to parachutal stall."},{"id":"eq-48","cat":"Equipment","q":"With moderate brake input, the D-lines may not be under tension and sag — what does that mean?","a":"The brake/control lines are unloading the D-lines, which can be normal in moderately braked flight."},{"id":"eq-49","cat":"Equipment","q":"Shortening the B-lines on a school wing…","a":"Angle of attack stays the same. Profile and flight behaviour are altered."},{"id":"met-1","cat":"Meteorology","q":"Reading wind strength from a pressure map (isobar spacing)?","a":"Reference scale: Switzerland on the map.\n• Isobar cells smaller than Switzerland → strong wind.\n• Larger than Switzerland → weak wind.\n• Roughly the same size → moderate wind."},{"id":"met-2","cat":"Meteorology","q":"Wind directions in degrees?","a":"North (incl. Nordföhn) = 360°/0°  •  Bise (E) = 90°  •  South (Südföhn) = 180°  •  West = 270°."},{"id":"met-3","cat":"Meteorology","q":"How to convert knots to km/h quickly? E.g. 10 kt.","a":"Double, then subtract 10%. Example: 10 kt × 2 = 20, −10% = 18 km/h."},{"id":"met-4","cat":"Meteorology","q":"What is the Venturi effect?","a":"Wind accelerates where its path narrows — e.g. in a narrowing valley, or as it crosses a peak or ridge."},{"id":"met-5","cat":"Meteorology","q":"Warm front — how long and how fast?","a":"Warm front moves at ~15–25 km/h. Takes 12–24 h to cross all of Switzerland. Less dangerous than a cold front. It moves as a wedge — arriving aloft first, then at the surface. On charts: half-circles (semicircles)."},{"id":"met-6","cat":"Meteorology","q":"What do you see one hour before a warm front arrives?","a":"Poor visibility, rain, steady wind, low cloud base."},{"id":"met-7","cat":"Meteorology","q":"Cold front — how long and how fast?","a":"Cold front moves at ~40–70 km/h — more dangerous because faster. Can catch up to a warm front → occlusion (mixed front). Takes only 6–12 h to cross Switzerland. On charts: triangles. Arrives at the surface first, then aloft."},{"id":"met-8","cat":"Meteorology","q":"Occlusion?","a":"Occurs when a cold front catches up to a warm front. Depending on which surface line dominates, it has either warm-front or cold-front character. On charts: triangles AND half-circles on the same line."},{"id":"met-9","cat":"Meteorology","q":"Cloud overview — types and altitude levels?","a":"3 altitude levels:\n1. High (\"Cirro-\") — Cirrocumulus, Cirrostratus\n2. Mid (\"Alto-\") — Altostratus, Altocumulus\n3. Low — Cumulus, Stratus (also Nimbostratus → storm clouds)\n\nKey types:\n• Cirrus = wispy streaks\n• Lenticularis = lens-shaped, lots of wind, stationary (lee wave!)\n• Cumulus Congestus / Cumulonimbus = potential hail\n• Stratus = layered (also fog, full overcast)\n• Cumulus = puffy. 8/8 coverage = overcast; 2/8 = sparse; 3–4/8 = ideal for thermal flying."},{"id":"met-10","cat":"Meteorology","q":"Why does ground (radiation) inversion form?","a":"Due to nocturnal radiative cooling of the ground under a clear sky."},{"id":"met-11","cat":"Meteorology","q":"Inversion?","a":"Warmer air above, cooler below — e.g. a sea of fog in the mountains. Cold and grey below, warm and sunny above (classic altitude inversion)."},{"id":"met-12","cat":"Meteorology","q":"Isothermal layer?","a":"A layer in which temperature stays constant with height."},{"id":"met-13","cat":"Meteorology","q":"Reverse thermal (\"Umkehrthermik\")?","a":"In the evening, slopes cool down. Cooled air slides under warmer air and pushes it upward, creating evening lift."},{"id":"met-14","cat":"Meteorology","q":"What does \"adiabatic\" mean?","a":"An air mass cools without exchanging heat with its surroundings — only through expansion (and warms through compression)."},{"id":"met-15","cat":"Meteorology","q":"Dry adiabatic lapse rate?","a":"1 °C cooling per 100 m of ascent."},{"id":"met-16","cat":"Meteorology","q":"Moist (wet) adiabatic lapse rate?","a":"0.6–0.9 °C per 100 m (closer to 0.6 in very humid air, closer to 0.9 in drier air)."},{"id":"met-17","cat":"Meteorology","q":"Altitude of the tropopause?","a":"Over us: about 11,000 m. Globally up to 13,000 m."},{"id":"met-18","cat":"Meteorology","q":"What determines the lapse rate of moist rising air?","a":"The amount of water vapour that condenses (releasing latent heat)."},{"id":"met-19","cat":"Meteorology","q":"When two winds meet head-on, it's…","a":"…shear-induced turbulence (wind-shear turbulence)."},{"id":"met-20","cat":"Meteorology","q":"Turbulence caused by buildings etc. is…","a":"…mechanical turbulence."},{"id":"met-21","cat":"Meteorology","q":"Wave motion caused by terrain (mountains)?","a":"Orographic or Föhn turbulence."},{"id":"met-22","cat":"Meteorology","q":"Decrease of air temperature with altitude (standard)?","a":"About 0.65 °C per 100 m (varies with stratification)."},{"id":"met-23","cat":"Meteorology","q":"Isothermal layers and inversions are…","a":"…capping layers that block thermally rising air masses."},{"id":"met-24","cat":"Meteorology","q":"Sunny weather at altitude with fog in the valleys indicates…","a":"…high stability in the lower troposphere."},{"id":"met-25","cat":"Meteorology","q":"In frontal formation, an air mass is called \"warm\" when its temperature is…","a":"…higher than the adjacent air mass."},{"id":"met-26","cat":"Meteorology","q":"At the same altitude AMSL, air is…","a":"…less dense when warm than when cold."},{"id":"met-27","cat":"Meteorology","q":"What does stable stratification mean for flying?","a":"No thermals."},{"id":"met-28","cat":"Meteorology","q":"What is an outflow?","a":"Essentially a downdraft/outburst. A thunderstorm outflow is dangerous: heavy cold air rushes down, causing very strong turbulence around the storm."},{"id":"met-29","cat":"Meteorology","q":"When is the valley wind strongest?","a":"Strong and dangerous in spring — peak in June — especially in the Rhine and Rhone valleys. Strongest near the valley floor; gusty up to ~500 m AGL. Solution: top-land instead of bottom-landing."},{"id":"met-30","cat":"Meteorology","q":"3 conditions that are dangerous to fly in?","a":"Föhn, valley wind, thunderstorm."},{"id":"met-31","cat":"Meteorology","q":"What is needed for a Föhn (foehn) wind?","a":"A large mountain range AND a pressure difference across it."},{"id":"met-32","cat":"Meteorology","q":"What do these signs indicate? Strong wind, humidity, mountains required; appears at or behind (lee of) peaks — a wind warning sign.","a":"Lenticularis (lenticular clouds — lee waves)."},{"id":"met-33","cat":"Meteorology","q":"Under which synoptic situation is Südföhn most likely in Alpine valleys?","a":"Switzerland is in the warm sector, and a cold front is approaching the Jura."},{"id":"met-34","cat":"Meteorology","q":"Under what conditions is ground fog (radiation fog) likely to form?","a":"Clear sky, no wind, small temperature–dew-point spread."},{"id":"met-35","cat":"Meteorology","q":"In meteorology, the dew point is…","a":"…the temperature to which air must cool for the water vapour it contains to begin condensing."},{"id":"met-36","cat":"Meteorology","q":"Which wind appears in Ticino Alpine valleys when the Azores high extends towards central Europe?","a":"Nordföhn (north foehn)."},{"id":"met-37","cat":"Meteorology","q":"Favourable conditions for a Nordföhn situation in Ticino?","a":"Switzerland is on the back side of a cold front; moderately humid cold air is pushed from the northwest against the Alps."},{"id":"met-38","cat":"Meteorology","q":"Valley wind with decreasing altitude…","a":"…increases (strongest around 500 m above the valley floor)."},{"id":"met-39","cat":"Meteorology","q":"How does the temperature of an air parcel change as it rises from the ground without forming a cloud?","a":"It cools by 1 °C per 100 m (dry adiabatic), because pressure decreases with altitude."},{"id":"met-40","cat":"Meteorology","q":"Surface winds over flat terrain blow…","a":"…approximately parallel to the isobars, from high pressure toward low pressure."},{"id":"met-41","cat":"Meteorology","q":"Altocumulus castellanus clouds two hours after sunrise signal…","a":"…unstable stratification at cloud level — often a precursor to thunderstorms later in the day."},{"id":"met-42","cat":"Meteorology","q":"In a high-pressure region in our hemisphere…","a":"…air masses rotate clockwise around its centre and sink (subsidence) over a wide area."},{"id":"met-43","cat":"Meteorology","q":"Which phase change releases energy as heat?","a":"Transition from liquid to solid (freezing)."},{"id":"met-44","cat":"Meteorology","q":"Where is an inversion typically found?","a":"At the boundary between hazy surface air and clear air aloft."},{"id":"met-45","cat":"Meteorology","q":"Why does the temperature of a rising air parcel change?","a":"Because atmospheric pressure decreases with altitude, the parcel expands and loses energy in the form of heat."},{"id":"met-46","cat":"Meteorology","q":"Clouds form when…","a":"…air (usually being lifted) cools down to its dew point."},{"id":"met-47","cat":"Meteorology","q":"Does time of day affect the formation of frontal thunderstorms?","a":"No (unlike heat thunderstorms, which need solar heating)."},{"id":"met-48","cat":"Meteorology","q":"At what time of day in July, in Alpine valleys with strong valley winds and fair weather, do you mainly encounter thermal turbulence (not mechanical or shear)?","a":"Around 11:00."},{"id":"met-49","cat":"Meteorology","q":"What dissolves a ground inversion?","a":"Solar heating of the near-ground air layers during the course of the day."},{"id":"met-50","cat":"Meteorology","q":"What does \"thermal turbulence\" mean?","a":"Warm-air bubbles detach from the ground and rise."},{"id":"met-51","cat":"Meteorology","q":"A balloon of 5 dm³ rises from sea level to 5500 m. What's its volume at 5500 m?","a":"≈ 10 dm³ — the volume doubles because pressure halves at ~5500 m."},{"id":"met-52","cat":"Meteorology","q":"Atmospheric pressure at sea level is not always the same because…","a":"…surface temperature variations cause the air to warm or cool, resulting in different air densities."},{"id":"met-53","cat":"Meteorology","q":"What's required for a Föhn situation in Alpine valleys?","a":"A large pressure gradient between the south and north sides of the Alps."},{"id":"met-54","cat":"Meteorology","q":"Lenticularis clouds can form when…","a":"…air masses flow over terrain at a certain speed (creating standing lee waves)."},{"id":"met-55","cat":"Meteorology","q":"Why does moist rising air cool more slowly than dry air?","a":"Because the latent heat released by condensation slows the temperature drop of the air mass."},{"id":"met-56","cat":"Meteorology","q":"Sign from a distance that a Cumulus Congestus or Cumulonimbus is producing precipitation?","a":"A grey curtain (\"virga\" or rain shaft) reaches from the cloud base down toward the ground."},{"id":"met-57","cat":"Meteorology","q":"Simultaneous sunny weather at altitude AND in the valleys signals…","a":"…a stable layer in the lower troposphere."},{"id":"met-58","cat":"Meteorology","q":"Air pressure is a result of…","a":"…gravity."},{"id":"met-59","cat":"Meteorology","q":"What is an \"air mass\" in meteorology?","a":"A body of air with uniform properties (temperature and humidity)."},{"id":"met-60","cat":"Meteorology","q":"A valley wind develops because air…","a":"…heats up faster in the mountains than over the flat lowlands during the day."},{"id":"met-61","cat":"Meteorology","q":"\"Blue thermals\" (no cumulus marker) occur when…","a":"…the temperature–dew point spread of the rising air mass is so large that the dew point is never reached."},{"id":"met-62","cat":"Meteorology","q":"In summer Alpine valleys with valley winds, turbulence peaks around…","a":"15:00."},{"id":"met-63","cat":"Meteorology","q":"What are the best conditions for thermals to form over land?","a":"Sheltered from wind, and dry ground."},{"id":"met-64","cat":"Meteorology","q":"The cumulus cloud base is…","a":"…the lower edge of the cloud — at the altitude where rising air cools to its dew point."},{"id":"met-65","cat":"Meteorology","q":"What signs of Südföhn appear on the north side of the Alps?","a":"• Distant mountains covered in cloud.\n• Cumulus and lenticularis clouds against the blue sky.\n• Variable surface winds near the ground.\n• A freshening southwest wind at the launch site."},{"id":"met-66","cat":"Meteorology","q":"The lapse rate of an isothermal layer is…","a":"0 °C per 100 m (constant temperature)."},{"id":"met-67","cat":"Meteorology","q":"Which weather situation strongly favours high-reaching thermals over the Alps?","a":"A weak (flat) high with its centre over the Alps."},{"id":"met-68","cat":"Meteorology","q":"Which phase change consumes energy (heat)?","a":"Liquid → gas (evaporation/vaporisation)."},{"id":"met-69","cat":"Meteorology","q":"How does the air 100 m above ground mainly warm up during the day?","a":"The near-ground layer heats up and rises, while cooler air aloft sinks to the surface where it is then heated — a convective exchange."},{"id":"met-70","cat":"Meteorology","q":"In which month do thermals in the Alps reach the highest altitudes?","a":"August."},{"id":"met-71","cat":"Meteorology","q":"Which phase change releases energy as heat?","a":"Gas → liquid (condensation)."},{"id":"met-72","cat":"Meteorology","q":"Which phase change consumes energy?","a":"Solid → liquid (melting)."},{"id":"met-73","cat":"Meteorology","q":"Warm front =","a":"Precipitation ENDS with the passage of the front."},{"id":"met-74","cat":"Meteorology","q":"Cold front =","a":"Precipitation BEGINS with the passage of the front."},{"id":"met-75","cat":"Meteorology","q":"Cold air =","a":"Sinks to the ground (because heavier) → higher pressure."},{"id":"met-76","cat":"Meteorology","q":"Warm air =","a":"Rises (because lighter) → lower pressure."},{"id":"met-77","cat":"Meteorology","q":"Luv =","a":"Windward (facing into the wind)."},{"id":"met-78","cat":"Meteorology","q":"Lee =","a":"Leeward (sheltered side, downwind of an obstacle)."},{"id":"prc-1","cat":"Flight Practice","q":"How to calculate range from glide ratio?","a":"Glide ratio × altitude = distance. Example: glide ratio 9, altitude 1000 m → you can travel ≈ 9 km."},{"id":"prc-2","cat":"Flight Practice","q":"You're flying south to your landing field. You notice a moderate west wind of 25 km/h. How do you arrive highest above the landing?","a":"Aim southwest (crab into the wind) and fly as fast as possible."},{"id":"prc-3","cat":"Flight Practice","q":"A steady 15 km/h headwind on takeoff. What can you expect for launch run and speed?","a":"Short launch run, low running speed."},{"id":"prc-4","cat":"Flight Practice","q":"You enter turbulence and the glider starts to swing slightly around the pitch and roll axes. Correct reaction?","a":"Sit relaxed in the harness, apply light brake, do NOT try to actively counteract the oscillations."},{"id":"prc-5","cat":"Flight Practice","q":"Zurich-Kloten reports QNH 1015. What does this mean?","a":"The pressure reduced to sea level (using ICAO standard atmosphere) is 1015 hPa. Setting an altimeter to this QNH will read sea-level zero."},{"id":"prc-6","cat":"Flight Practice","q":"What does \"Vrille\" (spin / negative spin) mean?","a":"Rapid rotation around the vertical axis: one wing half moves forward while the other moves backward (one side has stalled flow)."},{"id":"prc-7","cat":"Flight Practice","q":"Just after launch you must brake hard right to fly straight. Probable cause?","a":"A knot in the lines on the LEFT side (it shortens the left side, so the glider tries to turn right — you compensate with right brake)."},{"id":"prc-8","cat":"Flight Practice","q":"You have a knot between the D-lines and the brake lines on the left side. Consequences for continued flight?","a":"Higher risk of parachutal stall, and a right turn may cause flow separation/stall on the affected side."},{"id":"prc-9","cat":"Flight Practice","q":"From which position is the collision risk between a hang glider (delta) and a paraglider greatest, with neither pilot seeing the other?","a":"The delta approaches the paraglider from BEHIND and BELOW (paraglider can't see down/back; delta has limited upward visibility)."},{"id":"prc-10","cat":"Flight Practice","q":"At the landing field, a ~6×6 m red cloth with a yellow X across both diagonals means…","a":"…landing is FORBIDDEN. Find another landing site."},{"id":"prc-11","cat":"Flight Practice","q":"What can happen if you over-brake the paraglider in a turn?","a":"Flow separates on the inside wing; the glider drops over the stalled side and enters a spin (Vrille)."},{"id":"prc-12","cat":"Flight Practice","q":"You reach the landing field just before two other gliders flying 50 m apart. No wind, no obstacles, no local rule on circuit direction. How do you approach?","a":"The first to land chooses the direction freely BUT must fly a LEFT-hand circuit."},{"id":"prc-13","cat":"Flight Practice","q":"What happens if you accelerate by pulling ONLY the A-risers down?","a":"Frontal collapse: the wingtips overshoot the middle of the canopy and the glider folds up."},{"id":"prc-14","cat":"Flight Practice","q":"At 32 km/h in 2 °C air, the wind-chill on the body equals still air at…","a":"−11 °C."},{"id":"prc-15","cat":"Flight Practice","q":"You hit lift, start to circle. After 90° the vario shows sink. Best manoeuvre?","a":"Complete a 180° turn, then fly straight briefly — the lift should now be ahead of you. Then re-centre the thermal."},{"id":"prc-16","cat":"Flight Practice","q":"The crab angle (Vorhaltewinkel) depends on…","a":"…airspeed, wind strength, and wind direction."},{"id":"prc-17","cat":"Flight Practice","q":"Choosing a landing field from the air in a 25 km/h valley wind. Most important requirement for a safe landing?","a":"The terrain on the windward (upwind) side must be flat and free of trees and buildings."},{"id":"prc-18","cat":"Flight Practice","q":"Consequence of a >50% asymmetric collapse if the pilot does nothing (no brake input)?","a":"An ever-steepening spiral dive."},{"id":"prc-19","cat":"Flight Practice","q":"Just after launch you find a knot in the front lines on the LEFT side. Consequences?","a":"More susceptible to turbulence; the left side will collapse more easily."},{"id":"prc-20","cat":"Flight Practice","q":"Long exposure to airflow increases the body's…","a":"…fluid requirements (you dehydrate faster — drink!)."},{"id":"prc-21","cat":"Flight Practice","q":"Wind at the landing field is 25 km/h. As soon as your feet touch the ground, you must…","a":"…immediately turn 180° (facing the wing) and pull B-, C- or brake lines fully to depower the canopy (prevent being dragged)."},{"id":"prc-22","cat":"Flight Practice","q":"The crab angle…","a":"…increases with stronger crosswind."},{"id":"prc-23","cat":"Flight Practice","q":"Launching from a forest clearing/gap, you may encounter…","a":"…calm at the ground while wind is blowing at treetop height — meaning turbulence at treetop height as you climb out."},{"id":"prc-24","cat":"Flight Practice","q":"Pilot A flies at 35 km/h, Pilot B at 50 km/h. Same route, same crosswind.","a":"A must choose a LARGER crab angle than B (slower airspeed needs more crab to compensate for the same crosswind)."},{"id":"prc-25","cat":"Flight Practice","q":"To what altitude can a healthy body at rest typically adapt to the changing conditions?","a":"≈ 4000 m."},{"id":"prc-26","cat":"Flight Practice","q":"Which signs suggest a launch site is in the lee (downwind of an obstacle)?","a":"Abrupt changes in wind speed AND wind direction (rotor-like behaviour)."},{"id":"prc-27","cat":"Flight Practice","q":"How to stay airborne longest in calm air?","a":"Fly with 20–30% brake applied (minimum sink speed)."},{"id":"prc-28","cat":"Flight Practice","q":"You're flying a left-hand circuit, landing west. On base leg you notice a light east wind (2–5 km/h) at the field. What do you do?","a":"Continue the approach as planned and adjust the final approach for a flatter descent (the slight tailwind doesn't justify changing direction — but you'll come in faster/flatter)."},{"id":"prc-29","cat":"Flight Practice","q":"After a tree landing the glider hangs in the canopy. How do you avoid damaging the glider when retrieving it?","a":"Release the line locks and the brake-loop knots so the lines can move freely as you lower it."},{"id":"prc-30","cat":"Flight Practice","q":"For descending by spiral dive, note that…","a":"…in turbulent air it requires considerable pilot skill, and it puts significant load on the body."},{"id":"prc-31","cat":"Flight Practice","q":"What does \"wingover\" mean?","a":"Rapid alternating turns with brief 90° bank angles."},{"id":"prc-32","cat":"Flight Practice","q":"When releasing big-ears, note that the ears…","a":"…should NOT be actively re-opened (pumped open) at low altitude — let them open spontaneously."},{"id":"prc-33","cat":"Flight Practice","q":"Stable parachutal stall, 500 m above the landing field. How do you react?","a":"Push the A-risers forward, or apply the speedbar — until normal flight is restored."},{"id":"prc-34","cat":"Flight Practice","q":"Consequences of a wet canopy?","a":"Harder to inflate and launch; flow can separate at less brake input than normal (higher stall risk)."},{"id":"prc-35","cat":"Flight Practice","q":"When descending with big-ears, note that the glider…","a":"…is flying at a larger angle of attack, so there's a higher risk of parachutal stall when exiting the manoeuvre."},{"id":"prc-36","cat":"Flight Practice","q":"Advantage of descending via big-ears?","a":"No physical load on the body, and you can keep flying toward a specific target throughout the manoeuvre."},{"id":"prc-37","cat":"Flight Practice","q":"Lugano reports QNH 1015, Zurich-Kloten reports 1007. What does this mean?","a":"Strong pressure gradient → strong southerly flow with congested cloud (\"dust cloud\") on the south side of the Alps and Südföhn on the north side."},{"id":"prc-38","cat":"Flight Practice","q":"Steady 20 km/h headwind at launch. Most important requirement for a suitable launch site?","a":"Lots of wind → the terrain BEHIND the wing must be free of obstacles (you can be lifted/dragged backward)."},{"id":"prc-39","cat":"Flight Practice","q":"Circling in a thermal with 270°/10 kt wind tilting the thermal eastward. Where in the thermal do you circle to stay with it?","a":"On the WINDWARD (luv / west) side of the thermal."},{"id":"prc-40","cat":"Flight Practice","q":"Where do golden eagles in the Alps build their nests?","a":"In steep rock faces below the treeline (avoid disturbing them)."},{"id":"prc-41","cat":"Flight Practice","q":"Consequence of an abrupt turn initiation from straight flight?","a":"One-sided flow separation → the glider dives over the stalled side and starts to spin (Vrille)."},{"id":"prc-42","cat":"Flight Practice","q":"On final approach you realise you're slightly too high. Correct action?","a":"Apply brake to reduce glide performance, sit up early (and use big-ears or S-turns if needed) to increase drag."},{"id":"prc-43","cat":"Flight Practice","q":"Flying upwind, you reach a cumulus cloud. Where do you expect rising air?","a":"On the WINDWARD side of the cumulus."},{"id":"prc-44","cat":"Flight Practice","q":"The crab angle decreases when…","a":"…airspeed is increased."},{"id":"prc-45","cat":"Flight Practice","q":"A pilot with a heavy cold and middle-ear infection. What's the primary risk in flight?","a":"Sudden, severe headaches (pressure inability to equalise through blocked Eustachian tubes)."},{"id":"prc-46","cat":"Flight Practice","q":"The crab angle is the angle between…","a":"…the glider's longitudinal axis and the actual flight path (track over ground)."},{"id":"prc-47","cat":"Flight Practice","q":"The paraglider asymmetrically collapses. Correct reaction?","a":"1. Stabilise heading: weight-shift to the open side and apply gentle brake on the open side.\n2. If needed, pump the collapsed side to reinflate it."},{"id":"prc-48","cat":"Flight Practice","q":"You circle in a thermal for 10 min. Your position over the ground shifts 3 km. What's the wind speed?","a":"3 km in 10 min = 18 km/h."},{"id":"prc-49","cat":"Flight Practice","q":"While circling, you notice one-sided flow separation on the wing. Correct reaction?","a":"Release BOTH brakes (let the wing accelerate to restore attached flow)."},{"id":"prc-50","cat":"Flight Practice","q":"Where do chamois and ibex live in the Alps during winter and spring?","a":"On south-facing mountain slopes (avoid disturbing them — wildlife protection)."},{"id":"prc-51","cat":"Flight Practice","q":"Sign of one-sided flow separation?","a":"The pull on the inside brake suddenly slackens — it can be pulled down with no resistance."},{"id":"prc-52","cat":"Flight Practice","q":"With a 20 km/h tailwind you want to fly as far as possible. What do you do?","a":"Apply light brake (better glide ratio is irrelevant — you want to stay aloft longer with the wind pushing you)."},{"id":"prc-53","cat":"Flight Practice","q":"Same scenario as before: 270°/10 kt wind tilts the thermal east. Where is the strongest sink expected?","a":"On the LEE (downwind / east) side of the thermal."},{"id":"prc-54","cat":"Flight Practice","q":"In a large thermal climbing at 3 m/s, how do you fly to gain maximum altitude?","a":"With 20–30% brake applied (minimum sink rate)."},{"id":"prc-55","cat":"Flight Practice","q":"How best to reduce the chance of one-sided flow separation?","a":"Always fly with a sufficient airspeed reserve and pilot with feel/finesse."},{"id":"prc-56","cat":"Flight Practice","q":"After a heavy impact a pilot is pale, has bluish lips, cold sweat, weak rapid pulse, and is incoherent. Actions?","a":"Signs of shock: position them as comfortable as possible, protect from weather, do NOT give them anything to drink."},{"id":"prc-57","cat":"Flight Practice","q":"Stable parachutal stall on final approach, 10 m AGL. Correct reaction?","a":"LEAVE it in the stall, sit up, and land using the parachute-landing (PLF) technique. Do NOT try to recover normal flight this low."},{"id":"prc-58","cat":"Flight Practice","q":"To fly as far as possible in calm air, how should you fly?","a":"Hands up, trim speed (best glide ratio is at trim speed)."},{"id":"prc-59","cat":"Flight Practice","q":"From what pressure difference between Zurich and Lugano should you generally expect Föhn in Alpine valleys?","a":"4 hPa."},{"id":"prc-60","cat":"Flight Practice","q":"In strong winds the wind gradient near the ground decreases significantly. If the glider briefly settles back, …","a":"…do NOT apply brake — that could trigger a stall."},{"id":"prc-61","cat":"Flight Practice","q":"Landing in a 30 m target circle, if it's getting tight, options to lose height?","a":"• \"Make yourself big\" — increase drag with body posture.\n• Big-ears — but you lose precise steering.\n• S-turns."},{"id":"prc-62","cat":"Flight Practice","q":"What belongs to good pre-flight preparation at home?","a":"• Self-check: physical and mental state.\n• Gather weather information; identify hazards (FFG rule).\n• Choose a suitable flying area; check the Glider Map, airspace restrictions, DABS, military hours (Mon–Fri 07:30–12:05 and 13:15–17:05).\n• Equipment check (batteries charged, etc.).\n• Food and water — drink, drink, drink."},{"id":"prc-63","cat":"Flight Practice","q":"\"The flight begins at the landing field\" — what's important on site?","a":"• Inspect the landing field, plan the landing circuit, note obstacles.\n• Plan the flight itself: emergency landing options, expected turbulence, environmental and wildlife considerations.\n• Respect local rules.\n• Read the info board."},{"id":"aer-1","cat":"Aerodynamics","q":"In stable glide, which force opposes the total weight?","a":"The resultant aerodynamic force (vector sum of lift and drag)."},{"id":"aer-2","cat":"Aerodynamics","q":"\"Aspect ratio\" (Flügelstreckung) is the ratio between…","a":"…span and mean chord (average wing depth)."},{"id":"aer-3","cat":"Aerodynamics","q":"Wings with a high aspect ratio have…","a":"…a large span and small mean chord."},{"id":"aer-4","cat":"Aerodynamics","q":"If the airflow speed past a body is quadrupled, then…","a":"…drag increases 16× (drag is proportional to velocity squared)."},{"id":"aer-5","cat":"Aerodynamics","q":"As an air-flown body moves away from Earth's surface…","a":"…its drag decreases (lower air density at altitude)."},{"id":"aer-6","cat":"Aerodynamics","q":"Motion around the longitudinal axis of a glider is called…","a":"…roll."},{"id":"aer-7","cat":"Aerodynamics","q":"Formula for aspect ratio?","a":"Aspect ratio = span² ÷ wing area."},{"id":"aer-8","cat":"Aerodynamics","q":"At 1100 m AMSL, the drag on an air-flown body is…","a":"…about 90% of the drag at sea level."},{"id":"aer-9","cat":"Aerodynamics","q":"How is wing loading calculated?","a":"Total flight weight ÷ wing area."},{"id":"aer-10","cat":"Aerodynamics","q":"What's the name of the graph that shows horizontal vs. sink speed across a glider's entire speed range?","a":"The polar curve (Geschwindigkeitspolare)."},{"id":"aer-11","cat":"Aerodynamics","q":"At 4400 m AMSL, drag on an air-flown body is…","a":"…about 64% of drag at sea level."},{"id":"aer-12","cat":"Aerodynamics","q":"What does \"separation point\" mean?","a":"The point where the airflow detaches from the wing."},{"id":"aer-13","cat":"Aerodynamics","q":"As an air-flown body rises…","a":"…drag decreases more rapidly in the lower atmosphere than at higher altitudes (density drops non-linearly)."},{"id":"aer-14","cat":"Aerodynamics","q":"If drag on a glider is increased…","a":"…the glide angle becomes steeper (worse glide ratio)."},{"id":"aer-15","cat":"Aerodynamics","q":"When flown at minimum payload, a glider stalls…","a":"…at a LOWER speed than at maximum payload (less mass = less wing-loading = lower stall speed)."},{"id":"aer-16","cat":"Aerodynamics","q":"Whether a wing generates lift depends primarily on…","a":"…the angle of attack."},{"id":"aer-17","cat":"Aerodynamics","q":"Mean chord of a wing with 10 m span and 12.5 m² area?","a":"1.25 m (12.5 ÷ 10)."},{"id":"aer-18","cat":"Aerodynamics","q":"A glider that yaws by itself in calm air without pilot input is not…","a":"…directionally stable (Richtungsstabil)."},{"id":"aer-19","cat":"Aerodynamics","q":"On which 4 factors does the lift of a wing depend?","a":"1. Wing area (S)\n2. Lift coefficient (CL / CA)\n3. Air density (ρ)\n4. Airspeed (v)\n\nFormula: L = ½ ρ v² S CL"},{"id":"aer-20","cat":"Aerodynamics","q":"\"Wing loading\" is…","a":"…the ratio of total flight weight to wing area."},{"id":"aer-21","cat":"Aerodynamics","q":"A glider flies at 54 km/h (15 m/s) with 2 m/s sink, against 18 km/h (5 m/s) headwind. Glide ratio over ground?","a":"Ground speed = 15 − 5 = 10 m/s. Glide = 10 ÷ 2 = 5 (i.e. 5 m forward per 1 m down)."},{"id":"aer-22","cat":"Aerodynamics","q":"If air density halves, then…","a":"…drag also halves (drag is proportional to density)."},{"id":"aer-23","cat":"Aerodynamics","q":"The resultant aerodynamic force in stable trim flight vs. fully-accelerated flight…","a":"…remains the same (it always equals the total weight, by definition of stable flight)."},{"id":"aer-24","cat":"Aerodynamics","q":"In stable glide, which force acts perpendicular to lift?","a":"Drag."},{"id":"aer-25","cat":"Aerodynamics","q":"Total flight weight is 100 kg. In a steeply-banked turn the wing is loaded at 250 kg. What's the load factor?","a":"2.5 g (250 ÷ 100)."},{"id":"aer-26","cat":"Aerodynamics","q":"At best-glide speed, increasing the angle of attack by 2°…","a":"…increases the lift coefficient (CL/CA)."},{"id":"aer-27","cat":"Aerodynamics","q":"Approximate lift distribution at +10° angle of attack?","a":"2/3 from the upper surface (suction) and 1/3 from the lower surface (pressure)."},{"id":"aer-28","cat":"Aerodynamics","q":"At 3300 m AMSL, drag on a body is…","a":"…about 72% of sea-level drag."},{"id":"aer-29","cat":"Aerodynamics","q":"A glider that continuously speeds up in straight flight without pilot input has…","a":"…unstable (labile) flight characteristics."},{"id":"aer-30","cat":"Aerodynamics","q":"What does a body's drag depend on primarily? (1)","a":"The shape of the body."},{"id":"aer-31","cat":"Aerodynamics","q":"What does a body's drag depend on primarily? (2)","a":"The size (frontal area) of the body."},{"id":"aer-32","cat":"Aerodynamics","q":"What does a body's drag depend on primarily? (3)","a":"The flow velocity (drag ∝ v²)."},{"id":"aer-33","cat":"Aerodynamics","q":"Wings with low aspect ratio have…","a":"…small span and large mean chord."},{"id":"aer-34","cat":"Aerodynamics","q":"Where are vortices found around a flying glider?","a":"Behind the trailing edge (wingtip vortices and trailing-edge wake)."},{"id":"aer-35","cat":"Aerodynamics","q":"The lift-to-drag ratio of a wing depends primarily on…","a":"…the angle of attack."},{"id":"aer-36","cat":"Aerodynamics","q":"The glide ratio of a glider expresses the ratio between…","a":"…the CL and CD (CA and CW) of the wing — i.e. lift coefficient over drag coefficient."},{"id":"aer-37","cat":"Aerodynamics","q":"Reducing the angle of attack by 2° from best-glide speed…","a":"…decreases the lift coefficient."},{"id":"aer-38","cat":"Aerodynamics","q":"In a continuous transition from straight flight to turning flight…","a":"…the wing loading AND the minimum flight speed both increase (because of load factor / centrifugal force)."},{"id":"aer-39","cat":"Aerodynamics","q":"Air density halves at approximately…","a":"6600 m AMSL."},{"id":"aer-40","cat":"Aerodynamics","q":"Air pressure halves at approximately…","a":"5500 m AMSL."},{"id":"aer-41","cat":"Aerodynamics","q":"At altitude you can only compensate with speed — everything else stays the same. What does this mean in practice?","a":"Weight, wing area, etc. don't change. At altitude (lower air density) you need to run faster for launch, with a longer takeoff run. Upside: with lower density the wing tolerates more wind — a 30 km/h launch may be possible at altitude that wouldn't be at sea level."},{"id":"aer-42","cat":"Aerodynamics","q":"When I brake, the angle of attack…","a":"…increases. The trailing edge is pulled down, speed decreases, sink rate increases. Both CL and CD increase — and a stall becomes possible."},{"id":"aer-43","cat":"Aerodynamics","q":"When I accelerate, the angle of attack…","a":"…decreases. I fly faster; both CL and CD drop. A frontal collapse becomes possible (insufficient internal pressure)."},{"id":"aer-44","cat":"Aerodynamics","q":"Where do you feel induced drag (~40%)?","a":"You feel induced drag (wake / wingtip vortices) directly behind a preceding paraglider when flying close to one. A tandem produces even more than a solo."},{"id":"aer-45","cat":"Aerodynamics","q":"More heavily loaded wing:","a":"Faster and more agile."},{"id":"aer-46","cat":"Aerodynamics","q":"Less heavily loaded wing:","a":"Slower and safer to fly."},{"id":"aer-47","cat":"Aerodynamics","q":"\"Zuladung\" (payload) is…","a":"…everything except the wing itself (pilot + harness + reserve + instruments + clothing)."},{"id":"aer-48","cat":"Aerodynamics","q":"Wing loading is calculated from…","a":"…total flight weight (INCLUDING the wing) ÷ wing area. Stand on the scale with everything you'll fly with."},{"id":"aer-49","cat":"Aerodynamics","q":"A high glide ratio means…","a":"…a smaller glide angle (flatter descent — better)."},{"id":"aer-50","cat":"Aerodynamics","q":"If the glide ANGLE is large, then the glide RATIO is…","a":"…small (steep descent — bad)."},{"id":"aer-51","cat":"Aerodynamics","q":"When are you at best glide?","a":"At trim speed (hands up, brakes released)."},{"id":"aer-52","cat":"Aerodynamics","q":"With tailwind & lift, how to fly?","a":"Apply LIGHT brake (use the lift) — gives better glide-over-ground and longer reachable distance."},{"id":"aer-53","cat":"Aerodynamics","q":"With headwind & sink, how to fly?","a":"ACCELERATE (get through it fast) — only with sufficient terrain clearance because of collapse risk. Gives better glide over ground and reachable distance."},{"id":"aer-54","cat":"Aerodynamics","q":"Lateral axis (Querachse)?","a":"Pitch (nicken). Stability around it = pitch stability / longitudinal stability."},{"id":"aer-55","cat":"Aerodynamics","q":"Longitudinal axis (Längsachse)?","a":"Roll (rollen). Stability around it = roll/lateral stability."},{"id":"aer-56","cat":"Aerodynamics","q":"Vertical axis (Hochachse)?","a":"Yaw (gieren). Stability around it = directional stability."},{"id":"aer-57","cat":"Aerodynamics","q":"Convert m/s to km/h?","a":"Multiply by 3.6."},{"id":"aer-58","cat":"Aerodynamics","q":"How many G in straight flight, and at 70° bank?","a":"Straight flight = 1 G.\n70° bank ≈ 3 G (load factor = 1/cos(bank angle)).\n\nIn a turn, load factor INCREASES — so minimum speed also increases (stall speed grows with √load factor). Comparable to flying solo loaded for tandem: at 2 G everything speeds up. The wing can stall, so it needs more speed. Trim speed also increases."}];

let P;
try { P = JSON.parse(localStorage.getItem(STORE_KEY)) || null; } catch (e) { P = null; }
if (!P || P.v !== 1) P = { v:1, q:{}, lastDay:null, streak:0, bestStreak:0, exams:[], live:null };
function save(){ try { localStorage.setItem(STORE_KEY, JSON.stringify(P)); } catch (e) {} }

function dayStr(d){ return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function bumpDay(){
  const now = new Date(), today = dayStr(now);
  if (P.lastDay === today) return;
  const y = new Date(now); y.setDate(y.getDate() - 1);
  P.streak = (P.lastDay === dayStr(y)) ? P.streak + 1 : 1;
  P.bestStreak = Math.max(P.bestStreak || 0, P.streak);
  P.lastDay = today;
}
function qstat(id){ return P.q[id] || { s:0, r:0, w:0, k:0 }; }
function recordAnswer(id, ok){
  const st = P.q[id] || (P.q[id] = { s:0, r:0, w:0, k:0 });
  st.s++;
  if (ok) { st.r++; st.k++; } else { st.w++; st.k = 0; }
  bumpDay();
  save();
}

/* ================= mastery model ================= */
function masteryOf(id){ const k = qstat(id).k; return k >= 2 ? 1 : k === 1 ? 0.5 : 0; }
function topicMastery(t){
  const qs = byTopic[t];
  return qs.reduce((a, q) => a + masteryOf(q.id), 0) / qs.length;
}
function readiness(){ return TOPICS.reduce((a, t) => a + topicMastery(t), 0) / TOPICS.length; }
function altitude(){ return Math.round(readiness() * CLOUDBASE / 10) * 10; }
function reviewQueue(){ return QUESTIONS.filter(q => { const st = qstat(q.id); return st.w > 0 && st.k < 2; }); }
function masteredCount(t){ return byTopic[t].filter(q => qstat(q.id).k >= 2).length; }

/* ================= helpers ================= */
function esc(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmt(n){ return String(n).replace(/\B(?=(\d{3})+(?!\d))/g, ' '); }
function shuffle(a){
  a = a.slice();
  for (let i = a.length - 1; i > 0; i--){ const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}
function mmss(s){ s = Math.max(0, Math.round(s)); return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0'); }
function imgHtml(q){
  return q.img ? `<div class="qimg-wrap"><img class="qimg" src="${esc(q.img)}" alt="Question diagram" loading="lazy" onerror="this.parentNode.style.display='none'"></div>` : '';
}

/* ================= question picking ================= */
function prio(q){ const st = qstat(q.id); if (!st.s) return 0; if (st.k === 0) return 1; if (st.k === 1) return 2; return 3; }
function pickPractice(topic, n){
  if (topic === 'mix'){
    const lanes = TOPICS.map(t => shuffle(byTopic[t]).sort((a, b) => prio(a) - prio(b)));
    const out = [];
    let i = 0;
    while (out.length < n && lanes.some(l => l.length)){
      const lane = lanes[i % lanes.length];
      if (lane.length) out.push(lane.shift());
      i++;
    }
    return shuffle(out);
  }
  return shuffle(byTopic[topic]).sort((a, b) => prio(a) - prio(b)).slice(0, n);
}
function pickExam(n){
  const k = Math.floor(n / TOPICS.length);
  let out = [];
  TOPICS.forEach(t => { out = out.concat(shuffle(byTopic[t]).slice(0, k)); });
  return out;
}

/* ================= app state ================= */
let S = { view:'home', round:null, exam:null, examResult:null, cards:null, modal:null };
let tickId = null;
let toastId = null;

function toast(msg){
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  clearTimeout(toastId);
  toastId = setTimeout(() => el.remove(), 2600);
}
function openModal(title, body, okLabel, onOk){
  S.modal = { title, body, okLabel, onOk };
  render(true);
}
function closeModal(){ S.modal = null; render(true); }

/* ================= rounds (practice & review) ================= */
function startRound(mode, topic, qs){
  if (!qs || !qs.length) return;
  S.round = { mode, topic, qs, i:0, picked:null, revealed:false, done:[], startAlt: altitude() };
  S.view = 'round';
  render();
}
function startPractice(topic){ startRound('practice', topic, pickPractice(topic, 10)); }
function startReview(){
  const queue = shuffle(reviewQueue()).slice(0, 10);
  startRound('review', 'review', queue);
}
function onAnswer(oi){
  const r = S.round;
  if (!r || r.revealed) return;
  const q = r.qs[r.i];
  const ok = oi === q.correct;
  r.picked = oi;
  r.revealed = true;
  r.done.push({ q, ok, picked: oi });
  const wasInQueue = r.mode === 'review';
  recordAnswer(q.id, ok);
  if (wasInQueue && ok && qstat(q.id).k >= 2) toast('Graduated — that one leaves the review queue 🎉');
  render(true);
}
function nextQ(){
  const r = S.round;
  if (!r || !r.revealed) return;
  r.i++;
  r.picked = null;
  r.revealed = false;
  if (r.i >= r.qs.length) S.view = 'round-end';
  render();
}

/* ================= exam ================= */
function startExam(n){
  const begin = () => {
    const qs = pickExam(n);
    S.exam = { n, qs, i:0, ans:{}, flags:{}, started: Date.now(), dur: n * SECS_PER_Q };
    saveLive();
    S.view = 'exam-live';
    render();
  };
  if (P.live) openModal('Replace saved exam?', 'You have an exam in progress. Starting a new one discards it.', 'Start new exam', () => { P.live = null; save(); begin(); });
  else begin();
}
function saveLive(){
  const ex = S.exam;
  if (!ex) return;
  P.live = { ids: ex.qs.map(q => q.id), ans: ex.ans, flags: ex.flags, started: ex.started, dur: ex.dur, n: ex.n };
  save();
}
function resumeExam(){
  const L = P.live;
  if (!L) return;
  S.exam = { n: L.n, qs: L.ids.map(id => byId[id]).filter(Boolean), i:0, ans: L.ans || {}, flags: L.flags || {}, started: L.started, dur: L.dur };
  S.view = 'exam-live';
  render();
}
function examRemaining(ex){ return ex.dur - (Date.now() - ex.started) / 1000; }
function gradeExam(ex){
  const per = {};
  TOPICS.forEach(t => per[t] = [0, 0]);
  ex.qs.forEach((q, i) => {
    per[q.topic][1]++;
    if (ex.ans[i] === q.correct) per[q.topic][0]++;
  });
  const total = ex.qs.length;
  const right = TOPICS.reduce((a, t) => a + per[t][0], 0);
  const pass = TOPICS.every(t => !per[t][1] || per[t][0] / per[t][1] >= PASS_FRACTION);
  return { per, right, total, pct: Math.round(100 * right / total), pass, secs: Math.min(ex.dur, Math.round((Date.now() - ex.started) / 1000)) };
}
function submitExam(auto){
  const ex = S.exam;
  if (!ex) return;
  stopTick();
  const g = gradeExam(ex);
  ex.qs.forEach((q, i) => { if (ex.ans[i] != null) recordAnswer(q.id, ex.ans[i] === q.correct); });
  P.exams.push({ d: new Date().toISOString().slice(0, 10), n: ex.n, pct: g.pct, pass: g.pass });
  if (P.exams.length > 24) P.exams = P.exams.slice(-24);
  P.live = null;
  save();
  S.examResult = { ex, g, auto: !!auto };
  S.exam = null;
  S.view = 'exam-result';
  render();
}
function startTick(){
  stopTick();
  tickId = setInterval(() => {
    const ex = S.exam;
    if (!ex || S.view !== 'exam-live') { stopTick(); return; }
    const rem = examRemaining(ex);
    const el = document.getElementById('clock');
    if (el){
      el.textContent = mmss(rem);
      el.classList.toggle('low', rem < 300);
    }
    if (rem <= 0) submitExam(true);
  }, 1000);
}
function stopTick(){ if (tickId) { clearInterval(tickId); tickId = null; } }
window.addEventListener('beforeunload', e => {
  if (S.view === 'exam-live'){ saveLive(); e.preventDefault(); e.returnValue = ''; }
});

/* ================= flashcards ================= */
function startCards(cat){
  const pool = cat === 'all' ? CARDS : CARDS.filter(c => c.cat === cat);
  S.cards = { cat, deck: shuffle(pool), i:0, flipped:false, got:0, again:0 };
  S.view = 'cards';
  render();
}
function gradeCard(knewIt){
  const c = S.cards;
  if (!c || c.i >= c.deck.length) return;
  if (knewIt) c.got++;
  else { c.again++; c.deck.push(c.deck[c.i]); }
  c.i++;
  c.flipped = false;
  bumpDay();
  save();
  render();
}

/* ---------- round ---------- */
function renderRound(){
  const r = S.round, q = r.qs[r.i];
  const dots = r.qs.map((_, j) =>
    `<span class="dot ${j < r.i ? (r.done[j].ok ? 'ok' : 'bad') : j === r.i ? 'cur' : ''}"></span>`).join('');
  const opts = q.options.map((o, oi) => {
    let cls = 'opt';
    if (r.revealed){
      if (oi === q.correct) cls += ' right';
      else if (oi === r.picked) cls += ' wrong';
      else cls += ' dim';
    }
    return `<button class="${cls}" data-action="answer" data-i="${oi}" ${r.revealed ? 'disabled' : ''}>
      <span class="key">${oi + 1}</span><span>${esc(o)}</span></button>`;
  }).join('');

  let feedback = '';
  if (r.revealed){
    const ok = r.picked === q.correct;
    feedback = `<div class="verdict ${ok ? 'ok' : 'bad'}">${ok ? '✓ Correct!' : '✗ Not quite — the correct answer is highlighted.'}</div>
      ${q.exp ? `<div class="explain">💡 ${esc(q.exp)}${q.sub ? `<div><span class="chip plain">${esc(q.sub)}</span></div>` : ''}</div>` : ''}
      <div class="nextrow"><button class="btn" data-action="round-next">${r.i + 1 < r.qs.length ? 'Next question →' : 'Finish round'}</button></div>`;
  }

  return `<div class="play-head">
    <button class="ghost" data-action="round-quit">← End round</button>
    <div class="dots">${dots}</div>
    <div class="play-count">${r.i + 1}/${r.qs.length}</div>
  </div>
  <div class="card qcard">
    <div class="qmeta">
      <span class="chip">${META[q.topic].em} ${esc(q.topic)}</span>
      ${r.mode === 'review' ? '<span class="chip plain">🔁 review</span>' : ''}
    </div>
    <div class="qtext">${esc(q.text)}</div>
    ${imgHtml(q)}
    <div class="opts">${opts}</div>
    ${feedback}
  </div>
  <div class="kbd-hint"><kbd>1</kbd>–<kbd>${q.options.length}</kbd> answer · <kbd>Enter</kbd> next</div>`;
}

    <details class="rq ${d.ok ? 'ok' : 'bad'}">
