ce classes & structure"},{"id":"Legislation_88","topic":"Legislation","text":"The upper limit of class G airspace in Switzerland is fixed at","options":["600 m AGL.","300 m AGL.","None of the above is correct.","150 m AGL."],"correct":0,"exp":"Airspace G in Switzerland extends from the ground up to 600 m AGL - a 600-metre 'carpet' laid over the entire topography. Because the upper limit is AGL, the absolute altitude of the G ceiling rises and falls with the terrain underneath.","sub":"Altitude ceilings & pressure references"},{"id":"Legislation_89","topic":"Legislation","text":"In class G airspace the following rules apply to hang gliders and paragliders without a Transponder concerning visibility and distances from clouds: visibility / horizontal distance / vertical distance","options":["5.0km / 1.5 km / 300m","1.5 km / ground visibility out of clouds / out of clouds","5.0km / 100m / 50m","Up to 300m AGL: 1.5 km and ground visibility / out of clouds / out of clouds . Above 300m AGL: 1.5 km / 1.5 km / 300m"],"correct":3,"exp":"In airspace G the VFR rules split at 300 m AGL. Below 300 m AGL: 1.5 km visibility, OUT of cloud (no numerical distance), ground always in sight, 180-deg turn always possible. Above 300 m AGL (still inside G up to 600 m): the strict 300 m vertical / 1500 m horizontal cloud distance and 5 km visibility apply.","sub":"Cloud clearance & VFR visibility"},{"id":"Legislation_90","topic":"Legislation","text":"At an air pressure of 1013.2 hPa, the upper limit of class E airspace over the Jura is","options":["3'050 m AMSL.","4'550 m AMSL.","1'000 m AGL.","3'950 m AMSL."],"correct":0,"exp":"Over the Jura (and the Mittelland) the upper limit of airspace E is FL 100, i.e. 3050 m AMSL, regardless of military activity. The Jura/Mittelland-vs-Alps dividing line is drawn precisely on the glider chart; on its 'flat' side the E ceiling is always 3050 m.","sub":"Altitude ceilings & pressure references"},{"id":"Legislation_91","topic":"Legislation","text":"In class E airspace at 2,800m AMSL the following rules for visibility and distance from clouds apply: visibility / horizontal distance / vertical distance","options":["8.0km / 1.5km / 300m","5.0km / 300m / 50m","5.0km / 1.5km / 300m","1.5km and ground visibility / 100m / 50m"],"correct":2,"exp":"In airspace E below 3050 m AMSL the strict VFR cloud distances apply: 5 km visibility, 1500 m horizontal distance from cloud, 300 m vertical distance. Above 3050 m AMSL visibility increases to 8 km because faster IFR traffic can emerge from cloud at high speed.","sub":"Cloud clearance & VFR visibility"},{"id":"Legislation_93","topic":"Legislation","text":"At standard atmosphere, the upper limit of class E airspace over the Alps outside military operating hours","options":["3'950 m AMSL.","4'550 m AMSL.","3'050 m AMSL.","1'000 m AGL."],"correct":1,"exp":"Above the Alps (south of the Mittelland-Alps dividing line) outside military operating hours, the upper limit of airspace E is FL 150 = 4550 m AMSL. When the military is ON (Mon-Fri 07:35-12:05 and 13:15-17:05), the ceiling drops to FL 130 = 3950 m AMSL.","sub":"Altitude ceilings & pressure references"},{"id":"Legislation_94","topic":"Legislation","text":"Where can hang gliding / paragliding pilots inform themselves which areas of airspace are LS-R for gliders and for how long?","options":["On the GLDK, with additional information in the VFR-Manual","In every Swiss Glider.","In the regulation relating to traffic rules for aviation (VRV-L) from 20. May 2015.","In the NOTAM."],"correct":0,"exp":"The location and times of LS-R-for-Gliders zones are shown on the Glider Chart (GLDK/GLDC) - which is the basic reference - and the VFR-Manual provides additional information on local procedures, daily activity codes and any temporary changes that complement the chart.","sub":"Information sources & publications"},{"id":"Legislation_97","topic":"Legislation","text":"Which values for visibility and distance from clouds apply generally on Wednesdays at 15.30 over the Jura at 800 m AGL / 1'700 m AMSL? visibility / horizontal distance / vertical distance","options":["5.0 km / 100 m / 50 m","8.0 km / 1.5 km / 300 m","5.0 km / 1.5 km / 300 m","1.5 km and ground visibility / out of clouds / out of clouds"],"correct":2,"exp":"At 800 m AGL we are well above 300 m AGL, so the strict cloud-clearance rules apply: 1500 m horizontal and 300 m vertical from cloud. Below 3050 m AMSL the visibility minimum is 5 km. The location (Jura) and time (Wed afternoon, MIL ON) do not change these numbers.","sub":"Cloud clearance & VFR visibility"},{"id":"Legislation_99","topic":"Legislation","text":"Which values for visibility and distance from clouds apply generally on Wednesdays at 14.30 in the Alps at 800 m AGL / 3'800 m AMSL? visibility / horizontal distance / vertical distance","options":["5.0 km / 100 m / 50 m","5.0 km / 1.5 km / 300 m","8.0 km / 1.5 km / 300 m","1.5 km and ground visibility / out of clouds / out of clouds"],"correct":2,"exp":"Above 3050 m AMSL the visibility minimum jumps to 8 km because faster IFR traffic can emerge from cloud at high speed. The cloud distances (1500 m horizontal, 300 m vertical) and the 'above 300 m AGL' threshold still apply, only the visibility number changes.","sub":"Cloud clearance & VFR visibility"},{"id":"Legislation_100","topic":"Legislation","text":"Which values for visibility and distance from clouds apply generally on Wednesdays at 14.30 in the Alps at 200 m AGL / 3'800m AMSL? visibility / horizontal distance / vertical distance","options":["1.5km and ground visibility / out of clouds / out of clouds","1,5 km / 1,5 km / 300 m","5.0km / 1.5km / 300m","8.0km / 1.5km / 300m"],"correct":0,"exp":"At 200 m AGL you are in the LOWER half of airspace G (below 300 m AGL) - the relaxed rules apply regardless of how high you are above sea level. Required: 1.5 km horizontal visibility, OUT of cloud at all times, ground always in sight. The 3800 m AMSL is irrelevant because the rule is keyed to AGL, not AMSL.","sub":"Cloud clearance & VFR visibility"},{"id":"Legislation_101","topic":"Legislation","text":"Which publication provides information about the exact location of the separation line between the two main Swiss sectors the Jura/Swiss plateau and the Alps?","options":["GLDK","every Swissglider","DABS","NOTAM"],"correct":0,"exp":"The exact location of the dividing line between the Jura/Swiss Plateau and the Alps is printed precisely on the Glider Chart (GLDK/GLDC). It is also described in the AIP, but the chart is the operational reference the pilot uses pre-flight.","sub":"Information sources & publications"},{"id":"Legislation_102","topic":"Legislation","text":"Which values for visibility and distance from clouds apply generally on Wednesdays at 15.30 in the Jura at 500 m AGL / 1'400m AMSL? visibility / horizontal distance / vertical distance","options":["1.5 km / 1.5 km / 300 m","8.0 km / 1.5 km / 300 m","5.0 km / 1.5 km / 300 m","1.5 km and ground visibility / out of clouds / out of clouds"],"correct":0,"exp":"At 500 m AGL you are above 300 m AGL but still in airspace G (because G goes up to 600 m AGL). The strict 1500 m horizontal and 300 m vertical cloud distances apply, but the visibility is only 1.5 km because the 5 km visibility only kicks in once you are in airspace E (i.e. above 600 m AGL) below 3050 m AMSL.","sub":"Cloud clearance & VFR visibility"},{"id":"Legislation_103","topic":"Legislation","text":"An activated restricted area (LS-R...) is a defined area of airspace where","options":["flying during military operating hours is prohibited.","flying outside of military operating hours is prohibited.","special rules apply (i.e. flying prohibited in red LS-Rs or reduced distances to clouds in green LS-Rs).","the larger distances to clouds always apply."],"correct":2,"exp":"An activated LS-R is a defined area with special rules. Red LS-Rs (the standard kind, restricted areas) are forbidden when active - no entry. Green LS-Rs (LS-R for Gliders, the soaring zones) are open to paragliders/sailplanes with REDUCED cloud distances of 50 m vertical and 100 m horizontal.","sub":"Restricted, danger & glider zones"},{"id":"Legislation_104","topic":"Legislation","text":"Which publication provides information about military operating hours?","options":["DABS","GLDK","NOTAM","VLK"],"correct":1,"exp":"Military operating hours are printed on the Glider Chart (GLDK/GLDC) - the top of the chart shows the standard schedule (Mon-Fri 07:35-12:05 and 13:15-17:05). Activation on a given day is confirmed by 'MIL ON' on the chart and the DABS.","sub":"Information sources & publications"},{"id":"Legislation_105","topic":"Legislation","text":"At 900m AGL / 3'800m AMSL the following rules apply for visibility and distance to clouds in an active \"LS-R for Gliders\": visibility / horizontal distance / vertical distance","options":["8.0 km / 100 m / 50 m","5.0 km / 100 m / 50 m","8.0 km / 1.5 km / 300 m","8.0 km / 300 m / 100 m"],"correct":0,"exp":"Inside an active LS-R for Gliders the cloud distances are minimised to 100 m horizontal and 50 m vertical. Above 3050 m AMSL the visibility minimum is 8 km (because of fast IFR traffic). 900 m AGL is well above 300 m AGL so we are clearly in the 'upper-half' regime, only with the reduced cloud distances.","sub":"Cloud clearance & VFR visibility"},{"id":"Legislation_106","topic":"Legislation","text":"At 900m AGL / 2'800m AMSL the following rules apply for visibility and distance to clouds in an active \"LS-R for Gliders\": visibility / horizontal distance / vertical distance","options":["5.0 km / 100 m / 50 m","8.0 km / 1.5 km / 300 m","8.0 km / 300 m / 100 m","8.0 km / 100 m / 50 m"],"correct":0,"exp":"Inside an active LS-R for Gliders the cloud distances are minimised to 100 m horizontal and 50 m vertical. Below 3050 m AMSL the visibility minimum is 5 km (the 8 km only kicks in above 3050 m). At 900 m AGL we are in the 'above 300 m AGL' regime, just with reduced cloud distances.","sub":"Cloud clearance & VFR visibility"},{"id":"Legislation_107","topic":"Legislation","text":"At 3'400m AMSL and 200m AGL the following rules apply for visibility and distance to clouds in an active \"LS-R for Gliders\": visibility / horizontal distance / vertical distance","options":["5.0 km / 100 m / 50 m","8.0 km / 300 m / 100 m","Here you are not in an LS-R for Gliders but in airspace G, therefore the following apply: 1.5 km and ground visibility / out of clouds / out of clouds","8.0 km / 100 m / 50 m"],"correct":2,"exp":"Below 300 m AGL you are in the LOWER half of airspace G - and the LSR-for-Gliders cloud-clearance rule applies only ABOVE 300 m AGL. So even inside the chart footprint of an LSR-for-Gliders box, at 200 m AGL the standard G-lower rules apply: 1.5 km visibility, clear of cloud, ground in sight.","sub":"Cloud clearance & VFR visibility"},{"id":"Legislation_108","topic":"Legislation","text":"A zone \"LS-R for Gliders\" is a defined area of airspace where at defined times:","options":["hang gliders and paragliders are not allowed to enter.","reduced minimum distances to clouds apply for hang gliders, paragliders and sailplanes.","reduced minimum distances to clouds apply for all VFR flights.","sailplanes with the necessary equipment and authorisation are allowed to fly into clouds."],"correct":1,"exp":"An LS-R for Gliders is a defined airspace, active from 1 March to 31 October, where paragliders and sailplanes enjoy REDUCED minimum cloud distances (50 m vertical, 100 m horizontal) compared to the standard 300 m / 1500 m. Outside that season the zone is not in force - a frequent exam trap in winter.","sub":"Restricted, danger & glider zones"},{"id":"Legislation_109","topic":"Legislation","text":"An active danger zone (LS-D) is a defined area of airspace in which","options":["the larger minimum distances to clouds applies.","sport and sailplane flights are prohibited.","use of the area is prohibited for all aircraft.","activities dangerous to flying aircraft may take place."],"correct":3,"exp":"An active LS-D (danger area) is a defined airspace where dangerous activities for aircraft may be taking place on the ground - typically live firing or military exercises. Entry is NOT strictly forbidden (unlike red LS-Rs), but is discouraged for obvious safety reasons.","sub":"Restricted, danger & glider zones"},{"id":"Legislation_110","topic":"Legislation","text":"In which categories is it possible to sit for an examination?","options":["Paraglider, delta (hang glider) and rigid wing.","Powered hang gliders / paragliders and unpowered hang gliders / paragliders.","Sinker and glider.","Standard glider and high performance glider."],"correct":0,"exp":"Switzerland recognises three slope-glider exam categories: paraglider, delta (hang glider) and rigid wing. A pilot may add categories by passing the relevant theory subjects and the practical exam for the new category.","sub":"Brevet, licensing & exam"},{"id":"Legislation_111","topic":"Legislation","text":"Who is responsible for issuing official licences","options":["The Federal Office of Civil Aviation (FOCA/BAZL).","The Canton Department for Road Traffic and Aviation.","The examiner (expert).","The Swiss Hang Gliding Association (SHV)."],"correct":3,"exp":"The SHV/FSVL is the federation mandated by the BAZL/OFAC to issue the official licences to slope-glider pilots. Although the OFAC retains ultimate authority, the practical issuing of licences is delegated to the SHV.","sub":"Brevet, licensing & exam"},{"id":"Legislation_112","topic":"Legislation","text":"According to the rules for examination procedures what is the maximum allowable time period between the theory and the practical exams?","options":["48 months.","12 months.","36 months.","24 months."],"correct":2,"exp":"The maximum allowable interval between passing the theory exam and the practical exam is 36 months. Beyond that the theory has to be re-sat - a hard limit set by SHV directives approved by the BAZL.","sub":"Brevet, licensing & exam"},{"id":"Legislation_114","topic":"Legislation","text":"To whom can a candidate address a complaint when they believe that the decision of the examiner was not reached in conformity with the regulations?","options":["To the Swiss Federal Administrative Court.","To the expert examiner.","To the appeal committee of SHV.","To their flight instructor."],"correct":0,"exp":"If a candidate believes the examiner's decision was not made in accordance with the rules, the appeal goes to the BAZL first; an unsuccessful appeal there may then be carried to the Swiss Federal Administrative Court (Bundesverwaltungsgericht), which is the answer in the SHV booklet.","sub":"Brevet, licensing & exam"},{"id":"Legislation_115","topic":"Legislation","text":"Within what time limit must a complaint by a candidate be filed when they believe that the decision of the examiner was not reached in conformity with the regulations","options":["30 days.","12 days.","14 days.","9 days."],"correct":0,"exp":"An appeal against the examiner's decision must be filed within 30 days. The deadline is fixed in the SHV directives and runs from the day the examiner's decision is communicated to the candidate.","sub":"Brevet, licensing & exam"},{"id":"Legislation_117","topic":"Legislation","text":"How many high flights (verified by a Swiss flight instructor) must a candidate have in order to sit the practical exam?","options":["None of the above answers is correct.","At least: 30 for paragliders, 20 for hang gliders, 10 for rigid wings","At least: 50 for paragliders, 30 for hang gliders, 20 for rigid wings","At least: 60 for paragliders, 40 for hang gliders, 30 for rigid wings."],"correct":2,"exp":"Before the practical exam a paraglider candidate must have at least 50 high (major) flights verified by a Swiss flight instructor; the minimum is 30 for delta (hang glider) and 20 for rigid wing. These reflect the relative difficulty of each class.","sub":"Brevet, licensing & exam"},{"id":"Legislation_118","topic":"Legislation","text":"At the practical exam the number of high flights witnessed by a Swiss flight instructor must be proven. In how many different sites must the minimum number of high flights be carried out in order to sit for the practical exam?","options":["Minimum: 3 for paragliders, 5 for deltas, 5 for rigid wings","Minimum: 2 for paragliders, 2 for deltas, 2 for rigid wings","Minimum: 5 for paragliders, 3 for deltas, 3 for rigid wings","Minimum: 7 for paragliders, 7 for deltas, 7 for rigid wings"],"correct":2,"exp":"The required high flights must be spread over a minimum number of different sites: 5 sites for paragliders, 3 for deltas, 3 for rigid wings. The site where the practical exam itself takes place does not count toward these minimums.","sub":"Brevet, licensing & exam"},{"id":"Legislation_119","topic":"Legislation","text":"What prerequisites must a glider have in order that a candidate is allowed to start the exam? The glider must","options":["be recognised by SHV as having been tested for airworthiness, (exception: rigid wings) and have all markings according to regulations.","have all markings according to regulations.","be a class 1 glider and have all markings according to regulations.","have an aspect ratio of less than 4 and have all markings according to regulations."],"correct":0,"exp":"To sit the practical exam your wing must be recognised by the SHV as airworthy (with an exception for rigid wings) and bear all the legally required markings - identification number and manufacturer's plaque. An uncertified school wing or a wing without identification cannot be used in the exam.","sub":"Brevet, licensing & exam"},{"id":"Legislation_120","topic":"Legislation","text":"The practical exam consists of","options":["two flight tasks, for which three flights are allowed.","one flight task, for which two flights are allowed.","two flight tasks, for which four flights are allowed.","three flight tasks, for which five flights are allowed."],"correct":0,"exp":"The practical exam consists of two flight tasks: a precision landing with two consecutive 360-deg circles to the right (in max 20 s), and a precision landing with a figure-eight (left then right, max 30 s). Three flights are allowed for the two tasks combined.","sub":"Brevet, licensing & exam"},{"id":"Legislation_121","topic":"Legislation","text":"What is the diameter of the target circle in which pilots must land during the practical exam?","options":["30m for paragliders, 80m for deltas, 80m for rigid wings.","15m for paragliders, 30m for deltas, 30m for rigid wings.","80m for paragliders, 100m for deltas, 100m for rigid wings.","50m for paragliders, 50m for deltas, 50m for rigid wings."],"correct":0,"exp":"For the precision landing, paragliders must land in a target circle 30 m in diameter; deltas and rigid wings get 80 m. The larger circle for deltas/rigid reflects the much higher landing speed and smaller flare margin of these aircraft.","sub":"Brevet, licensing & exam"},{"id":"Legislation_123","topic":"Legislation","text":"Airspace is used by different categories of aircraft, each enjoying different priorities (precedence) in accordance with their capabilities. Which of the following is correct?","options":["Hang gliders and paragliders have priority over airships. Airships have priority over military jets.","Helicopters have priority over military jets. Military jets have priority over hang gliders and paragliders.","Helicopters have priority over hang gliders and paragliders. Hang gliders and paragliders have priority over Military jets.","Military jets have priority over hang gliders. Hang gliders and paragliders have priority over helicopters."],"correct":0,"exp":"Right-of-way is ranked by manoeuvrability: the LESS manoeuvrable aircraft has priority. Paragliders/hang gliders/sailplanes rank above airships, and airships rank above military jets/helicopters because jets are the most manoeuvrable of all. Top of the ladder: aircraft in distress, then balloons.","sub":"Traffic rules & right of way"},{"id":"Legislation_125","topic":"Legislation","text":"Airspace is used by different categories of aircraft, each enjoying different priorities (precedence) in accordance with their capabilities. Which of the following is correct?","options":["Sailplanes and tow planes have priority over paragliders and hang gliders.","Tow planes have priority over paragliders and hang gliders, which have priority over sailplanes.","Paragliders, hang gliders and tow planes have priority over sailplanes.","Paragliders, hang gliders and sailplanes have priority over tow planes."],"correct":3,"exp":"Paragliders, hang gliders and sailplanes share the same priority class (all three are 'unpowered slope/soaring aircraft') and rank ABOVE tow planes, which are powered and more manoeuvrable. The motto: less manoeuvrable = higher priority.","sub":"Traffic rules & right of way"},{"id":"Legislation_126","topic":"Legislation","text":"Airspace is used by different categories of aircraft, each enjoying different priorities (precedence) in accordance with their capabilities. Which of the following is correct?","options":["Balloons, hang gliders, paragliders and dirigibles are part of the same category of aircraft.","Balloons and dirigibles have the right of way over hang gliders and paragliders.","Balloons, hang gliders and paragliders have the right of way over dirigibles.","Hang Gliders, paragliders and dirigibles have right of way over the balloons."],"correct":2,"exp":"Balloons sit second on the priority ladder (only behind aircraft in distress); paragliders/hang gliders come next; dirigibles (airships/zeppelins) are below the soaring class. The order reflects manoeuvrability - balloons can barely steer, while a dirigible has engines and rudder.","sub":"Traffic rules & right of way"},{"id":"Legislation_127","topic":"Legislation","text":"How close may a hang glider or paraglider fly to an aircraft of another category (e.g a Balloon)?","options":["To a distance where there is no danger of collision.","100 m","The same distances apply as with clouds.","50 m"],"correct":0,"exp":"The OACS sets no numerical minimum distance to other aircraft - the requirement is simply 'sufficient distance to avoid any risk of collision'. Use common sense: stay well clear, especially of balloons and large dirigibles, because they cannot evade you.","sub":"Traffic rules & right of way"},{"id":"Legislation_128","topic":"Legislation","text":"The flight paths of a hang glider / paraglider and a powered aircraft intersect at the close to the same altitude. Who has right of way?","options":["The aircraft approaching from the left.","The hang glider / paraglider.","The powered aircraft.","The aircraft approaching from the right."],"correct":1,"exp":"When flight paths cross at the same altitude, the paraglider has priority over a powered aeroplane: the more manoeuvrable aircraft (the powered one) must give way to the less manoeuvrable (the paraglider). The rule is built around manoeuvrability, not size or altitude.","sub":"Traffic rules & right of way"},{"id":"Legislation_129","topic":"Legislation","text":"A delta (hang glider) and a paraglider in free airspace at the same altitude approach each other head-on. What is the correct behaviour?","options":["Both gliders alter their course to the right.","Both gliders alter their course to the left.","The delta (hang glider) accelerates and flies under the paraglider.","The delta (hang glider) must turn to the right as the paraglider has right of way."],"correct":0,"exp":"When two aircraft of the same priority class meet head-on in free airspace, BOTH turn right. This is the universal aviation rule, mirroring road traffic in many countries, and it removes any negotiation between the pilots.","sub":"Traffic rules & right of way"},{"id":"Legislation_130","topic":"Legislation","text":"A delta (hang glider) and a paraglider are soaring on a hill and approach each other head-on at the same altitude. What is the correct behaviour?","options":["The glider with the slope to the right must alter course to the left.","The delta (hang glider) must alter course as the paraglider has right of way.","The glider with the slope to the left must alter course to the right.","The delta (hang glider) accelerates and flies under the paraglider."],"correct":2,"exp":"On a slope, head-on encounters are resolved by manoeuvrability: the pilot with the slope on the LEFT has room to escape (turn right means turning away from the ridge) and must give way; the pilot with the slope on the RIGHT has no room to evade safely and keeps course.","sub":"Traffic rules & right of way"},{"id":"Legislation_132","topic":"Legislation","text":"A hang glider and a sailplane approach each other head-on in free airspace. Who must give way?","options":["The hang glider.","The sailplane.","Both - to the right.","None, but the sensible one gives way."],"correct":2,"exp":"Same rule as for two paragliders meeting head-on: BOTH aircraft turn right. The fact that one is a faster sailplane does not change the priority - same class of priority, same evasive rule.","sub":"Traffic rules & right of way"},{"id":"Legislation_133","topic":"Legislation","text":"Overtaking manoeuvres between paragliders are","options":["generally prohibited.","allowed everywhere in principle.","allowed in free airspace, prohibited next to a slope.","prohibited in free airspace, allowed next to a slope."],"correct":2,"exp":"Overtaking another paraglider is allowed in free airspace - to the right, with the overtaken pilot keeping right of way - but is FORBIDDEN next to a slope, where the squeezed pilot has nowhere safe to go. The slope concentrates lift, traffic and terrain, so the rules are stricter.","sub":"Traffic rules & right of way"},{"id":"Legislation_134","topic":"Legislation","text":"Overtaking in free airspace is carried out","options":["to the right, with the glider being passed having right of way.","to the left, with the glider being passed having right of way.","to the right, with the passing glider having right of way.","to the left, with the passing glider having right of way."],"correct":0,"exp":"Overtaking in free airspace is done to the RIGHT, and the glider being overtaken always has right of way - so you must give them room and absolutely never force the manoeuvre. Overtaking is defined as approaching from within the rear 140-deg arc (i.e. behind the 70-deg-from-tail line on either side).","sub":"Traffic rules & right of way"},{"id":"Legislation_137","topic":"Legislation","text":"How close may a hang glider / paraglider approach another glider during flight?","options":["At a distance that there is never a risk of collision.","50m","30m","10m"],"correct":0,"exp":"There is no numerical minimum distance to other gliders - the rule is simply that the distance must be such that there is no risk of collision. Stay well clear, anticipate their flight path and turn away early; better excessive caution than a near miss.","sub":"Traffic rules & right of way"},{"id":"Legislation_138","topic":"Legislation","text":"Is flying above or below a paraglider allowed?","options":["Only with prior agreement between the pilots.","Yes, provided that sufficient distance is maintained.","No, not in any case.","Yes, without limitation."],"correct":1,"exp":"Vertical separation is permitted - you may fly above or below another paraglider provided you keep a sufficient safety distance. Be especially aware of wingtip vortices and the lower glider's right of way in landing approach.","sub":"Traffic rules & right of way"},{"id":"Legislation_140","topic":"Legislation","text":"Two gliders find themselves on landing approach at the same time. Who has right of way?","options":["The glider who began the downwind leg first.","In all situations the lower glider.","The glider closest to the landing spot.","In all situations the fastest glider."],"correct":1,"exp":"On landing approach, the LOWER glider has right of way in all situations. The reasoning is practical: the lower pilot is the one closer to the ground and has fewer options to extend the approach, so the higher pilot must adapt.","sub":"Traffic rules & right of way"},{"id":"Legislation_141","topic":"Legislation","text":"What are the rules for hang gliders and paragliders with respect to the minimum distance to a slope?","options":["There are no rules.","150m during military operating hours, 60m outside these hrs","60m","30m"],"correct":0,"exp":"The OACS does NOT prescribe a minimum distance to a slope - it is left to the pilot's judgement. The relevant rule sets are the right-of-way rules on the slope (slope-on-left gives way) and the prohibition of overtaking near a slope, not a numerical clearance figure.","sub":"Traffic rules & right of way"},{"id":"Legislation_142","topic":"Legislation","text":"From the air it is possible to see a yellow cross in the middle of the landing field. This means that","options":["landing on this field is prohibited at the present time.","all pilots in training are required to land as close as possible to the cross.","a right - hand landing approach should be flown.","all pilots are required to land as close as possible to the cross."],"correct":0,"exp":"A yellow cross laid out in the middle of a landing field means landing on this field is TEMPORARILY prohibited - typically because of an event on the ground, a competition or temporary works. Pick an alternate landing site.","sub":"Operating rules & ground distances"},{"id":"Legislation_144","topic":"Legislation","text":"Is it possible to fly in every country with the Swiss hang gliding licence?","options":["No.","Only for occasional flights.","Yes.","Depends on the country. The local laws and regulations have to be respected."],"correct":3,"exp":"Whether the Swiss SHV licence is accepted abroad depends on the country - many states accept it (especially neighbouring countries with reciprocal recognition), but it is the pilot's responsibility to check and respect the local laws and procedures of the destination country.","sub":"Legal framework (OACS/VLK)"},{"id":"Legislation_145","topic":"Legislation","text":"Which rules apply for hang gliders and paragliders at the location marked with an X at 800 m AGL on a Friday at 14:00 in November when, according to DABS, LS-R3 (red) = active?","options":["Maximum height 3950 m AMSL, minimum visibility 8 km, distance to clouds 1500 m horizontal / 300 m vertical","Maximum height 3050 m AMSL, minimum visibility 1.5 km, out of clouds, ground visibility","Flying is prohibited","Maximum height 3050 m AMSL, minimum visibility 5 km, distance to clouds 1500 m horizontal / 300 m vertical"],"correct":3,"img":"assets/shv_images/legislation_145.jpg","exp":"Friday 14:00 in November is MIL ON (Mon-Fri 13:15-17:05). LS-R3 active doesn't affect the X here. In the Jura/Mittelland the E-top sits at 3050 m AMSL regardless of military activity. At 800 m AGL we are well above 300 m AGL, so the strict cloud rule applies: 300 m vertical, 1500 m horizontal, 5 km visibility (below 3050 m).","sub":"Glider chart reading & scenarios"},{"id":"Legislation_146","topic":"Legislation","text":"Which rules apply for hang gliders and paragliders at the location marked with an X at 200 m AGL on a Sunday at 15:00 in May?","options":["Minimum visibility 5 km, distance to clouds 100 m horizontal / 50 m vertical","Flying is prohibited","Minimum visibility 1.5 km, out of clouds, ground visibility","Minimum visibility 5 km, distance to clouds 1500 m horizontal / 300 m vertical"],"correct":2,"img":"assets/shv_images/legislation_146.jpg","exp":"At 200 m AGL you are in the lower half of airspace G (below 300 m AGL), where the relaxed VFR rules apply: 1.5 km horizontal visibility, OUT of cloud at all times, ground always in sight, and a 180-deg turn must always be possible. Day, time and season don't change this.","sub":"Glider chart reading & scenarios"},{"id":"Legislation_147","topic":"Legislation","text":"Which general rules apply for hang gliders and paragliders without special permission at the location marked with an X at 900 m AMSL on a Tuesday at 09:00 in June?","options":["Flying is prohibited","Maximum height 4550 m AMSL, minimum visibility 8 km, distance to clouds 100 m horizontal / 50 m vertical","Maximum height 3950 m AMSL, minimum visibility 8 km, distance to clouds 1500 m horizontal / 300 m vertical","Maximum height 3050 m AMSL, minimum visibility 1.5 km, out of clouds, ground visibility"],"correct":0,"img":"assets/shv_images/legislation_147.jpg","exp":"The X is inside a restricted zone (aerodrome cylinder, CTR or active LS-R) on a Tuesday at 09:00 - during military hours and weekday business. Without special permission flying is prohibited at this location. Knowing where you are on the chart and which zones are active is the precondition for a legal flight.","sub":"Glider chart reading & scenarios"},{"id":"Legislation_148","topic":"Legislation","text":"Which rules apply for hang gliders and paragliders at the location marked with an X at 1800 m AMSL (~900 m AGL) on a Saturday at 12:00 in March?","options":["Maximum height 5950 m AMSL, minimum visibility 8 km, distance to clouds 1500 m horizontal / 300 m vertical","Flying is prohibited","Maximum height 2750 m AMSL, minimum visibility 5 km, distance to clouds 1500 m horizontal / 300 m vertical","Maximum height 2750 m AMSL, minimum visibility 1.5 km, out of clouds, ground visibility"],"correct":2,"img":"assets/shv_images/legislation_148.jpg","exp":"Saturday is MIL OFF and March 1st-onwards is inside the LSR-for-Gliders season. The 2750 m AMSL ceiling here is the upper limit of an LSR-for-Gliders box at this point. Above 300 m AGL (we are at 900 m AGL) the strict cloud distances apply (300 m / 1500 m, 5 km visibility below 3050 m) unless you are INSIDE the active glider zone with reduced minima - the answer takes the strict numbers because the question gives the upper limit of the LSR-for-Gliders as the cap.","sub":"Glider chart reading & scenarios"},{"id":"Legislation_150","topic":"Legislation","text":"Which general rules apply for hang gliders and paragliders without special permission at the location marked with an X at 2000 m AMSL on a Wednesday at 15:00 in May?","options":["Flying is prohibited","Maximum height 3050 m AMSL, minimum height 1350 m AMSL, minimum visibility 5 km, distance to clouds 1500 m horizontal / 300 m vertical","Maximum height 3050 m AMSL, minimum visibility 1.5 km, out of clouds, ground visibility","Maximum height 1350 m AMSL, minimum visibility 5 km, distance to clouds 1500 m horizontal / 300 m vertical"],"correct":1,"img":"assets/shv_images/legislation_150.jpg","exp":"In the Jura/Mittelland the airspace E ceiling is 3050 m AMSL regardless of MIL status. North of the dividing line a TMA has a sharp lower limit (here 1350 m AMSL) - paragliders may NOT fly under it in the Jura (the 300-m-AGL underflight rule applies only south of the dividing line). At 2000 m AMSL you are between 1350 and 3050 m, so the strict cloud distances apply: 5 km visibility, 1500 m / 300 m clearances.","sub":"Glider chart reading & scenarios"},{"id":"Legislation_152","topic":"Legislation","text":"Which rules apply for hang gliders and paragliders at the location marked with an X at 2500 m AMSL on a Monday at 15:00 in March when, according to DABS, LS-R2 (red) = active?","options":["Maximum height 4550 m AMSL, minimum visibility 8 km, distance to clouds 1500 m horizontal / 300 m vertical","Maximum height 3050 m AMSL, minimum visibility 5 km, distance to clouds 1500 m horizontal / 300 m vertical","Maximum height 3950 m AMSL, minimum visibility 5 km, distance to clouds 1500 m horizontal / 300 m vertical","Flying is prohibited"],"correct":1,"img":"assets/shv_images/legislation_152.jpg","exp":"Monday 15:00 is MIL ON (Mon-Fri 13:15-17:05). LS-R2 active is a restricted area but the X is not inside it. In the Jura/Mittelland the E ceiling stays at 3050 m AMSL regardless of MIL. At 2500 m AMSL (well above 300 m AGL) the strict cloud distances apply: 5 km visibility (below 3050 m), 1500 m horizontal, 300 m vertical.","sub":"Glider chart reading & scenarios"},{"id":"Legislation_153","topic":"Legislation","text":"Which rules apply for hang gliders and paragliders at the location marked with an X at 2700 m AMSL on a Sunday at 14:00 in August?","options":["Maximum height 3050 m AMSL, minimum visibility 5 km, distance to clouds 1500 m horizontal / 300 m vertical","Maximum height 3050 m AMSL, minimum visibility 5 km, distance to clouds 100 m horizontal / 50 m vertical","Maximum height 4550 m AMSL, minimum visibility 8 km, distance to clouds 1500 m horizontal / 300 m vertical","Flying is prohibited"],"correct":0,"img":"assets/shv_images/legislation_153.jpg","exp":"Sunday is MIL OFF and August is inside the LSR-for-Gliders season. At 2700 m AMSL we are above the LSR-for-Gliders upper limit (2450 m at that location) - so even though the chart marks it as a glider zone, you are ABOVE its top: the LARGE cloud clearances (300 m / 1500 m) and 5 km visibility (below 3050 m AMSL) apply. In the Mittelland/Jura the E ceiling sits at 3050 m AMSL.","sub":"Glider chart reading & scenarios"},{"id":"Legislation_154","topic":"Legislation","text":"Which general rules apply for hang gliders and paragliders without special permission at the location marked with an X at 1500 m AMSL on a Thursday at 10:00 in July?","options":["Flying is prohibited","Maximum height 4550 m AMSL, minimum visibility 8 km, distance to clouds 1500 m horizontal / 300 m vertical","Maximum height 3950 m AMSL, minimum visibility 8 km, distance to clouds 1500 m horizontal / 300 m vertical","Maximum height 3050 m AMSL, minimum visibility 1.5 km, out of clouds, ground visibility"],"correct":0,"img":"assets/shv_images/legislation_154.jpg","exp":"Thursday at 10:00 is MIL ON (Mon-Fri 07:35-12:05). The X is inside a permanently or daily active restricted/controlled zone (an aerodrome cylinder, CTR or active LS-R) at 1500 m AMSL - without special permission flying there is prohibited. Always run the five pre-flight questions: season, MIL status, dividing-line side, altitude, location vs restricted zones.","sub":"Glider chart reading & scenarios"},{"id":"Legislation_155","topic":"Legislation","text":"Which general rules apply for hang gliders and paragliders without special permission at the location marked with an X at 4900 m AMSL (~900 m AGL) on a Sunday at 16:00 in August?","options":["minimum visibility 1.5 km, out of clouds, ground visibility","Flying is prohibited","minimum visibility 8 km, distance to clouds 100 m horizontal / 50 m vertical","minimum visibility 8 km, distance to clouds 1500 m horizontal / 300 m vertical"],"correct":1,"img":"assets/shv_images/legislation_155.jpg","exp":"Sunday is MIL OFF, so in the Alps airspace E goes up to 4550 m AMSL. At 4900 m AMSL with only 900 m of ground clearance you are well into airspace C - and the 600 m AGL G ceiling above the peak does NOT extend to 900 m. Without special permission flying is therefore prohibited.","sub":"Glider chart reading & scenarios"},{"id":"Legislation_156","topic":"Legislation","text":"Which rules apply for hang gliders and paragliders at the location marked with an X at 2800 m AMSL (~1200 m AGL) on a Monday at 15:00 in April when, according to DABS, LS-D14 (red) = active?","options":["Maximum height 2200 m AMSL, minimum visibility 5 km, distance to clouds 1500 m horizontal / 300 m vertical,","Maximum height 3950 m AMSL, minimum visibility 5 km, distance to clouds 1500 m horizontal / 300 m vertical, flying below 2200 m AMSL is life-threatening","Flying is prohibited","Maximum height 4550 m AMSL, minimum visibility 8 km, distance to clouds 1500 m horizontal / 300 m vertical, flying below 2200 m AMSL is prohibited"],"correct":1,"img":"assets/shv_images/legislation_156.jpg","exp":"Monday 15:00 is MIL ON (Mon-Fri 13:15-17:05); in the Alps the E ceiling therefore comes down from 4550 to 3950 m AMSL. LS-D14 active is a DANGER area (live firing below 2200 m AMSL) - it is not legally forbidden to fly in it, but flying below 2200 m AMSL is life-threatening. The cloud distances are the standard 300 m / 1500 m with 5 km visibility (below 3050 m).","sub":"Glider chart reading & scenarios"},{"id":"Legislation_157","topic":"Legislation","text":"Which rules apply for hang gliders and paragliders at the location marked with an X at 150 m AGL (~1850 m AMSL) on a Friday at 14:00 in September when, according to a telephone enquiry, TMA LSMM 1 HX = active.","options":["Flying is prohibited","Maximum height 3950 m AMSL, minimum visibility 5 km, distance to clouds 1500 m horizontal / 300 m vertical","Maximum height 300 m AGL, minimum visibility 5 km, distance to clouds 1500 m horizontal / 300 m vertical","Maximum height 300 m AGL, minimum visibility 1.5 km, out of clouds, ground visibility"],"correct":3,"img":"assets/shv_images/legislation_157.jpg","exp":"This is the classic Meiringen example: south of the dividing line, you may fly under a TMA up to 300 m above ground without clearance. At 150 m AGL you are in the lower half of airspace G - the relaxed VFR rule applies: 1.5 km horizontal visibility, clear of cloud, ground always in sight. Ceiling: 300 m AGL (the TMA's underflight rule), NOT 600 m, because the TMA above you is active.","sub":"Glider chart reading & scenarios"},{"id":"Legislation_158","topic":"Legislation","text":"Which rules apply for hang gliders and paragliders at the location marked with an X at 4100 m AMSL (~1600 m AGL) on a Saturday at 15:00 in February when, according to DABS, LS-R11 (red) = inactive.","options":["Flying is prohibited","Maximum height 4550m AMSL, minimum visibility 8 km, distance to clouds 1500 m horizontal / 300 m vertical","Maximum height 4550 m AMSL, minimum visibility 8 km, distance to clouds 100 m horizontal / 50 m vertical","Maximum height 4550m AMSL, minimum visibility 8 km, out of clouds, ground visibility"],"correct":1,"img":"assets/shv_images/legislation_158.jpg","exp":"Saturday is MIL OFF, so in the Alps the E ceiling is 4550 m AMSL. February is OUTSIDE the LS-R-for-Gliders season (1 Mar-31 Oct), so glider-zone reduced clearances don't apply. LS-R11 inactive: no restriction. At 4100 m AMSL (above 3050 m) visibility must be 8 km, with 300 m / 1500 m cloud distances. The 1600 m of ground clearance means you are in airspace E, not G.","sub":"Glider chart reading & scenarios"},{"id":"Legislation_162","topic":"Legislation","text":"What are the lower and upper limits of the airspace with this marking?","options":["Lower limit 2050m AMSL at standard atmosphere, upper limit 3950m AMSL at standard atmosphere.","Lower limit 2050m AGL, upper limit 3950m AMSL at standard atmosphere.","Lower limit 2050m AGL, upper limit 3950m AMSL.","Lower limit 2050m AMSL, upper limit 3950m AMSL at standard atmosphere."],"correct":3,"img":"assets/shv_images/legislation_162.jpg","exp":"The tag on the chart shows a lower limit of 2050 m AMSL (italic = above sea level) and an upper limit of 3950 m at standard atmosphere (flight level in blue highlight). 3950 m AMSL is FL 130 - the alpine E ceiling during MIL ON. The 2050 m floor is a fixed AMSL altitude (italics) and does not fluctuate with pressure.","sub":"Glider chart reading & scenarios"},{"id":"Legislation_163","topic":"Legislation","text":"What are the lower and upper limits of the LS-R for gliders with this marking on a Sunday in June?","options":["Lower limit 600m AGL, upper limit 3200m AMSL at standard atmosphere.","Lower limit 600m AGL, upper limit 3200m AMSL.","Lower limit 600m AGL, upper limit 3950m AMSL at standard atmosphere.","Lower limit 3200m AMSL, upper limit 3950m AMSL at standard atmosphere."],"correct":2,"img":"assets/shv_images/legislation_163.jpg","exp":"On a Sunday (MIL OFF) in June (inside LSR-for-Gliders season 1 Mar-31 Oct) the marked LSR-for-Gliders box is active. Its lower limit is given as 600 m AGL (upright = above ground), its upper as 3950 m at standard atmosphere (FL 130, blue background). Inside it the reduced cloud clearances of 50 m / 100 m and the standard visibility minima apply.","sub":"Glider chart reading & scenarios"},{"id":"Legislation_164","topic":"Legislation","text":"From what altitude can you only fly in airspace with this marking with radio communication?","options":["Higher than 3050m AMSL.","Higher than 3050m AMSL at standard atmosphere.","Higher than 300m AGL.","Higher than 300m AMSL."],"correct":2,"img":"assets/shv_images/legislation_164.jpg","exp":"The marking shows a TMA south of the dividing line whose lower limit allows paragliders to fly underneath up to 300 m AGL without clearance/radio. Above 300 m AGL you enter the controlled airspace and need radio communication (and clearance). Below 300 m AGL you are legal in G without any radio.","sub":"Glider chart reading & scenarios"},{"id":"Legislation_165","topic":"Legislation","text":"This symbol on the glider map stands for","options":["a heliport.","a civil aerodrome.","a military aerodrome.","a civil and military aerodrome."],"correct":3,"img":"assets/shv_images/legislation_165.jpg","exp":"The chart symbol shown - a 5 km cylinder with the specific mixed civil/military marking - represents a combined civil and military aerodrome. The 5 km radius applies (the standard for an airfield runway up to 600 m above its reference point), and the field is used by both traffic types.","sub":"Glider chart reading & scenarios"},{"id":"Legislation_166","topic":"Legislation","text":"Why are TMAs of Emmen (LSME) and Alpnach (LSMA) graphically different on this map section?","options":["The TMA Emmen is active 24 hours a day, the TMA Alpnach is activated via Notam/DABS.","The TMA Emmen is active in accordance with HX, the TMA Alpnach is activated via Notam/DABS.","There is no difference.","The TMA Emmen is a temporary zone, the TMA Alpnach permanent."],"correct":1,"img":"assets/shv_images/legislation_166.jpg","exp":"TMA Emmen (LSME) has the activity code HX - 'no fixed hours, must be queried' - so it is on the chart as a permanent box that may activate at any time. TMA Alpnach (LSMA) is a TEMPORARY TMA, activated only via NOTAM/DABS on the day; Sion and Alpnach are the only two such temporary TMAs in Switzerland, hence the visually finer border.","sub":"Glider chart reading & scenarios"},{"id":"Legislation_167","topic":"Legislation","text":"Up to what height is it permitted to climb in LS-R24 on a Sunday afternoon in July?","options":["up to 4550m pressure altitude (QNE) or 600m above ground (whichever gives the higher altitude)","up to 600m above ground","up to 3950m pressure altitude (QNE) or 600m above ground (whichever is higher)","up to 4550m pressure altitude (QNE)"],"correct":0,"img":"assets/shv_images/legislation_167.jpg","exp":"Sunday is MIL OFF, so in the Alps the E ceiling is 4550 m AMSL (= FL 150 / QNE). However, the 600 m AGL G ceiling overrides locally: above a peak you may climb to 600 m above that peak even if it exceeds 4550 m AMSL. The rule is the HIGHER of the two values.","sub":"Glider chart reading & scenarios"},{"id":"Legislation_168","topic":"Legislation","text":"Up to what height is it permitted to climb in LS-R24 on a Monday at 2pm in February?","options":["up to 600m above ground","up to 3950m pressure altitude (QNE) or 600m above ground (whichever is higher)","up to 3950m pressure altitude (QNE)","up to 4550m pressure altitude (QNE) or 600m above ground (whichever gives the higher altitude)"],"correct":1,"img":"assets/shv_images/legislation_168.jpg","exp":"Monday at 14:00 is MIL ON (Mon-Fri 13:15-17:05); in the Alps the E ceiling drops from 4550 to 3950 m AMSL (= FL 130 / QNE). The 600 m AGL G ceiling still overrides locally above a peak. The rule is again the HIGHER of the two values - whichever permits more altitude at that point.","sub":"Glider chart reading & scenarios"},{"id":"Legislation_169","topic":"Legislation","text":"What is the minimum lower limit of a TMA in the Alps?","options":["300m AGL.","GND.","600m AMSL.","The height indicated on the map."],"correct":0,"exp":"South of the Mittelland-Alps dividing line, paragliders may fly under a TMA up to 300 m above ground without clearance. That is the practical minimum lower limit for a paraglider in the Alps: regardless of what the chart shows as the TMA lower altitude, the rule allows you 300 m AGL underflight.","sub":"Airspace classes & structure"},{"id":"Legislation_170","topic":"Legislation","text":"What is the minimum lower limit of a TMA in the Jura?","options":["600m AMSL.","GND.","The height indicated on the map.","300m AGL."],"correct":2,"exp":"North of the dividing line (Jura/Mittelland) the underflight rule does NOT apply. A paraglider may only ascend to the lower limit indicated on the chart - whatever the chart shows is the hard ceiling. The 300-m-below rule is an alpine-only relaxation.","sub":"Altitude ceilings & pressure references"},{"id":"Legislation_171","topic":"Legislation","text":"To what altitude can you climb in the Jura with a QNH of 1035 hPa?","options":["Exactly 3950m AMSL.","Exactly 3050m AMSL.","Slightly less than 3050m AMSL.","Slightly higher than 3050m AMSL."],"correct":3,"exp":"The 3050 m Jura E-ceiling is a flight level (FL 100) - it follows the standard atmosphere of 1013.25 hPa. With a high-pressure QNH of 1035 hPa (above standard) the pressure surface FL 100 sits about (1035-1013) x ~8 m/hPa ~ 200 m HIGHER than standard - so you may legally climb slightly above 3050 m AMSL. The trick: boundaries given as flight levels move with the weather.","sub":"Altitude ceilings & pressure references"},{"id":"Legislation_172","topic":"Legislation","text":"To what altitude can you climb in the Jura with a QNH of 1005 hPa?","options":["Slightly less than 3050m AMSL.","Exactly 3950m AMSL.","Slightly higher than 3050m AMSL.","Exactly 3050m AMSL."],"correct":0,"exp":"With a low-pressure QNH of 1005 hPa (below standard 1013.25) the FL 100 pressure surface sits about 60-80 m LOWER than standard, so the Jura E ceiling effectively comes down to slightly less than 3050 m AMSL. Flight-level-based boundaries shift down in a low and up in a high.","sub":"Altitude ceilings & pressure references"},{"id":"Legislation_173","topic":"Legislation","text":"A TMA north of the dividing line Jura-Swiss plateau/Alps","options":["may be flown under at 300m AGL.","always starts at 600m above ground.","extends to the specified lower limit in all cases.","is no different to TMAs south of this dividing line."],"correct":2,"exp":"North of the Mittelland-Alps dividing line, the lower limit of a TMA is HARD and matches the value printed on the chart. There is no underflight relaxation here - you cannot legally climb closer than the printed lower limit to the TMA.","sub":"Airspace classes & structure"},{"id":"Legislation_174","topic":"Legislation","text":"FIZ stands for","options":["Instrument flight zone.","Flight information service.","Flight information zone.","Aircraft identification zone."],"correct":2,"exp":"FIZ stands for Flight Information Zone - an airspace within which a Flight Information Service is provided (information and alerting, but no clearance). It is distinct from RMZ (Radio Mandatory Zone) and TMZ (Transponder Mandatory Zone), all three of which feature on Swiss charts.","sub":"Aviation abbreviations"},{"id":"Legislation_176","topic":"Legislation","text":"What are the lower and upper limits of the airspace with this marking?","options":["Lower limit at ground level, upper limit 3950m AMSL.","Lower limit on request on 119.625, upper limit 3950m AMSL.","Lower limit in accordance with Notam/DABS, upper limit 3950m AMSL at standard atmosphere.","Lower limit in accordance with Notam/DABS, upper limit 3950m AMSL."],"correct":2,"img":"assets/shv_images/legislation_176.jpg","exp":"When the tag shows the lower limit 'in accordance with NOTAM/DABS' the box is one of the temporary TMAs (Sion or Alpnach), activated daily. The upper limit 3950 m at standard atmosphere is FL 130 (highlighted in blue). On a day the bulletin marks it as inactive you ignore the box; when active you must avoid it.","sub":"Glider chart reading & scenarios"},{"id":"Legislation_177","topic":"Legislation","text":"The upper limit of class E airspace in the Jura at an atmospheric pressure of 1037 hPa is","options":["3250m AMSL.","4150m AMSL.","3950m AMSL.","3050m AMSL."],"correct":0,"exp":"The Jura E-top is FL 100 (referenced to 1013.25 hPa). With QNH 1037 hPa the surface shifts up by approximately (1037-1013) x 8 m/hPa ~ 200 m, putting the actual E ceiling at roughly 3250 m AMSL. Flight-level-based boundaries move with the weather; in a strong high they rise.","sub":"Altitude ceilings & pressure references"},{"id":"Legislation_178","topic":"Legislation","text":"Which rules apply for hang gliders and paragliders without a Transponder at the location marked with an X at 2219 m AMSL or 500m AGL on a Sunday at 14:00 in February?","options":["Maximum height 3950m AMSL, minimum visibility 5 km, distance to clouds 100 m horizontal / 50 m vertical","Maximum height 3050m AMSL, minimum visibility 1.5 km, distance to clouds 1500 m horizontal / 300 m vertical","Maximum height 3050m AMSL, minimum visibility 8 km, distance to clouds 1500 m horizontal / 300 m vertical","Maximum height 3050m AMSL, minimum visibility 1.5 km, out of clouds, ground visibility"],"correct":1,"img":"assets/shv_images/legislation_178.jpg","exp":"February is OUTSIDE the LSR-for-Gliders season, so no glider-zone relaxations apply. Sunday is MIL OFF (but in the Jura that's irrelevant; ceiling is always 3050 m). At 500 m AGL we are above 300 m AGL (so strict cloud distances 300 m / 1500 m apply) but still in airspace G (G goes up to 600 m AGL), so visibility is still 1.5 km - the 5 km only kicks in above G.","sub":"Glider chart reading & scenarios"},{"id":"Legislation_179","topic":"Legislation","text":"In an RMZ the following rules apply:","options":["Entry only with constant radio monitoring and blind transmissions on the appropriate frequency.","Entry is allowed at all times without conditions.","Entry only after prior establishment of radio contact on the appropriate frequency.","Hang gliders and paragliders are forbidden to enter."],"correct":0,"exp":"In a Radio Mandatory Zone (RMZ) entry is only permitted with continuous radio monitoring on the published frequency AND so-called 'blind transmissions' - call-outs by which you announce your position even if no ATC unit responds. It is not controlled airspace per se, but compulsory listening watch is the rule.","sub":"Aviation abbreviations"},{"id":"Materials_2","topic":"Materials","text":"The term “ripstop material” means","options":["the technique where stronger threads are intertwined at regular intervals in the warp and weft of the cloth to prevent a tear from spreading.","the reinforcing on heavily loaded areas of the glider.","the tear barriers which prevent the damage from one element of the glider from spreading to the next.","a special coating which increases the elasticity of the cloth and therefore improves the tear resistance of the cloth."],"correct":0,"exp":"Ripstop is a weaving pattern where thicker, stronger threads are inserted at regular intervals in both perpendicular directions of the weave. If a tear starts in the lighter weave, those reinforcement threads form a stop-grid that prevents the tear from running further than the next intersection. It's a structural weave property, not a coating or reinforcement patch.","sub":"Sail cloth and coating"},{"id":"Materials_3","topic":"Materials","text":"The resistance to ripping and tearing in materials used by paragliders is improved by","options":["the coating of the cloth.","the interweaving of threads with higher elasticity.","extremely fine weaving in the cloth.","the \"ripstop\" weave technique in the cloth."],"correct":3,"exp":"Ripstop is a weaving technique that inserts thicker, stronger threads at regular intervals in both warp and weft, creating tiny barriers across the cloth. A tear that starts can only propagate as far as the next barrier before being stopped. Coatings, fine weaves and elasticity don't stop tear propagation the way ripstop barriers do.","sub":"Sail cloth and coating"},{"id":"Materials_4","topic":"Materials","text":"When talking about paragliders the term porosity means","options":["the tear resistance of the cloth.","the capacity of the cloth to withstand bending.","the permeability of a material to air.","the composition of the upper surface of the wing."],"correct":2,"exp":"Porosity describes how readily air passes through the cloth. A new, well-coated wing has very low porosity, so it holds pressure cleanly and keeps its profile. As the coating ages porosity rises, performance drops and the wing tends to stall earlier. Porosity has nothing to do with tear resistance or bending.","sub":"Sail cloth and coating"},{"id":"Materials_5","topic":"Materials","text":"The porosity of the materials used for paragliders (canopy)","options":["is not important, the strength is what counts.","should be as low as possible.","should be as high as possible.","should never be below a predetermined value, as the boundary layer becomes too laminar."],"correct":1,"exp":"Low porosity is essential: the canopy must hold air pressure to keep its shape and develop lift. A porous wing leaks and the pressure differential between upper and lower surface collapses - so the wing flies slower, stalls earlier and is more collapse-prone. Coatings exist specifically to drive porosity to the lowest practical value.","sub":"Sail cloth and coating"},{"id":"Materials_6","topic":"Materials","text":"The cloth used for paragliders are coated to","options":["minimise elasticity and mechanical strength.","increase porosity and mechanical strength.","increase elasticity and mechanical strength.","minimise porosity and elasticity."],"correct":3,"exp":"The coating's job is twofold: seal the weave so air can't leak through (low porosity, profile stays sharp) and fix the threads so the fabric doesn't stretch under load (low elasticity, wing keeps its certified shape). It also adds UV protection. Coatings don't increase mechanical strength as a primary effect - they preserve the cloth's properties.","sub":"Sail cloth and coating"},{"id":"Materials_7","topic":"Materials","text":"The coating on Paraglider cloth","options":["reduces porosity.","increases UV sensitivity.","increases elasticity.","decreases mechanical strength."],"correct":0,"exp":"Paraglider cloth is coated (typically with polyurethane, sometimes silicone or Mylar) to seal the weave and stop air leaking through. Lower porosity means the canopy keeps a clean pressure differential between upper and lower surface, so the wing keeps its profile and performance. The coating also dampens UV ageing and can even improve mechanical strength a touch.","sub":"Sail cloth and coating"},{"id":"Materials_8","topic":"Materials","text":"The coating on Paraglider cloth","options":["increases porosity.","decreases mechanical strength.","reduces UV sensitivity.","increases elasticity."],"correct":2,"exp":"Coatings (polyurethane, silicone or Mylar) shield the bare nylon threads from UV radiation. Without the coating, sun ages the fabric quickly - fibres become brittle, porosity climbs and the wing's flight characteristics drift. The coating also reduces porosity and elasticity; all three effects work together to keep a new wing flying like new for longer.","sub":"Sail cloth and coating"},{"id":"Materials_9","topic":"Materials","text":"The coating on Paraglider cloth","options":["decreases elasticity.","increases porosity.","increases UV sensitivity.","decreases mechanical strength."],"correct":0,"exp":"Coating the woven nylon fixes the threads in place and stiffens the fabric, which directly reduces its elasticity. Low elasticity is wanted: the wing must keep a stable profile in flight rather than ballooning or stretching under aerodynamic load. The coating also lowers porosity and shields the cloth from UV.","sub":"Sail cloth and coating"},{"id":"Materials_10","topic":"Materials","text":"The coating on Paraglider cloth","options":["increases porosity.","increases UV sensitivity.","decreases mechanical strength.","increases elasticity."],"correct":2,"exp":"The wing's coating primarily lowers porosity, reduces elasticity and protects against UV. Adding any film to the woven cloth fixes the threads in place rather than letting them work independently, which in this exam framing is sometimes described as a small reduction in raw cloth mechanical strength. Either way, the practical effect: a sealed, profile-stable wing that ages less quickly.","sub":"Sail cloth and coating"},{"id":"Materials_11","topic":"Materials","text":"What are the effects on the performance of a wing where the coating is old, damaged or insufficient?","options":["The entire speed range of the glider increases and the tendency to collapse increases.","The entire speed range of the glider reduces and the polar curve becomes flater.","The stall speed is higher as well as its tendency to go into parachutal stalls.","The glider is hard to steer and has a tendency towards instability in the longitudinal axis."],"correct":2,"exp":"When the coating ages or is damaged, porosity rises and the wing loses internal pressure. The boundary layer separates earlier, so the wing stalls at a higher airspeed than its certified figure, and parachutal stalls become more frequent (the wing falls vertically without forward speed). That's why coating health is so closely tied to safe flight envelope.","sub":"Sail cloth and coating"},{"id":"Materials_12","topic":"Materials","text":"The quality of a wing coating can be considerably damaged by","options":["packing the glider on a tar or concrete surface.","storing the wing as dry as possible in a cool room.","consistently storing the wing in a dark place protected from sunlight.","the execution of extreme flying manoeuvres with the resulting collapses."],"correct":0,"exp":"Friction against rough surfaces (tar, gravel, concrete, sand) abrades the thin coating off the ripstop weave. Once the coating is worn through, porosity climbs and the wing's flight behaviour degrades. Cool, dark, dry storage protects the coating; extreme manoeuvres don't damage it directly.","sub":"Sail cloth and coating"},{"id":"Materials_13","topic":"Materials","text":"The quality of a wing coating can be considerably damaged by","options":["cleaning the wing with an household cleaning product.","storing a dry wing in place with large temperature variations.","consistently storing the wing in a dark place protected from sunlight.","the execution of extreme flying manoeuvres with the resulting collapses."],"correct":0,"exp":"Household detergents and cleaning sprays contain solvents and surfactants that chemically attack the polyurethane or silicone coating. Even a single wipe-down with the wrong product strips the seal and raises porosity. Always clean a wing only with lukewarm water - no soap, no spray, no detergent.","sub":"Sail cloth and coating"},{"id":"Materials_17","topic":"Materials","text":"A paraglider that has been in contact with sea water should be","options":["dried as quickly as possible by reverse launching in the sea breeze.","dried in the shade and then well shaken out to remove the salt.","porosity tested by an expert.","rinsed thoroughly with clean water asap and then dried."],"correct":3,"exp":"Salt and the acids that come with seawater eat the coating, so the first priority is to flush them out. Rinse the wing thoroughly with fresh water as soon as possible, then dry it in the shade. Reverse-launching to dry or just shaking out the salt won't remove the corrosive residue from the fabric.","sub":"Sail cloth and coating"},{"id":"Materials_18","topic":"Materials","text":"The largest load on a wing during flight is","options":["on the upper side of the wing surface near the leading edge.","on the lower side of the wing surface near the trailing edge.","on the upper side of the wing surface near the trailing edge.","on the lower side of the wing surface near the leading edge."],"correct":0,"exp":"Lift is generated by the pressure drop on the upper surface, and that suction is strongest just behind the leading edge - that's where the airflow is accelerating most over the curved profile. So the upper surface near the front carries the biggest aerodynamic load, which is why cell walls and line attachments are heaviest reinforced in that region.","sub":"Wing construction"},{"id":"Materials_20","topic":"Materials","text":"What are the purpose of cell walls and ribs in a wing?","options":["To spread the load from the suspension lines evenly to the upper surface of the wing.","To limit the air circulation within the glider and thereby minimize the porosity of the wing.","To regulate the air circulation inside the wing and therefore maintain an even internal pressure.","To improve the structural strength of the wing in the longitudinal and transverse axis."],"correct":0,"exp":"The cell walls and ribs are the wing's internal structure. They take the concentrated load coming up each suspension line and spread it across the curved upper surface (which generates lift), so the cloth doesn't have to carry the load only at the line attachment points. Without them the upper surface would collapse into the line points like a sagging tent.","sub":"Wing construction"},{"id":"Materials_21","topic":"Materials","text":"The load suffered by the cell walls is highest","options":["at the rear half of the wing where the suspension lines are attached.","between the suspension line connection points at the rear half of the wing.","at the front half of the wing where the suspension lines are attached.","between the suspension line connection points at the front half of the wing."],"correct":2,"exp":"Lift is generated mostly on the front portion of the wing's upper surface, so the line tension that must transfer that lift to the pilot peaks there. The cell wall takes its highest concentrated load at the line attachment points on the front half - which is also why those areas are specifically reinforced in modern wings.","sub":"Wing construction"},{"id":"Materials_22","topic":"Materials","text":"In which situation do the cell walls suffer the most loading?","options":["In strong thermals.","In a B - stall.","In \"big ears\".","In a spiral dive."],"correct":1,"exp":"In a B-stall the wing is pulled into a stalled descent while the A and C/D lines still hang against full weight - so the cell walls between line groups carry huge concentrated loads as the wing fights to stay open against the artificially imposed shape. Spiral dives and big ears load the lines more than the walls; thermals are gentle by comparison.","sub":"Wing construction"},{"id":"Materials_23","topic":"Materials","text":"Manufacturers reduce the deformation of cell walls where the lines are attached by","options":["minimising the number of suspension line connection points.","arranging the cross-port openings directly over the line connections.","choosing a relatively thick wing profile.","reinforcing the loaded area of the cell wall."],"correct":3,"exp":"Where lines attach, the cell wall fabric carries concentrated point loads that try to pull and stretch the cloth. Manufacturers reinforce just those small areas - often with Mylar tape or extra-strong patches - so the cell wall doesn't deform around the attachment. Cross-ports and profile thickness don't address this localised stretch.","sub":"Wing construction"},{"id":"Materials_24","topic":"Materials","text":"Why are diagonal V-ribs or cell walls built into the wing construction?","options":["They allow the load on the upper wing surface to be carried by a reduced number of suspension lines thus reducing drag.","They encourage a gentle, continuous reopening of the wing after a collapse.","They inhibit permanent deformation of the wing as a result of the slow stretching of the cloth.","They inhibit the rapid exhausting of air from individual cells, and thereby inhibit collapses."],"correct":0,"exp":"Diagonal V-ribs internally connect upper to lower surface and redistribute load sideways - so a single line attachment can carry the load of several cells via the V-rib bridge. That means fewer suspension lines coming out the bottom of the wing, which directly reduces aerodynamic drag. It's a modern construction trick that boosts performance without sacrificing structure.","sub":"Wing construction"},{"id":"Materials_26","topic":"Materials","text":"Paraglider X has 18 cells, glider Y has 24 cells. Both have a surface area of 24m2 and a span of 10m. They are constructed from the same materials and principles. Which of the following is true?","options":["X has a thicker profile and larger pack volume than Y.","X has a smaller aspect ratio than Y, but both have the same pack volume.","Y has a more precise profile and a larger pack volume than X.","Y has a larger aspect ratio and a greater pack volume than X."],"correct":2,"exp":"More cells at the same surface area means more internal walls - so the wing approximates the ideal airfoil more accurately (smoother profile), but the additional cell walls add weight and fold to a larger pack volume. Aspect ratio is set by span over area, which is identical here. The classic trade: precision and looks vs. weight and pack size.","sub":"Wing construction"},{"id":"Materials_27","topic":"Materials","text":"In which direction can the loading on ripstop material over a period of time cause the most deformities?","options":["Loads vertical (at 90 degrees) to the material.","Loads parallel to the \"warp\" thread direction in the cloth.","Loads diagonally across the material in relation to the structure of the fabric.","Loads parallel to the \"weft\" thread direction in the cloth."],"correct":2,"exp":"Ripstop fabric is strong along the warp and weft thread directions - that's where the woven threads carry tension. But diagonal (bias) loads stretch the weave by shearing the squares, which over time deforms the fabric and changes the profile. Manufacturers package the cloth panels so most flight loads align with the threads, not the diagonal.","sub":"Sail cloth and coating"},{"id":"Materials_28","topic":"Materials","text":"If the stitching on a wing is too close together","options":["the stitching conforms better to the shape of the cloth/wing.","the material is perforated and loses strength.","the porosity is minimised.","the tear resistance is increased."],"correct":1,"exp":"Every stitch is a needle perforation in the fabric. If stitches are placed too close together, the line of holes acts like a perforated tear-strip and the material rips along it under load. Manufacturers space stitches carefully so the cloth keeps its strength between holes. Closer stitching doesn't reduce porosity or improve tear resistance.","sub":"Wing construction"},{"id":"Materials_29","topic":"Materials","text":"How do you distinguish the different groups of lines on a paraglider?","options":["By their diameter; eg. 0.9mm, 1.3mm, 1.5mm.","By their point of attachment to the wing; eg. A, B, C, D-lines.","By their materials; eg. polyester, dyneema, kevlar, polyamide.","By their colour; eg. yellow, red lines."],"correct":1,"exp":"Line groups are officially named by where they attach to the wing: A at the leading edge, then B, C, D toward the trailing edge, plus the brake (F) at the trailing edge. Manufacturers often colour-code groups for convenience (school wings frequently use red on the A group), but colour and diameter and material can all vary - the attachment point is the universal definition.","sub":"Line groups, geometry and load distribution"},{"id":"Materials_30","topic":"Materials","text":"Where do the A lines attach to the wing?","options":["At the trailing edge.","On the stabilos.","At the leading edge.","On the longitudinal axis."],"correct":2,"exp":"The A lines run from the front (A) riser up to the leading edge of the wing - the part of the canopy with the cell openings that the air enters through. Then come B, C and D moving back, with the brake (F) line attaching at the trailing edge. A-line attachment at the leading edge is what lets you pull up the wing during launch.","sub":"Line groups, geometry and load distribution"},{"id":"Materials_31","topic":"Materials","text":"What requirements among others must modern suspension lines satisfy?","options":["Low elasticity, high load capacity with a minimum diameter.","High elasticity, high load capacity with a minimum diameter.","High elasticity, low load capacity with a minimum diameter.","Low elasticity, low load capacity with a minimum diameter."],"correct":0,"exp":"Modern lines must be (1) as inelastic as possible so the wing keeps its profile under load, (2) strong enough to carry the loads with safety margin, and (3) as thin as possible to minimise parasitic drag. Those three are essentially incompatible without high-performance fibres, which is why Dyneema and aramid replaced everything else.","sub":"Line materials and construction"},{"id":"Materials_32","topic":"Materials","text":"On a modern paraglider, what is the tolerable stretch of a 6m suspension line, under a load of 50 N (5kg)?","options":["approx. 3cm.","The suspension lines on modern paragliders are made of materials that don't stretch.","approx. 6cm.","approx. 9cm."],"correct":0,"exp":"The accepted tolerance for modern paraglider lines is about 3 cm extension on a 6 m line under a load of 50 N (about 5 kg) - that's roughly 0.5% stretch. Modern lines are not zero-stretch (no real material is), but they are deliberately engineered to be very close to inelastic so the wing's profile and trim stay consistent.","sub":"Line care, damage and replacement"},{"id":"Materials_33","topic":"Materials","text":"What materials are used in the manufacture of suspension lines?","options":["Polyethylene (Dyneema) or Aramid (Kevlar).","Aramid (Kevlar) or Polyester.","Polyester or Polyamid (Nylon).","Polyester or Polyethylene (Dyneema)."],"correct":0,"exp":"Modern paraglider line cores are made of either polyethylene (brand name Dyneema, white, excellent strength-to-weight, slight stretch) or aramid (Technora/Kevlar, light brown, very dimensionally stable but kink-sensitive and UV-sensitive). Polyester is only used for the sheath; polyamide (nylon) is the wing fabric. Manufacturers typically use both core types in a mix.","sub":"Line materials and construction"},{"id":"Materials_34","topic":"Materials","text":"In the construction of modern gliders suspension lines usually consist of a core and a covering (mantle),","options":["in order to protect the core from the effects of light and friction.","so that they can be coloured differently and therefore be more easily differentiated.","so that in the event of a break in the core the mantle can carry the load for a short period.","so that the load capacity of the line is increased by the covering."],"correct":0,"exp":"The sheath (braided nylon or polyester) wraps the load-bearing core to shield it from UV radiation and from mechanical abrasion against other lines or terrain. A bare core would degrade in sunlight and fray on contact. The sheath does add diameter and drag, which is why some high-performance wings use unsheathed lines coated for UV protection instead.","sub":"Line materials and construction"},{"id":"Materials_35","topic":"Materials","text":"If the core is made from a material where the elasticity is very small, should we expect long term changes in the length of the suspension lines?","options":["Yes, definitely with temperatures over 60° C.","Yes, as all materals under continuous load significantly change their length.","Yes, especially because the outer coating tends to shrink and therefore shorten the lines.","No, lines made from materials with minimal stretch never change their length significantly."],"correct":2,"exp":"Even when the load-bearing core is dimensionally very stable, the polyester sheath wrapped around it shrinks over time - especially when exposed to moisture. The shrinking sheath pulls the assembled line shorter, particularly in lightly-loaded positions (C and D) where each line only carries 300-500 g and can't resist the sheath contraction.","sub":"Line care, damage and replacement"},{"id":"Materials_36","topic":"Materials","text":"The technique used for sewing suspension lines","options":["Can, especially for Aramid lines, diminish their strength by up to 40%","is the only production method which permanently guarantees sufficient strength.","requires great care in production and doesn't reduce the line's strength noticeably.","is purely for cosmetic reasons."],"correct":0,"exp":"Sewing a loop into an aramid (Kevlar/Technora) line damages the rigid, kink-sensitive fibres at each needle hole - and can cut the line's strength by up to 40%. That's why splicing is used instead for aramid: the cores are intertwined without piercing the fibres, so almost no strength is lost.","sub":"Line materials and construction"},{"id":"Materials_37","topic":"Materials","text":"Which technique allows us to secure loops in the ends of unmantled suspension lines when they are made from \"Aramid\" without significantly diminishing their strength?","options":["Fusing.","None.","Sewing.","Splicing."],"correct":3,"exp":"For unsheathed aramid lines, splicing (intertwining the fibres of the core into a loop) doesn't pierce or damage the fibres, so it preserves nearly the full breaking strength. Sewing pierces the rigid fibres and can cost up to 40% of the line's strength. Fusing melts aramid (which has a high melting point) and isn't a safe loop technique.","sub":"Line materials and construction"},{"id":"Materials_38","topic":"Materials","text":"What can cause stress whitening damage to core of aramid (Kevlar) or polyethylene (dyneema) suspension lines, thereby significantly weakening them?","options":["Highly loading a suspension line or group of lines during manoeuvres such as frontstalls, assymetric collapses or B-stalls.","Continually flying the glider with a load near or over the allowed maximum.","Fully soaking the lines and then allowing them to freeze.","Stress whitening damage is always a production error and cannot be caused through the use of the glider."],"correct":2,"exp":"When water gets into Dyneema or Aramid lines and then freezes, the ice expands inside the fibre bundle and damages the core - producing 'stress whitening' that is invisible from outside (hidden under the sheath) but seriously weakens the line. Normal manoeuvres or maximum load flying don't cause this. It's a care issue, not a flying issue: never store a wet wing where it might freeze.","sub":"Line care, damage and replacement"},{"id":"Materials_39","topic":"Materials","text":"1mm suspension lines with a tensile strength of 100 daN (10kN) 100Kg differ from 1.5mm lines with the same tensile strength by the fact that they have","options":["increased drag and reduced tendency to knot during wing preparation.","reduced drag and increased tendency to knot during wing preparation.","reduced drag and reduced tendency to knot during wing preparation.","increased drag and increased tendency to knot during wing preparation."],"correct":1,"exp":"A thinner line of the same strength is essentially the same fibre core with less sheath bulk - so it has less aerodynamic drag (smaller frontal area) but is more flexible and slippery, which makes it more prone to tangling during wing preparation. That's why high-performance wings often use unsheathed thin lines but ask for careful sorting before launch.","sub":"Line materials and construction"},{"id":"Materials_40","topic":"Materials","text":"What can be said about the loading on lines of a stable wing?","options":["A and C lines carry the load, whilst B and D lines
