hy everyone can use them.","I respect people’s property and privacy and behave accordingly."],"correct":3,"exp":"Alpine huts, holiday chalets and surrounding land are private property even when their owners are absent. The flying-fee covers the launch site, not the entire mountain. Respecting privacy and not bringing flying neighbours into conflict is the only sustainable approach if you want the site to stay open in the long run.","sub":"Wildlife and nature awareness"},{"id":"Practical Flying_156","topic":"Practical Flying","text":"Which season is the most difficult for Chamois and Ibex, when a lot of them die?","options":["After the first snowfall when the animals must acclimatise to the cold and don't find food anymore.","At the end of the winter (March - April), when the snow still covers the grass and their fat reserves are exhausted.","In the middle of winter, when any movement in the deep snow is almost impossible.","During the rutting season, when the males constantly chase the females and none get enough nourishment."],"correct":1,"exp":"End-of-winter snow still covers the grass, while fat reserves accumulated in autumn are spent and the animals can't yet feed. March-April is when most chamois and ibex die - so they are also most fragile then. A flush at that point can finish an animal that would have made it through with just two more weeks.","sub":"Wildlife and nature awareness"},{"id":"Practical Flying_157","topic":"Practical Flying","text":"What do Chamois and Ibex do in the summer during the day?","options":["They graze the entire day on north facing slopes.","After grazing all morning they move to the shaded cliffs and wind exposed knolls above their pastures and rest.","They return to the cool mountain forests and rest.","They stay in the mountain forests and alternately eat and rest."],"correct":1,"exp":"Summer routine for chamois/ibex: graze the high pastures in the cool morning, then retreat to shaded cliffs and wind-exposed knolls above the pastures to rest through the hot midday. That's exactly where soaring paragliders go - the overlap is the source of the conflict.","sub":"Wildlife and nature awareness"},{"id":"Practical Flying_158","topic":"Practical Flying","text":"Chamois and Ibex are most bothered when pilots","options":["fly over lush green mountain pastures.","fly low over the mountain forest treetops, thereby flushing out the animals lying under the trees.","fly closely along mountain slopes and cliffs above the tree line in uninhabited areas.","call out and sing in the air, thereby scaring the animals."],"correct":2,"exp":"The worst disturbance is flying close along mountain slopes and cliffs above the tree line, in remote areas where humans rarely appear - exactly the terrain animals retreat to expecting safety. The unexpected airborne predator silhouette triggers flight, which costs energy and exposes them to snow patches/avalanches.","sub":"Wildlife and nature awareness"},{"id":"Practical Flying_159","topic":"Practical Flying","text":"Pilots can help to protect wild life most efficiently by","options":["following agreements between the clubs and gamekeepers.","turning away immediately, when they see fleeing wildlife.","warning wild animals by shouting loudly.","flying close to the ground so that the wild animals can see them."],"correct":0,"exp":"The most effective wildlife protection a single pilot can practice is to follow the negotiated agreements between clubs and gamekeepers - they already encode local seasonal sensitivities, no-fly zones and times. Reacting to fleeing animals is reactive, shouting is counterproductive and flying low is just more disturbance.","sub":"Wildlife and nature awareness"},{"id":"Practical Flying_160","topic":"Practical Flying","text":"On the landing site where I have just touched down, a helicopter rescue is about to occur. This has been communicated to me by other pilots calling out. How should I correctly behave?","options":["I pack my paraglider carefully and don’t move, so that the approaching pilot can clearly see me.","I leave my gear on the ground and move immediately out of the danger zone.","I leave the zone immediately with all my gear and make sure that, at a reasonable distance away, nothing will be blown away.","I weigh down my glider with my harness and rucksack to prevent an uncontrolled inflation."],"correct":2,"exp":"Helicopter rescues need the landing area completely clear. Pack up everything you've brought and walk out to a safe distance where wind/rotor wash can't catch your gear and send it through the rotor disc - that endangers the crew and the patient. Leaving gear behind risks it being lifted, which is worse than not moving at all.","sub":"Special-field landings, post-flight and first aid"},{"id":"Practical Flying_162","topic":"Practical Flying","text":"While flying over a large forest I have to deploy the reserve chute after a large collapse. I land uninjured in a large clearing in the forest. What should I do?","options":["I pack my glider and make my way home, leaving a note with my name, address and phone number in the clearing.","Pack the glider and reserve as quickly as possible so that hikers don’t get the idea that they need to call the emergency services or the police.","I wait in place for at least an hour in order to give my personal details to the rescuers upon their arrival.","I contact the REGA on 1414 as soon as possible to report my position and details of the incident, so as to avoid an unnecessary deployment of the emergency services."],"correct":3,"exp":"If anyone has seen your reserve descent and reported a likely crash, the Rega will already be coordinating a rescue you don't need. Calling Rega on 1414 with your position and 'unhurt' avoids a wasted, expensive, dangerous helicopter mission. Just packing up and going home leaves searchers continuing for hours.","sub":"Special-field landings, post-flight and first aid"},{"id":"Practical Flying_164","topic":"Practical Flying","text":"I am high above the valley during a valley crossing. Suddenly I hear a helicopter and see it approaching me head-on, at the same height and at a distance of about one kilometer. How should I behave?","options":["I enlarge my silhouette by pitching and rolling, or circling so that he can see and avoid me.","I call the REGA operations centre so that they can contact the helicopter pilot to make him aware of me.","I pull big ears to increase my sink rate so that we don’t cross at the same height, while turning 90° to avoid the helicopter.","I release the brakes in order to gain his attention by waving and shouting. If that doesn’t work I deploy the reserve chute."],"correct":0,"exp":"A paraglider silhouette against the valley is small and stationary; helicopter pilots scanning a wide field of view can easily miss you. The right reaction is to make yourself visible: small pitch or roll oscillations, or a tighter circle, change your silhouette and motion so the helicopter sees you. Phone calls take too long and big ears don't change visibility.","sub":"Traffic, collision avoidance and reserve use"},{"id":"Practical Flying_165","topic":"Practical Flying","text":"I am at the launch site and learn by radio that an accident has occurred at the landing site and a rescue helicopter has been deployed. How should I correctly behave?","options":["I take off and search immediately for a good thermal in order to make good use of the time until the helicopter has departed.","I delay my takeoff until the rescue is completed and the helicopter has left the area. I inform other pilots on launch about the incident and ask them to also wait.","I take off as quickly as possible in order to land before the rescue helicopter. I then help the rescue workers.","I take off and land on the field directly beside the official landing site. As long as its rotors aren’t turning I can land directly beside the helicopter."],"correct":1,"exp":"A rescue helicopter at the landing field means the field is closed. The right behaviour is to delay your take-off until the rescue completes and the helicopter is clear, and to broadcast the situation to other pilots on launch so nobody else accidentally tries to land into the rescue. Adding more aircraft to the situation - even 'to help' - just gets in the way.","sub":"Special-field landings, post-flight and first aid"},{"id":"Practical Flying_167","topic":"Practical Flying","text":"An approx. 6 x 6 metre red cloth with a diagonal yellow cross placed on the landing means","options":["A practical exam for flight instructor candidates is taking place. The cross is laid out because a very precise landing is required.","This marker signals the hunt for red and white deer. Within 5km of this marker one can expect shooting noise. There is no immediate danger for paragliding pilots. The signal is purely for information.","This marker is information for approaching helicopters and denotes a helipad, (outlanding site).","This marker signals a ban on landings for aircraft, regardless of whether they are fixed wing, helicopters, paragliders or hang gliders. Respect the landing ban and use an alternative landing site. If a rescue helicopter is approaching the landing ban marker should be removed temporarily so that it doesn’t get blown away by the heli’s downwash."],"correct":3,"exp":"The 6x6 m red cloth with a diagonal yellow cross is the standard ICAO landing-prohibited symbol. Placed on a landing field it tells every approaching aircraft - paragliders, deltas, helicopters and small fixed-wing - that landings are forbidden right now (typically because of an emergency, hazard or test). Find another field.","sub":"Special-field landings, post-flight and first aid"},{"id":"Practical Flying_168","topic":"Practical Flying","text":"Are local wildlife and forest protection zones to be observed by paragliding pilots?","options":["No. They are also not important for cross country pilots.","Yes, because failure to do so may jeopardize the flying site concerned.","Yes. Flying into these zones is illegal and will be punished.","No, these are purely voluntary agreements and non-compliance has no consequences."],"correct":1,"exp":"Wildlife and forest protection zones are not just polite suggestions - failure to respect them is the most common reason that flying sites are closed by the municipality or the cantonal authority. The whole pilot community then loses a launch. So 'yes, observe them' is the answer that protects your own flying future.","sub":"Wildlife and nature awareness"},{"id":"Weather_3","topic":"Weather","text":"In order to guarantee that all users of airspace have their altimeters set to the same altitude, the atmosphere has been standardised (ICAO standard atmosphere). What are the values for standard atmosphere in the region of the troposphere? (Sea level Pressure, Temperature and Temperature gradient)","options":["1013.25 hPa 15°C 1°C/100m","1013.25 hPa 15°C 0.65°C/100m","1033.65 hPa 15°C 0.5°C/100m","1033.65 hPa 15°C 1°C/100m"],"correct":1,"exp":"The ICAO standard atmosphere defines sea-level conditions as 1013.25 hPa, 15°C, with a temperature gradient of 0.65°C per 100 m (i.e. 6.5°C per 1000 m). These three numbers anchor every altimeter setting, density calculation and exam question — there is no rounding to 1°C/100 m and no 1033 hPa value.","sub":"Atmospheric basics and pressure"},{"id":"Weather_4","topic":"Weather","text":"The average altitude of the tropopause at our latitude is","options":["5'500m above sea level.","50'000m above sea level.","11'000m above sea level.","4'000m above sea level."],"correct":2,"exp":"At our latitudes (Europe) the tropopause sits at about 11 km above sea level — slightly thinner at the poles (~8 km) and thicker at the equator (~18 km), and a touch lower in winter when the cold troposphere shrinks. All weather and all paragliding happens beneath that boundary.","sub":"Atmospheric basics and pressure"},{"id":"Weather_5","topic":"Weather","text":"Air pressure is a result of","options":["gravity","the magnetic poles.","floating water and dust particles in the air.","the earth's rotation."],"correct":0,"exp":"Atmospheric pressure is simply the weight of the column of air above pressed down by gravity. That is why pressure is highest at sea level (longest air column) and decreases steadily with altitude — it has nothing to do with the magnetic poles, dust or Earth's rotation.","sub":"Atmospheric basics and pressure"},{"id":"Weather_6","topic":"Weather","text":"How does air pressure vary with increasing altitude?","options":["It reduces by half up to the tropopause and beyond that stays constant.","It reduces by half approximately every 5'500m.","It reduces by half approximately every 11'000m.","It reduces at approx. 80hPa per 100m in altitude."],"correct":1,"exp":"Pressure does not fall linearly: it halves every 5500 m. So 1013 hPa at sea level becomes about 500 hPa at 5500 m and roughly a quarter of sea-level pressure (~250 hPa) at 11000 m. The 80 hPa/100 m and the constant-above-tropopause options are wrong by a wide margin.","sub":"Atmospheric basics and pressure"},{"id":"Weather_8","topic":"Weather","text":"The pressure at sea level","options":["can in rare cases increase from the average.","varies above or below the average depending on the weather conditions.","is always constant.","can in rare cases reduce from the average."],"correct":1,"exp":"Sea-level pressure is never constant — weather systems continuously push it up (anticyclones, 1020–1040 hPa) or down (depressions, often 955–990 hPa). Barometers move both ways from the standard 1013 hPa value, depending entirely on the prevailing weather situation.","sub":"Atmospheric basics and pressure"},{"id":"Weather_13","topic":"Weather","text":"The temperature of air layers near the ground is primarily influenced by","options":["the relative humidity of the air.","the angle of the sun's radiation striking the air particles.","the ground temperature.","the sun's radiation striking air particles."],"correct":2,"exp":"The sun's rays pass through the atmosphere almost unimpeded and primarily heat the ground; the ground then warms the thin layer of air in contact with it by conduction and radiation. So near-surface air temperature is governed by ground temperature, not by direct solar radiation on the air particles themselves.","sub":"Temperature and adiabatic lapse rates"},{"id":"Weather_15","topic":"Weather","text":"At the same altitude above sea level","options":["warm air is denser than cold air.","warm air is less dense than cold air.","the air density is dependent on the adiabatic gradient.","warm air is the same density as cold air."],"correct":1,"exp":"At the same altitude, warm air is less dense (lighter) than cold air — that is exactly why hot-air balloons fly and why thermal bubbles rise. Density depends on temperature, not on the adiabatic lapse rate, and is certainly not the same for warm and cold parcels.","sub":"Temperature and adiabatic lapse rates"},{"id":"Weather_16","topic":"Weather","text":"How does the temperature of a bubble of air change as it leaves the ground and rises without creating a cloud?","options":["The temperature reduces at approx. 1°C /100m because the pressure reduces with increasing altitude.","No statement can be made about it, because the temperature is dependent on the weather conditions.","The temperature reduces at approx. 0.65°C /100m, as is the case in the entire troposphere.","The temperature rises at approx. 0.5°C /100m because the sun's radiation becomes more intense."],"correct":0,"exp":"A dry-adiabatic parcel that rises without condensing always cools at 1°C per 100 m. The reason is the pressure drop with altitude: as pressure decreases the parcel expands, and that expansion (without exchanging heat with the surroundings) dilutes its energy. The 0.65°C/100 m value applies only to the ambient (environmental) lapse rate, not to a rising bubble.","sub":"Temperature and adiabatic lapse rates"},{"id":"Weather_18","topic":"Weather","text":"How do the volume and temperature of a sinking air mass change?","options":["Its volume decreases, its temperature decreases.","Its volume increases, its temperature increases.","Its volume decreases, its temperature increases.","Its volume increases, its temperature decreases."],"correct":2,"exp":"A sinking air mass moves into higher pressure, so it is compressed: its volume decreases and the same energy is concentrated into a smaller space, raising its temperature. This is the mirror image of a rising parcel and is the mechanism behind Föhn warming on the lee side of mountains.","sub":"Temperature and adiabatic lapse rates"},{"id":"Weather_21","topic":"Weather","text":"On average the air temperature in the troposphere reduces with increasing altitude. However, it can occur that the temperature in a particular layer stays the same. What is this phenomenon called?","options":["Isotherm","Superadiabatic","Inversion","Restitution"],"correct":0,"exp":"When temperature stays the same across an entire layer (no decrease and no increase with altitude), it is called an \"isotherm\" or isothermal layer. Like an inversion, an isothermal layer also stops thermals because the rising bubble no longer has any buoyancy advantage over the ambient air.","sub":"Inversions, isotherms, and stability"},{"id":"Weather_23","topic":"Weather","text":"An inversion is an air layer in which the temperature","options":["is constant.","reduces with increasing altitude.","increases with increasing altitude.","is above freezing level."],"correct":2,"exp":"An inversion is, by definition, an air layer where temperature increases with increasing altitude. It is a \"reversal\" of the normal tropospheric pattern (where temperature decreases with height) and acts as a stable cap that blocks thermal development.","sub":"Inversions, isotherms, and stability"},{"id":"Weather_24","topic":"Weather","text":"An isotherm is an air layer in which the temperature","options":["is above freezing level.","reduces with increasing altitude.","increases with increasing altitude.","is constant."],"correct":3,"exp":"An isotherm is a layer in which the temperature remains constant with altitude — it neither falls nor rises. Like an inversion it is a stable layer that blocks thermals, even though the temperature is not reversed but just flat.","sub":"Inversions, isotherms, and stability"},{"id":"Weather_25","topic":"Weather","text":"Inversions and isotherms are","options":["unstable stratified elements of the troposphere.","barriers for thermal rising air masses.","origins and triggers of thermal rising air.","stable or unstable depending on temperature."],"correct":1,"exp":"Inversions and isothermal layers both act as a lid on thermal updrafts: the rising bubble loses its buoyancy advantage once it enters air that is not colder than itself. They are stable layers and therefore barriers to thermals — they neither trigger nor accelerate convection.","sub":"Inversions, isotherms, and stability"},{"id":"Weather_26","topic":"Weather","text":"The vertical temperature gradient is defined as","options":["the pressure difference per km between two different geographical points.","the unit of measurement of temperature, as the expression says; grad(ient).","the temperature difference per 100m change in altitude.","the altitude difference per °C in an air mass."],"correct":2,"exp":"The vertical temperature gradient is simply the difference in temperature per 100 m change in altitude. It is the standard meteorological measure of how quickly temperature changes with height through the troposphere (around 0.65°C/100 m on average, 1°C/100 m for a dry adiabat).","sub":"Temperature and adiabatic lapse rates"},{"id":"Weather_29","topic":"Weather","text":"Which of the following signs indicates the presence of an inversion?","options":["A cirrus cloud.","A fog layer.","A lenticular cloud.","A cumulonimbus cloud."],"correct":1,"exp":"A persistent ground-level fog or stratus layer is the textbook visible signature of an inversion in winter — radiation cooling trapped the cold, moist air below the warmer layer above. Cirrus, lenticulars and cumulonimbus all signal completely different processes (high humidity, mountain wave, convective storm).","sub":"Inversions, isotherms, and stability"},{"id":"Weather_33","topic":"Weather","text":"Which of the following changes of state defines condensation?","options":["Transformation from liquid to solid state.","Transformation from gaseous to solid state.","Transformation from gaseous to liquid state.","Transformation from liquid to gaseous state."],"correct":2,"exp":"Condensation is the phase change from gaseous water vapour to liquid water — the process that produces clouds, fog and dew. It releases latent heat into the surrounding air, which is why moist-adiabatic cooling is gentler than dry-adiabatic cooling.","sub":"Humidity, dew point, and phase changes"},{"id":"Weather_34","topic":"Weather","text":"Which of the following changes of state requires energy in the form of heat?","options":["Transformation from gaseous to liquid state.","Transformation from liquid to solid state.","Transformation from solid to liquid state.","Transformation from gaseous to solid state."],"correct":2,"exp":"Melting (solid → liquid) requires energy: the intermolecular bonds of ice must be broken by adding heat to free the water molecules. The other three transitions listed — vapour to liquid, liquid to solid, vapour to solid — all release energy, not absorb it.","sub":"Humidity, dew point, and phase changes"},{"id":"Weather_41","topic":"Weather","text":"What does the temperature gradient of saturated (humid), rising air particularly depend on?","options":["The relative humidity.","How much higher the temperature is than the surrounding air.","The intensity of the suns radiation.","The amount of water vapour that condenses."],"correct":3,"exp":"The moist-adiabatic lapse rate depends most strongly on how much water vapour actually condenses in the rising parcel. The more vapour condenses, the more latent heat is released, the warmer the parcel stays, and the smaller the temperature gradient. It is not driven by relative humidity, temperature offset from the surroundings or solar intensity.","sub":"Temperature and adiabatic lapse rates"},{"id":"Weather_43","topic":"Weather","text":"Which cloud form is an indicator of good thermals","options":["Cumulus","Stratus","Cirrus","Lenticular"],"correct":0,"exp":"Fluffy cumulus clouds are the visible signature of good thermal activity: each cumulus marks the top of a rising thermal column where moisture has condensed at the cloud base. Stratus = stable, cirrus = high ice, lenticular = strong wind aloft — none of them indicate thermals.","sub":"Cloud types and formation"},{"id":"Weather_44","topic":"Weather","text":"Altocumulus castellanus clouds two hours after sunrise are an indication of","options":["a large region of stability in the lower portion of the troposphere.","an approaching warm front.","an unstable layer at the height of the clouds.","the centre of a high-pressure system."],"correct":2,"exp":"Altocumulus castellanus — towered, castle-shaped mid-level clouds — appearing just a couple of hours after sunrise signal an unstable, humid layer at their altitude. They are the classic morning warning sign for afternoon thunderstorms because that mid-level instability will be amplified once the boundary layer fully heats.","sub":"Cloud types and formation"},{"id":"Weather_45","topic":"Weather","text":"Sunny weather at higher altitudes with low altitude fog at the same time is an indication of","options":["a high level of stability in the lower portion of the troposphere.","the centre of a low-pressure system.","an approaching cold front.","a low level of stability in the lower levels of the troposphere."],"correct":0,"exp":"Sunshine at altitude combined with low-altitude fog or stratus is the textbook signature of a strong, stable inversion in the lower troposphere — typically a winter anticyclone. The fog is trapped beneath the warm layer above, and the sky is blue from the mountain tops.","sub":"Cloud types and formation"},{"id":"Weather_48","topic":"Weather","text":"Cumulus cloudbase is","options":["the lower level of the cloud and is at the height where the temperature of the rising air reaches its dew point.","the upper level of the cloud and is at the height where the temperature of the rising air reaches that of the surrounding air.","the upper level of the cloud and is at the height where the temperature of the rising air reaches its dew point.","the lower level of the cloud and is the height where the temperature of the rising air reaches that of the surrounding air."],"correct":0,"exp":"Cumulus cloud base = the lower edge of the cloud, sitting at the altitude where the rising thermal first cools enough for its temperature to equal its dew point. Above this level condensation continues, building the cloud upward; below it the air remains too warm/dry to condense.","sub":"Cloud types and formation"},{"id":"Weather_49","topic":"Weather","text":"What is the name for a covered cloud layer with a base height of 4,000m above sea level?","options":["Altostratus","Nimbostratus","Altocumulus","Cirrostratus"],"correct":0,"exp":"A continuous cloud layer with a base at about 4000 m is classified as altostratus — \"alto-\" denotes the mid-level altitude band (3000–6000 m) and \"stratus\" the sheet-like, layered form. Nimbostratus is lower and rain-producing; altocumulus is patchy; cirrostratus sits much higher.","sub":"Cloud types and formation"},{"id":"Weather_50","topic":"Weather","text":"What is the name for small cloud clusters with a cloudbase of 4,500m above sea level?","options":["Cumulonimbus","Altostratus","Cirrocumulus","Altocumulus"],"correct":3,"exp":"Small patchy clouds with a base around 4500 m are altocumulus — \"alto-\" for the mid-level altitude band, \"cumulus\" for the heaped/puffy form. Cirrocumulus would be much higher (above 6000 m), altostratus is a sheet, cumulonimbus a towering storm cloud.","sub":"Cloud types and formation"},{"id":"Weather_52","topic":"Weather","text":"Which of the following cloud types has its cloud base much higher than the others?","options":["Cumulus","Cirrocumulus","Stratocumulus","Cumulonimbus"],"correct":1,"exp":"Cirrocumulus sits above 6000 m (often higher than 8 km), the highest base of the cumulus family and far above stratocumulus, cumulus or cumulonimbus — the others have bases under 3000 m or extend down to it. Cirro-clouds are also pure ice crystals at that altitude.","sub":"Cloud types and formation"},{"id":"Weather_54","topic":"Weather","text":"Which of the following cloud types causes rain?","options":["Nimbostratus","Stratocumulus","Cumulus humilis","Cirrostratus"],"correct":0,"exp":"Nimbostratus is the thick, rain-producing layer cloud — \"nimbo-\" means rain in cloud-naming. It is the classic precipitation cloud of warm fronts and well-established low-pressure systems. Stratocumulus, cumulus humilis and cirrostratus produce, at most, drizzle, no rain or only halos.","sub":"Cloud types and formation"},{"id":"Weather_57","topic":"Weather","text":"Which of the following cloud types is the most dangerous for paragliders and hang gliders in its vicinity?","options":["Cirrocumulus","Cumulus humilis","Cumulonimbus","Stratocumulus"],"correct":2,"exp":"Cumulonimbus is by far the most dangerous cloud type for paragliders and hang-gliders: vertical drafts of over 30 m/s, hail, lightning, gust fronts and even being sucked in to high altitude. Cirrocumulus, cumulus humilis and stratocumulus pose almost no threat by comparison.","sub":"Thunderstorms and convective hazards"},{"id":"Weather_58","topic":"Weather","text":"Lenticular clouds can develop when","options":["large scale lifting of unstable surface air suddenly occurs.","thermals cause a föhn effect.","strong thermals rise at the saturated adiabatic lapse rate.","an air mass flows over mountainous terrain at a certain speeds."],"correct":3,"exp":"Lenticular (lens-shaped) clouds develop when a moist air mass flows over a mountain ridge at a sufficient speed and gets pushed into a standing wave. They form at the wave crests where the rising air condenses, and dissolve again as the air descends — which is why they look stationary in a strong wind.","sub":"Cloud types and formation"},{"id":"Weather_60","topic":"Weather","text":"Which of the following is a sign visible from afar, that a culumus congestus or cumulonimbus cloud is creating precipitation?","options":["A grey curtain hanging from cloudbase towards the ground.","The vertical extent of the cloud is greater than the horizontal extent.","Fog rising upwards between the ground and cloudbase.","The cloudbase is black in colour."],"correct":0,"exp":"A grey curtain hanging from the cloud base toward the ground is the textbook far-visible sign that a cumulus congestus or cumulonimbus is precipitating — the vertical streaks of rain or hail are unmistakable from kilometres away. Vertical extent, dark colour or rising fog are not specific precipitation indicators.","sub":"Thunderstorms and convective hazards"},{"id":"Weather_62","topic":"Weather","text":"Which of the following statements is false","options":["Cumulonimbus clouds can produce hail stones as large as a fist.","Cumulus congestus and cumulonimbus clouds can, through evaporation, produce cold air pockets which can fall to the ground at high speed in the area surrounding the cloud.","Cumulus congestus and cumulonimbus clouds always result in hail to ground level.","Cumulus congestus and cumulonimbus clouds can produce up- and downdrafts with peak gusts over 30 m/s."],"correct":2,"exp":"Cumulus congestus and cumulonimbus clouds frequently produce hail aloft, but the hail does not always reach the ground — small hailstones may melt in warmer layers below. The other statements (hail as large as a fist, evaporative downdrafts, 30 m/s gusts) are all true for big storm cells.","sub":"Cloud types and formation"},{"id":"Weather_66","topic":"Weather","text":"In Europe, the atmospheric pressure at sea level of an extensive low-pressure system could be","options":["1,055 hPa","915 hPa","955 hPa","1,035 hPa"],"correct":2,"exp":"An extensive low-pressure system at European latitudes typically reads around 955 hPa at its centre — pronounced but not record-breaking. 1035 hPa is a strong high, 915 hPa would be a record-deep cyclone, and 1055 hPa is essentially unheard of in extra-tropical Europe.","sub":"Pressure systems and isobars"},{"id":"Weather_67","topic":"Weather","text":"In Europe, the atmospheric pressure at sea level of an extensive high-pressure system could be","options":["1,035 hPa","915 hPa","955 hPa","1,055 hPa"],"correct":0,"exp":"A typical pronounced European anticyclone tops out around 1035 hPa at sea level; in winter, with cold dense air, it can reach 1040 hPa. 1055 hPa is essentially unheard of, while 915 and 955 hPa describe deep lows, not highs.","sub":"Pressure systems and isobars"},{"id":"Weather_69","topic":"Weather","text":"In a high-pressure-system in the northern hemisphere","options":["the air masses turn in an anticlockwise direction around their centre and rise over a large area.","the air masses turn in an anticlockwise direction around their centre and sink over a large area.","the air masses turn in a clockwise direction around their centre and sink over a large area.","the air masses turn in a clockwise direction around their centre and rise over a large area."],"correct":2,"exp":"In a northern-hemisphere high (anticyclone), surface air spirals clockwise around the centre, sinks over a large area and warms by compression — this subsidence is what gives anticyclones their famously clear, dry weather. Anticlockwise belongs to lows in this hemisphere, and rising air belongs to lows.","sub":"Pressure systems and isobars"},{"id":"Weather_70","topic":"Weather","text":"An isobar is a line connecting points","options":["of equal pressure reduced to sea level.","of equal height with a pressure of 500 hPa.","with the highest pressure change.","of equal temperature reduced to sea level."],"correct":0,"exp":"An isobar is a contour line on a surface chart connecting points of equal atmospheric pressure, reduced to mean sea level so that high and low altitudes can be compared on the same map. Iso = equal, bar = pressure; not equal temperature, not constant 500 hPa, not the steepest gradient.","sub":"Pressure systems and isobars"},{"id":"Weather_72","topic":"Weather","text":"Surface winds blow over flatlands","options":["roughly parallel to the isobars from the centre of a low to the centre of a high-pressure system.","roughly parallel to the isobars from the centre of a high to the centre of a low-pressure system.","in a direct path from a from the centre of a low to the centre of a high-pressure system.","in a direct path from the centre of a high to the centre of a low-pressure system."],"correct":1,"exp":"Surface winds in flat terrain blow roughly parallel to the isobars, flowing from the centre of a high toward the centre of a low (the air mass is equalising pressure, but the Coriolis force deflects it so it travels along the isobars rather than straight across them). A direct path or the opposite direction would ignore the Coriolis effect.","sub":"Pressure systems and isobars"},{"id":"Weather_73","topic":"Weather","text":"When the distance between isobars is small","options":["there is a flat pressure gradient and likelihood of light winds.","there is a steep pressure gradient and likelihood of strong winds.","there is a steep pressure gradient and likelihood of light winds.","there is a flat pressure gradient and likelihood of strong winds."],"correct":1,"exp":"When isobars are squeezed close together the pressure gradient is steep (a lot of hPa change over little distance) — and that drives a strong wind, exactly as a steep slope makes water flow fast. Far-apart isobars = weak gradient = light wind.","sub":"Pressure systems and isobars"},{"id":"Weather_74","topic":"Weather","text":"When the distance between isobars is large","options":["there is a flat pressure gradient and likelihood of light winds.","there is a steep pressure gradient and likelihood of strong winds.","there is a flat pressure gradient and likelihood of strong winds.","there is a steep pressure gradient and likelihood of light winds"],"correct":0,"exp":"When isobars are spread far apart, the pressure gradient is flat (very few hPa per hundred kilometres) and the surface wind is light — there is little \"push\" to equalise the pressure. Steep gradients with strong winds need the lines packed tightly together.","sub":"Pressure systems and isobars"},{"id":"Weather_75","topic":"Weather","text":"Thermal updrafts develop best","options":["where there is a steep pressure gradient, and new cold air is continuously being blown in across a heated surface, eliminating the need for the thermal updrafts to sink again.","in the centre of a high-pressure system where, because of the cloudless skies, the sun's radiation is the most intense.","in the centre of a low-pressure system, where the air masses have a tendency to rise under the influence of the system.","in an area with a flat pressure gradient, where the air can be heated without disturbance from wind, and no subsidence (subsidence Inversion) exists to block the heated air from rising."],"correct":3,"exp":"Thermal updrafts develop best in an area of flat pressure gradient (light winds — no mixing-out of the surface bubble) without subsidence inversion (so the rising warm air is not blocked aloft). High-pressure centres usually have a subsidence inversion that caps thermals, low-pressure centres bring weather, and strong gradients mean strong wind, not steady thermals.","sub":"Thermals and favourable conditions"},{"id":"Weather_76","topic":"Weather","text":"A wind from direction 135° is","options":["a northeast wind","a southwest wind","a northwest wind","a southeast wind"],"correct":3,"exp":"Winds are named by the direction they come FROM, not where they head to. 135° on the compass rose is the southeast quadrant (between 90° = east and 180° = south), so a wind from 135° is a southeast wind. Northeast is 045°, northwest 315°, southwest 225°.","sub":"Wind direction, speed, and surface-layer effects"},{"id":"Weather_77","topic":"Weather","text":"A wind from northwest direction comes from an angle of","options":["045°","225°","315°","135°"],"correct":2,"exp":"A northwest wind comes from 315° on the compass rose — halfway between north (000°/360°) and west (270°). 045° would be northeast, 135° southeast and 225° southwest.","sub":"Wind direction, speed, and surface-layer effects"},{"id":"Weather_78","topic":"Weather","text":"A wind with a strength of 25 kt blows with about","options":["25 km/h","35 km/h","45 km/h","15 km/h"],"correct":2,"exp":"Conversion shortcut: knots × 2 − 10% ≈ km/h. So 25 kt × 2 = 50 km/h, minus 10% (5 km/h) = 45 km/h. That is also why the popular Beaufort cut-offs (15 kt ≈ 27 km/h, 20 kt ≈ 36 km/h) come out so clean.","sub":"Wind direction, speed, and surface-layer effects"},{"id":"Weather_79","topic":"Weather","text":"A wind from 270° / 10kt is","options":["an west wind with a velocity of approx. 18 km/h.","an east wind with a velocity of approx. 10 km/h.","an west wind with a velocity of approx. 10 km/h.","an east wind with a velocity of approx. 18 km/h."],"correct":0,"exp":"270° on the compass rose is due west, so a wind from 270° is a west wind. Speed: 10 kt × 2 − 10% = 20 − 2 = 18 km/h. East would be 090°, and a 10 kt wind is 18 km/h not 10 km/h.","sub":"Wind direction, speed, and surface-layer effects"},{"id":"Weather_82","topic":"Weather","text":"When comparing surface wind to wind at 300m AGL in flat terrain, the surface wind is generally","options":["stronger and more turbulent.","stronger and less turbulent.","weaker and less turbulent.","weaker and more turbulent."],"correct":3,"exp":"In flat terrain the surface wind is weaker than the wind at 300 m AGL (ground friction slows it) and at the same time more turbulent (the same friction breaks the flow into eddies). Aloft the wind is faster and smoother — the classic wind gradient profile.","sub":"Wind direction, speed, and surface-layer effects"},{"id":"Weather_83","topic":"Weather","text":"When comparing surface wind to wind at 300m AGL in flat terrain, the wind at 300m altitude is generally","options":["stronger and more turbulent.","weaker and less turbulent.","weaker and more turbulent.","stronger and less turbulent."],"correct":3,"exp":"Conversely, at 300 m AGL in flat terrain the wind is stronger (no friction with the ground) and more laminar (less mechanical mixing) than at the surface. This is the wind gradient pilots feel on every flight: smoother and quicker as you climb away from the ground.","sub":"Wind direction, speed, and surface-layer effects"},{"id":"Weather_86","topic":"Weather","text":"When there is valley wind, thermal updrafts are found","options":["generally in the middle of the valley.","generally in the upper area of the valley sides.","neither in the middle of the valley or the upper area of the valley sides.","in the middle of the valley as well as in the upper area of the valley sides."],"correct":1,"exp":"Under a developed valley wind, thermals concentrate in the upper area of the valley sides — the slopes facing the sun heat strongly, lift slope thermals, and the rising warm air feeds the wind that climbs up the valley. The valley centre is mostly downflow/return air, not lift.","sub":"Valley and mountain winds in the Alps"},{"id":"Weather_87","topic":"Weather","text":"When there is mountain wind, thermal updrafts are found","options":["generally in the upper area of the valley sides.","in the middle of the valley as well as in the upper area of the valley sides.","generally in the middle of the valley.","neither in the middle of the valley or the upper area of the valley sides."],"correct":2,"exp":"When the mountain wind takes over at night, the cold drainage flow runs down the valley slopes and the only remaining lift is the slightly warmer air in the middle of the valley being pushed upward — restitution lift. That is why nighttime thermals are usually centred on the valley axis, not on the cold slopes.","sub":"Valley and mountain winds in the Alps"},{"id":"Weather_89","topic":"Weather","text":"The mountain wind occurs because the air","options":["cools quicker in the mountains than in the valley when the sun's radiation weakens.","warms up faster in the valley than in the mountains during the day.","cools quicker in the valley than in the mountains when the sun's radiation weakens.","warms up faster in the mountains than in the valley during the day."],"correct":0,"exp":"Mountain (katabatic) wind sets in because mountain slopes lose heat by radiation faster than the broad valley floor when the sun weakens — the cold, dense air on the slopes runs downhill into the warmer main valley. The opposite happens during the day (slopes warm faster), driving the valley wind.","sub":"Valley and mountain winds in the Alps"},{"id":"Weather_90","topic":"Weather","text":"From which time in the Alps in summer is there a likelihood of valley wind?","options":["About 11:00 am","About 08:00 am","About 18:00 pm","About 22:00 pm"],"correct":0,"exp":"In summer in the Alps, the valley wind starts to set in around 11:00 once the sun has warmed the slopes enough to drive the upslope flow; it peaks mid-afternoon around 15:00. At 08:00 the system is too cold and at 18:00–22:00 it has already reversed into the mountain wind.","sub":"Valley and mountain winds in the Alps"},{"id":"Weather_91","topic":"Weather","text":"From which time in the Alps in summer is there a likelihood of mountain wind?","options":["About 08:00 am","About 22:00 pm","About 18:00 pm","About 11:00 am"],"correct":2,"exp":"In summer in the Alps, the mountain wind starts to set in around 18:00 — the sun is fading, the high slopes cool fastest and the cold drainage begins. By 22:00 it is fully established and by 11:00 the next morning it has reversed back to the valley wind.","sub":"Valley and mountain winds in the Alps"},{"id":"Weather_93","topic":"Weather","text":"Which of the following statements is correct?","options":["The valley wind blows at 50m above ground with the same strength as at 800m above ground.","The valley wind is weak close to the ground and increases continuously with increasing altitude.","The valley wind is strongest about 500m above ground and reduces above and below this level.","The valley wind increases with decreasing altitude."],"correct":3,"exp":"The valley wind increases with decreasing altitude — it is strongest right on the valley floor where the cross-section is narrowed and the flow concentrates, and it gradually fades with height, typically disappearing around 2000 m where the prevailing wind takes over. At 800 m above ground it is already much weaker than at 50 m.","sub":"Valley and mountain winds in the Alps"},{"id":"Weather_94","topic":"Weather","text":"Under which of the following conditions is a valley wind most likely in alpine valleys?","options":["30 August, 15:00pm, 3/8 to 5/8 cumulus.","30 December, 14:00pm, cloudless sky.","30 July, 14:00pm, overcast sky.","30 June, 20:00pm, cloudless sky."],"correct":0,"exp":"A late-summer afternoon (30 August, 15:00) with 3/8 to 5/8 cumulus is the textbook valley-wind situation: good solar heating, plenty of thermal activity, sun-driven slope heating — all the ingredients are present. Cloudless December at 14:00 is too weak, overcast or 20:00 in June miss the heating, and so on.","sub":"Valley and mountain winds in the Alps"},{"id":"Weather_95","topic":"Weather","text":"The term \"mechanical turbulence\" describes in meteorological terms the movement of air which occurs when","options":["two neighbouring air masses moving in different directions or with different speeds rub against each other.","an airmass moving close to the ground is disturbed by the terrain, as well as obstacles such as houses, trees, etc.","warm air bubbles release from the ground and rise.","technical equipment such as aircraft move forward in the air."],"correct":1,"exp":"Mechanical turbulence is generated when air moving close to the ground is forced around solid obstacles — trees, houses, ridges, mountains. The flow breaks into eddies on the leeward side of each obstacle, which is why landing zones behind buildings or behind a ridge get bumpy.","sub":"Mechanical, shear, and thermal turbulence"},{"id":"Weather_96","topic":"Weather","text":"The term \"shear turbulence\" describes in meteorological terms the movement of air which occurs when","options":["two neighbouring air masses moving in different directions or with different speeds rub against each other.","an airmass moving close to the ground is disturbed by the terrain, as well as obstacles such as houses, trees, etc.","warm air bubbles release from the ground and rise.","an airflow which is separated into shear layers by an obstacle."],"correct":0,"exp":"Shear turbulence occurs at the boundary between two air masses moving in different directions or at different speeds: they rub against each other and the friction breaks the flow into eddies. Mechanical turbulence is obstacle-driven, thermal turbulence is buoyancy-driven, and \"shear layers from an obstacle\" is mostly mechanical.","sub":"Mechanical, shear, and thermal turbulence"},{"id":"Weather_97","topic":"Weather","text":"The term \"thermal turbulence\" describes in meteorological terms the movement of air which occurs when","options":["an airmass moving close to the ground is disturbed by the terrain, as well obstacles such as as houses, trees, etc.","warm air bubbles release from the ground and rise.","two neighbouring air masses rubbing against each other heat up and therefore rise.","two neighbouring air masses moving in different directions or with different speeds rub against each other."],"correct":1,"exp":"Thermal turbulence is generated when warm air bubbles release from the ground and rise — the climbing column is surrounded by sink at its edges, creating the characteristic bumpy edge of every thermal. Mechanical and shear turbulence have different origins (obstacles, wind shear).","sub":"Mechanical, shear, and thermal turbulence"},{"id":"Weather_100","topic":"Weather","text":"In alpine valleys with pronounced valley wind systems, what type of turbulence is to be expected on a south-facing slope at 2,800m above sea level on a summer's day at 13:00?","options":["Windward side turbulence.","Shear turbulence.","Mechanical turbulence.","Thermic turbulence."],"correct":3,"exp":"On a summer afternoon at 13:00, a sun-baked south-facing slope at 2800 m AGL is a thermal factory — the rising columns of warm air over the slope are the dominant turbulence source there. Mechanical and shear effects are present but much weaker than the buoyant thermal activity at that time and place.","sub":"Mechanical, shear, and thermal turbulence"},{"id":"Weather_101","topic":"Weather","text":"At which time of the day in alpine valleys with pronounced valley wind systems in good weather in July, can the least turbulence be expected?","options":["About 9:00","About 18:00","About 11:00","About 13:00"],"correct":0,"exp":"In mid-summer in an alpine valley, the calmest, smoothest air is in the early morning around 09:00 — the night inversion is still in place, the valley wind has not started, and thermals have barely begun. By 11:00 thermals kick in, 15:00 is peak turbulence, and 18:00 brings the mountain wind transition.","sub":"Mechanical, shear, and thermal turbulence"},{"id":"Weather_102","topic":"Weather","text":"At which time of the day in alpine valleys with pronounced valley wind systems in good weather in July, can the strongest turbulence be expected?","options":["About 15:00","About 9:00","About 19:00","About 12:00"],"correct":0,"exp":"In an alpine valley in summer, turbulence peaks in mid-afternoon around 15:00 — that is when thermals are strongest, the valley wind is at its peak (often 30–60 km/h on the floor) and shear plus mechanical effects pile on top. 09:00 is still calm, 12:00 building, 19:00 already calming as the mountain wind sets in.","sub":"Mechanical, shear, and thermal turbulence"},{"id":"Weather_103","topic":"Weather","text":"At which time of the day in alpine valleys with pronounced valley wind systems in good weather in July, should one expect more thermal and less mechanical and shear turbulence?","options":["About 9:00","About 11:00","About 18:00","About 15:00"],"correct":1,"exp":"Around 11:00 the day is heating up but the strong valley wind has not yet fully kicked in — thermals are present but mechanical and shear turbulence (from the still-weak valley flow) are minimal. By 15:00 the valley wind is hammering and shear/mechanical effects dominate the bumpiness; 09:00 has no thermals yet; 18:00 the wind has shifted.","sub":"Mechanical, shear, and thermal turbulence"},{"id":"Weather_104","topic":"Weather","text":"In meteorology what is meant by an \"air mass\"?","options":["The specific weight per cubic meter at 15°C at sea level at the equator.","A body of air having uniform characteristics.","An area with a higher air concentration in the centre of a high.","A part of the atmosphere with the same air density."],"correct":1,"exp":"In meteorology an \"air mass\" is a body of air with uniform characteristics — temperature, humidity, pressure — over a large horizontal area (often continental-scale). Mass per cubic metre at a specific reference, density-uniform air, or a concentration centre describe other concepts.","sub":"Air masses and fronts"},{"id":"Weather_110","topic":"Weather","text":"What could the weather typically look like an hour before the arrival of a warm front?","options":["The sky is covered with 5/8 of cumulus, strong gusty wind, strong thermals with strong sink around them.","Clouds cover the mountains in the distance, cumulus and lenticular clouds in the blue portion of the sky, changing wind direction on the ground, freshening southwest wind at launch.","Blue sky, no wind, not much turbulence, steady lift at takeoff, smooth, widespread lift, cumulus congestus and cumulonimbus in the distance.","Poor visibility, low cloud base, rain, steady wind."],"correct":3,"exp":"The hour before a warm front arrives at the ground typically brings poor visibility, a low cloud base, steady rain or drizzle from the dense nimbostratus deck, and a steady increasing wind — not gusty cumulus weather and not a clear, calm break. The other options describe pre-cold-front or general fair-weather conditions.","sub":"Air masses and fronts"},{"id":"Weather_112","topic":"Weather","text":"With which of the following weather conditions should one most likely expect south föhn in the alpine valleys?","options":["Switzerland is in a warm sector, with a cold front approaching the Jura.","The cirrostratus clouds of an approaching warm front begin to cover the sky above Switzerland.","A high altitude south west airflow brings warm air to the Alps above a \"Bise\" (cool northeast wind) flow at lower levels.","Switzerland is behind a cold front, and moderately humid, cold air approaches the Alps from the northwest."],"correct":0,"exp":"South Föhn in the alpine valleys is most likely when Switzerland sits in the warm sector of a depression with a cold front approaching the Jura — pressure builds south of the Alps, drops north, and the south-to-north pressure difference drives air over the ridges. Cirrostratus advance, southwest aloft over Bise below or post-cold-front patterns don't produce that specific south-to-north pressure gradient.","sub":"Foehn winds"},{"id":"Weather_114","topic":"Weather","text":"Which conditions favor the development of föhn in alpine valleys?","options":["A large pressure difference between the north and south sides of the Alps.","An extensive high-pressure system with its center above the Alps.","A small pressure difference between the north and south sides of the Alps.","An extensive low-pressure system with its center above the Alps."],"correct":0,"exp":"Föhn requires a strong pressure difference between the north and south sides of the Alps — typically more than 4 hPa across Zurich-Lugano. The greater the difference, the more violently air is forced over the ridges. A small difference cannot drive Föhn, and a high or low centred directly over the Alps eliminates the cross-Alps gradient entirely.","sub":"Foehn winds"},{"id":"Weather_116","topic":"Weather","text":"An occlusion occurs when","options":["a warm front overtakes a cold front at altitude.","a cold front overtakes a warm front at ground level.","a cold front overtakes a warm front at altitude.","a warm front overtakes a cold front at ground level."],"correct":1,"exp":"An occlusion forms when the faster cold front catches up with the slower warm front at ground level and pinches the warm sector aloft. Mechanically it is always the cold front at ground level overtaking the warm front there — high-altitude overtaking or the reverse pattern is not what defines an occlusion.","sub":"Air masses and fronts"},{"id":"Weather_117","topic":"Weather","text":"An occlusion has","options":["harmless characteristics of a warm and cold front as both neutralise each other.","the weather characteristics of either a warm or a cold front, depending on the temperature of the inflowing cold air.","the weather characteristics of a cold front.","the weather characteristics of a warm front."],"correct":1,"exp":"An occluded front carries the weather characteristics of either a warm front or a cold front depending on whether the cold air behind the cold front is warmer or colder than the cold air ahead of the warm front — that comparison sets which front is at the surface and therefore what observers experience.","sub":"Air masses and fronts"},{"id":"Weather_119","topic":"Weather","text":"What does the following drawing represent?","options":["A cold front.","An occlusion with the characteristics of a cold front.","An occlusion with the characteristics of a warm front.","A warm front."],"correct":2,"img":"assets/shv_images/weather_119.jpg","exp":"This sketch shows an occlusion with warm-front character — the warm-front dividing line is the one that reaches the ground, meaning the cold air behind the system is warmer than the cold air ahead of it. Surface weather looks like a warm front (steady rain, layered clouds), with cold-front clouds hidden above.","sub":"Synoptic chart reading and forecasting"},{"id":"Weather_120","topic":"Weather","text":"What does the following drawing represent?","options":["An occlusion with the characteristics of a cold front.","A cold front.","An occlusion with the characteristics of a warm front.","A warm front."],"correct":3,"img":"assets/shv_images/weather_120.jpg","exp":"This cross-section shows the wedge of warm air gently sliding up over the retreating cold air — the slowly-rising slope and high-to-low cloud sequence above are the hallmarks of a classic warm front (cirrus → cirrostratus → altostratus → nimbostratus).","sub":"Synoptic chart reading and forecasting"},{"id":"Weather_121","topic":"Weather","text":"What does the following drawing represent?","options":["An occlusion with the characteristics of a cold front.","An occlusion with the characteristics of a warm front.","A cold front.","A warm front."],"correct":0,"img":"assets/shv_images/weather_121.jpg","exp":"This cross-section shows the teardrop of cold dense air pushing in under the warm air and shoving it abruptly upward — the steep frontal slope and barrier-style cumulonimbus tower above are the signature of a cold front, not a warm front or an occlusion.","sub":"Synoptic chart reading and forecasting"},{"id":"Weather_122","topic":"Weather","text":"the formation of cumulonimbus and therefore thunderstorms before the arrival of a front is most likely with","options":["cold fronts in August.","warm fronts in August.","cold fronts in January.","warm fronts in January."],"correct":0,"exp":"Frontal cumulonimbus and thunderstorms are most likely with a cold front in August: in summer the lower atmosphere is hot and humid, so the abrupt cold-front uplift of warm moist air triggers the most violent storms. Warm fronts in any season have gentle uplift, and January cold fronts lack the warm sector's heat and humidity.","sub":"Thunderstorms and convective hazards"},{"id":"Weather_123","topic":"Weather","text":"Hot and humid air lies over Switzerland. The forecast predicts the arrival of a cold polar air mass from the northwest during the day. What type of weather can one expect for this day?","options":["Continuous cooling of the warm humid air and gradual onset of precipitation.","Frontal thunderstorms bringing hail and strong gusty winds.","Very favourable conditions for thermal and distance flying due to the cold air being rapidly heated closed to the ground.","The arriving cold air will stabilise the atmosphere, making thermal flights impossible for quite a while."],"correct":1,"exp":"When hot humid air sits over Switzerland and cold polar air is forecast to push in from the northwest, the textbook outcome is a violent cold-front passage with frontal thunderstorms, hail and strong gusty winds — the rapidly-rising warm humid air feeds powerful cumulonimbus along the front. Continuous gentle cooling or stable post-frontal conditions don't fit this synoptic setup.","sub":"Air masses and fronts"},{"id":"Weather_124","topic":"Weather","text":"At what time of day are thermal (local) thunderstorms most likely?","options":["The time of day has no influence on thermal (local) thunderstorms.","Shortly after midday.","Mornings.","Late afternoon."],"correct":3,"exp":"Thermal (local) thunderstorms develop late in the afternoon, after hours of solar heating have built deep cumulus towers into mature cumulonimbus. Mornings are far too cool and only just-after-noon is rarely warm enough; \"no time-of-day effect\" applies only to frontal storms.","sub":"Thunderstorms and convective hazards"},{"id":"Weather_125","topic":"Weather","text":"At what time of day are frontal thunderstorms most likely?","options":["The time of day has no influence on frontal thunderstorms.","15:00","10:00","20:00"],"correct":0,"exp":"Frontal thunderstorms can occur at any time of day or night — they are driven by the dynamic uplift of warm air at the front, not by solar heating. So time of day has no influence on frontal storms, unlike thermal/local storms which peak in late afternoon.","sub":"Thunderstorms and convective hazards"},{"id":"Weather_126","topic":"Weather","text":"What wind would one expect over the Swiss plateau (between the Alps and the Jura mountains) when Switzerland is situated on the edge of an extensive high whose centre is located above northern Germany?","options":["Northwest wind","Bise","West wind","South Föhn"],"correct":1,"exp":"A high centred over northern Germany sets up Bise: surface winds wrap clockwise around the high, so on the Swiss plateau the flow comes from the northeast. Northwest wind, west wind or south Föhn require different synoptic setups.","sub":"Synoptic chart reading and forecasting"},{"id":"Weather_127","topic":"Weather","text":"What wind would one expect in the Alps in Switzerland when the Azores high pressure system starts to extend towards central Europe?","options":["West wind","South Föhn","Northwest wind","Bise"],"correct":2,"exp":"When the Azores high extends towards central Europe, the clockwise circulation on its northern flank pushes air across the Alps from the northwest. That gives Switzerland a northwest wind — not a westerly, not Bise, and not Föhn.","sub":"Synoptic chart reading and forecasting"},{"id":"Weather_129","topic":"Weather","text":"Which of the following weather conditions would most favour the development of high reaching thermals in the Alps?","options":["An extensive high-pressure system centred over northern Germany.","An extensive low-pressure system centred over the gulf of Genoa.","A weak high-pressure system centred over the Alps.","The Azores high-pressure system extends towards central Europe."],"correct":2,"exp":"High-reaching alpine thermals develop best under a weak high-pressure system centred over the Alps — pressure difference is small (so wind stays light), the air column is dry enough to allow strong heating, and the temperature gradient becomes steep enough for deep convection. A strong high suppresses convection, a low over Genoa brings unstable wet weather, and the Azores ridge pushes in wind.","sub":"Thermals and favourable conditions"},{"id":"Weather_130","topic":"Weather","text":"In general what conditions cause an inversion at ground level?","options":["The heating of the air layers close to the ground during the course of the day.","The nightly radiation of heat from the ground when there are clear skies.","Incoming continental air masses in the air layers close to the ground.","Sinking air warming at the unsaturated (dry) adiabatic lapse rate in front of and in the centre of a high-pressure system."],"correct":1,"exp":"A ground-level inversion forms classically when the sky is clear at night: the ground radiates heat away into space, the air in contact with it cools below the temperature of the air a few hundred metres above, and a stable, cold layer sets up. Daytime heating, advection or anticyclonic subsidence don't create the same near-surface temperature reversal.","sub":"Inversions, isotherms, and stability"},{"id":"Weather_132","topic":"Weather","text":"What are the best conditions for the creation of good thermals over a given area?","options":["High angle of incidence of the sun's rays, strong reflection.","Low angle of incidence of the sun's rays, strong reflection.","High angle of incidence of the sun's rays, weak reflection.","Low angle of incidence of the sun's rays, weak reflection."],"correct":2,"exp":"The best thermals develop where the sun's rays strike the ground at a high (near-perpendicular) angle and reflection is weak (dark, dry surface like a ploughed field) — so the maximum solar energy goes into heating the soil. Low sun angles or reflective surfaces (snow, water) waste the energy.","sub":"Thermals and favourable conditions"},{"id":"Weather_133","topic":"Weather","text":"What are the best conditions for the creation of good thermals over a given area?","options":["Wind exposed and moist.","Wind exposed and dry.","Wind protected and moist.","Wind protected and dry."],"correct":3,"exp":"Good thermals form best over ground that is wind-protected (so the warm surface pocket can build up without being blown away) and dry (no energy wasted on evaporation). A wind-exposed or moist surface lets either the wind or the latent-heat draw of evaporation kill the thermal before it triggers.","sub":"Thermals and favourable conditions"},{"id":"Weather_136","topic":"Weather","text":"The term \"lee thermal\" means","options":["The downwash on the wind protected side of a thermal rising air masse.","Thermal rising air in the lee side of other thermal rising air.","The rising air created by rotor turbulence on the wind protected side of a mountain.","Thermal rising air which forms on the wind protected side of a mountain."],"correct":3,"exp":"A \"lee thermal\" forms on the wind-protected (lee) side of a mountain. The wind-sheltered slope lets warm air build up there for longer than on a wind-swept windward face, so the thermal that does release tends to be stronger — but also more turbulent because of the lee rotor.","sub":"Thermals and favourable conditions"},{"id":"Weather_139","topic":"Weather","text":"One should expect blue thermals when","options":["the temperature - dew point difference of the rising air mass is so great that the dew point is not reached.","the thermal rising air originates not from the ground but from a higher lying air layer.","the ground cools so much during the night that it's colder than a neighbouring water body.","the atmospheric layering is so stable that air does not rise thermally."],"correct":0,"exp":"Blue thermals occur specifically when the temperature–dew-point spread of the rising air is so large that the dew point is never reached during the climb — no condensation, no cumulus. Origin from higher layers, cooling water bodies or stable stratification describe other conditions entirely.","sub":"Thermals and favourable conditions"},{"id":"Weather_140","topic":"Weather","text":"The term \"restitution lift\" means","options":["thermal rising air masses in the middle of the valley after the onset of the mountain (katabatic) breeze.","sinking air masses next to thermal rising air masses.","temperature related downdrafts.","sinking air masses which descend during the day above cold surfaces such as glaciers and lakes."],"correct":0,"exp":"\"Restitution lift\" is the gentle thermal updraft that forms in the middle of the valley after the katabatic mountain wind has set in — the slightly warmer valley-floor air is squeezed upward by the cold drainage flow on either side, producing a soft, often nighttime lift on the valley axis.","sub":"Thermals and favourable conditions"},{"id":"Weather_144","topic":"Weather","text":"This symbol on a weather map defines","options":["a warm front.","an isobar.","an occlusion.","a cold front."],"correct":2,"img":"assets/shv_images/weather_144.jpg","exp":"A symbol combining both semicircles and triangles on the same line — typically purple in colour — is the meteorological pictogram for an occluded front, where the cold front has overtaken the warm front and the two air-mass boundaries have merged.","sub":"Synoptic chart reading and forecasting"},{"id":"Weather_145","topic":"Weather","text":"Where is the centre of the low-pressure system?","options":["Near Tunis","Over the Bay of Biscay (Golf von Biskaya)","Near Lulea","Near Stockholm"],"correct":2,"img":"assets/shv_images/weather_145.jpg","exp":"On Figure M32 the centre of the depression lies just south of Lulea (Sweden), where the isobars circle around a value near 975 hPa — the lowest pressure on the chart. Stockholm and the Bay of Biscay are nowhere near a closed low; Tunis is firmly in high-pressure territory.","sub":"Synoptic chart reading and forecasting"},{"id":"Weather_146","topic":"Weather","text":"Where is the centre of the high-pressure system?","options":["Near Tunis","Over the Bay of Biscay (Golf von Biskaya)","Near Stockholm","Near Lulea"],"correct":1,"img":"assets/shv_images/weather_146.jpg","exp":"On Figure M32 the centre of the anticyclone sits over the Bay of Biscay — closed isobars rising to about 1030 hPa surround the centre there. Tunis, Stockholm and Lulea lie at lower pressures or are nearer the low.","sub":"Synoptic chart reading and forecasting"},{"id":"Weather_147","topic":"Weather","text":"Where is the pressure gradient the flattest?","options":["Near Lulea","Near Stockholm","Over the Bay of Biscay (Golf von Biskaya)","Near Tunis"],"correct":3,"img":"assets/shv_images/weather_147.jpg","exp":"The flattest pressure gradient on Figure M32 is over North Africa — the isobars are very widely spaced near Tunis, indicating little change of pressure with distance and therefore weak winds. Closer-packed lines (Stockholm, around the low) mean steeper gradients.","sub":"Synoptic chart reading and forecasting"},{"id":"Weather_148","topic":"Weather","text":"Where is the pressure gradient the steepest?","options":["Near Lulea","Near Stockholm","Near Tunis","Over the Bay of Biscay (Golf von Biskaya)"],"correct":1,"img":"assets/shv_images/weather_148.jpg","exp":"On Figure M32 the steepest pressure gradient — most tightly packed isobars — runs around Stockholm in southern Scandinavia, where the air streams from the high toward the deep low at Lulea. That is where the wind is strongest on the chart.","sub":"Synoptic chart reading and forecasting"},{"id":"Weather_149","topic":"Weather","text":"Where is the wind the highest?","options":["In north Africa","In Switzerland","In Iceland","In southern Scandinavia"],"correct":3,"img":"assets/shv_images/weather_149.jpg","exp":"On Figure M32 the highest wind speeds are over southern Scandinavia, where the isobars are packed most tightly — strong west-to-northwest flow parallel to the lines as air streams from the Biscay high toward the Lulea low.","sub":"Synoptic chart reading and forecasting"},{"id":"Weather_150","topic":"Weather","text":"Where is the wind the weakest?","options":["In north Africa","In southern Scandinavia","In Switzerland","In Iceland"],"correct":0,"img":"assets/shv_images/weather_150.jpg","exp":"On Figure M32 the weakest winds are over North Africa: the isobars are widely spaced (flat gradient) and that area also sits near the edge of the anticyclone, where surface flow is slow. Switzerland is in moderate flow, southern Scandinavia is the windy zone.","sub":"Synoptic chart reading and forecasting"},{"id":"Weather_151","topic":"Weather","text":"What is the wind direction in Algiers (Alger)?","options":["190°","280°","100°","320°"],"correct":1,"img":"assets/shv_images/weather_151.jpg","exp":"On Figure M32, with isobars arching from the Biscay high around toward the Mediterranean, the wind direction over Algiers reads as a weak westerly, around 280° — parallel to the isobars and following the clockwise circulation around the high to its south.","sub":"Synoptic chart reading and forecasting"},{"id":"Weather_152","topic":"Weather","text":"What is the wind direction in London?","options":["310°","270°","130°","190°"],"correct":0,"img":"assets/shv_images/weather_152.jpg","exp":"On Figure M32, London sits between the Biscay high and the Lulea low in tightly packed isobars; the surface wind reads as a fresh northwesterly around 310°, parallel to the isobars as air streams from the high toward the low.","sub":"Synoptic chart reading and forecasting"},{"id":"Weather_154","topic":"Weather","text":"What is the wind direction in Zürich?","options":["280°","030°","210°","100°"],"correct":2,"img":"assets/shv_images/weather_154.jpg","exp":"On Figure M33 (the south Föhn situation), Zurich sits in the warm sector with isobars running from southwest to northeast over Switzerland; surface wind reads as a fairly strong southwesterly, around 210°. That south-to-west flow is the very gradient that drives Föhn.","sub":"Synoptic chart reading and forecasting"},{"id":"Weather_155","topic":"Weather","text":"What is the wind direction in Lisbon (Lissabon)?","options":["250°","190°","320°","100°"],"correct":2,"img":"assets/shv_images/weather_155.jpg","exp":"On Figure M33, Lisbon sits behind the cold-front trailing edge under the Atlantic anticyclone; surface wind reads as a weak northwesterly around 320° — parallel to the widely-spaced isobars on the eastern flank of the high.","sub":"Synoptic chart reading and forecasting"},{"id":"Weather_156","topic":"Weather","text":"Which of the following cities are in a warm sector?","options":["Lulea and St. Petersburg","Paris and London","Lisbon (Lissabon) and Athens (Athen)","Zürich and Stockholm"],"correct":3,"img":"assets/shv_images/weather_156.jpg","exp":"On Figure M33 the warm sector lies between the leading warm front and the trailing cold front and stretches across central and northern Europe. Zurich and Stockholm both sit inside that wedge of warm subtropical air — Paris and London are behind the cold front, Lisbon and Athens are in anticyclonic high-pressure air.","sub":"Synoptic chart reading and forecasting"},{"id":"Weather_157","topic":"Weather","text":"Which cities have post cold front conditions?","options":["Lisbon (Lissabon) and Athens (Athen)","Paris and London","Lulea and St.Petersburg","Zurich and Stockholm"],"correct":1,"img":"assets/shv_images/weather_157.jpg","exp":"On Figure M33, Paris and London lie just behind the cold front in the post-frontal \"train\" — typical cumulus clouds, fresh polar air, good visibility and stratocumulus. Zurich and Stockholm are still in the warm sector, Lisbon and Athens under anticyclonic influence.","sub":"Synoptic chart reading and forecasting"},{"id":"Weather_160","topic":"Weather","text":"What is the cloud distribution in Lulea most likely to be?","options":["5/8 - 7/8 cirrostratus","8/8 nimbostratus","5/8 - 7/8 cumulonimbus, isolated lenticulars in the east","3/8 - 5/8 cumulus"],"correct":0,"img":"assets/shv_images/weather_160.jpg","exp":"At Lulea on Figure M33, hundreds of kilometres ahead of the warm front advancing from the south, the cirrostratus deck is already overhead with 5/8–7/8 cover — the textbook warm-front herald. Cumulus, cumulonimbus or nimbostratus belong to other parts of the frontal cycle.","sub":"Synoptic chart reading and forecasting"},{"id":"Weather_162","topic":"Weather","text":"What is the cloud distribution in northeastern Switzerland most likely to be?","options":["8/8 nimbostratus","2/8 - 4/8 cumulus, with lenticulars at altitude","5/8 - 7/8 cirrocumulus","5/8 - 7/8 cirrostratus"],"correct":1,"img":"assets/shv_images/weather_162.jpg","exp":"At northeastern Switzerland on Figure M33, just ahead of an advancing cold front in a warm-sector Föhn pattern, expect light cumulus cover (2/8–4/8) plus lenticular clouds at altitude — strong southwesterly wind over the alpine ridges generates the lee waves. Nimbostratus or cirrostratus belong elsewhere on the chart.","sub":"Synoptic chart reading and forecasting"},{"id":"Weather_163","topic":"Weather","text":"What is the cloud distribution in St Petersburg most likely to be?","options":["3/8 - 5/8 cumulus","5/8 - 7/8 cumulonimbus, isolated lenticulars in the east","5/8 - 7/8 cirrostratus","8/8 nimbostratus"],"correct":3,"img":"assets/shv_images/weather_163.jpg","exp":"At St. Petersburg on Figure M33, very close to (and just under) the advancing warm front, the warm air rising over the cold air mass is producing a fully-developed nimbostratus deck — 8/8 cover with steady rain. Cumulus belongs post-front, cumulonimbus belongs ahead of the cold front.","sub":"Synoptic chart reading and forecasting"}];
window.CARDS=[{"id":"law-1","cat":"Legislation","q":"Which publication shows the exact boundary line between the two regions Jura/Mittelland and the Alps?","a":"The Glider Map (GLDK / Segelflugkarte)."},{"id":"law-2","cat":"Legislation","q":"What does the green dividing line on the Glider Map mean?","a":"It separates the Mittelland/Jura region (Jura & lowlands, ceiling 3050 m) from the Alps (ceiling 4550 m — the lower limit of airspace C, when military is off; with MIL-ON only up to 3950 m in the Alps). You can fly higher in the Alps because the ground itself is higher, so the airspace above is raised. A new Glider Map is published every year in March."},{"id":"law-3","cat":"Legislation","q":"How high may you fly over the mountains in the Alps?","a":"Normally up to 4550 m — but if a peak is e.g. 4200 m high, you may fly another 600 m above it (≈ 4800 m). With MIL-ON: 3950 m. With MIL-OFF: 4550 m."},{"id":"law-4","cat":"Legislation","q":"What are the MIL-ON times (Swiss military airspace activation)?","a":"During MIL-ON (in the Alps) you may only fly up to 3950 m. Times: Monday–Friday, mornings 07:30–12:05 and afternoons 13:15–17:05."},{"id":"law-5","cat":"Legislation","q":"What does LS-R stand for?","a":"LS-R = Restricted airspace (Luftraumbeschränkungsgebiet)."},{"id":"law-6","cat":"Legislation","q":"What's the difference between green and red LS-R zones on the Glider Map?","a":"Red LS-R zones cannot be entered when active — check the DABS for current status (active = forbidden). Green LS-R zones, depending on activation status, actually represent a relaxation of the normal rules (\"LS-R for gliders\")."},{"id":"law-7","cat":"Legislation","q":"What rules apply in green LS-R zones (\"LSR for gliders\")?","a":"Inside an LSR for gliders (former glider zones) reduced cloud clearances apply: 50 m vertical, 100 m horizontal. Flight visibility stays the same (5 km / 8 km). They're classified as LS-R because IFR traffic is forbidden inside them. Active 1 March – 31 October from sunrise to sunset.\n\nIMPORTANT: This only affects cloud clearance, never altitude limits.\n• \"MO\" suffix = only active when MIL-OFF.\n• \"MA\" suffix = may also be active during MIL-ON — check by radio/phone."},{"id":"law-8","cat":"Legislation","q":"Special rules in LSR for Gliders?","a":"Reduced cloud clearance: 50 m vertical, 100 m horizontal. From 2500 m AMSL upward the normal larger cloud clearances apply again."},{"id":"law-9","cat":"Legislation","q":"What does LS-D stand for?","a":"LS-D = Danger area. Caution — e.g. live firing exercises. Strongly recommended not to fly into it."},{"id":"law-10","cat":"Legislation","q":"What is a NOTAM?","a":"Notice to Airmen — daily updates on hazards and obstacles. Legally you should check it daily; in practice the DABS usually suffices for free-flight pilots."},{"id":"law-11","cat":"Legislation","q":"What is the DABS (Daily Airspace Bulletin Switzerland)?","a":"The DABS shows Swiss airspace restrictions graphically. Times are in UTC — add 1 h in winter, 2 h in summer for local time. Published daily at 16:00 on www.skybriefing.com for the following day. Note: special items (e.g. extended military hours during WEF) appear in text on page 2."},{"id":"law-12","cat":"Legislation","q":"What is the AIP?","a":"Aeronautical Information Publication — the official aviation handbook."},{"id":"law-13","cat":"Legislation","q":"What is a CTR?","a":"Control Zone (Kontrollzone). Although it starts at the ground it is NOT Class G — it's a controlled airspace. CTRs are shown on the map with dashed lines and transparent blue fill; they extend from ground (GND) up to a specific altitude listed in the box."},{"id":"law-14","cat":"Legislation","q":"A CTR…","a":"…surrounds an airport and extends from the ground up to the altitude given on the Glider Map."},{"id":"law-15","cat":"Legislation","q":"What is a TMA?","a":"Terminal Maneuvering Area — approach corridors around major airports. Class C (Zürich, Bern, Basel, Geneva) or D. Never exte
