 primarily create the profile shape.","The load on a modern glider is distributed equally on all main lines.","A and B lines take more than double the load of C and D lines.","C and D lines take more than double the load of A and B lines."],"correct":2,"exp":"About 80% of the wing's load travels through A and B risers and only 20% through C and D - so A+B carry roughly four times the load of C+D, easily more than double. This isn't an equal distribution by design: it follows directly from the fact that lift is concentrated on the front of the wing.","sub":"Line groups, geometry and load distribution"},{"id":"Materials_41","topic":"Materials","text":"What is the advantage of suspension lines looped as opposed to sewn to the cloth of the glider?","options":["Maintenance is easier as damaged lines may be easily replaced.","The looped connections are aerodynamically more efficient and are therefore used on all modern high performance gliders.","Looped connections hold better as the line is not weakened by the sewing.","None. It is a purely cosmetic measure."],"correct":0,"exp":"Looped attachments are simply hooked into a sewn loop on the cell wall, so a damaged line can be unhooked and replaced quickly. Sewn-to-cloth attachments require seamstress work to repair. Looped connections aren't more aerodynamic or stronger - the benefit is purely serviceability, which is a big deal for a part that gets replaced periodically.","sub":"Line care, damage and replacement"},{"id":"Materials_42","topic":"Materials","text":"When replacing damaged lines it is important to observe that","options":["in every case lines as strong or stronger are used.","due to drag, the new lines have the same diameter.","only original lines provided by the manufacturer are used.","the lines conform dimensionally with the replaced ones."],"correct":2,"exp":"Lines are matched to a specific wing model: the manufacturer chose the diameter, sheathing, splice technique and material mix to give the wing its certified flight characteristics. Substituting different lines - even if they're stronger or the same diameter - changes how loads distribute and voids the certification. Only original parts via authorised service.","sub":"Line care, damage and replacement"},{"id":"Materials_43","topic":"Materials","text":"What circumstances can cause a change in the initial length of the suspension lines?","options":["Only the use of lines of different types or different dimensions.","Only a very high loading on individual lines, for example when a line gets caught somewhere during launch or landing.","Modern glider lines never change their length permanently.","Different loading on the lines during normal usage."],"correct":3,"exp":"Different lines see different loads in normal flying - A and B carry 80%, C and D only about 20%. Lines under more load tend to creep longer, lightly-loaded lines tend to shrink. So after many flights, the original lengths drift purely from normal use. That's why periodic glider checks include line-length measurement and trim correction.","sub":"Line care, damage and replacement"},{"id":"Materials_44","topic":"Materials","text":"What are the consequences of a large overload on certain lines, e.g. if a line gets caught somewhere at launch or landing?","options":["The strength of the overloaded line will be critically reduced.","The lines may be permanently lengthened and may affect the wing’s behaviour.","All heavily overloaded lines will break, which can affect the wing's behaviour.","Modern glider lines wouldn't be affect both in terms of strength or length."],"correct":1,"exp":"A short, severe overload (line caught at launch, snagged on landing) stretches the fibres past their elastic limit. The line gets longer permanently, which shifts the geometry of that line group and subtly changes the wing's profile and flight behaviour. The line may still hold its rated load - the issue is dimensional, not strength.","sub":"Line care, damage and replacement"},{"id":"Materials_45","topic":"Materials","text":"What could cause permanent shortening of suspension lines?","options":["Exposure of the lines to moisture and dirt.","Badly sorting the lines before packing the glider.","Exposure of the lines to cold temperatures.","The glider is hardly ever used over a long period of time."],"correct":0,"exp":"Dyneema and aramid line cores - and the polyester sheaths - shrink over time when exposed to moisture and dirt, especially in lightly-loaded positions (C and D, where each line only carries 300-500 g). The contamination penetrates the sheath and the unloaded fibres pull tighter as they dry. Cold or disuse don't cause permanent shortening.","sub":"Line care, damage and replacement"},{"id":"Materials_47","topic":"Materials","text":"What are the consequences of a shortening of the A lines?","options":["Angle of attack remains unchanged and the profile and handling of the wing changes.","Angle of attack increases, the profile remains unchanged and handling of the wing changes.","Angle of attack increases and the profile and handling of the wing changes.","Angle of attack reduces and the profile and handling of the wing changes."],"correct":3,"exp":"Pulling the leading edge down by shortening A lines tilts the wing nose-low and reduces the angle of attack. Both the wing profile and its handling change - the wing flies faster, is easier to inflate, but is more prone to frontal collapses. A and D are opposite levers on the same AoA dial.","sub":"Line trim and tuning effects"},{"id":"Materials_48","topic":"Materials","text":"What are the consequences of a shortening of the B lines on a school glider?","options":["Angle of attack increases, the profile remains unchanged and handling of the wing changes.","Angle of attack increases and the profile and handling of the wing changes.","Angle of attack reduces and the profile and handling of the wing changes.","Angle of attack stays approximately the same and the profile and handling of the wing changes."],"correct":3,"exp":"The B lines sit in the middle of the line tree, so shortening them mostly bows the profile rather than shifting the leading edge up or down - the angle of attack barely changes. What does change is the wing's profile shape and how it handles. Not all line-group changes shift AoA; the B group is the exception.","sub":"Line trim and tuning effects"},{"id":"Materials_49","topic":"Materials","text":"What are the consequences of a lengthening of the D lines?","options":["Angle of attack increases, the profile remains unchanged and handling of the wing changes.","Angle of attack remains unchanged and the profile and handling of the wing changes.","Angle of attack reduces and the profile and handling of the wing changes.","Angle of attack increases and the profile and handling of the wing changes."],"correct":2,"exp":"Stretching the rear (D) lines lowers the trailing edge, which tilts the wing nose-down and reduces the angle of attack. The wing's profile shape and handling change accordingly: faster flight, easier inflation, but more vulnerable to frontal collapses. Lengthening D mirrors what shortening A would do.","sub":"Line trim and tuning effects"},{"id":"Materials_50","topic":"Materials","text":"What are the consequences of a shortening of the D lines?","options":["Angle of attack reduces and the profile and handling of the wing changes.","Angle of attack increases, the profile remains unchanged and handling of the wing changes.","Angle of attack remains unchanged and the profile and handling of the wing changes.","Angle of attack increases and the profile and handling of the wing changes."],"correct":3,"exp":"Shortening the rear (D) lines tilts the back of the wing down, raising the leading edge - so the angle of attack increases. That changes both the wing's profile and how it handles: slower flight, harder to inflate, with parachutal-stall tendency. Any change in line-group length changes the profile.","sub":"Line trim and tuning effects"},{"id":"Materials_52","topic":"Materials","text":"What would change in the handling of a glider if the D lines are lengthened or stretch ?","options":["The glider is more difficult to inflate, requires larger but less powerful steering movements due to the lower centre of gravity and converts forward speed into height (flares) better upon landing.","The glider is easier to inflate, flies slower due to the decreased angle of attack, is more prone to frontal collapses and parachutal stalls.","The glider is easier to inflate, flies faster due to the decreased angle of attack, is more prone to frontal collapses but less likely to parachutal stall.","The glider is more difficult to inflate, flies slower due to the increased angle of attack, is less prone to frontal collapses but is more likely to parachutal stall."],"correct":2,"exp":"Stretching the rear (D) lines drops the trailing edge, which tilts the wing nose-down and reduces the angle of attack. The wing inflates more easily and flies faster, but with a lower AoA the frontal collapse risk goes up while parachutal-stall risk drops. D and A behave opposite to each other.","sub":"Line trim and tuning effects"},{"id":"Materials_53","topic":"Materials","text":"What would change in the handling of a glider if the A lines are too short or shrink?","options":["The glider is more difficult to inflate, flies slower due to the increased angle of attack, is less prone to frontal collapses but is more likely to parachutal stall.","The glider is easier to inflate, flies slower due to the decreased angle of attack, is more prone to frontal collapses and parachutal stalls.","The glider is more difficult to inflate, requires larger but less powerful steering movements due to the lower centre of gravity and converts forward speed into height (flares) better upon landing.","The glider is easier to inflate, flies faster due to the decreased angle of attack, is more prone to frontal collapses but less likely to parachutal stall."],"correct":3,"exp":"Shortening the A lines pulls the leading edge down, reducing the angle of attack. The wing inflates more easily and flies faster, but with a lower AoA it's much more vulnerable to frontal collapses - and the parachutal-stall risk drops because the wing is further from the stall side of the polar. A and D have opposite effects.","sub":"Line trim and tuning effects"},{"id":"Materials_54","topic":"Materials","text":"What would be the effect on a wing if the D lines are too short or shrink?","options":["The glider is easier to inflate, flies faster due to the decreased angle of attack, is more prone to frontal collapses but less likely to parachutal stall.","The glider is easier to inflate, flies slower due to the decreased angle of attack, is more prone to frontal collapses and parachutal stalls.","The glider is more difficult to inflate, requires larger but less powerful steering movements due to the lower centre of gravity and converts forward speed into height (flares) better upon landing.","The glider is more difficult to inflate, flies slower due to the increased angle of attack, is less prone to frontal collapses but is more likely to parachutal stall."],"correct":3,"exp":"Shortening the rear (D) lines tilts the back of the wing down and raises the angle of attack. The wing now resists inflating, flies slower (because the higher AoA puts it closer to the stall side of the polar), is less prone to frontal collapses but much more likely to enter a parachutal stall. D and A produce opposite effects.","sub":"Line trim and tuning effects"},{"id":"Materials_55","topic":"Materials","text":"Upon launch a pilot notices that one of the B-lines of the glider is torn. What course of action should the pilot take?","options":["Reconnect the ends with a short piece of extra line, making sure that the \"repaired\" line is not shorter or noticeably longer than the neighbouring B-line.","Remove the torn line and fly without it.","The pilot shouldn't fly until the damaged line is replaced.","Tie the ends together with a fisherman's knot."],"correct":2,"exp":"Lines are critical structural elements - a torn line means the wing's geometry and load distribution are compromised. Never tie lines back together, splice with random cord, or just fly without one: only an authorised replacement by an original line restores the safety margin. Ground the wing until it's properly repaired.","sub":"Line care, damage and replacement"},{"id":"Materials_56","topic":"Materials","text":"Compared to a paraglider with 5m lines, one with 7m lines has","options":["A higher center of gravity and a bigger pendulum when rapidly changing direction.","A lower center of gravity and a smaller pendulum when rapidly changing direction.","A higher center of gravity and a smaller pendulum when rapidly changing direction.","A lower center of gravity and a bigger pendulum when rapidly changing direction."],"correct":3,"exp":"Longer suspension lines put the pilot further below the wing, lowering the centre of gravity of the pilot-wing system. The longer 'pendulum arm' also means larger swinging amplitudes when the wing changes direction quickly. Short lines give crisper handling; long lines give a more pendulous, slower-feeling glider.","sub":"Line groups, geometry and load distribution"},{"id":"Materials_60","topic":"Materials","text":"If a material is subjected to a load equal to its maximum resistance you should presume that","options":["the material's physical dimensions and strength will no longer be the same as they were before.","the material's original dimensions and strength remain unchanged provided that the maximum load is not exceeded.","the dimensions have changed somewhat, but the strength isn't diminished.","the glider needs to be trimmed somewhat, in order to allow for the altered dimensions."],"correct":0,"exp":"Loading a material right up to its tensile maximum permanently deforms it: fibres are stretched past their elastic limit and microscopic damage accumulates. After such an event the part has new dimensions and reduced strength compared to its original state. That's why heavily overloaded lines must be replaced, never retensioned or re-used.","sub":"EN certification, wing loading and structural loads"},{"id":"Materials_61","topic":"Materials","text":"The type of loading on a paraglider wing is","options":["Pressure.","Tension.","Torsion.","Bending."],"correct":1,"exp":"A paraglider is made entirely of flexible elements - fabric and lines. Flexible things can only carry tension (pulling) - they can't resist compression, bending or torsion in any meaningful way. That's why structural design and damage analysis for a paraglider focus only on tensile loads on lines and cloth.","sub":"EN certification, wing loading and structural loads"},{"id":"Materials_64","topic":"Materials","text":"A glider is equipped with A,B,C and D risers. Which risers on this wing have the least load in stable flight?","options":["The A risers.","The B risers.","The C risers.","The D risers."],"correct":3,"exp":"Lift on a wing is concentrated on the front half - about 80% of the load runs through the A and B risers, only about 20% through C and D combined. Of those, the D risers (furthest back) carry the smallest share. That's why steering by D risers if the brakes fail is risky: you're working with the lightly-loaded group that goes slack first.","sub":"Line groups, geometry and load distribution"},{"id":"Materials_65","topic":"Materials","text":"Continual execution of extreme manoeuvres on a normal, certified glider","options":["will diagonally load the stabilos, resulting in an altered profile in the middle of the glider.","can result in hairline cracks in the quick links due to the shock loading on them.","will not result in any appreciable stretching of the glider cloth.","can result in the stretching of various parts of the glider and therefore a change in the flight characteristics of the glider."],"correct":3,"exp":"Extreme manoeuvres impose heavy and sudden tension on the lines, cell walls and risers. Repeated near-limit loads stretch various components beyond their elastic range, so dimensions creep over time and the wing's certified flight characteristics drift. The lines won't all snap or quick-links crack - the damage is dimensional, slow and accumulates.","sub":"EN certification, wing loading and structural loads"},{"id":"Materials_66","topic":"Materials","text":"How does a foot accelerator work on a modern production glider?","options":["It is attached to the D-lines, allowing the length of the D risers and therefore the angle of attack to be varied.","It is attached to the A and B risers allowing it to change the length of the A and B lines, modifying the angle of attack and speed of the wing.","By stretching the legs the centre of gravity moves forward, reducing the angle of attack and resulting in acceleration.","It is attached to the A-lines, allowing the front lines to be pulled downward, decreasing the angle of attack and accelerating the glider."],"correct":1,"exp":"Pushing the speed bar pulls down the A risers most and the B risers less (sometimes a little C too) via a pulley system. Shortening the front risers tilts the wing forward, which reduces the angle of attack and increases airspeed without changing the profile much. The D risers are never shortened by the accelerator.","sub":"Risers, speed bar and trimmers"},{"id":"Materials_67","topic":"Materials","text":"If a foot accelerator is pressed to its maximum on a modern production glider in calm air","options":["the forward speed increases.","the sink rate reduces.","the glide ratio improves.","nothing happens / changes."],"correct":0,"exp":"Pushing the speed bar in calm air shortens the A risers (and B to a lesser extent), lowering the angle of attack. The wing accelerates forward but the sink rate also rises - so on a still day the glide ratio actually gets worse, not better. The clear effect: more forward speed.","sub":"Risers, speed bar and trimmers"},{"id":"Materials_68","topic":"Materials","text":"If a foot accelerator is used to its maximum on a modern production glider with a head wind of 25km","options":["the glide ratio improves.","nothing happens / changes.","the glide ratio reduces.","the sink rate reduces."],"correct":0,"exp":"In a headwind the polar curve shifts and the best glide-over-ground tangent moves to a higher airspeed. Pressing the speed bar gets you to that new optimum: you sink a bit faster through the air but cover more ground per metre lost, so the glide ratio over the ground improves. This is exactly the situation accelerators were designed for.","sub":"Risers, speed bar and trimmers"},{"id":"Materials_69","topic":"Materials","text":"Trim tabs or trimmers generally modify the length of","options":["the rear risers.","the second from the rear risers.","the second from the front risers.","the front risers."],"correct":0,"exp":"Trimmers are mechanical adjusters on the rear (D) risers. Letting them out lengthens the rear risers, lowering the trailing edge and reducing the angle of attack so the wing flies faster - same end effect as the speed bar but adjusted by hand and held in position. Tandems use trimmers because there's no foot room for a speed bar.","sub":"Risers, speed bar and trimmers"},{"id":"Materials_70","topic":"Materials","text":"Trim tabs or trimmers","options":["seriously affect the flight behaviour of every glider with every trim setting.","are to vary the riser lengths and therefore the flight characteristics of the glider. A glider with trimmers can only be guaranteed as certified if it was actually tested with trimmers.","don't affect the flight behaviour of a glider, but compromise the strength of the risers.","up to a length of 5cm can be added to all serial gliders without affecting the certification or safety of the glider."],"correct":1,"exp":"Trimmers change the length of (usually) the rear risers, which shifts the angle of attack and flight characteristics. Because they actively modify wing geometry, the EN certification for a wing only covers configurations that were tested with the trimmers - if a wing wasn't certified with trimmers and you add them aftermarket, certification no longer applies. They aren't cosmetic and they aren't free of consequences.","sub":"Risers, speed bar and trimmers"},{"id":"Materials_71","topic":"Materials","text":"For fast flights, trim tabs or trimmers are","options":["tightened to increase the angle of attack and lift the profile at the rear.","tightened to reduce the angle of attack and lower the profile at the rear.","released to reduce the angle of attack and lift the profile at the rear.","released to increase the angle of attack and lift the profile at the rear."],"correct":2,"exp":"To fly faster you release (let out) the trimmers, which lengthens the rear risers. That lets the trailing edge rise - lowering the angle of attack and freeing the wing to accelerate. Tightening trimmers does the opposite (rear down, AoA up, slower). It's the same direction as the speed bar, just held mechanically.","sub":"Risers, speed bar and trimmers"},{"id":"Materials_73","topic":"Materials","text":"The brake/steering lines can be protected from wear by","options":["using pulleys or sliding rings for the lines to pass through.","pulling the brakes from the front down to the middle.","avoiding varying the brake position unnecessarily.","applying the brakes in a very controlled manner."],"correct":0,"exp":"Brake lines pass through small pulleys or smooth sliding rings on the rear risers so they don't scrub against the webbing. Without those guides the brake line would saw against the riser at every brake input, fraying it. Pilot habits like brake position or smoothness can't prevent that mechanical wear.","sub":"Brake and steering lines"},{"id":"Materials_74","topic":"Materials","text":"The correct length of the brake/steering lines","options":["depends on the pilot weight and desired airspeed.","is determined by the manufacturer and must only be shortened by them or their representatives.","must be adjusted to suit the body size, especially the arm length of the pilot.","must be adjusted to suit the harness and pilot position."],"correct":1,"exp":"Brake-line length is part of the wing's certified setup: the factory chose how much travel before reaching the stall point. Shortening or lengthening it can pre-load the trailing edge (causing parachutal stalls or losing braking authority) and voids certification. Only the manufacturer or their authorised representative can adjust it. Pilot size or harness doesn't change the brake-line baseline.","sub":"Brake and steering lines"},{"id":"Materials_75","topic":"Materials","text":"The length of the brake/steering lines are set so that","options":["it is never necessary to wrap the brakes upon landing.","it is possible to fly the entire speed range of the glider without problems.","the glider can be flown at best glide with brakes at shoulder height.","they are as short as possible to avoid tangling with the D lines."],"correct":1,"exp":"The brake-line length is calibrated by the manufacturer so that 'arms up' is at zero brake and the wing can use its full speed range - from full speed at the top all the way through to stall at the bottom of the travel. If brakes are too short, the wing is permanently pre-braked and you can't fly the high-speed end; if too long, you can't reach the stall to control sink.","sub":"Brake and steering lines"},{"id":"Materials_76","topic":"Materials","text":"Whilst flying with a little brake the D lines are not under tension but form an arc, what can we conclude?","options":["The brakes take the load of the D lines which is normal when flying with light braking.","The D-lines have gradually stretched under load. The glider should be sent to the manufacturer for a check.","The brake/steering lines have been set too short and should therefore be lengthened.","The glider was delivered with the D-lines too long. They must be replaced."],"correct":0,"exp":"With even a small brake input, the trailing edge of the wing is pulled down by the brake line itself. This lifts the rear of the canopy so the D lines aren't holding much load and visibly arc rather than pulling taut. That's the expected behaviour with brakes applied - not a sign of stretched D lines or short brakes.","sub":"Brake and steering lines"},{"id":"Materials_77","topic":"Materials","text":"A harness with strong diagonal bracing has what effect on the pilot?","options":["The pilot feels the turbulence less and has more ability to control the glider with weight shift.","The pilot feels the turbulence less but has less ability to control the glider with weight shift.","The pilot feels the turbulence more but has less ability to control the glider with weight shift.","The pilot feels the turbulence more and has more ability to control the glider with weight shift."],"correct":1,"exp":"Diagonal bracing in the harness locks the seat plate laterally. With strong bracing the pilot can't swing side to side, which both damps the feedback from the wing in turbulence and makes weight-shifting much less effective - the pilot's mass can't actually transfer to the side. Comfort and stability up, feedback and steering authority down.","sub":"Harness geometry and feedback"},{"id":"Materials_78","topic":"Materials","text":"A harness without diagonal bracing has what effect on the pilot?","options":["The pilot feels the turbulence less but has less ability to control the glider with weight shift.","The pilot feels the turbulence more but has less ability to control the glider with weight shift.","The pilot feels the turbulence more and has more ability to control the glider with weight shift.","The pilot feels the turbulence less and has more ability to control the glider with weight shift."],"correct":2,"exp":"Diagonal cross-bracing in the harness locks the seat plate against lateral roll. Without it, the harness can swing side-to-side freely, so the pilot feels every wing movement (alive feedback in turbulence) and weight-shifting works very effectively because the pilot's mass actually transfers to one side. Cross-braced harnesses are stable but mute both.","sub":"Harness geometry and feedback"},{"id":"Materials_79","topic":"Materials","text":"If the distance between the riser connection points on the harness is lessened","options":["the pilot feels the turbulence more and the danger of a twist is increased.","the pilot feels the turbulence less and the danger of a twist is reduced.","the pilot feels the turbulence less and the danger of a twist is increased.","the pilot feels the turbulence more and the danger of a twist is reduced."],"correct":2,"exp":"Bringing the karabiners closer together puts the pivot points near the pilot's centreline, damping lateral motion - so you feel less of the wing's micro-movements in turbulence. The downside is that closer hang points let the risers wrap around each other more easily during a collapse, so the twist risk goes up.","sub":"Harness geometry and feedback"},{"id":"Materials_80","topic":"Materials","text":"If the distance between the riser connection points on the harness is increased","options":["the pilot feels the turbulence more and the danger of a twist is reduced.","the pilot feels the turbulence more and the danger of a twist is increased.","the pilot feels the turbulence less and the danger of a twist is reduced.","the pilot feels the turbulence less and the danger of a twist is increased."],"correct":0,"exp":"Spreading the karabiner hang points apart gives the harness more room to swing laterally, so the pilot feels more of the wing's movement in turbulence - useful feedback for active piloting. The wider geometry also makes it geometrically harder for the risers to wrap around each other, so the twist risk drops.","sub":"Harness geometry and feedback"},{"id":"Materials_81","topic":"Materials","text":"Harnesses with high carabiner hang points have what effect during turbulence?","options":["The pilot feels turbulence less but has more difficulty to lean forward when accelerating at launch.","The pilot feels turbulence more but has more difficulty to lean forward when accelerating at launch.","The pilot feels turbulence more but has less difficulty to lean forward when accelerating at launch.","The pilot feels turbulence less but has less difficulty to lean forward when accelerating at launch."],"correct":0,"exp":"Karabiners mounted high up on the shoulders bring the pivot point close to the pilot, which damps lateral oscillation - so you feel less of the wing's micro-movements in turbulence. The trade-off is the high pivot makes it physically harder to lean forward and run hard during launch acceleration.","sub":"Harness geometry and feedback"},{"id":"Materials_82","topic":"Materials","text":"Harnesses with low carabiners have what effect during turbulence?","options":["The pilot feels turbulence more but has more difficulty to lean forward when accelerating at launch.","The pilot feels turbulence more but has less difficulty to lean forward when accelerating at launch.","The pilot feels turbulence less but has more difficulty to lean forward when accelerating at launch.","The pilot feels turbulence less but has less difficulty to lean forward when accelerating at launch."],"correct":1,"exp":"Karabiners mounted low (closer to the pilot's seat) put the pivot point further from the wing, so harness oscillations are larger and the pilot feels more of the wing's motion in turbulence. The lower geometry also leaves more room to lean forward at launch, making the acceleration run easier. The trade-off: less damping than high karabiners.","sub":"Harness geometry and feedback"},{"id":"Materials_83","topic":"Materials","text":"If a harness without diagonal bracing on a paraglider is replaced with a harness with diagonal bracing this will have, amongst other things, an influence on","options":["the behaviour of the glider in extreme flight situations.","the profile and therefore angle of attack of the glider.","the polar graph of the speeds for the glider.","the \"twist\" of the glider profile."],"correct":0,"exp":"Adding diagonal bracing changes how the harness reacts during dynamic events - collapses, big-ear release, spirals. The braced harness damps lateral oscillations and resists twist, so the wing-pilot system behaves differently in extreme flight situations even though the wing itself, its profile and its polar curve are unchanged.","sub":"Harness geometry and feedback"},{"id":"Materials_84","topic":"Materials","text":"If a harness is set so that the pilot is in a very reclined position the advantage is","options":["the glider is easier to start.","the glider is easier to steer with weight-shift.","the risk of twist in a uncontrolled situation is minimised.","there is less drag and a better glide ratio."],"correct":3,"exp":"Lying back in a pod-style reclined harness drops your frontal area sharply, which cuts pilot drag. Less drag means a better glide ratio - the main reason XC and competition pilots prefer this position. It's also more wind-sheltered for long flights, but it's harder to launch in and to climb into for beginners.","sub":"Harness geometry and feedback"},{"id":"Materials_85","topic":"Materials","text":"If a harness is set so that the pilot is in a very reclined position the disadvantage is","options":["there is more drag and a worse glide ratio.","the risk of twist in a uncontrolled situation is increased.","the glider cannot be steered with weight-shift.","the glider is harder to start."],"correct":1,"exp":"Lying back puts the pilot's centre of mass closer to the harness pivot line, which makes the system easier to spin about its vertical axis. In an asymmetric collapse the harness can rotate more freely and a twist becomes more likely - especially with a reactive wing. The aerodynamic glide gain comes with this handling cost.","sub":"Harness geometry and feedback"},{"id":"Materials_86","topic":"Materials","text":"Harnesses with built-in back protection","options":["are compulsory for all candidates of pilot exams.","increase passive safety but in no way mean that launch and landing procedures should be disregarded.","are compulsory for participants of SHV organised competitions.","should only be used if the pilot believes it is an absolute necessary as they admit to having difficulty starting and landing."],"correct":1,"exp":"A back protector is passive safety - it cushions an impact you didn't prevent. It cannot replace correct launch and landing technique, weather analysis or piloting discipline. Pilots who rely on protectors as a safety net rather than as a backup take greater risks and more often end up in the kind of crash the protector was never designed to absorb.","sub":"Harness back protection"},{"id":"Materials_87","topic":"Materials","text":"Harnesses with ram-air type airbags instead of foam back protection have the advantage that","options":["they general have a lower pack volume and less weight.","they provide flotation in the event of a possible water landing, thereby also minimising the risk of non-swimmers drowning.","they already provide full protection before commencing the launch.","they have less drag."],"correct":0,"exp":"Ram-air airbags only inflate once the airflow blows into them in flight - so unpacked, they're just folded fabric and the harness is much lighter and smaller than a foam-protector version. The downside is the airbag offers no protection at launch (before it inflates), so foam wins for take-off and landing safety while airbags win for pack volume and weight.","sub":"Harness back protection"},{"id":"Materials_88","topic":"Materials","text":"Harnesses with foam back protection instead of ram-air type airbags have the advantage that","options":["they provide flotation in the event of a possible water landing, thereby also minimising the risk of non-swimmers drowning.","they generally have a lower pack volume and less weight.","they provide better insulation against the cold.","they already provide full protection when commencing the launch."],"correct":3,"exp":"Foam back protection is already in its protective shape the moment you clip in - so it cushions an impact at launch, in the air or on landing. Airbags by contrast only inflate after the airflow blows into them in flight, leaving you unprotected during the run-up. The trade is foam's bigger pack volume and extra weight.","sub":"Harness back protection"},{"id":"Materials_89","topic":"Materials","text":"In paragliding terms, a wing loading of 2.0 daN/m² (2.0 Kg/m²) for a modern intermediate glider (calculated using flat surface area) is;","options":["normal.","at the lower limit.","at the upper limit.","definitely too low."],"correct":3,"exp":"The accepted wing-loading range is 2.5 to 4.0 kg/m^2 for recreational pilots. At 2.0 kg/m^2 the wing is dangerously under-loaded - it will be soft, slow, easy to collapse in turbulence, and unable to develop enough internal pressure to recover cleanly. Below 2.5 is outside the certified envelope and unsafe.","sub":"EN certification, wing loading and structural loads"},{"id":"Materials_90","topic":"Materials","text":"In paragliding terms, a wing loading of 3.5 daN/m² (3.5 Kg/m²) for a modern intermediate glider (calculated using flat surface area) is;","options":["normal.","definitely too low.","at the lower limit.","at the upper limit."],"correct":0,"exp":"Standard wing loading for a recreational pilot sits between 2.5 and 4 kg/m^2, so 3.5 kg/m^2 sits squarely in the normal range. Higher loading (3.5-4.2) is increasingly popular with experienced pilots because modern wings handle better when loaded up - more pressure equals more pitch authority and resistance to collapses.","sub":"EN certification, wing loading and structural loads"},{"id":"Materials_91","topic":"Materials","text":"In paragliding terms, a wing loading of 4.5 daN/m² (4.5 Kg/m²) for a modern intermediate glider (calculated using flat surface area) is;","options":["at the lower limit.","normal.","definitely too high.","at the upper limit."],"correct":3,"exp":"The standard wing-loading range is 2.5-4.0 kg/m^2 with extended values up to about 4.2 for experienced pilots on modern wings. 4.5 kg/m^2 sits right at the upper limit: speed and pitch authority are great, but stall margins shrink and a collapse will be sharper. Only pilots who know the wing well should load it this high.","sub":"EN certification, wing loading and structural loads"},{"id":"Materials_92","topic":"Materials","text":"The most important thing to consider when mounting a reserve chute is that","options":["the container must be mounted on a load carrying part of the harness.","the pilot is able to see and reach easily the handle to open it.","the container must in every case be mounted on the same side as the throwing hand.","the container must be mounted to the harness as solidly as possible."],"correct":1,"exp":"When you most need the reserve - asymmetric collapse, sudden disorientation, twisted lines - your hand has to find the release handle by feel, fast, under stress. So the single most important mounting rule is that the handle is easily seen and reached in the pilot's normal flying position. Mounting strength matters too, but no fixing point helps if you can't grab it.","sub":"Reserve parachute"},{"id":"Materials_93","topic":"Materials","text":"If the connection point of a reserve chute main line is situated about the pilots center of gravity (same height) then","options":["the likelihood of the main and reserve chutes tangling is smaller.","the pilot is automatically brought into an upright position upon throwing the reserve.","the glider will automatically cease flying, resulting in a more stable descent.","the pilot must remember to move into an upright stance before landing."],"correct":3,"exp":"If the reserve attaches at the pilot's centre of gravity (same height as the pilot), the canopy doesn't automatically rotate the pilot upright after deployment - the pilot stays in whatever orientation they were in. So the pilot must actively get into the feet-down, upright landing posture before ground contact. Higher attachment points do that rotation automatically.","sub":"Reserve parachute"},{"id":"Materials_95","topic":"Materials","text":"To ensure that the pilot’s body be as vertical as possible the harness should be joined to the reserve chute lines","options":["in front of the pilot and low.","in front of the pilot and high.","behind the pilot and low.","behind the pilot and high."],"correct":3,"exp":"Connect the reserve risers high up on the shoulder straps and behind the pilot. That geometry pulls the pilot upright once the reserve opens, putting the legs down ready to absorb the landing. Low or forward attachment points leave the pilot seated and tipped, which is the wrong body position to take the impact.","sub":"Reserve parachute"},{"id":"Materials_96","topic":"Materials","text":"Which material is best for the manufacture of reserve chutes?","options":["Polyethylene ripstop.","Polyester ripstop.","Polyamide (Nylon) ripstop.","Mylar coated polyester."],"correct":2,"exp":"Reserve canopies are made of the same polyamide (nylon) ripstop as the main wing, but woven much finer and looser. The looser weave intentionally allows some stretch - that stretch absorbs the deployment shock so the lines and the pilot's body aren't slammed. Polyester or polyethylene fabrics are not used for the canopy itself.","sub":"Reserve parachute"},{"id":"Materials_98","topic":"Materials","text":"What are the important factors in the construction of reserve chutes?","options":["Absolute resistence to UV radiation.","Minimal elasticity.","High strength and elasticity within clearly defined limits.","Minimal porosity."],"correct":2,"exp":"Reserve canopies must be strong enough to take the shock load when they snap open - but also intentionally elastic within defined limits so that stretch absorbs the opening shock and protects the pilot's body. Pure inelasticity would mean a violent jerk; uncontrolled elasticity would mean a sluggish, slow-opening canopy. Controlled stretch is the design target.","sub":"Reserve parachute"},{"id":"Materials_99","topic":"Materials","text":"The intervals at which you pack your reserve influence","options":["its opening speed.","the strength of individual parts of the chute.","the soiling of the chute.","the porosity of the cloth."],"correct":0,"exp":"If a reserve sits packed for too long, the folds compress and the fabric layers can stick together (static cling, humidity, settling), which slows the canopy unwrapping at the critical moment. Regular repacking (typically every 4-6 months, with 24 hours of airing) restores loft and reliable opening speed. The strength or porosity of the cloth itself isn't changed by packing intervals.","sub":"Reserve parachute"},{"id":"Materials_100","topic":"Materials","text":"What factors can reduce the life of a reserve chute?","options":["Exposure to cold temperatures and frequent packing.","UV radiation and exposure to cold temperatures.","Frequent packing and moisture/dampness.","Moisture/dampness and UV radiation."],"correct":3,"exp":"Reserve canopies are nylon ripstop, the same family of material that gets damaged by UV (degrades the fibre and any coating) and by moisture (which can rot fabric and slow opening on the next deployment). Cold and frequent packing don't materially shorten lifespan - in fact regular repacks are the recommended practice.","sub":"Reserve parachute"},{"id":"Materials_101","topic":"Materials","text":"Which part of a reserve chute takes the longest to dry after a water landing?","options":["The outer container.","The inner container.","The chute itself.","The suspension lines."],"correct":3,"exp":"Reserve lines are bundles of fibres surrounded by a sheath - water wicks into the bundle and is held against gravity by capillary action between fibres. The fabric canopy dries in hours once spread out, the containers in a day, but the lines can hold internal moisture for many days. Drying them through is critical, because wet lines can freeze, shrink and lose strength.","sub":"Reserve parachute"},{"id":"Materials_102","topic":"Materials","text":"Reserve chutes must achieve a sink rate of < 5.5m in the certification process. In practice","options":["this sink rate has been recognised as appropriate.","this rate is achieved without problems.","the test results don’t matter.","a considerably higher sink rate can often be expected."],"correct":3,"exp":"The 5.5 m/s figure is measured on a test rig - reserve dropped from a bridge or helicopter with only a weight attached, no paraglider. In real life the deflated wing stays connected and interferes with the reserve canopy, making the whole system pendulum and raising the actual sink rate. You should expect a noticeably harder landing than the certification number suggests.","sub":"Reserve parachute"},{"id":"Materials_103","topic":"Materials","text":"What needs to be taken into consideration when assessing reserve chutes with a stated maximum sink rate of 5.5 m/sec?","options":["In practice, test values don’t matter.","Emergency landings at higher altitudes (thinner air) were taken into account.","This value was achieved under artificial test conditions and may be higher in practice.","Any disturbances caused by the paraglider were taken into account."],"correct":2,"exp":"The 5.5 m/s value is measured on a test rig: the reserve is dropped from a bridge or helicopter with just a weight on it, no paraglider. In actual emergencies the still-connected main wing interferes with the reserve canopy, swinging the system and raising the real sink rate. So the certified number is a best-case lab value, not what you should expect.","sub":"Reserve parachute"},{"id":"Materials_104","topic":"Materials","text":"Which criteria are the most important when purchasing a reserve chute?","options":["Construction of the inner container.","Sufficient surface area.","Minimum possible pack volume.","Minimum possible weight."],"correct":1,"exp":"The most important reserve criterion is that the canopy is big enough for the pilot's all-up weight - that's what keeps the sink rate below the certification target. Pack volume, weight and inner-container design matter for comfort but are secondary to sizing: a too-small reserve can never give a survivable descent. Always size to your real loaded weight.","sub":"Reserve parachute"},{"id":"Materials_105","topic":"Materials","text":"Which of the following can shorten the opening time of a reserve chute? 1. Low porosity. 2. Double hang points. 3. Short pack interval. 4. High airflow speed. 5. Easy to grasp reserve handle.","options":["2,3,4,5","1,2,3,4","1,2,4,5","1,3,4,5"],"correct":3,"exp":"A reserve opens quickly if (1) the canopy fabric has low porosity so it inflates fast, (3) the pack is fresh so folds haven't compressed/stuck, (4) you're moving fast through the air to inflate it, and (5) the handle is easy to grab so reaction time is short. Double hang points may aid stability but don't speed up the opening.","sub":"Reserve parachute"},{"id":"Materials_107","topic":"Materials","text":"If a paraglider is put in a car boot there are different fluids that it may come into contact with. Which of the following would damage it the least?","options":["Antifreeze for the radiator.","Distilled water for the battery.","Cleaning fluid for the windscreen washer.","Petrol."],"correct":1,"exp":"Of the fluids commonly found in a car boot, distilled water is the only one that's chemically inert toward the wing's coating and fibres. Petrol, antifreeze and screen wash all contain solvents or surfactants that dissolve or attack the polyurethane/silicone coating. If the wing must travel in the boot, store it away from any other liquids.","sub":"Sail cloth and coating"},{"id":"Materials_108","topic":"Materials","text":"Which form of radiation causes the most damage to a paraglider?","options":["X-ray radiation.","Gamma radiation.","Infrared radiation.","Ultra-violet radiation."],"correct":3,"exp":"Ultraviolet radiation is the dominant source of fabric ageing in a paraglider. UV photons break the polymer chains in nylon fibres and the coatings, making them brittle and porous over time. Infrared is just heat (manageable), and X-ray/gamma exposure isn't a real-world flying issue. Minimising UV - by packing the wing in the shade between flights - dramatically extends life.","sub":"Sail cloth and coating"},{"id":"Materials_109","topic":"Materials","text":"Gloves for paragliding","options":["should always be worn to protect hands from injury.","should be as thin as possible so that the feeling is not unnecessarily minimised and the drag is not increased.","should only be worn when absolutely necessary as they reduce the feeling that the pilot has for the brake/steering lines.","need only be worn in winter and high altitudes to protect against cold."],"correct":0,"exp":"Gloves should always be worn. Their main job is to protect the hands from line burn during launch, abrasion on rough terrain and the cold at altitude. Even in summer the brake lines under load can saw your fingers, and at 3000 m it's freezing even with sun on the ground. Modern paragliding gloves don't degrade brake feel meaningfully.","sub":"Pilot protective gear"},{"id":"Materials_110","topic":"Materials","text":"The helmet is mostly to protect the pilot","options":["after pilot error resulting in a landing on the pilot's head.","during a crash with another aircraft.","during a fall from high altitude.","during a fall on launch and landing."],"correct":3,"exp":"Statistically, head injuries in paragliding overwhelmingly happen during the launch run and landing - tripping, hitting the slope, low-altitude impacts. The helmet's main job is to absorb those low-energy ground impacts. Mid-air collisions with other aircraft or falls from altitude are catastrophic regardless of helmet, so the helmet is specifically designed for the take-off/landing phase.","sub":"Pilot protective gear"},{"id":"Materials_111","topic":"Materials","text":"Which helmet protects pilots the best?","options":["Bicycle helmets.","Climbing helmets.","Jet helmets.","Integral helmets."],"correct":3,"exp":"Full-face (integral) helmets cover the face and chin in addition to the skull, so they protect the face and jaw during the launch and landing impacts that are most common. Modern composite full-face helmets are both light and strong. Bicycle, climbing and jet helmets give less coverage and are not optimal for paragliding's typical impact patterns.","sub":"Pilot protective gear"},{"id":"Materials_112","topic":"Materials","text":"During flight an Anemometer measures","options":["the drift speed relative to the forward speed.","the speed in relation to the ambient air.","the speed over ground.","the wind direction."],"correct":1,"exp":"An anemometer measures the speed of the air flowing past it - i.e. the wing's airspeed relative to the surrounding air mass, not its ground speed and not wind direction. It's not the same as a GPS speed reading, which gives speed over ground (and includes any wind drift).","sub":"Flight instruments"},{"id":"Materials_113","topic":"Materials","text":"Which of the following mounting positions would give the most accurate reading from an Anemometer?","options":["1 meter under the pilot's foot.","On the thigh of the pilot.","On the front riser.","On the A-lines half way between the pilot and the canopy."],"correct":0,"exp":"The anemometer needs clean air to measure airspeed accurately. Mounting it on a riser, on the pilot's body, or up in the lines puts it in the disturbed flow around the pilot or the wing. About 1 m below the pilot's foot is far enough from the pilot's slipstream and harness drag to read the actual airflow the wing is seeing.","sub":"Flight instruments"},{"id":"Materials_114","topic":"Materials","text":"During flight a variometer informs a pilot about","options":["the horizontal speed.","the air density.","the relationship between vertical and horizontal speed.","vertical speed."],"correct":3,"exp":"A variometer measures and reports the glider's vertical speed - climb rate in thermals, sink rate elsewhere. It does so by tracking the rate of change in atmospheric pressure with time. An audible vario is the single most useful instrument for a paraglider pilot. It does not measure horizontal speed or air density.","sub":"Flight instruments"},{"id":"Materials_115","topic":"Materials","text":"A variometer works by measuring","options":["the horizontal speed.","the vertical speed.","the changes in altitude.","atmospheric pressure differences."],"correct":3,"exp":"A variometer doesn't measure speed directly - it measures atmospheric pressure and reports its rate of change. Since pressure decreases steadily with altitude, a falling pressure means you're climbing and a rising pressure means you're sinking. The numerical readout in m/s is computed from that pressure trend.","sub":"Flight instruments"},{"id":"Materials_117","topic":"Materials","text":"A zone of high pressure is extending from Spain in the direction of central Europe. In Switzerland it can be expected that after calibrating an altimeter in the morning, by the afternoon the reading from the altimeter will be","options":["too low.","too high.","Correct as before.","too high or too low depending on the temperature."],"correct":0,"exp":"A strengthening or approaching high pressure pushes local pressure up. An altimeter calibrated in the morning interprets the rising pressure as a descent - so by the afternoon its altitude reading is too low compared to the actual height. Always recalibrate before each flight, especially when the weather pattern is changing.","sub":"Flight instruments"},{"id":"Materials_118","topic":"Materials","text":"A high pressure above central Europe is weakening. In Switzerland it can be expected that after calibrating an altimeter in the morning, by the afternoon the reading from the altimeter will be","options":["too high or too low depending on the temperature.","too low.","too high.","correct as before."],"correct":2,"exp":"An altimeter derives altitude from atmospheric pressure: when local pressure drops it concludes you went higher. If the high pressure system is weakening, pressure falls during the day - so a morning-calibrated altimeter reads too high by the afternoon. Always recalibrate before each flight to avoid this drift.","sub":"Flight instruments"},{"id":"Materials_119","topic":"Materials","text":"An EN certification test is","options":["an obligatory certification of the flight characteristics of each type of wing sold in Switzerland, conforming to SHV standards.","an obligatory certification of the flight characteristics of each wing sold in Switzerland, conforming to SHV standards.","a non obligatory certification of the flight characteristics of each wing sold in Switzerland, conforming to SHV standards.","a non obligatory certification of the flight characteristics of each type of wing sold in Switzerland, conforming to European standards."],"correct":3,"exp":"EN certification is a European Norm scheme. It is voluntary - manufacturers aren't legally forced to certify - but in practice SHV and most national bodies expect EN compliance, and BAZL requires it for exam wings. It is per wing model (one certificate per type), not per individual airframe.","sub":"EN certification, wing loading and structural loads"},{"id":"Materials_122","topic":"Materials","text":"Flying with a EN tested wing in Switzerland is","options":["obligatory for SHV members, otherwise strongly recommended.","obligatory for exams as stipulated by BAZL (OFAC) otherwise strongly recommended.","obligatory for pilots with SHV 3rd party insurance, otherwise strongly recommended.","required by law."],"correct":1,"exp":"In Switzerland, flying with an EN-certified wing is legally required only for the official BAZL/OFAC exams. Outside of exams it's strongly recommended but not statutorily compulsory - though SHV insurance and most schools effectively require it. Across the rest of Europe EN is the de facto standard, with Germany still on the older LTF as the exception.","sub":"EN certification, wing loading and structural loads"},{"id":"Materials_123","topic":"Materials","text":"The compliance of a wing to EN norms is a declaration concerning","options":["the structural strength and flight characteristics of a specific glider model in new condition.","the construction (conforming to SHV standards) and durability/resistance to aging of a specific glider model.","the flight characteristics and construction conforming to SHV standards of a specific glider model in new condition.","the structural strength and durability/resistance to aging of a specific glider model."],"correct":0,"exp":"EN certification tests a brand new wing of a specific model: the static and shock-load tests check structural strength (8G minimum, often more), and the in-flight manoeuvre sequence (24 manoeuvres scored across 90 points) classifies its flight characteristics A/B/C/D. It's a one-time, type-level certification - it says nothing about how the wing holds up after wear, age or damage.","sub":"EN certification, wing loading and structural loads"},{"id":"Practical Flying_2","topic":"Practical Flying","text":"What effects should a pilot with a bad cold and otitis (middle ear inflammation) expect during his flight? < >","options":["Highly reduced oxygen uptake within the lungs.","Damage to the body due to dehydration.","Sudden and very acute headaches.","Highly reduced ability to concentrate, impaired perception and judgement, reduced bodily performance.",">>>"],"correct":2,"exp":"When you fly with a head cold or middle-ear infection, the Eustachian tubes are swollen and can no longer equalise pressure on the way down. As the outside pressure rises, the trapped air in the inner ear is compressed, the eardrum is pushed inward and stretches violently - producing sudden, very sharp pain (and risk of barotrauma) rather than slow performance loss. The textbook reasons not to fly that day.","sub":"Pilot physiology, cold and altitude"},{"id":"Practical Flying_3","topic":"Practical Flying","text":"Up until what altitude can a person in a resting state adapt to the different changing atmospheric conditions?","options":["approx. 3,000m above sea level.","approx. 4,000m above sea level.","approx. 5,000m above sea level.","approx. 2,000m above sea level."],"correct":1,"exp":"Up to about 4000 m above sea level a resting body still adapts well to the falling oxygen partial pressure - hyperventilation and faster pulse compensate enough that you keep functioning. Higher up, those mechanisms run out and acute mountain sickness or hypoxia set in. Paragliding without oxygen above this band is risky for anyone not specifically acclimatised.","sub":"Pilot physiology, cold and altitude"},{"id":"Practical Flying_6","topic":"Practical Flying","text":"The oxygen content of the air changes with altitude. The significant effects on the human body can be greatly reduced by","options":["regular physical exercise and acclimatisation.","consciously taking deep breaths at shorter intervals.","preventative intake of travel sickness preparations.","regular intake of vitamin C preparations."],"correct":0,"exp":"Hypoxia tolerance is genuinely improved only by raising the body's aerobic baseline and by spending time at altitude so the blood/lung response adapts. Regular endurance training and a stepwise acclimatisation week (sleep low, climb high) are the two interventions with measurable effect; deep breaths, vitamin pills and motion-sickness drugs do not change how much O2 the blood can carry.","sub":"Pilot physiology, cold and altitude"},{"id":"Practical Flying_7","topic":"Practical Flying","text":"When a paraglider is flying at 32km/h in an air mass of 2ºC the cooling effect on your body is comparable to a temperature in calm air of","options":["+ 8° C","+ 2° C","- 11° C","- 0° C"],"correct":2,"exp":"The standard wind-chill table for paragliding tabulates exactly this scenario: ambient air 2 deg C and an airspeed of about 32 km/h feels like -11 deg C on exposed skin. The 13-degree drop comes from forced convection stripping the warmed boundary layer off your face and hands - and is why a hard-shell collar, full-finger gloves and a hot drink before launch matter even on a mild spring day.","sub":"Pilot physiology, cold and altitude"},{"id":"Practical Flying_8","topic":"Practical Flying","text":"What happens to the human body when the core temperature is reduced below its normal range?","options":["The physical performance increases and oxygen needs decrease.","The physical performance decreases and oxygen needs increase.","The physical performance and oxygen needs increase.","The physical performance and oxygen needs decrease."],"correct":1,"exp":"A cold body has to spend a much larger fraction of its energy budget on shivering and on maintaining core temperature, so muscle output drops while basal oxygen demand actually rises. The net effect for the pilot: slower reactions, weaker grip on the brakes and a much smaller decision window - which is exactly when accidents happen.","sub":"Pilot physiology, cold and altitude"},{"id":"Practical Flying_9","topic":"Practical Flying","text":"When the human body is exposed to an airflow for an extended period","options":["its demand for oxygen increases considerably.","its demand for protein increases considerably.","its demand for vitamins increases considerably.","its demand for liquids increases considerably."],"correct":3,"exp":"Constant airflow over the body, mouth and nose accelerates evaporation from skin and respiratory tract, so fluid loss climbs sharply during a long flight. The result of skipping fluids is a headache, sluggish thinking and slower reflexes hours into the flight - that's why Sam stresses 'drink, drink, drink' in the pre-flight checklist even though it means using a urinal condom or similar in the air.","sub":"Pilot physiology, cold and altitude"},{"id":"Practical Flying_10","topic":"Practical Flying","text":"Zürich-Kloten announces a QNH of 1015. What does this signify?","options":["At Zürich-Kloten the sea level pressure calculated in accordance with the ICAO standard atmosphere is 1015 hPa.","The maximum pressure in Zürich-Kloten on this day is 1015 hPa.","In Zürich-Kloten the atmospheric pressure is 1015 hPa.","The standard pressure in Zürich-Kloten according to ICAO is 1015 hPa."],"correct":0,"exp":"QNH is the local sea-level pressure that aerodromes broadcast after correcting the station reading down to mean sea level using the ICAO standard atmosphere. With this number dialled into the altimeter it then reads altitude above sea level rather than above the station. So 'Zurich QNH 1015' is purely a calibration value, not the maximum or standard pressure for that day.","sub":"Flight preparation and airspace info"},{"id":"Practical Flying_11","topic":"Practical Flying","text":"Zürich-Kloten announces a QNH of 1015 hPa, Lugano a QNH of 1007. What does this signify?","options":["The pressure drop between Zürich and Lugano results in a very strong north wind across the Alps with cloud congestion on the northern side and north föhn on the southern side of the Alps.","The pressure drop between Zürich and Lugano results in a very strong south wind across the Alps with cloud congestion on the southern side and south föhn on the northern side of the Alps.","There is colder, denser air in Zürich-Kloten than in Lugano. Good thermals can be expected in the north side of the Alps.","As Zürich-Kloten is at a higher altitude than Lugano, the pressure is somewhat higher. When converted to sea level pressure the difference over the alps is small and the resulting wind therefore weak."],"correct":0,"exp":"Both stations report QNH at sea level, so the 8 hPa drop from Zurich (1015) to Lugano (1007) is a real north-south pressure gradient across the Alps. Wind always blows from high to low pressure, so this configuration drives air over the main Alpine crest from north to south - the classic north-foehn pattern with strong, gusty winds on the south side.","sub":"Flight preparation and airspace info"},{"id":"Practical Flying_13","topic":"Practical Flying","text":"From what difference in pressure between Zurich and Lugano can one expect foehn in the Alpine valleys?","options":["From 8 hPa upwards.","From 2 hPa upwards.","From 16 hPa upwards.","From 4 hPa upwards."],"correct":3,"exp":"The 4 hPa rule of thumb between Zurich (north of the Alps) and Lugano (south) is the practical foehn threshold used by Swiss pilots. Below that the pressure gradient is too weak to drive the cross-Alpine flow, above it the air is forced over or around the ridge and you get the characteristic strong, gusty, dry winds on the lee side. Always check the QNH pair before flying.","sub":"Flight preparation and airspace info"},{"id":"Practical Flying_15","topic":"Practical Flying","text":"15 A pilot is anticipating flying from the Alps far into the flatlands. Which of the following publications will give him information about the location of the dividing line Alps/Swiss Plateau and the resulting change in maximum flight altitude?","options":["The DABS.","The Notam.","The glider map.","The VFR-Manual."],"correct":2,"exp":"When the route leaves familiar Alpine terrain for the flatlands you need the document that shows controlled airspace, prohibited zones, glider sectors and especially the high-tension power lines that criss-cross the lowlands - the glider/gliding map (Segelflugkarte). DABS and NOTAM cover only short-term restrictions; the VFR Manual is reference material rather than a navigation chart.","sub":"Flight preparation and airspace info"},{"id":"Practical Flying_17","topic":"Practical Flying","text":"Amongst other things, which of the following form part of the preparation for flying in a new site?","options":["Inspect the landing field, find out about aerial obstacles, register the flight with the chief of the nearest airfield.","Register the flight with the chief of the nearest airfield, plan the flight according to the conditions, inspect the landing field.","Find out about aerial obstacles, register the flight with the chief of the nearest airfield, plan the flight according to the conditions.","Plan the flight according to the conditions, inspect the landing field, find out about air-space and aerial obstacles."],"correct":3,"exp":"Good preparation always covers the same four pillars: match your plan to the actual conditions, walk the landing field, identify all cables and obstacles, and respect wildlife sanctuaries. There is no requirement to register a flight or notify an airfield chief - those distractor options exist only to pad the question.","sub":"Flight preparation and airspace info"},{"id":"Practical Flying_18","topic":"Practical Flying","text":"What do you need to pay particular attention to when visiting a new landing field?","options":["Where is the next doctor's surgery, where is the next telephone.","What are the access options, where is the place to pack up the gear.","By which wind directions you can approach, which obstacles are to be noted for each different landing approach.","Where is the next telephone, what are the access options."],"correct":2,"exp":"When you fly into an unfamiliar landing field, the very first questions are: in which wind directions can I approach safely, and which obstacles must I clear on each approach? Doctor surgeries and pack-up spots are operational details for after landing, not life-and-death information you need while still in the air.","sub":"Flight preparation and airspace info"},{"id":"Practical Flying_19","topic":"Practical Flying","text":"Information concerning large cables and where they go are given","options":["in the regulations for aircraft in special categories (VLK).","in the DABS.","in the Notam.","on the federal aerial obstacle map and partially on the glider map."],"correct":3,"exp":"Permanent obstacles like overhead lines and cableways are catalogued on the federal aerial obstacle map (Luftfahrthindernisverzeichnis) and many of them also appear directly on the glider/gliding map. DABS and NOTAM publish only short-term, time-limited information; the VLK regulations are about aircraft categories, not obstacles.","sub":"Flight preparation and airspace info"},{"id":"Practical Flying_20","topic":"Practical Flying","text":"What is the most important criterion when choosing a launch site?","options":["You should be able to safely stop a takeoff at any time.","The wind must come from the front.","The launch should be very steep to facilitate as quick a start as possible.","The launch should be equipped with a windsock."],"correct":0,"exp":"Sam states the guiding principle bluntly: a launch site is only suitable when an abort remains possible at any moment in the run. A cliff with a short run that drops away into space fails this test even though it looks dramatic and steep. Wind direction, slope angle and windsock are secondary - if you cannot stop, you should not be there.","sub":"Take-off site choice and conditions"},{"id":"Practical Flying_21","topic":"Practical Flying","text":"At launch you have a headwind of 15km/h. What can be expected in terms of distance required and speed of takeoff?","options":["The take-off distance is short, the speed is low.","The take-off distance is long, the speed is high.","The take-off distance is short, the speed is high.","The take-off distance is long, the speed is low."],"correct":0,"exp":"Airspeed is what makes the wing fly; the ground roll just has to add enough speed-over-ground to reach that airspeed. With 15 km/h of head wind already on the wing, you only need to run up another ~10 km/h of airspeed to lift off, so the take-off run is short and your groundspeed at lift-off is modest. Strong head wind = short run, low ground speed.","sub":"Take-off site choice and conditions"},{"id":"Practical Flying_23","topic":"Practical Flying","text":"In the area of the launch site there is no wind. What are the most important criteria for a suitable spot for takeoff?","options":["There must be a windsock on the slope below the launch.","The area behind the glider should be as flat and free of small obstacles and unevenness as possible.","The terrain must be very steep to facilitate as quick a start as possible.","The area in front of the glider should be as free from small obstacles or unevenness as possible."],"correct":3,"exp":"Zero-wind launches are forward launches in which all the airspeed has to be built by running. The area in front of the glider (the actual run-out) therefore has to be flat, smooth and obstacle-free so you can accelerate without tripping. What lies behind the wing matters very little once it is overhead.","sub":"Take-off site choice and conditions"},{"id":"Practical Flying_24","topic":"Practical Flying","text":"At launch you have a head wind of 20km/h. What are the most important criteria for a suitable takeoff spot?","options":["The area in front of the glider should be as free from small obstacles or unevenness as possible.","There must be a windsock on the slope below the launch.","The terrain must be very steep to facilitate as quick a start as possible.","The area behind the glider should be as free of small obstacles and unevenness as possible."],"correct":3,"exp":"At 20 km/h head wind you do a reverse launch. Once the wing comes up it can lift you a step or two backwards before you stabilise it, so the critical zone is now behind you, not in front. That ground has to be free of stones and holes - tripping while being dragged backward is the classic injury here.","sub":"Take-off site choice and conditions"},{"id":"Practical Flying_25","topic":"Practical Flying","text":"When taking off in a corridor in a forest, you have to be aware and ready for the possibility that","options":["it is calm at ground level although at tree-top height the wind will be present, resulting in strong turbulence at that height.","when clearing the first trees there may be strong thermals due to the temperature difference between the forest and the clearing.","in the cool clearing between the sunny forests there will be back-wind close to the ground, making it difficult to clear the launch.","due to the large temperature difference between the forest and field, especially strong and frequent thermals with the corresponding turbulence will be present."],"correct":0,"exp":"Inside a forest corridor the trees shelter the launch and you'll often feel essentially no wind at ground level - while at canopy height the actual ridge wind is blowing. The moment the wing climbs above the tree tops it abruptly meets that wind, often with a hard pull or sudden swing. Plan the launch and the first seconds of climb-out for that transition.","sub":"Take-off site choice and conditions"},{"id":"Practical Flying_26","topic":"Practical Flying","text":"What indications are there that you are taking off on the leeward side of a mountain?","options":["Force and direction of wind can change abruptly.","At higher altitudes the clouds drift over the launch from front.","Constant cycles between zero wind and warm front-winds of varying strength.","Constant front wind of 5 - 10 km/h."],"correct":0,"exp":"On the lee side, air spills over the ridge in rolling eddies rather than as steady flow. The result on the launch is exactly what gives it away: wind that swings rapidly in direction and strength, sometimes blowing up, sometimes down, sometimes from the side. Steady, predictable wind is the windward signature; abrupt shifts mean you're behind the obstacle.","sub":"Take-off site choice and conditions"},{"id":"Practical Flying_27","topic":"Practical Flying","text":"At the launch site there is a 25km/h head wind, what is the best method to take off?","options":["The Pilot should forward launch whenever conditions allow as this is by far the safest launch method.","The pilot positions himself on a steep slope as close to the glider's trailing edge as possible and accelerates as fast as possible, in order to energetically pull up the glider.","The pilot inflates the glider in reverse fashion on a shallow slope and takes care not be involuntarily lifted up before he is ready.","The pilot inflates the glider in reverse fashion on a steep slope so that he is lifted as soon as the glider is up."],"correct":2,"exp":"At 25 km/h head wind a forward launch is dangerous - the wing comes up far above you and you have very little chance of controlling it. The textbook solution is a reverse launch on a shallow slope: shallow so the wing does not overshoot and pluck you off before you are ready, reverse so you can watch and control the canopy through the gust. Steep slope plus that wind = immediate uncontrolled lift-off.","sub":"Take-off site choice and conditions"},{"id":"Practical Flying_28","topic":"Practical Flying","text":"Which of the following is the correct 5 point check on take off?","options":["1. Harness, helmet and reserve closed and secure; 2. Risers and lines run correctly; 3. Canopy layout is satisfactory; 4. Wind direction and strength; 5. Start and air space are clear.","1. Wind direction and strength; 2. Start and air space are clear. 3. Harness, helmet and reserve closed and secure; 4. Risers and lines run correctly; 5. Canopy layout is satisfactory.","1. Canopy layout is satisfactory; 2. Wind direction and strength; 3. Start and air space are clear. 4. Harness, helmet and reserve closed and secure; 5. Risers and lines run correctly.","1. Risers and lines run correctly; 2. Canopy layout is satisfactory; 3. Wind direction and strength; 4. Start and air space are clear. 5. Harness, helmet and reserve closed and secure."],"correct":0,"exp":"Sam goes through the check in the order: body and equipment first (reserve pins, all buckles closed and secured), then risers and lines, then the wing layout, then wind direction and strength, and finally the launch path and airspace - the last item is checked again right before the take-off run.","sub":"Take-off site choice and conditions"},{"id":"Practical Flying_30","topic":"Practical Flying","text":"At what moment should the pilot be sure that the start and airspace are clear?","options":["Just before taking off.","Before the pilot lays out the glider on the start.","Before the pilot makes himself ready for the start.","When the pilot has finished laying out the glider."],"correct":0,"exp":"Of all five points, the airspace check is the only one that can change in the few seconds between setting up and running. A pilot flying past, an animal walking into the corridor or a paraglider you didn't see - all of these can appear after the check. That is why the rule is to look up one more time just before lifting off.","sub":"Take-off site choice and conditions"},{"id":"Practical Flying_34","topic":"Practical Flying","text":"A pilot finds the conditions at launch challenging. He should","options":["take off, because as a frequent user of this launch he can assume that he will be able to launch safely this time as well.","let other pilots start first in order to conclude that, as they started without problems, then so can he.","start, given that safety on official launches is guaranteed.","take off only when he is convinced he can do it without a problem."],"correct":3,"exp":"The launch decision is yours alone. 'I fly here often' or 'other people are launching' are answers that have killed pilots; the safety of an officially permitted launch site does not transfer to your skill, gear or condition. Only the pilot can judge whether the conditions match their abilities, and the rule is to launch only when convinced you can do so without problem.","sub":"Take-off site choice and conditions"},{"id":"Practical Flying_36","topic":"Practical Flying","text":"During which phase at the latest should you abort your takeoff?","options":["In the control and correction phase.","In the acceleration phase.","In the inflation phase.","In none of the phases."],"correct":0,"exp":"The launch has three phases: inflation, control/correction, and acceleration. An abort decision belongs in the control phase - the moment you decide 'no, something is wrong' before you commit to the run. Once you are in the acceleration phase you are committed; trying to abort during the sprint is what produces injuries.","sub":"Take-off execution and immediate problems"},{"id":"Practical Flying_37","topic":"Practical Flying","text":"On a South facing launch you have a wind from 120º at 5 knots. What is the best approach?","options":["The start should be aborted as the side wind presents too high a risk.","Inflate the glider against the wind and accelerate diagonally down the slope against the wind.","Inflate the glider against wind and progressively turn towards the fall-line and accelerate.","Inflate the glider towards the south and then accelerate in a southwesterly direction to compensate for the side wind."],"correct":2,"exp":"Wind from 120 deg on a south-facing slope means it comes from your left at about 60 deg off the fall line. The standard solution: inflate against the wind so the canopy comes up clean and symmetric, then gradually pivot the wing back toward the fall line while you accelerate down the slope. Trying to launch and accelerate directly into the cross component is a recipe for a slide and a side collapse.","sub":"Take-off site choice and conditions"},{"id":"Practical Flying_40","topic":"Practical Flying","text":"Why should the brakes never be released immediately after taking off?","options":["Because shortly after launch the danger exists that the static pressure in the glider drops and the glider collapses.","Because due to the turbulence that is often present close to the ground the pilot needs the brakes to pull himself back into an upright position should he touch the ground again.","Because the glider needs to be strongly braked directly after launch in order to increase glider performance enough to take off.","In the event of a collapse close to ground caused by turbulence a pilot has no time for correction if he first has to search for brakes."],"correct":3,"exp":"In the first seconds after lift-off you are flying low, slow and inside ground-level turbulence. If a gust collapses one side of the wing while your hands are up, you have no time to brake-recover before you reach the ground. Keep the brakes engaged ready to react - sliding into the harness can wait until you have altitude and clean air below you.","sub":"Take-off execution and immediate problems"},{"id":"Practical Flying_41","topic":"Practical Flying","text":"Directly after taking off the pilot realizes he must brake hard on the right side in order to fly straight ahead. What could be the cause?","options":["Strong side wind from the left.","He has a knot in the left suspension lines.","He has a knot in the right suspension lines.","Light side wind from the right."],"correct":1,"exp":"A knot on the left brings the left wingtip down a bit, increases the angle of attack on that side and produces extra drag - so the wing veers left. To fly straight you have to brake the right (open) side hard. Strong side wind would produce a body drift, not a constant pull to one side.","sub":"Take-off execution and immediate problems"},{"id":"Practical Flying_42","topic":"Practical Flying","text":"Directly after taking off the pilot realizes he must brake hard on the right side in order to fly straight ahead. He notices a knot on the left side between the D-lines and brake lines. What are the consequences for the rest of the flight?","options":["The glider is more susce
