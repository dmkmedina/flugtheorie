ptible to turbulence and collapses faster.","The D-lines could break due to the friction, resulting in a crash.","The glider has a greater tendency to collapse on the right side, and when turning left the possibility of stalling the glider must be anticipated.","The tendency to go into inflated stalls is higher, and when turning right the possibility of stalling the glider must be anticipated."],"correct":3,"exp":"A knot in the rear (D-line/brake-line) area shortens that side and effectively pre-brakes it. The angle of attack stays high, so the parachutal-stall tendency is increased; if you also turn into the knotted side the inside brake will reach stall point much sooner than normal. Plan a wide, gentle turn pattern and land using the rear riser of the knotted side rather than full brake.","sub":"Take-off execution and immediate problems"},{"id":"Practical Flying_43","topic":"Practical Flying","text":"Directly after taking off a pilot notices a knot between the front lines on the left side of the wing. What are the consequences?","options":["The glider has a greater tendency to collapse on the right side, and when turning left the possibility of stalling the glider must be anticipated.","The A-lines could break due to the friction, resulting in a crash.","The tendency to go into inflated stalls is higher, and when turning right the possibility of stalling the glider must be anticipated.","The glider is more susceptible to turbulence and collapses faster on the left side."],"correct":3,"exp":"A knot in the front A-lines pulls the leading edge of that side downward, reducing the angle of attack and the internal pressure on that half of the wing. That side is then much more vulnerable to turbulence and will collapse more easily than the open side - the opposite problem to a rear-line knot.","sub":"Take-off execution and immediate problems"},{"id":"Practical Flying_44","topic":"Practical Flying","text":"Directly after taking off a pilot realizes that the left brake does not function and discovers a knot at the brake line guide on the rear riser. What should he do?","options":["Steer to the left with more force so that the knot gives a little.","Turn to the right in order to immediately execute an emergency landing.","Pull both brakes for an instant quickly and forcefully to 100% (symmetrical pumping) in order to release the knot.","Fly the glider to a safe distance away from the hill using the left rear riser instead of the brake when steering, then try to undo the knot."],"correct":3,"exp":"A jammed brake is treated as a steering failure. The first priority is to fly away from the slope on the rear riser of the affected side, which still steers and decelerates the wing without the broken brake. Pumping the brakes or throwing the reserve over an unstable, uncollapsed wing makes things worse; turning straight into the hill is the worst option of all.","sub":"Take-off execution and immediate problems"},{"id":"Practical Flying_45","topic":"Practical Flying","text":"A pilot wants to fly as far as possible with calm air. What should he do?","options":["Fly as fast as possible, opening trimmers if installed and using the accelerator as much as the glider and turbulence allows.","Fly the glider with approx. 50% brakes.","Fly the glider with zero brakes at trim speed.","Fly the glider with approx. 20 - 30% brakes."],"correct":2,"exp":"In calm air the wing's best glide is at trim speed - arms up, brakes just touching. Any extra brake increases the angle of attack and the sink rate without buying speed; accelerator increases speed but the polar drops faster than glide ratio improves. So calm air, maximum distance: zero brake at trim speed.","sub":"Glide, wind drift and crab angle"},{"id":"Practical Flying_46","topic":"Practical Flying","text":"A launch is at 1,600m AMSL and the valley below is at 400m AMSL. The manufacturer indicates the glider has a glide ratio of 9:1. What is the longest distance you can fly in calm air?","options":["14,4 km","10,8 km","6 km","9 km"],"correct":1,"exp":"Maximum distance over ground = glide ratio x altitude lost. You start 1200 m above the valley floor (1600 - 400); with the wing's best glide of 9 you can cover 9 x 1.2 km = 10.8 km in calm air. The other distances come from the wrong altitude difference or the wrong arithmetic.","sub":"Glide, wind drift and crab angle"},{"id":"Practical Flying_48","topic":"Practical Flying","text":"Can the speed of your glider be greatly influenced by your body position?","options":["If during the flight a good aerodynamic position is assumed, the drag is reduced and the speed slightly increased.","If the legs are outstretched, the centre of mass moves forward, thereby reducing the angle of attack and increasing speed.","No.","If during the flight the pilot leans forward with his shoulders against the risers the glider will be accelerated."],"correct":0,"exp":"Your body is the biggest drag-producing object hanging under the wing, so the polar genuinely changes with posture. A compact, reclined position with arms tight to the risers cuts pressure drag and adds 1-2 km/h. Extended legs or shoulders pushed forward actually move the centre of gravity backward and increase drag - which is why a clean aerodynamic position is part of the syllabus.","sub":"Glide, wind drift and crab angle"},{"id":"Practical Flying_49","topic":"Practical Flying","text":"A pilot wants to fly as far as possible with a head wind of 25 km/h. What should he do?","options":["Fly as fast as possible, opening trimmers if installed and using the accelerator as much as the glider and turbulence allows.","Fly the glider with light brake pressure (1 - 10% braked).","Fly the glider with approx. 20 - 30% brakes.","Fly the glider with approx. 50% brakes."],"correct":0,"exp":"Against a 25 km/h head wind, trim speed gives you almost no progress over ground - the wing crawls. You need to fly the wing fast: trimmers open if you have them, accelerator on. Yes, the sink rate increases, but ground covered per metre lost is greater because you're not standing in the air. This is the classic 'speed up in headwind/sink' rule.","sub":"Glide, wind drift and crab angle"},{"id":"Practical Flying_52","topic":"Practical Flying","text":"A pilot is flying towards his landing field exactly south of his position with a 25 km/h west wind. What should he do to arrive as high as possible?","options":["He should aim the glider in a south-westerly direction and fly as fast as possible.","He should aim the glider towards the landing and fly with brakes lightly applied.","He should aim the glider in a southerly direction and fly as fast as possible.","He should aim the glider towards the landing and fly as fast as possible."],"correct":0,"exp":"Wind from the west at 25 km/h would drift the wing east of the target. To still reach a landing exactly south, you have to angle the heading into the wind component (south-westerly) so that drift plus heading produce a true south track. And because you also have a head-wind component, you must fly fast (accelerator on) to keep the over-ground progress as high as possible.","sub":"Glide, wind drift and crab angle"},{"id":"Practical Flying_53","topic":"Practical Flying","text":"A pilot is flying towards his landing field exactly south of his position with a 0 km/h west wind. If he aims his glider exactly towards his landing field all the time which of the following would be his flight path? 21","options":["4","3","2","1"],"correct":0,"img":"assets/shv_images/practical_flying_53.jpg","exp":"With no wind, aiming the heading directly at the target produces a straight line over ground to the target - the simplest case shown in track 4. The other tracks are crosswind paths or dogleg arcs; they would only happen if there were wind or you constantly readjusted the heading.","sub":"Glide, wind drift and crab angle"},{"id":"Practical Flying_54","topic":"Practical Flying","text":"A pilot is flying towards his landing field exactly south of his position with a 0 km/h west wind. If he aims his glider due south all the time, which of the following would be his flight path? 142","options":["3","1","4","2"],"correct":0,"img":"assets/shv_images/practical_flying_54.jpg","exp":"Zero wind, heading due south, target exactly south - this just gives a straight south track (path 3). The west wind in the question stem is 0 km/h, so the geometry collapses to the no-wind case. The visual gotcha is that students sometimes read 'west wind' as 'crosswind' even when its speed is zero.","sub":"Glide, wind drift and crab angle"},{"id":"Practical Flying_55","topic":"Practical Flying","text":"A pilot is flying towards his landing field exactly south of his position with a 20 km/h west wind. If he aims his glider towards southwest all the time which of the following would be his flight path? 12","options":["1","2","4","3"],"correct":0,"img":"assets/shv_images/practical_flying_55.jpg","exp":"Heading south-west with a 20 km/h west wind: the wing slides east because of the crosswind from the west, but the south-west heading already builds in some westerly correction. The vector sum produces the straight-south track to the target shown in path 1 - exactly the standard crab-angle solution.","sub":"Glide, wind drift and crab angle"},{"id":"Practical Flying_56","topic":"Practical Flying","text":"The angle of correction for wind drift (crab angle) is the angle between","options":["the transverse axis of your glider and the wind direction.","the longitudinal axis (or roll axis) of your glider and the wind direction.","the wind direction and your trajectory.","the longitudinal axis (or roll axis) of your glider and your trajectory."],"correct":3,"exp":"The crab angle is purely a geometry term: it is the angle between where the nose of the wing is pointing (longitudinal axis) and where the wing is actually travelling over the ground (the trajectory). Wind direction or aircraft transverse axis don't enter the definition - they only set the size of the angle you need.","sub":"Glide, wind drift and crab angle"},{"id":"Practical Flying_57","topic":"Practical Flying","text":"The angle of correction for wind drift (crab angle)","options":["is influenced by the direction but not the strength of the side wind.","increases as the side wind increases.","is influenced by the strength but not the direction of the side wind.","decreases as the side wind increases."],"correct":1,"exp":"The harder the side wind blows, the more the wind vector pushes the wing sideways relative to its own airspeed, so the heading has to be cranked further into the wind to compensate. Direction matters too (no wind = no crab) but the question is about magnitude: stronger crosswind always means a bigger correction angle.","sub":"Glide, wind drift and crab angle"},{"id":"Practical Flying_59","topic":"Practical Flying","text":"The angle of correction for wind drift (crab angle)","options":["is not influenced by the glider speed.","will become smaller when speed is increased.","will become larger when speed is increased.","is always half the angle between wind direction and trajectory."],"correct":1,"exp":"The wind component is fixed; only your airspeed is in your control. Going faster makes the side-wind vector shrink relative to your own velocity, so the heading has to bend into wind less to keep the ground track straight - the crab angle gets smaller. Accelerator-on in strong crosswind also keeps the ground track honest.","sub":"Glide, wind drift and crab angle"},{"id":"Practical Flying_60","topic":"Practical Flying","text":"The size of the angle of correction for wind drift (crab angle) depends on","options":["the speed of the glider, the wind direction and the wind strength.","the sink rate of the glider, the wind direction and the flight distance.","the speed of the glider, the wind direction and the flight distance.","the sink rate of the glider, the wind direction and wind strength."],"correct":0,"exp":"The crab-angle vector triangle is built from three quantities: how fast the wing is going (airspeed), how fast the wind is blowing (strength) and from where (direction). Flight distance and sink rate don't enter the geometry at all - they only tell you how long you stay aloft, not which heading to fly.","sub":"Glide, wind drift and crab angle"},{"id":"Practical Flying_61","topic":"Practical Flying","text":"A pilot is heading into the wind as he comes under a cumulus cloud. Where should he anticipate the thermal?","options":["Primarily on the windward side of the cumulus.","As soon as he finds himself underneath the cumulus.","In the centre of the cumulus.","Primarily on the leeward side of the cumulus."],"correct":0,"exp":"A cumulus is the visible top of a thermal column. With head wind the column tilts away from the pilot (downwind), so by the time you reach the cumulus the rising air is already behind it. The lift you can still tap is therefore on the windward side - between your position and the cloud, not under or downwind of it.","sub":"Thermalling and ridge soaring"},{"id":"Practical Flying_62","topic":"Practical Flying","text":"After circling for 10min in a thermal the pilot finds that his position over ground has shifted by 3km. What can we say about the force of wind?","options":["It cannot be determined from the information given.","Strong wind must be anticipated at ground level.","It is 18 km/h.","It is 30 km/h."],"correct":2,"exp":"If you drift 3 km in 10 minutes while circling, the average wind at your altitude is 3 km / (10/60 h) = 18 km/h. You don't need any extra information about ground-level conditions to compute it - the thermal effectively makes you a wind drogue. Stronger ground wind is possible but isn't derivable from the question.","sub":"Thermalling and ridge soaring"},{"id":"Practical Flying_63","topic":"Practical Flying","text":"A pilot finds a mass of rising air and tries to circle within it. After a turn of 90º his vario tells him he is descending. What should he do?","options":["He should immediately change the turn direction, as he most probably turned too early in the thermal.","As the horizontal extent or circumference of the rising air mass doesn't allow a full circle, he should look for another one.","He should turn another 180º then fly straight for a short distance, as the rising air must be in front of him, and then try to centre himself in the lift again.","He should definitely continue the turn with the same bank angle and speed."],"correct":2,"exp":"A vario showing sink after 90 deg of turn typically means you've turned right out of the column. Reversing direction makes you do another 180 deg back to where you came from; flying straight a short way often puts you back into rising air. Continuing the turn in the same direction or instantly switching usually wastes height without finding the core again.","sub":"Thermalling and ridge soaring"},{"id":"Practical Flying_64","topic":"Practical Flying","text":"A pilot is circling in a thermal with no prevailing wind. This current","options":["inclines to the west with increasing altitude.","rises vertically upwards.","inclines to the north with increasing altitude.","inclines to the east with increasing altitude."],"correct":1,"exp":"Without ambient wind there is nothing to push the rising air sideways - the thermal goes straight up like a chimney. Any inclination of the column always traces to a horizontal wind component; remove the wind and the column is vertical.","sub":"Thermalling and ridge soaring"},{"id":"Practical Flying_65","topic":"Practical Flying","text":"A pilot is circling in a thermal with no prevailing wind. What happens when he flies too far from the centre of the thermal?","options":["He ceases to climb and flies with his normal sink-rate.","The lift becomes stronger and more turbulent.","He flies into the surrounding sink and loses altitude rapidly.","The lift becomes stronger and less turbulent."],"correct":2,"exp":"Mass conservation: the air rising in the thermal has to be replenished from the sides, and it then sinks back down outside the column. So the thermal is surrounded by a halo of compensating sink. Leave the core and you don't merely 'stop climbing' - you start descending faster than normal sink. That's why centring matters so much.","sub":"Thermalling and ridge soaring"},{"id":"Practical Flying_66","topic":"Practical Flying","text":"A pilot is flying in a thermal with zero wind in order to gain altitude as fast as possible. Suddenly he loses the thermal and his vario indicates strong sink. What is generally the best thing to do?","options":["Make large diameter turns until the lift reappears.","A tight 120 - 180º turn to come back as quickly as possible into the thermal.","Turn 120 - 180º as flat as possible, in order to lose as little height as possible in the sink.","Fly straight ahead and look for a new area of lift."],"correct":1,"exp":"Strong sink right after losing the lift means you've drifted out of the column and into the compensating sink around it. A tight 120-180 deg turn brings you back into the core faster than a flat half-circle and much faster than searching for new lift. Flat turns lose altitude in sink; flying straight just continues the bleed.","sub":"Thermalling and ridge soaring"},{"id":"Practical Flying_67","topic":"Practical Flying","text":"A pilot is ascending in a thermal with a 10 knot wind from 270º. The thermal","options":["deviates with increasing height towards the east.","deviates with increasing height towards the north.","deviates with increasing height towards the west.","rises vertically."],"correct":0,"exp":"A wind from 270 deg is a westerly. The thermal column drifts with the wind, so it tilts in the direction the wind is blowing - toward the east. That's why on a westerly day you fly to the west of the visible cumulus to find the core at higher altitudes.","sub":"Thermalling and ridge soaring"},{"id":"Practical Flying_68","topic":"Practical Flying","text":"A pilot is ascending in a thermal with a 10 knot /270º wind. The thermal is deviating to the East at altitude. Which side of the thermal will the sink be at its strongest?","options":["On the side facing towards the sun.","On the windward side.","On the leeward side.","On the side facing away from the sun."],"correct":2,"exp":"The compensating sink around a tilted thermal isn't symmetric: it is strongest on the leeward (downwind) side, because that is where the air spills off the tilted column. Cross the thermal on the lee side and the sink is much harder than on the windward side - good incentive to stay upwind of the core.","sub":"Thermalling and ridge soaring"},{"id":"Practical Flying_69","topic":"Practical Flying","text":"A pilot is ascending in a thermal with a 10 knot /270º wind. The thermal is deviating to the East at altitude. In order not to lose the thermal, the pilot should","options":["fly generally more in the windward side of the thermal.","fly generally more in the leeward side of the thermal.","circle to the right whenever possible.","circle to the left whenever possible."],"correct":0,"exp":"Since a tilted column has stronger sink on the lee side, staying upwind of the core when circling keeps you in the column for longer as both you and it drift downwind together. The choice of turn direction matters much less than knowing where the strong sink lives.","sub":"Thermalling and ridge soaring"},{"id":"Practical Flying_70","topic":"Practical Flying","text":"A pilot is ascending in a thermal and wishes to fly a long cross country flight. When should he leave the thermal?","options":["Only when he is the highest.","Only when he has chosen his next objective and has enough height to reach it.","Only when his vario displays no more useable lift.","Only when he gets to within 50m of cloudbase."],"correct":1,"exp":"On XC, leaving a thermal is a planned decision, not a habit. You commit to the next objective - cumulus, ridge, possible source - and you stay in the climb until your altitude on the polar reaches that point with margin. Leaving at cloudbase or when the climb dies are habits that cost you the day.","sub":"Thermalling and ridge soaring"},{"id":"Practical Flying_71","topic":"Practical Flying","text":"What safety measures should be taken when encountering thermal turbulence during ridge soaring?","options":["Never fly below the ridge level.","Increase distance from ridges and adapt speed accordingly.","Leave the slope, as soaring in thermal turbulence carries too much risk.","Release the trimmers for a more homogeneous airflow over the glider, thereby reducing the chances of a stall."],"correct":1,"exp":"Thermal turbulence next to a ridge means thermals are detaching and rolling against the slope. The defensive answer is twofold: widen your distance to the terrain so a collapse never puts you in rock contact, and trim your airspeed to suit the conditions (a touch of speed bar usually makes the wing fly through gusts more cleanly). Releasing trimmers or quitting soaring entirely is not the standard procedure.","sub":"Thermalling and ridge soaring"},{"id":"Practical Flying_73","topic":"Practical Flying","text":"A paraglider","options":["leaves no perceptible wake turbulence when flying in the lower speed range.","leaves a band of sink behind it.","leaves a band of lift behind it.","leaves a zone of perceptible wake turbulence for a short time, which can be felt by other gliders."],"correct":3,"exp":"Every wing produces wingtip vortices and a churned-up trail behind it. For a paraglider the wake is short-lived but very real - fly close behind another wing, especially near the ground, and you can feel the rolling sink and pitch upsets. The polite spacing is the same as for any aircraft: a generous offset so you stay out of the lead pilot's wake.","sub":"Traffic, collision avoidance and reserve use"},{"id":"Practical Flying_75","topic":"Practical Flying","text":"What are the possible consequences when a glider flying straight ahead is braked (on both sides) too much or too sharply?","options":["The wing enters a constantly increasing spiral dive.","The airflow separates on one side (stalls) resulting in the wing diving over to that side and entering a spin.","The airflow separates from the wing, resulting in a parachutal stall, or the wing tips back into a full stall.","The glider suffers a front collapse, whereby the wingtips overtake the centre of the glider causing it to collapse together."],"correct":2,"exp":"Pulling both brakes too hard takes airspeed away symmetrically, so the airflow detaches at the same moment on both sides of the wing. With no airflow the wing either hangs vertically with no forward speed (parachutal/inflated stall) or tips backwards and deflates (full stall). Spiral and front collapse happen from asymmetric input, not symmetric over-braking.","sub":"Active piloting, turns and wingovers"},{"id":"Practical Flying_76","topic":"Practical Flying","text":"What are the indications that a glider is in an inflated or parachutal stall?","options":["No sensation of wind on face, no pressure in brakes and the underside of the glider is no longer tensioned, ie is concave between the line connection points.","The glider has a high sink rate and the brake pressure is very high.","The glider enters a constantly increasing spiral dive.","Wind in the face, speed over ground is zero and the glider just sinks."],"correct":0,"exp":"In a parachutal stall the wing keeps its span but stops moving forward. The classic indicators all show the loss of airflow: no wind in your face, slack brake pressure that gives no resistance, and the underside fabric ballooning concave because the relative wind now hits it from below. High sink without brake pressure is the giveaway.","sub":"Stalls and collapses"},{"id":"Practical Flying_77","topic":"Practical Flying","text":"A pilot finds himself in an inflated or parachutal stall 500m above ground. What should he do?","options":["Pull one brake line abruptly fully down and immediately release again.","Pull both brakes abruptly fully down and immediately release again.","Push out on the A-risers or apply the accelerator until the glider flies normally again.","A certified glider will recover from a parachutal stall by itself. The pilot should therefore wait with brakes lightly applied until the glider recovers."],"correct":2,"exp":"Out of parachutal stall at altitude you have to give the wing speed again. Pushing forward on the A-risers or stepping on the accelerator tilts the canopy nose down, restores forward flight and resolves the stall. Pumping brakes either side risks driving the wing into full stall or spin; waiting for a self-recovery is unsafe because some parachutal stalls are stable.","sub":"Stalls and collapses"},{"id":"Practical Flying_78","topic":"Practical Flying","text":"On final approach, 10m above ground a pilot finds himself in an inflated or parachutal stall. What should he do?","options":["Leave the glider in inflated stall, get upright and prepare for a parachute landing fall (PLF).","Throw the reserve.","Immediately pull on the front risers.","Leave the glider in inflated stall, get into an upright position and pull both brakes down fully at around 4m above the ground."],"correct":0,"exp":"Ten metres above the ground you have no altitude to recover a forward surge. The least bad option is to keep the wing in parachutal stall (it descends roughly vertically at controlled sink), sit upright, get the legs ready and execute a parachute landing fall. Pumping brakes near the ground would cause a forward surge into the ground; throwing the reserve from 10 m is too low to inflate.","sub":"Stalls and collapses"},{"id":"Practical Flying_79","topic":"Practical Flying","text":"What else may cause a stable parachutal stall other than pulling the brakes too hard?","options":["Lines out of trim due to aging, which is not noticed due to the lack of an annual check.","Brakes set too short.","Answers a, b and c are correct.","Flying through a rain shower, i.e. wet glider."],"correct":2,"exp":"All three are well-documented routes into a stable parachutal stall: stretched (out-of-trim) lines from age, brakes set too short at the line lock, and rain-soaked fabric (heavier wing, distorted profile). That's why annual line trim checks, correct brake-line length and dropping into landing instead of climbing into showers all matter for safety.","sub":"Stalls and collapses"},{"id":"Practical Flying_80","topic":"Practical Flying","text":"What are the consequences of braking too hard in a turn?","options":["The airflow separates on one side (stalls) resulting in the wing diving over to that side and entering a spin.","The wing enters a constantly increasing spiral dive.","The glider suffers a front collapse, whereby the wingtips overtake the centre of the glider causing it to collapse together.","The airflow separates from the wing, resulting in a parachutal stall."],"correct":0,"exp":"In a turn, the inside half of the wing flies slower than the outside half. Pull the inside brake too hard and the inside half drops below stall speed first - airflow detaches there, the wing whips over to that side and the asymmetric stall develops into a spin. Symmetric over-braking from straight flight goes to parachutal stall; this is different.","sub":"Active piloting, turns and wingovers"},{"id":"Practical Flying_81","topic":"Practical Flying","text":"A pilot abruptly initiates a turn when flying in a straight line. What are the consequences?","options":["The airflow separates from the wing, resulting in a parachutal stall.","As a result of the asymmetric loading parts of the glider on that side could become stretched, resulting in the glider henceforth pulling lightly toward the stretched side.","The glider suffers a front collapse, whereby the wingtips overtake the centre of the glider causing it to collapse together.","The airflow separates on one side (stalls) resulting in the wing diving over to that side and entering a spin."],"correct":3,"exp":"An abrupt turn input from straight flight is essentially the same as suddenly over-braking one side: the inside half of the wing loses airspeed too quickly, the airflow separates and the wing pitches over and starts to spin. Smooth turn initiation with weight shift first, then dosed brake, keeps you well inside the stable envelope.","sub":"Active piloting, turns and wingovers"},{"id":"Practical Flying_82","topic":"Practical Flying","text":"What are the indications that your wing has stalled on one side?","options":["The glider becomes unstable about the longitudinal axis and begins to pendulum.","The tension on the inside brake suddenly decreases and gives no more resistance throughout the brake range.","The glider enters a spiral dive resulting in a constant, high G loading.","The glider half on the inside of the turn collapses due to the decrease in pressure inside the glider."],"correct":1,"exp":"When the inside of the wing stalls, the airflow on that half collapses and the brake line goes slack: you can pull it almost to your hip without ever feeling pressure. That sudden 'nothing there' on the inside brake is the unmistakable signature. Spiral builds G-forces; pendulum is about pitch; a side collapse releases pressure differently.","sub":"Stalls and collapses"},{"id":"Practical Flying_83","topic":"Practical Flying","text":"While turning a pilot realizes that one side of the wing has stalled. What is the most appropriate action?","options":["Pump the inside brake in order to increase the internal pressure.","Release both brakes and allow glider to regain speed.","Apply the outside brake immediately in order to stabilise the direction.","Immediately grab and hold the risers to minimise the risk of a twist."],"correct":1,"exp":"Once one side has stalled, the recipe is the same as for any stall: release brake pressure so the wing can take a clean profile and accelerate. Both hands up lets the airflow reattach and the wing return to normal flight. Pumping the inside brake just deepens the stall; loading the outside brake or grabbing the risers can drive you into a spin or twist.","sub":"Stalls and collapses"},{"id":"Practical Flying_84","topic":"Practical Flying","text":"The risk of asymmetric stall can be minimised if","options":["the glider is constantly observed and tight turns are avoided.","the pilot always flies with reserve speed and with lots of feeling.","an anemometer is carried in flight to reliably control the airspeed.","some outside brake is always applied in a turn so that the wing cannot stall on one side."],"correct":1,"exp":"Asymmetric stall risk is minimised by keeping the wing well above its stall speed - 'reserve speed' - and by flying with fingertip feel rather than hauling the brakes. You never lose much by being a bit faster; you can lose everything by being a bit too slow. Anemometers measure groundspeed and brake/turn rules don't replace airspeed margin.","sub":"Stalls and collapses"},{"id":"Practical Flying_85","topic":"Practical Flying","text":"What happens if a pilot pulls only on the A-risers to provoke acceleration?","options":["The glider suffers a front collapse, whereby the wingtips overtake the centre of the glider causing it to collapse together.","The airflow separates from the wing, resulting in a parachutal stall.","The airflow separates on one side (stalls) resulting in the wing diving over to that side and entering a spin.","The wing enters a constantly increasing spiral dive."],"correct":0,"exp":"Pulling only the A-risers does the opposite of accelerating: it tips the leading edge downward, drops the angle of attack on every cell at once, and the wing folds inward as the wingtips swing forward past the centre. That's a textbook front (frontal) collapse. The accelerator does the same job safely because it pulls the A and B groups together in a coordinated way.","sub":"Active piloting, turns and wingovers"},{"id":"Practical Flying_86","topic":"Practical Flying","text":"What consequences can arise when more than 50% of the glider folds on one side and the pilot lets the glider continue flying without brake input.","options":["The wing enters a constantly increasing spiral dive.","The airflow separates from the wing, resulting in a parachutal stall.","The glider suffers a front collapse, whereby the wingtips overtake the centre of the glider causing it to collapse together.","The airflow separates on one side (stalls) resulting in the wing diving over to that side and entering a spin."],"correct":0,"exp":"When more than half the wing folds away, the asymmetric drag and lift loss start a rotation toward the collapsed side. If the pilot does nothing, that rotation accelerates - the wing tips dive and the rotation tightens into a constantly increasing spiral. Active counter-braking and weight shift are needed; passive 'wait and see' usually ends badly.","sub":"Stalls and collapses"},{"id":"Practical Flying_87","topic":"Practical Flying","text":"Whilst flying the wing suddenly collapses on one side. What is the appropriate action?","options":["Immediately forcefully pump the brake on the collapsed side in order to reopen it as fast as possible thereby minimising the altitude lost.","Immediately fully apply the brake on the open side in order to prevent the glider turning towards the collapsed side.","Apply both brakes fully until the glider reopens.","Stabilise the direction using weight-shift and careful braking on the open side then, if necessary, pump on the collapsed side to reopen it."],"correct":3,"exp":"The procedure on a side collapse is sequential, not simultaneous: first stabilise the direction with weight shift toward the open side and a gentle dose of brake on the open side so the wing flies straight, then - and only then - pump the collapsed side if it hasn't reopened by itself. Full brake on either side, or symmetric full brake, all risk stalling on top of the collapse.","sub":"Stalls and collapses"},{"id":"Practical Flying_88","topic":"Practical Flying","text":"A pilot flies through turbulent air the glider begins to pendulum a little about the longitudinal and transverse axes. What is the appropriate reaction?","options":["Stabilise the pendulum using immediate and forceful opposite braking.","Brake the glider 50% and hold the risers in order to stabilise the body position somewhat.","Fly without brakes and, if need be, accelerate in order to escape the turbulence as fast as possible.","Sit relaxed in the harness and pull gently to moderately on the brakes without trying to compensate for the pendulum."],"correct":3,"exp":"A bit of pendulum motion in turbulence is normal. The right response is to take the brakes down to about 25-30 % and just feel the wing - active 'fight back' braking risks introducing the wing into oscillation cycles. Sit relaxed, let your body absorb the motion, and the wing self-stabilises. Aggressive opposite brake and high speed both make things worse.","sub":"Active piloting, turns and wingovers"},{"id":"Practical Flying_91","topic":"Practical Flying","text":"What is a \"Wingover\" ?","options":["Rapid alternating turns, whereby the glider occasionally exhibits a bank angle of over 90°.","Very tight turns whereby the G loading due to the centrifugal force increases markedly.","A rapid rotation of the wing about the vertical axis, whereby one half of the glider flies forwards, the other backwards.","Twisting of risers and lines provoked by rotation of glider around the vertical axis. Due to the pilot's inertia he can't rotate as fast as the glider."],"correct":0,"exp":"A wingover is a deliberate, rhythmic alternation of turns that builds energy each cycle until the wing momentarily exceeds 90 deg of bank. It is a swinging manoeuvre around the longitudinal axis - very different from a spiral (constant tight turn) or a twist (risers cross). The exam requires demonstrating wingovers to stabilo height.","sub":"Active piloting, turns and wingovers"},{"id":"Practical Flying_92","topic":"Practical Flying","text":"What is a spiral dive?","options":["Twisting of risers and lines provoked by rotation of glider around the vertical axis. Due to the pilot's inertia he can't rotate as fast as the glider.","Very tight turns whereby the load factor due to the centrifugal force increases markedly.","Rapid alternating turns, whereby the glider occasionally exhibits a bank angle of over 90° .","A rapid rotation of the wing about the vertical axis, whereby one half of the glider flies forwards, the other backwards."],"correct":1,"exp":"A spiral dive is a sustained tight turn in which the wing screws downward and the load factor climbs as centrifugal force grows. 4 G is realistic on a school wing - twice your normal weight pressing on you. That's why the safety syllabus reserves it for training under supervision: it descends fast but punishes the body.","sub":"Big-ears and spiral-dive descents"},{"id":"Practical Flying_93","topic":"Practical Flying","text":"Descending with \"big ears\" has the advantage that","options":["the manoeuvre is easily entered and achieves a high sink rate without physical strain on the body.","the wing is not deformed and can achieve a high sink rate.","the body is not physically strained and during the manoeuvre the glider is able to be steered towards a particular goal.","a high sink rate can be achieved without problems during exiting the manoeuvre or physical strain on the body."],"correct":2,"exp":"Big ears is the rapid-descent of choice when you also need horizontal control. The wing still flies forward (you only fold the outer A-line in), the body doesn't take G-forces and weight-shift steering still works - so you can leave a lift band, head into the wind, or pick a landing field. The other rapid-descent options (B-stall, spiral) either descend on the spot or load the body hard.","sub":"Big-ears and spiral-dive descents"},{"id":"Practical Flying_95","topic":"Practical Flying","text":"When applying big ears it should be observed that","options":["only the intended A-lines resp. the separate A-risers are pulled, otherwise the entire leading edge may be collapsed. [x]","answers x, y and z are correct.","with a clumsy application, the middle A-lines could be pulled as well, resulting in a full frontal collapse. [y]","inexperienced pilots can avoid the danger of a front collapse by pulling in one ear after the other. [z]"],"correct":1,"exp":"All three side notes apply to big-ears: only the intended outer A-lines must be pulled (others on the A-row would fold the centre and front-collapse the wing); a clumsy grab can pick up the middle A-line and produce that frontal collapse; and inexperienced pilots can take the ears in one at a time to avoid pulling both centre lines together.","sub":"Big-ears and spiral-dive descents"},{"id":"Practical Flying_96","topic":"Practical Flying","text":"When descending with \"big ears\" it is important to be aware that the glider in this configuration","options":["flies with a larger angle of attack and hence is especially susceptible to parachutal stalls while exiting the manoeuvre.","flies extremely unstably.","flies with considerably increased forward speed thereby increasing the risk of front collapses.","requires exceptional pilot skill especially in turbulent air and also places great strain on the body over longer periods."],"correct":0,"exp":"Folding the wingtips in cuts surface area but keeps your weight the same, so wing loading goes up and forward speed drops. The pilot has to fly at a higher angle of attack than usual, which puts the wing much closer to its stall point than in normal flight. That's why entering and especially exiting big ears can drop you into a parachutal stall if you're not on the bar.","sub":"Big-ears and spiral-dive descents"},{"id":"Practical Flying_97","topic":"Practical Flying","text":"When descending with \"big ears\" it is important to note that","options":["the accelerator should not be simultaneously applied, so that the risk of front collapses is kept to a minimum.","there is a great strain on the body.","the accelerator can be simultaneously applied to minimise the risk of parachutal stall and to increase the sink rate.","the glider flies extremely unstably."],"correct":2,"exp":"The accelerator is what tilts the canopy forward enough to keep angle of attack out of the stall band when ears are in. The combination is therefore safe: ears for area reduction (high sink) plus accelerator to keep airflow attached. The notion that they should not be combined is exactly the wrong way around.","sub":"Big-ears and spiral-dive descents"},{"id":"Practical Flying_98","topic":"Practical Flying","text":"When opening \"big ears\" it is important to note that","options":["they should be pumped opened with simultaneous, forceful application of both brakes.","at the latest during final approach, they should be fully opened by pumping of the brake lines.","during the landing approach they should only be opened by shaking the outermost A-lines.","at low altitude they should not be opened actively (by pumping of the brake lines)."],"correct":3,"exp":"Close to the ground you don't want a forward surge or a brake-induced stall. Pumping the brakes to pop the ears back open could either over-brake the now slow-flying wing into parachutal stall or trigger a pitch surge into the ground. So at low altitude let them open passively (release the A-lines, weight shift) and keep flying - never actively pump on short final.","sub":"Big-ears and spiral-dive descents"},{"id":"Practical Flying_99","topic":"Practical Flying","text":"When descending with a spiral dive it is important to note that","options":["only a low sink-rate can be achieved.","It places great strain on the body over an extended time and is therefore not suited to all pilots.","there is a risk of parachutal stall when exiting the manoeuvre.","only by simultaneously applying the accelerator will the sink rate markedly increase."],"correct":1,"exp":"Spiral dive achieves a very high sink rate, but at the cost of sustained G-forces of 2-4 G on the body. After a minute or two many pilots blackout or vomit; for older pilots the load is genuinely dangerous. That's why it isn't a 'go-to' descent manoeuvre - big ears with bar is gentler and works for everyone.","sub":"Big-ears and spiral-dive descents"},{"id":"Practical Flying_100","topic":"Practical Flying","text":"When descending in a spiral dive, it should be noted that","options":["only the inside brake is applied during the manoeuvre.","the speed, sink rate and G forces can be actively controlled using the outside brake and with weight-shift to the outside.","there is a risk of parachutal stall when exiting the manoeuvre.","only by simultaneously applying the accelerator will the sink rate markedly increase."],"correct":1,"exp":"In a stable spiral you keep both speed and G-load under control by feeding outside brake and shifting weight outwards. Releasing the inside brake alone might let the wing reopen too suddenly; the outside brake is what tames the rotation while the inside hand stays planted. The myth that spiral exits cause parachutal stall is wrong - the issue is over-shoot and G-spike.","sub":"Big-ears and spiral-dive descents"},{"id":"Practical Flying_101","topic":"Practical Flying","text":"When descending in a spiral dive, it should be noted that","options":["a stable spiral must be actively controlled using the outside brake and with weight-shift to the outside. [z]","depending on the harness geometry, body position and glider characteristics, every glider can theoretically remain in a stable spiral. [x]","answers x, y and z are correct.","when the outside leg is lifted over the inside leg in order to lean more to the inside of the turn, the tendency for the glider to remain in a stable spiral is markedly increased. [y]"],"correct":2,"exp":"All three caveats are textbook: an established spiral has to be actively controlled with outside brake and outside weight; depending on harness/glider/body geometry it can become 'stable' and the wing won't exit on its own; lifting the outer leg over the inner tightens the spin and increases the dive tendency. That's why spiral training belongs in SIV, not in everyday flying.","sub":"Big-ears and spiral-dive descents"},{"id":"Practical Flying_104","topic":"Practical Flying","text":"When landing on a slope the situation does not allow you to approach along it, only up or down the slope. Which of the following is correct with zero wind?","options":["It is easier to land more precisely but more difficult to land softly down the slope.","It is easier to land more precisely and softer down the slope.","It is easier to land more precisely but more difficult to land softly up the slope.","It is easier to land more precisely and softer up the slope."],"correct":2,"exp":"Landing up the slope brings you against a rising surface that effectively cuts your touchdown speed to zero very fast - the geometry makes pinpoint placement easy. The drawback is that the same wedge of ground is decelerating you violently, so the impact is harsh on legs and spine. Down-slope landings keep the contact gentler but the run-out is uncontrolled.","sub":"Special-field landings, post-flight and first aid"},{"id":"Practical Flying_105","topic":"Practical Flying","text":"Why do we do a landing approach?","options":["A landing approach is clearly identifiable to other airspace users and also provides the highest likelihood of a precise landing.","A landing approach no longer has any practical meaning for licenced pilots.","As training in order to pass the practical exam organized by the SHV.","As a memory tool for beginners"],"correct":0,"exp":"The landing volte is not just a beginner crutch - it's a shared protocol. Everyone in the pattern can predict where everyone else is going, so collisions on short final are avoided, and the geometry happens to be the best for hitting a spot accurately. That's why licensed pilots still fly it, including on outlandings.","sub":"Landing approach pattern and corrections"},{"id":"Practical Flying_106","topic":"Practical Flying","text":"Which part of the approach is #1?","options":["Downwind leg.","Base leg.","Zone for losing altitude.","Final approach."],"correct":2,"img":"assets/shv_images/practical_flying_106.jpg","exp":"In the standard volte the first phase, #1, is the altitude-loss zone (position circles): you circle in the same direction as your downwind leg until you've bled off enough height to enter the pattern at a healthy altitude. Only then do you fly off into the downwind leg.","sub":"Landing approach pattern and corrections"},{"id":"Practical Flying_107","topic":"Practical Flying","text":"Which part of the approach is #2?","options":["Zone for losing altitude.","Base leg.","Downwind leg.","Final approach."],"correct":2,"img":"assets/shv_images/practical_flying_107.jpg","exp":"#2 in the diagram is the downwind leg - flown along the side of the landing field with the wind from behind, at a constant safe altitude. From here you set up the base leg perpendicular and finally turn final into wind.","sub":"Landing approach pattern and corrections"},{"id":"Practical Flying_108","topic":"Practical Flying","text":"Which part of the approach is #3?","options":["Zone for losing altitude.","Downwind leg.","Base leg.","Final approach."],"correct":2,"img":"assets/shv_images/practical_flying_108.jpg","exp":"#3 is the base leg - the crosswind segment that connects the downwind leg to the final approach. It is the only segment of the volte you can stretch (you're too high) or shorten (you're too low) to fine-tune your descent path.","sub":"Landing approach pattern and corrections"},{"id":"Practical Flying_109","topic":"Practical Flying","text":"Which part of the approach is #4?","options":["Final approach.","Downwind leg.","Base leg.","Zone for losing altitude."],"correct":0,"img":"assets/shv_images/practical_flying_109.jpg","exp":"#4 is the final leg - the straight segment from the end of base into wind to the landing spot. It must be flown as straight as you can manage, with only small wind-correction adjustments so you don't drift sideways into another pilot's flare zone.","sub":"Landing approach pattern and corrections"},{"id":"Practical Flying_110","topic":"Practical Flying","text":"How should a pilot lose excess height before going into the downwind leg?","options":["By circling to the right.","By circling in the same direction as the landing approach.","By flying \"S\" turns.","By circling to the left."],"correct":1,"exp":"Always circle in the same sense as the pattern itself so other pilots can predict your motion - if you'll fly a left-hand pattern, do left position circles. Random left-or-right circles, S-turns or contradictory directions all break the predictability that the volte is supposed to provide.","sub":"Landing approach pattern and corrections"},{"id":"Practical Flying_111","topic":"Practical Flying","text":"If you are obliged to do a left hand approach, in which sector should you lose height before going into the downwind leg? 21","options":["2","4","1","3"],"correct":0,"img":"assets/shv_images/practical_flying_111.jpg","exp":"For a left-hand approach the altitude-loss circles are placed in sector 2 of the diagram, so that you naturally end up on the upwind side and can fly the left downwind leg parallel to the landing field. Any other sector forces you to cross your own pattern to enter the downwind leg.","sub":"Landing approach pattern and corrections"},{"id":"Practical Flying_113","topic":"Practical Flying","text":"Each diagram shows a standard landing approach in zero wind (dotted line) and a practical approach in accordance with conditions (solid line). Which approach should a pilot take with zero wind when he realises on turning from downwind to base that he is too low? 1","options":["4","1","2","3"],"correct":2,"img":"assets/shv_images/practical_flying_113.jpg","exp":"Too low on the turn from downwind to base means you have no spare height to spend - so the right correction is to cut the corner: turn directly toward the final aim point rather than continuing to the planned base position. Diagram 2 shows that shortened path; anything that extends the route loses you the rest of your altitude.","sub":"Landing approach pattern and corrections"},{"id":"Practical Flying_114","topic":"Practical Flying","text":"Each diagram shows a standard landing approach in zero wind (dotted line) and a practical approach in accordance with conditions (solid line). Which approach should a pilot take with zero wind when he realises on the base leg that he is too high? 31","options":["3","1","4","2"],"correct":2,"img":"assets/shv_images/practical_flying_114.jpg","exp":"Too high on the base leg means too much energy remaining. Lengthen the base leg by flying farther past the planned turn-onto-final, possibly add S-turns, and only then turn final - diagram 4 shows that extended base. Tightening the path makes the height excess even worse.","sub":"Landing approach pattern and corrections"},{"id":"Practical Flying_115","topic":"Practical Flying","text":"Practical Flying From 69 Each diagram shows a standard landing approach in zero wind (dotted line) and a practical approach in accordance with conditions (solid line). Which approach should a pilot take with 10 - 15 km/h wind? 312","options":["4","3","1","2"],"correct":2,"img":"assets/shv_images/practical_flying_115.jpg","exp":"With 10-15 km/h of wind, the standard volte (diagram 1) lines up exactly: downwind along the side of the field, short crosswind base, final straight into wind. The 'standard pattern is the right pattern' is exactly what these diagrams are designed to reinforce.","sub":"Landing approach pattern and corrections"},{"id":"Practical Flying_116","topic":"Practical Flying","text":"Each diagram shows a standard landing approach in zero wind (dotted line) and a practical approach in accordance with conditions (solid line). Which approach should a pilot take with 5 - 0 km/h wind? 4213","options":["4","2","1","3"],"correct":3,"img":"assets/shv_images/practical_flying_116.jpg","exp":"In very light or zero wind the wing covers the same distance per metre of altitude no matter which way it points. The pattern has to be opened out (wider downwind, longer base) so you don't arrive too high - diagram 3 shows that expanded pattern. A tight standard volte at 0-5 km/h would put you well above the field on final.","sub":"Landing approach pattern and corrections"},{"id":"Practical Flying_117","topic":"Practical Flying","text":"A pilot reaches a landing field just before 2 others who are 50m from him. The wind is zero, there are no obstacles on any side and there is no agreed landing approach direction. How should he land?","options":["Being the first he can freely choose the landing direction but must execute a left hand approach.","He should carry out a landing approach but is free to choose the landing direction and approach turn direction.","The first to land must fly a left hand approach and land at 90° to the valley axis.","The first to land can choose the turn direction for landing approach but must land at 90° to the valley axis."],"correct":0,"exp":"First pilot down picks the direction. Convention here defaults to the standard left-hand pattern, which lets the followers copy it without negotiation. Forcing a 90-degree-to-valley-axis landing or simply 'free choice' both lead to chaos when the next pilots are only 50 m behind.","sub":"Landing approach pattern and corrections"},{"id":"Practical Flying_118","topic":"Practical Flying","text":"A pilot reaches a landing field just before 2 others who are 50m from him. The wind is zero. He decides to make a left hand approach landing towards the west. On the base leg he realizes there is a 2-5km/h east wind. What should he do?","options":["Immediately abort the approach, fly to the lee side of the landing point and land into the wind.","Consider the downwind leg to be the base leg and land across the wind.","Continue with the same approach, choosing a somewhat steeper final approach angle.","Continue with his approach choosing a somewhat shallower final approach angle."],"correct":3,"exp":"You've already committed to the pattern, and the two pilots behind you have committed to copy it. With a 2 m/s tailwind on what was going to be your final, the glide is flatter and your touchdown will overshoot - so the right adjustment is a shallower final, not a steeper one, and an earlier flare. Abandoning the pattern mid-base or landing across the wind invites collisions with the others.","sub":"Landing approach pattern and corrections"},{"id":"Practical Flying_119","topic":"Practical Flying","text":"When landing with a tailwind, the angle of approach is","options":["shallower and the touchdown speed lower.","steeper and the touchdown speed lower.","steeper and the touchdown speed higher.","shallower and the touchdown speed higher."],"correct":3,"exp":"With tailwind, ground speed equals airspeed plus wind speed. The wing crosses the ground faster, so the glide angle relative to the ground is shallower (it 'travels further per metre lost') - and you touch down with higher speed than airspeed alone, making the run-out harder. Both effects work against soft landings.","sub":"Landing approach pattern and corrections"},{"id":"Practical Flying_120","topic":"Practical Flying","text":"When landing with a headwind, the angle of approach is","options":["steeper and the touchdown speed lower.","shallower and the touchdown speed higher.","steeper and the touchdown speed higher.","shallower and the touchdown speed lower."],"correct":0,"exp":"Head wind subtracts from the ground speed, so the wing comes down at a steeper angle and touches down with lower over-ground speed. This is the easy case: short flare, gentle run-out, exactly what the volte is optimised for. Stronger headwind = steeper, slower, kinder landing.","sub":"Landing approach pattern and corrections"},{"id":"Practical Flying_123","topic":"Practical Flying","text":"On the base leg of an approach the pilot realizes he is too high. What should he do?","options":["Extend the base leg and if necessary repeat it.","Fly back to the position to lose height and restart the downwind leg.","Fly another circle in the landing approach turn direction.","Brake the glider in order to reduce the glide performance."],"correct":0,"exp":"If you arrive at the base leg with too much height, the cleanest answer is to fly the base segment longer - and if necessary repeat it with S-turns - so the altitude bleeds off on a predictable, straight track. Returning to the holding pattern wastes time, circling on base risks others, and pulling brakes reduces glide but increases stall risk.","sub":"Landing approach pattern and corrections"},{"id":"Practical Flying_124","topic":"Practical Flying","text":"On the base leg of an approach the pilot realizes he is too low. What should he do?","options":["Shorten the base leg or abandon it entirely.","Brake the glider lightly to improve the glide performance.","Consider the downwind leg to be the base leg and land across the wind.","Fly directly to the planned landing point and circle until touchdown."],"correct":0,"exp":"Too low on the base leg means you have to head directly to the field. Shortening or abandoning the base entirely lets you turn final immediately and arrive with whatever altitude is left. Trying to improve glide with brakes actually steepens the descent; circling at low altitude crashes you out.","sub":"Landing approach pattern and corrections"},{"id":"Practical Flying_125","topic":"Practical Flying","text":"On the final leg of a landing approach the pilot realizes he is fractionally too high. What should he do?","options":["Fly another circle in the landing approach turn direction.","Extend the approach over the landing point, turn 180° and land from the opposite direction.","Brake the glider to reduce the glide ratio and stand up earlier in the harness to increase the drag.","Increase speed in order to increase the drag."],"correct":2,"exp":"A small height excess on short final is corrected by adding drag from your body: brake the wing slightly to lower the glide ratio, and stand up out of the harness so the seat board, legs and torso work as a parachute. Acceleration would do the opposite (less drag, more glide), and S-turning or U-turning at low altitude is dangerous.","sub":"Landing approach pattern and corrections"},{"id":"Practical Flying_126","topic":"Practical Flying","text":"On the base leg of an approach with a slight head wind the pilot realizes he is too low. What should he do?","options":["Fly the glider with zero brakes until just before ground level then slowly and continuously pull the brakes.","Brake the glider 50% in order to fly as long as possible.","An out-landing is unavoidable.","Brake the glider lightly in order to improve the glide performance."],"correct":0,"exp":"Already too low on base, you need maximum glide: keep the brakes off and the body compact in the harness so the wing flies the polar's flattest path. Only just before touchdown do you slowly and continuously start to brake for the flare. Heavy brake or 50% drag would steepen the descent and you'd land short.","sub":"Landing approach pattern and corrections"},{"id":"Practical Flying_127","topic":"Practical Flying","text":"On a final the pilot applies 80% brakes without stalling, if he maintains this much brake for a long time","options":["it is highly likely that after a while the glider will stall.","the forward speed and sink rate will continuously decrease.","because of the high internal pressure the glider will fly safely and stably.","the glider speed will slowly and continuously increase."],"correct":0,"exp":"80% brake puts the wing right at the edge of the stall envelope. The polar is at minimum sink but the wing is flying slowly with high angle of attack. Any gust or tiny brake increase will drop airflow off the wing and you fall into parachutal or full stall. That's why 80% brake is fine for a moment in the flare but not a sustained state.","sub":"Active piloting, turns and wingovers"},{"id":"Practical Flying_128","topic":"Practical Flying","text":"What must you do immediately after landing?","options":["Immediately fold the glider and pack it into its backpack.","Immediately leave the landing area.","Immediately remove your harness and helmet.","Record the flight in your logbook."],"correct":1,"exp":"The landing area belongs to whoever comes next. Folding, removing gear or filling in the logbook all happen off the landing strip. Step off the field with your wing as soon as you can - the pilot behind you is already on final.","sub":"Special-field landings, post-flight and first aid"},{"id":"Practical Flying_129","topic":"Practical Flying","text":"At the landing field there is a 25km/h wind. As soon as the pilot's feet touch the ground he should","options":["pull the brakes as far down as possible to immediately stop the glider flying.","turn 180º toward the glider and pull on the B or C-lines to immediately stop the glider flying.","pull the A-risers down as far as possible so that glider front collapses and stops flying immediately.","pull one brake fully so the glider comes down on its leading edge and ceases to produce lift."],"correct":1,"exp":"At 25 km/h, brake pulls only make the wing produce more lift and drag you. The classic procedure is the opposite: spin 180 deg to face the wing, pull on the B or C-line group (or rear risers) to collapse the lifting surface from the back, and run forward toward the wing. Pulling A-risers can cause an asymmetric collapse that drags you sideways.","sub":"Special-field landings, post-flight and first aid"},{"id":"Practical Flying_130","topic":"Practical Flying","text":"When landing on a steep slope the final approach should be","options":["down the slope.","parallel to the slope.","up the slope.","against the wind."],"correct":1,"exp":"On a steep slope, landing straight uphill or downhill leaves no margin in the flare - the slope geometry wrecks your reference. Approaching parallel to the contour lets you touch down with the slope just to your side, flare normally, and step off cleanly. Landing 'against the wind' is the rule on flat ground but is overridden by the slope on terrain.","sub":"Special-field landings, post-flight and first aid"},{"id":"Practical Flying_131","topic":"Practical Flying","text":"When required at altitude to choose a landing field situated in a valley with a valley wind of 25km/h, which landing field features are the most important in order to carry out a safe landing?","options":["The landing field should be protected from the wind as much as possible by the terrain, trees or buildings.","The terrain should never slope upwards against the wind.","The lee side of the field must be free of trees or buildings for at least 100m for the base and final legs.","The windward side terrain should be as flat and free of trees and buildings as possible."],"correct":3,"exp":"In valley wind, mechanical turbulence is produced by anything upstream of the field - trees, buildings, ridges. The most important criterion is therefore that the windward side is flat and obstacle-free, so the air arrives at the landing point smoothly. Sheltered or wind-shadow fields actually create rotor zones over the landing area.","sub":"Special-field landings, post-flight and first aid"},{"id":"Practical Flying_132","topic":"Practical Flying","text":"You are forced to land with a 20km/h wind in a field surrounded by buildings. What should you expect?","options":["Strong turbulence throughout the whole of the final stage of approach.","Extended float just above the ground due to the increased ground effect.","Strong turbulence at roof level, calm air at ground level.","Ideal landing conditions in a field protected from the wind."],"correct":0,"exp":"Buildings shed rotor turbulence on their downwind side that extends a long way and reaches all the way down to ground level - that's why you can be pummelled for the entire final, not just at roof height. Don't expect a calm ground-level pocket and don't expect ground-effect float to save you; plan an aggressive flare with margin.","sub":"Special-field landings, post-flight and first aid"},{"id":"Practical Flying_133","topic":"Practical Flying","text":"In strong wind, a significant decrease in wind (wind gradient) may occur as you approach the ground. If the glider loses pressure briefly,","options":["it will result in a collapse in every case.","it will result in a deep stall in every case.","this can be absorbed by fully applying the brakes.","do not brake under any circumstances, or else the glider will stall. Instead the glider should be allowed to fly and, if necessary, the dive lightly checked."],"correct":3,"exp":"A wind gradient on final means the wing meets slower air as you descend - it briefly flies above stall but with reduced internal pressure and can sag back. The correct response is to leave the brakes alone (extra brake stalls it cleanly) and let the wing re-accelerate, only braking gently to flare. Full brake here drops you straight in.","sub":"Special-field landings, post-flight and first aid"},{"id":"Practical Flying_134","topic":"Practical Flying","text":"Which of the following precautions should be taken when you are forced to land in still or flowing water?","options":["Disconnect all electronic devices (radio, vario etc) and hold them over your head so that they don't get wet.","Tighten all harness straps so that you don't inadvertently slip out after landing and the glider sinks or floats away.","Throw the reserve just before landing so that it provides additional buoyancy in the water.","Open as many of the harness buckles as possible before landing."],"correct":3,"exp":"Water landings are life-threatening because the harness and lines tangle around you. The standard mitigation is to open as many harness buckles as possible while still airborne (chest strap, leg straps) so that on contact you can immediately fall out and away from the gear. Tightening straps locks you to the sinking wing; throwing reserves over water is a flotation myth.","sub":"Special-field landings, post-flight and first aid"},{"id":"Practical Flying_135","topic":"Practical Flying","text":"In the case of landing in a tree what causes most serious injuries?","options":["The pilot gets out of his harness without using a rope to secure himself, the branches break and he falls out of the tree.","The glider and pilot slide down the tree and fall to the ground.","The branches give way under the weight of the pilot and glider, and the pilot falls to the ground.","The pilot is injured by the crash into the tree."],"correct":0,"exp":"Falling out of the tree is the single biggest cause of serious injury in tree landings. The wing is usually caught in the branches and supports you safely; impatient pilots who unbuckle to climb down or wait for branches to give way fall the last few metres onto roots and rocks. Stay clipped in and wait for rescue.","sub":"Special-field landings, post-flight and first aid"},{"id":"Practical Flying_136","topic":"Practical Flying","text":"After landing the glider is caught in the crown of a tree. Which retrieval measure will ensure that damage to the glider is minimised?","options":["Undo the connection between the harness and risers.","Recover the glider using a helicopter.","Undo the quick-links on the risers and the brake line knots.","Connect a long rope to the harness and pull the glider horizontally off the tree from as far away as possible."],"correct":2,"exp":"To minimise damage when retrieving the wing from the crown, the gentlest method is to undo the quick-links connecting the risers to the harness and untie the brake lines. The wing can then be lifted out vertically without dragging it through the branches. Disconnecting harness-to-riser still pulls fabric down; helicopters and rope-yanks cause heavy damage.","sub":"Special-field landings, post-flight and first aid"},{"id":"Practical Flying_137","topic":"Practical Flying","text":"In which situation in air is the danger of collision between a delta and paraglider at its greatest, notably as neither of the pilots can see each other.","options":["A delta approaches a paraglider from behind and from below.","A delta approaches a paraglider from behind and from above.","A delta approaches a paraglider from the front and from above.","A delta approaches a paraglider from the front and from below."],"correct":0,"exp":"Delta pilots have a poor blind-spot looking up and forward; paraglider pilots have a poor blind-spot looking down and behind. A delta closing from behind and below combines both blind spots - neither pilot can see the other - and the delta's higher speed closes the gap quickly. This is statistically the most dangerous co-altitude scenario in mixed traffic.","sub":"Traffic, collision avoidance and reserve use"},{"id":"Practical Flying_138","topic":"Practical Flying","text":"A paraglider flies in the same thermal and at the same altitude as a delta. How can the paraglider pilot put himself and the delta at risk?","options":["By suddenly changing direction of rotation.","By turning in the same direction as the delta.","By circling very tightly.","By flying slowly."],"correct":0,"exp":"In a shared thermal you respect the existing rotation direction - both pilots can predict each other, and the spacing stays roughly constant. Suddenly reversing your turn direction sets you and the delta on intersecting paths at the same altitude with closure speeds that leave no time to react. The cardinal rule is: first one in sets the direction, everybody follows.","sub":"Traffic, collision avoidance and reserve use"},{"id":"Practical Flying_139","topic":"Practical Flying","text":"The reserve parachute should be used","options":["as soon as a situation appears to be uncontrollable.","with an asymmetric collapse in the final landing approach.","when being sucked into a cumulus cloud and the vario shows over 6 m/s climb rate.","as soon as the wing collapses (full frontal collapse over the entire span of the wing)."],"correct":0,"exp":"The reserve is a 'second chance' tool with one rule: deploy whenever the situation appears uncontrollable and won't stabilise within 2-3 seconds. Asymmetric collapses on final, cloud suction or even a single full frontal are still situations a trained pilot can manage; uncontrollable is the threshold.","sub":"Traffic, collision avoidance and reserve use"},{"id":"Practical Flying_140","topic":"Practical Flying","text":"In which of the following situations should the reserve chute be deployed immediately without hesitation?","options":["The right hand third of the wing is collapsed and caught in the lines (cravat).","If a delta and paraglider crash together head-on.","One side of the glider stalls and it goes into a spin.","The glider is being sucked into a cumulus cloud and is climbing at 8 m/s."],"correct":1,"exp":"A delta-paraglider head-on collision is an instant non-controllable situation: the wing is shredded or entangled with another aircraft, you have no idea of damage and the closure rate has put you in freefall. Pull the reserve immediately - the other options (cravat, spin, cloud climb) are recoverable with technique and altitude.","sub":"Traffic, collision avoidance and reserve use"},{"id":"Practical Flying_141","topic":"Practical Flying","text":"In which of the following situations should the reserve chute be deployed immediately without hesitation?","options":["The right hand third of the wing is collapsed and caught in the lines (cravat).","After a spin the lines are twisted a few times and the glider starts to go into a spiral dive by itself.","The glider is being sucked into a cumulus cloud and is climbing at 8 m/s.","One side of the glider stalls and it goes into a spin."],"correct":1,"exp":"A twisted-line spiral after a spin is the classic 'uncontrollable and getting worse' situation: you can't reach the brakes through the twist, the wing is in an accelerating dive and there is no recovery technique that solves both at once. Throw the reserve. A single cravat or one-sided stall in a spin is still flyable with the right inputs.","sub":"Traffic, collision avoidance and reserve use"},{"id":"Practical Flying_143","topic":"Practical Flying","text":"After a violent contact with the ground, a pilot is pale, has bluish lips, cold sweat, a weak, rapid pulse and talks incoherently.","options":["Signs of shock, positioned as desired, protected from the elements, give nothing to drink.","This is just fright, they will soon recover.","Give them a lot to drink.","Put them as quickly as possible into the recovery position."],"correct":0,"exp":"Pale skin, blue lips, cold sweat, weak rapid pulse and confusion are the classic signs of shock - circulatory failure that follows trauma. Position the casualty as they prefer (don't force them flat), shelter them from sun/wind/cold/wet, and give nothing to drink (internal injuries are likely and the stomach must stay empty for surgery). Recovery position is only for the unresponsive but breathing.","sub":"Special-field landings, post-flight and first aid"},{"id":"Practical Flying_144","topic":"Practical Flying","text":"What action should be taken if an accident victim does not respond but breathes normally and has no open wounds? The casualty is","options":["placed in the recovery position, protected from the elements (sun, wind, cold, wet) and their breathing constantly checked.","brought to a sitting position and protected from the weather (sun, wind, cold, and moisture).","laid on his stomach and given cool drinks to wake him up.","laid on his back with his legs in a raised position."],"correct":0,"exp":"Unresponsive but breathing means the airway is the next thing to fail. Recovery position (on the side, lower arm forward, knee bent up) keeps the tongue out of the airway and lets vomit drain rather than aspirate. Then shelter from sun/wind/cold/wet and monitor breathing continuously - if it stops, start CPR.","sub":"Special-field landings, post-flight and first aid"},{"id":"Practical Flying_146","topic":"Practical Flying","text":"What symptoms signal spinal injury?","options":["The victim is unconscious.","The victim has strong pain in the legs.","The victim is pale, has blue lips, cold sweat, a fast, weak pulse and talks incoherently.","The victim has back pains, no sensation in the feet, legs, arms or hands."],"correct":3,"exp":"A spinal cord injury characteristically presents with back pain plus loss of sensation in the limbs - the nerves below the damage level no longer report. Unconsciousness, leg pain alone or shock symptoms can occur with many other injuries. The action is the opposite of moving: immobilise and call Rega.","sub":"Special-field landings, post-flight and first aid"},{"id":"Practical Flying_147","topic":"Practical Flying","text":"When someone who is injured must be airlifted, before the helicopter arrives you should","options":["mark the accident scene with the glider.","immediately leave the accident scene.","remove the injured person's helmet and harness and stow them in the backpack.","immediately stop all flying in the broad vicinity of the accident scene, remove all gliders, jackets and other loose articles from the accident scene and surroundings."],"correct":3,"exp":"Before a rescue helicopter arrives, the area has to be made completely safe for it: stop all paragliding traffic nearby (downwash zones can collapse wings), remove every loose item (gliders, jackets, packs) that could be lifted by the rotors and damage them or hit the casualty. Don't strip the casualty of helmet/harness - the rescue team will manage that.","sub":"Special-field landings, post-flight and first aid"},{"id":"Practical Flying_148","topic":"Practical Flying","text":"When does the golden eagle breed?","options":["March-May","January-March","May-July","June-August"],"correct":0,"exp":"Golden eagles breed in early spring, March through May. Pairs are monogamous, the territory is large (~100 km^2), and the hen lays one or two eggs in the eyrie. Paraglider passage through the territory during this window is exactly when the female can be flushed off the eggs - which kills the brood.","sub":"Wildlife and nature awareness"},{"id":"Practical Flying_149","topic":"Practical Flying","text":"What is meant by the \"garland flight\" of the golden eagle?","options":["The eagle is defending his territory and his young.","The eagle is happy and flies playfully.","The eagle is hunting smaller birds.","The eagle is courting a mate."],"correct":0,"exp":"The 'garland flight' (Girlandenflug) is a sinuous, undulating display flight that golden eagles use to mark territory boundaries - swooping low then rising, again and again, as a visible warning to rivals. If you see an eagle doing this near you, the message is exactly 'this is mine, my chicks are here, leave': turn away.","sub":"Wildlife and nature awareness"},{"id":"Practical Flying_151","topic":"Practical Flying","text":"Are there areas where takeoffs and landings are forbidden for environmental reasons?","options":["No, as long as I do not disturb the environment, I can take off and land anywhere.","Yes, however these areas are wooded or otherwise unsuitable for takeoffs and landings.","Yes, in national protected areas in accordance with the outlanding regulation of federal government and in accordance with regional special regulations.","Yes, in all national protected areas."],"correct":2,"exp":"Yes - in officially designated protected zones (national parks, wildlife sanctuaries) outlandings and take-offs are banned by federal regulation plus local agreements. The blanket 'no, anywhere is fine' answer ignores the legal framework; 'all national protected areas' overstates it (regulation is zone-specific).","sub":"Wildlife and nature awareness"},{"id":"Practical Flying_152","topic":"Practical Flying","text":"Golden eagles are most bothered by pilots when they","options":["encroach on their territory, forcing the eagles to fly out and mark the boundaries.","soar south facing cliffs in spring.","fly in spring in the proximity of the nests causing the eagles to leave their eggs.","fly above the tree line and drive away their most important prey - marmots."],"correct":2,"exp":"Eagles are most disturbed when paragliders cross the airspace near their nest during the breeding window. The female flushes off the eggs, the embryos cool, and the brood is lost. Marking-boundary flights and prey hunting carry stress but not the same direct cost to next year's population.","sub":"Wildlife and nature awareness"},{"id":"Practical Flying_153","topic":"Practical Flying","text":"Where do the Chamois and Ibex live in the alps from winter to spring?","options":["Mostly in south facing mountain forests.","Mostly on the steep south facing mountain sides.","On mountain pastures untouched by ski tourism.","On north facing slopes largely unaffected by tourism."],"correct":1,"exp":"From winter through early spring, chamois and ibex congregate on the steep south-facing slopes where the snow melts first and they can scrape down to grass. North-facing slopes stay frozen and forested gullies offer no food. So fly that fact into your planning: south slopes in winter/spring carry the densest wildlife.","sub":"Wildlife and nature awareness"},{"id":"Practical Flying_155","topic":"Practical Flying","text":"In my flying site there are many alpine huts and holiday chalets.","options":["I have paid a fee for launch and am therefore entitled to use all areas.","Paragliders are an attraction for everyone, the more the better.","Alpine huts don’t belong to anyone, that’s w
