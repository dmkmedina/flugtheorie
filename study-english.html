h the wing laid out flat. An inflated paraglider has a curved arc shape, so its overhead shadow is smaller than the spread-out fabric. The projected area is what actually counts aerodynamically.","sub":"Wing geometry and wing loading"},{"id":"Aerodynamics_101","topic":"Aerodynamics","text":"The resultant aerodynamic force is the resultant of","options":["weight and lift.","weight and drag.","lift and drag.","weight, lift and drag."],"correct":2,"exp":"The resultant aerodynamic force (FRA / Gesamtluftkraft) is the vector sum of lift and drag - the two perpendicular aerodynamic forces on the wing. Weight is a separate force (gravity); it's what FRA has to balance in steady flight, not a component of it.","sub":"Equilibrium and the resultant aerodynamic force"},{"id":"Aerodynamics_102","topic":"Aerodynamics","text":"During the stable flight of a glider the resultant aerodynamic force has the same value as","options":["the lift.","the total weight.","the drag.","lift, drag and total weight."],"correct":1,"exp":"In stable straight flight all forces sum to zero. The vertical-down weight force must be exactly opposed by an equal vertical-up force - that's the resultant aerodynamic force. So in steady flight |FRA| = total weight. If you're heavier you need a proportionally larger FRA (more lift and drag combined).","sub":"Equilibrium and the resultant aerodynamic force"},{"id":"Aerodynamics_103","topic":"Aerodynamics","text":"In stable flight, both at trim speed and fully accelerated, the resultant aerodynamic force","options":["is higher in trim speed flight.","stays the same.","is lower in trim speed flight.","only stays the same with an identical glide ratio."],"correct":1,"exp":"In any stable (non-accelerating) glide - whether trim or fully accelerated - the resultant aerodynamic force equals the total weight. Since weight doesn't change between trim and speed bar, FRA must also stay the same. What changes is the breakdown of FRA into lift and drag, and the glide ratio.","sub":"Equilibrium and the resultant aerodynamic force"},{"id":"Aerodynamics_104","topic":"Aerodynamics","text":"Which force is acting in opposition to the total weight in stable flight?","options":["The drag","The resultant aerodynamic force","The induced drag","The lift"],"correct":1,"exp":"The total weight acts straight down. The only force that can balance it in stable flight is one of equal magnitude pointing straight up - that's the resultant aerodynamic force. Lift alone is not enough (it points perpendicular to the trajectory, not vertical) - it's the combination of lift and drag (= FRA) that opposes weight.","sub":"Equilibrium and the resultant aerodynamic force"},{"id":"Aerodynamics_105","topic":"Aerodynamics","text":"Which force is acting perpendicular to lift in stable flight?","options":["The lift","The resultant aerodynamic force","The total weight","The drag"],"correct":3,"exp":"Lift and drag are by definition perpendicular to each other: lift is perpendicular to the airflow direction, drag is parallel to it. So the force acting at 90 degrees to lift is drag - exactly along the relative wind / flight path.","sub":"Equilibrium and the resultant aerodynamic force"},{"id":"Aerodynamics_106","topic":"Aerodynamics","text":"Drag is a component of","options":["the resultant aerodynamic force and acts in the direction of the airflow.","the lift and always acts vertically.","the weight and acts in the direction opposite to the airflow.","the weight acting parallel to the flight path and produces the forward movement of the glider."],"correct":0,"exp":"Drag is one of the two components of the resultant aerodynamic force (lift is the other). Drag points along the direction of the airflow / flight path, opposing the wing's motion. It's not a component of weight, and it doesn't act vertically.","sub":"Equilibrium and the resultant aerodynamic force"},{"id":"Aerodynamics_107","topic":"Aerodynamics","text":"Which of the following numbers represents the glide angle and drag? (Forces in balance in stable flight)","options":["1 and 3","4 and 5","4 and 3","1 and 5"],"correct":0,"img":"assets/shv_images/aerodynamics_107.jpg","exp":"In the standard SHV force-balance diagram, position 1 marks the glide angle alpha (between trajectory and horizon) and position 3 marks drag (along the trajectory, opposite to motion). Identify each component by its direction relative to the airflow and weight.","sub":"Equilibrium and the resultant aerodynamic force"},{"id":"Aerodynamics_108","topic":"Aerodynamics","text":"Which of the following numbers represent the lift and drag? (Forces in balance in stable flight)","options":["2 and 3","3 and 6","5 and 6","5 and 3"],"correct":3,"img":"assets/shv_images/aerodynamics_108.jpg","exp":"In the SHV equilibrium diagram, lift is perpendicular to the trajectory (position 5) and drag is parallel to the trajectory in the opposing direction (position 3). The two together at 90 degrees to each other make up the resultant aerodynamic force.","sub":"Equilibrium and the resultant aerodynamic force"},{"id":"Aerodynamics_109","topic":"Aerodynamics","text":"Which of the following numbers represents the glide angle and total weight?","options":["1 and 6","1 and 2","2 and 4","4 and 6"],"correct":1,"img":"assets/shv_images/aerodynamics_109.jpg","exp":"Glide angle alpha (between the trajectory and horizon) is position 1. Total weight (vertically downward through the pilot) is position 2. In the diagram these are the two horizontal/vertical references against which the aerodynamic forces are measured.","sub":"Equilibrium and the resultant aerodynamic force"},{"id":"Aerodynamics_110","topic":"Aerodynamics","text":"Which of the following numbers represent the resultant aerodynamic force and angle of attack?","options":["3 and 4","5 and 6","2 and 5","6 and 4"],"correct":3,"img":"assets/shv_images/aerodynamics_110.jpg","exp":"The resultant aerodynamic force FRA (vertical, opposite to weight in steady flight) is position 6 in the SHV diagram, and the angle of attack (between chord and airflow) is position 4. FRA opposes weight; AoA defines how lift and drag are split.","sub":"Equilibrium and the resultant aerodynamic force"},{"id":"Aerodynamics_111","topic":"Aerodynamics","text":"On a paraglider the movement about the longitudinal axis is called","options":["Yaw.","Pitch.","Spin.","Roll."],"correct":3,"exp":"The longitudinal axis runs front-to-back through the pilot. Rotation around this axis moves the wingtips up and down alternately - that's a roll. Wingovers are essentially large rolls (with a touch of pitch). Yaw is the vertical axis; pitch is transverse.","sub":"Axes, stability, and turns"},{"id":"Aerodynamics_112","topic":"Aerodynamics","text":"On a paraglider the movement about the transverse axis is called","options":["Yaw.","Spin.","Pitch.","Roll."],"correct":2,"exp":"The transverse axis runs left-to-right across the wing. Rotation around it tips the wing forward or backward relative to the pilot - that's pitch. When you enter a thermal the wing pitches up; exiting it pitches forward. Pitch is the axis you manage with timed brake inputs.","sub":"Axes, stability, and turns"},{"id":"Aerodynamics_113","topic":"Aerodynamics","text":"On a paraglider the movement about the vertical axis is called","options":["Yaw.","Roll.","Pendulum.","Pitch."],"correct":0,"exp":"The vertical axis runs through the pilot and up through the wing. Rotation around it swings the wingtips forward and back asymmetrically - that's yaw. A wing that spontaneously yaws in smooth air is described as not directionally stable. Roll is around the longitudinal axis; pitch is around the transverse.","sub":"Axes, stability, and turns"},{"id":"Aerodynamics_114","topic":"Aerodynamics","text":"A paraglider which continually increases speed unless the pilot actively intervenes has","options":["stable flight characteristics.","indifferent flight characteristics.","inverse flight characteristics.","unstable flight characteristics."],"correct":3,"exp":"A wing that spontaneously accelerates and keeps accelerating without pilot input is unstable: small perturbations grow rather than damp out. The ball-in-bowl analogy: it's like a ball on top of an upturned bowl - the slightest push makes it roll away. Stable wings, by contrast, return to trim by themselves.","sub":"Axes, stability, and turns"},{"id":"Aerodynamics_115","topic":"Aerodynamics","text":"A paraglider which, after an external disturbance or after a strong pilot input, continues to maintain that flight state without further action by the pilot, has","options":["inverse flight characteristics.","stable flight characteristics.","indifferent flight characteristics.","unstable flight characteristics."],"correct":2,"exp":"A wing that holds whatever new flight state it is put into (after a disturbance or pilot input) without returning or running away is indifferent / neutral. The ball-on-flat-table analogy: push it once and it just keeps rolling at constant speed. Stable would return to centre; unstable would accelerate.","sub":"Axes, stability, and turns"},{"id":"Aerodynamics_116","topic":"Aerodynamics","text":"A paraglider in straight flight which, after releasing the accelerator, automatically returns to normal flight speed, has","options":["inverse flight characteristics.","indifferent flight characteristics.","unstable flight characteristics.","stable flight characteristics."],"correct":3,"exp":"A wing that automatically returns to trim after the speedbar is released - without pilot input - has stable characteristics. Like a ball at the bottom of a bowl: a disturbance moves it temporarily but it always rolls back to centre. This is the desired property manufacturers aim for, especially on school wings.","sub":"Axes, stability, and turns"},{"id":"Aerodynamics_117","topic":"Aerodynamics","text":"A paraglider which, without active pilot input, continually yaws in smooth conditions is not","options":["roll stable.","longitudinally stable.","transverse stable.","directionally stable."],"correct":3,"exp":"Yaw is rotation around the vertical axis. A wing that continuously yaws on its own in smooth air lacks stability about the vertical axis - the technical term is 'not directionally stable'. Each axis has its own stability category: roll, pitch (longitudinal stability for trim), and yaw (directional).","sub":"Axes, stability, and turns"},{"id":"Aerodynamics_118","topic":"Aerodynamics","text":"A paraglider which, without active pilot input, noticeably reduces its angle of attack is not","options":["transverse stable.","pitch stable.","directionally stable.","vertically/height stable."],"correct":1,"exp":"Angle of attack varies around the transverse (pitch) axis. A wing that won't hold its angle of attack by itself - it pitches up or down on its own - is not pitch stable. This is different from directional or roll stability, which are about the other two axes.","sub":"Axes, stability, and turns"},{"id":"Aerodynamics_119","topic":"Aerodynamics","text":"A paraglider which, without active pilot input, continually rolls about the longitudinal axis is not","options":["vertically/height stable.","directionally stable.","roll stable.","pitch stable."],"correct":2,"exp":"Roll is rotation around the longitudinal axis. A wing that continuously rolls on its own in calm air lacks roll stability - it doesn't damp out lateral oscillations of the wingtips. The matching label is 'not roll stable' (or 'not longitudinally stable' in older terminology where longitudinal refers to the rolling axis).","sub":"Axes, stability, and turns"},{"id":"Aerodynamics_120","topic":"Aerodynamics","text":"The glide ratio of a glider gives information about the relationship between","options":["lift and total weight.","thrust and drag.","thrust and total weight.","lift and drag."],"correct":3,"exp":"Glide ratio is the lift-to-drag ratio (Cl / Cd). It's one of four equivalent ways to express the same number: lift/drag, Cl/Cd, horizontal speed / sink rate, and horizontal distance / altitude lost. Higher lift relative to drag = better glide = flying further for each metre of altitude.","sub":"Glide ratio and glide distance"},{"id":"Aerodynamics_121","topic":"Aerodynamics","text":"The glide ratio of a glider gives information about the relationship between","options":["the span and average chord of the wing.","the static and dynamic pressure on the wing profile.","the lift on the upper and lower surfaces of the wing.","the value of the coefficients CL and CD of the wing."],"correct":3,"exp":"Glide ratio is the ratio of the lift coefficient Cl to the drag coefficient Cd. Since Cl and Cd are proportional to lift and drag (with the same speed, density and area factors), Cl/Cd = lift/drag = glide ratio. This is one of the four equivalent definitions.","sub":"Glide ratio and glide distance"},{"id":"Aerodynamics_122","topic":"Aerodynamics","text":"The glide ratio of a glider gives information about the relationship between","options":["the speed at best glide and the speed at minimum sink of the glider.","the minimum and maximum speed.","the air speed and speed over the ground.","the horizontal and vertical speed."],"correct":3,"exp":"Glide ratio = horizontal speed / vertical speed (sink rate). A wing flying 10 m/s forward and sinking 1 m/s has a glide ratio of 10. This is identical to the distance-over-altitude formula because both distances accumulate at the same speeds over the same time.","sub":"Glide ratio and glide distance"},{"id":"Aerodynamics_123","topic":"Aerodynamics","text":"The glide ratio of a glider gives information about the relationship between","options":["the span and the average chord of the glider","the speed at best glide and the speed at minimum sink.","the horizontal distance and the height difference.","the thrust and the total weight"],"correct":2,"exp":"Glide ratio is the ratio of horizontal distance travelled to vertical altitude lost. A glide ratio of 9 means 9 m forward for every 1 m of altitude lost - or 9 km for every 1000 m. It's a dimensionless number measuring how far the wing flies per unit of altitude.","sub":"Glide ratio and glide distance"},{"id":"Aerodynamics_124","topic":"Aerodynamics","text":"A paraglider with a glide ratio of 8 flies 800 m above the ground. What is the longest distance it can fly with this glide ratio in calm air?","options":["8.1 km","10.0 km","6.4 km","24.0 km"],"correct":2,"exp":"Distance = glide ratio x altitude lost = 8 x 0.8 km = 6.4 km. The wing flies 8 m horizontally for each metre of altitude lost, so from 800 m the longest possible distance in calm air is 6.4 km. In practice you would plan more conservatively (glide ratio ~5-6) to leave margin for sink and wind.","sub":"Glide ratio and glide distance"},{"id":"Aerodynamics_125","topic":"Aerodynamics","text":"A paraglider with a glide ratio of 12 flies 2'400 m above the ground. What is the longest distance it can fly with this glide ratio in calm air?","options":["24.0 km","28.8 km","23.0 km","12.0 km"],"correct":1,"exp":"Distance = glide ratio x altitude = 12 x 2.4 km = 28.8 km. A glide ratio of 12 is more typical of high-performance / competition wings than school wings. Even so, the calm-air calculation is an upper bound; real flight always involves some sink and headwind.","sub":"Glide ratio and glide distance"},{"id":"Aerodynamics_126","topic":"Aerodynamics","text":"A paraglider has travelled .0 km with a 1'400 m altitude loss. What is its glide ratio? 475","options":["4","7","6","5"],"correct":3,"exp":"Glide ratio = horizontal distance / altitude lost = 7.0 km / 1.4 km = 5. The wing has travelled 5 m forward for every metre of altitude given up. Always convert to the same units (here both in km) before dividing.","sub":"Glide ratio and glide distance"},{"id":"Aerodynamics_127","topic":"Aerodynamics","text":"If the value of the glide ratio increases, the glide angle","options":["first increases, then decreases.","decreases.","increases.","remains the same."],"correct":1,"exp":"Glide angle is the angle between the trajectory and the horizon. A flatter glide (more horizontal distance per metre lost) means a SMALLER glide angle. So as the glide ratio increases, the glide angle decreases. This is the classic SHV gotcha - 'good glide' = 'small angle'.","sub":"Glide ratio and glide distance"},{"id":"Aerodynamics_128","topic":"Aerodynamics","text":"If the value of the glide angle increases, the glide ratio","options":["remains the same.","decreases.","increases.","first increases, then decreases."],"correct":1,"exp":"Inverse of the previous: if the glide angle (the steepness of descent) increases, you're sinking more per metre of forward travel, so the glide ratio (distance / altitude) decreases. Steeper angle = worse glide; flatter angle = better glide.","sub":"Glide ratio and glide distance"},{"id":"Aerodynamics_129","topic":"Aerodynamics","text":"What do we call the graphic representation of the relationship between the forward speed and sink rate over the whole speed range of the glider?","options":["Barogram.","Speed polar curve.","Profile polar curve.","Emmagram."],"correct":1,"exp":"The graph that plots horizontal airspeed against sink rate across the whole speed range of the glider is the speed polar curve (Geschwindigkeitspolare). The four key points - stall, minimum sink, best glide, Vmax - lie on this curve. A barogram is altitude vs time; emagram is meteorological.","sub":"Polar curve and speed selection"},{"id":"Aerodynamics_130","topic":"Aerodynamics","text":"What is the speed of the following glider at its best glide angle?","options":["9.2m/s (33 km/h)","7.2m/s (26 km/h)","5.6m/s (20 km/h)","11.3m/s (41 km/s)"],"correct":0,"img":"assets/shv_images/aerodynamics_130.jpg","exp":"On the speed polar, best glide angle (Fmax) is identified by the tangent from the origin to the curve. For the SHV reference glider this lands at around 9 m/s horizontal airspeed (approximately 33 km/h) - the speed for the maximum glide ratio in calm air. That's the trim point at which the wing flies furthest per metre lost.","sub":"Polar curve and speed selection"},{"id":"Aerodynamics_131","topic":"Aerodynamics","text":"What is the best glide ratio of the following glider?","options":["3.7","4.7","6.8","5.3"],"correct":3,"img":"assets/shv_images/aerodynamics_131.jpg","exp":"Read off the polar: best glide point is at ~9.2 m/s horizontal speed and ~1.7 m/s sink rate. Glide ratio = 9.2 / 1.7 ≈ 5.3. This is the maximum glide ratio for the reference glider - flatter than any other point on the polar by definition.","sub":"Polar curve and speed selection"},{"id":"Aerodynamics_132","topic":"Aerodynamics","text":"What is the speed corresponding to minimum sink of the following paraglider?","options":["5.6 m/s (20 km/h)","7.2 m/s (26 km/h)","11.3 m/s (41 km/h)","9.2 m/s (33 km/h)"],"correct":1,"img":"assets/shv_images/aerodynamics_132.jpg","exp":"Minimum sink (Tmin) is the apex of the polar curve - the highest point - found by drawing a horizontal tangent. For the SHV reference glider that is at about 7.2 m/s (~26 km/h) horizontal speed and ~1.5 m/s sink. Used when you want to stay up the longest, e.g. in weak lift.","sub":"Polar curve and speed selection"},{"id":"Aerodynamics_133","topic":"Aerodynamics","text":"What is the glide ratio of the following glider if it is flying at minimum sink?","options":["2.0","3.7","4.6","5.3"],"correct":2,"img":"assets/shv_images/aerodynamics_133.jpg","exp":"At minimum sink: ~7.2 m/s horizontal / ~1.5 m/s sink ≈ 4.6 - 4.8. Min sink has a worse glide ratio than best glide, even though you sink slower in absolute terms. You're trading distance for airtime.","sub":"Polar curve and speed selection"},{"id":"Aerodynamics_134","topic":"Aerodynamics","text":"What is the minimum speed of the following glider?","options":["5.6 m/s (20 km/h)","4.2 m/s (15km/h)","7.2 m/s (26 km/h)","9.2 m/s (33 km/h)"],"correct":0,"img":"assets/shv_images/aerodynamics_134.jpg","exp":"Minimum flight speed - just above stall - is the leftmost point on the polar curve where lift is still being generated. For the reference glider this is around 5.6 m/s (~20 km/h). Below this the wing stalls and ceases to fly forward.","sub":"Polar curve and speed selection"},{"id":"Aerodynamics_135","topic":"Aerodynamics","text":"What is the glide ratio of the following glider if it is flying at minimum speed?","options":["4.6","5.3","2.0","3.7"],"correct":2,"img":"assets/shv_images/aerodynamics_135.jpg","exp":"At minimum speed the sink rate has shot up dramatically (close to stall). Roughly 5.6 m/s horizontal over 2.8 m/s sink gives glide ratio = 2.0. Heavy braking ruins the glide - the wing falls almost as fast as it moves forward.","sub":"Polar curve and speed selection"},{"id":"Aerodynamics_136","topic":"Aerodynamics","text":"What is the glide ratio of the following paraglider if it is flying at maximum speed?","options":["2.0","3.7","5.3","4.6"],"correct":1,"img":"assets/shv_images/aerodynamics_136.jpg","exp":"Vmax (full speedbar): ~11.3 m/s horizontal / ~3 m/s sink ≈ 3.7. Max speed comes with a heavy sink-rate penalty - the glide ratio is much worse than at trim. Use accelerator only when fighting headwind or sink, not for maximum glide in calm air.","sub":"Polar curve and speed selection"},{"id":"Aerodynamics_137","topic":"Aerodynamics","text":"At what speed should the following glider fly in order to go the furthest possible distance if it has a head wind of 8 m/s (29 km/h)?","options":["9 m/s (32 km/h)","11 m/s (40 km/h)","7 m/s (25 km/h)","With its maximum speed"],"correct":3,"img":"assets/shv_images/aerodynamics_137.jpg","exp":"In a strong headwind the best-glide tangent shifts forward on the polar - to maintain the highest glide ratio over the ground, you must accelerate. With 8 m/s of headwind (close to the wing's own trim speed) the new tangent often touches the polar near Vmax. Push the speedbar fully (with safety margin to the slope).","sub":"Polar curve and speed selection"},{"id":"Aerodynamics_138","topic":"Aerodynamics","text":"Paraglider X has a glide ratio of 10, Paraglider Y has a glide ratio of 5. What conclusions can be drawn?","options":["Y has a sink rate double that of X.","X flies twice as far as Y.","X flies half as far as Y.","Y has a sink rate half that of X."],"correct":1,"exp":"Glide ratio is the ratio of distance to altitude lost. From the same altitude, a glider with ratio 10 flies twice as far as one with ratio 5 - 10/5 = 2. Sink rates depend on airspeed too, not just glide ratio, so the sink-rate options in the question are not directly derivable.","sub":"Glide ratio and glide distance"},{"id":"Aerodynamics_139","topic":"Aerodynamics","text":"A paraglider is flying in a zone of sink. To get the best glide the pilot flies at","options":["the speed for minimum sink.","the speed for best glide in calm air.","the average between the speed for best glide and speed for minimum sink.","a speed faster than the speed for best glide in calm air."],"correct":3,"exp":"In sinking air, shift the origin of the polar down by the sink rate. The new tangent for best glide-over-ground touches the polar at a higher airspeed than best glide in calm air - so accelerate. Same rule as for headwind: fly faster to get out of the bad air mass and improve ground-relative glide.","sub":"Polar curve and speed selection"},{"id":"Aerodynamics_140","topic":"Aerodynamics","text":"In order to get the best glide performance in relation to the ground in a head wind, a paraglider should fly at","options":["the speed for best glide in calm air.","the speed for minimum sink.","a speed faster than the speed for best glide in calm air.","the average between the speed for best glide and speed for minimum sink."],"correct":2,"exp":"In a headwind, the polar origin shifts to the right (subtract wind from ground speed). The new best-glide tangent touches the polar at a higher airspeed - so accelerate. The stronger the headwind, the more accelerator you need to maximise glide over the ground.","sub":"Polar curve and speed selection"},{"id":"Aerodynamics_141","topic":"Aerodynamics","text":"A paraglider is flying at a speed of 36km/h (10m/s) and its sink rate is 1m/s. It enters a descending air current of 1m/s. What is its speed and sink rate in this current?","options":["Speed: 36km/h (10m/s); sink rate: 0.5m/s","Speed: 36km/h (10m/s); sink rate: 2m/s","Speed: 36km/h (10m/s); sink rate: 1m/s","Speed: 18km/h (05m/s); sink rate: 1m/s"],"correct":1,"exp":"Relative to the air mass, the wing flies at the same airspeed (36 km/h) and sinks at the same 1 m/s. But the whole air mass is itself sinking at 1 m/s, so the wing's sink rate over the ground is 1 + 1 = 2 m/s. Air speed stays the same; only the ground-relative sink changes.","sub":"Polar curve and speed selection"},{"id":"Aerodynamics_142","topic":"Aerodynamics","text":"A hang glider pilot flies at 36 km/h (10 m/s) with a sink rate of 1 m/s. He reaches an area of sink where the air descends at 1 m/s. What happens if the glider maintains its speed?","options":["The sink rate and the glide ratio decrease.","The sink rate and the glide ratio increase.","Its glide ratio will reduce from 10 to 5.","Its glide ratio will increase from 5 to 10."],"correct":2,"exp":"Forward speed still 10 m/s, but total sink rate over the ground is now 2 m/s (wing's 1 m/s + air mass's 1 m/s). New glide ratio = 10 / 2 = 5. Even moderate sink halves the glide ratio of an excellent glider - a powerful reminder that 'manufacturer glide ratio' rarely matches reality.","sub":"Polar curve and speed selection"},{"id":"Aerodynamics_143","topic":"Aerodynamics","text":"A paraglider flies at a speed of 54 km/h (15 m/s) and has a sink rate of 2m/s. It encounters a head wind of 18 km/h (5m/s). What is its sink rate and forwards speed in relation to the ground?","options":["sink rate: 2 m/s, Groundspeed: 36 km/h (10 m/s)","sink rate: 2 m/s, Groundspeed: 72 km/h (20 m/s)","sink rate: 2 m/s, Groundspeed: 54 km/h (15 m/s)","sink rate: 3 m/s, Groundspeed: 54 km/h (15 m/s)"],"correct":0,"exp":"Sink rate doesn't change with horizontal wind - the wing's behaviour relative to the air mass is unaffected. Only the ground speed changes: 15 m/s air speed - 5 m/s headwind = 10 m/s ground speed (= 36 km/h). Sink stays at 2 m/s.","sub":"Polar curve and speed selection"},{"id":"Aerodynamics_144","topic":"Aerodynamics","text":"A paraglider flies at a speed of 54 km/h (1 5m/s) and has a sink rate of 2m/s. It encounters a head wind of 18 km/h (5 m/s). What will its glide ratio be?","options":["10.0","7.5","5.0","6.0"],"correct":2,"exp":"Ground speed = 15 - 5 = 10 m/s, sink = 2 m/s, so glide-over-ground = 10 / 2 = 5. In calm air the same wing would have glide 15/2 = 7.5; the headwind has reduced effective glide by a third. This is why you accelerate in headwind to push the ratio back up.","sub":"Polar curve and speed selection"},{"id":"Aerodynamics_145","topic":"Aerodynamics","text":"A hang glider flies in calm air with a glide ratio of 10 and a speed of 43 km/h (about 12 m/s). Its sink rate is:","options":["around 1.0 m/s","around 1.5 m/s","around 1.2 m/s","around 1.8 m/s"],"correct":2,"exp":"Sink rate = horizontal speed / glide ratio = 12 / 10 = 1.2 m/s. The four equivalent definitions of glide ratio let you solve for any single missing quantity if the other two are given.","sub":"Glide ratio and glide distance"},{"id":"Aerodynamics_146","topic":"Aerodynamics","text":"A paraglider flies with a glide ratio of 8. When it flies a distance of 1'600m in calm air how much altitude will it lose?","options":["240 m","180 m","200 m","150 m"],"correct":2,"exp":"Glide ratio 8 means 8 m forward per 1 m lost, so altitude lost = distance / glide ratio = 1600 / 8 = 200 m. Simple division - any conservative crossing plan would build in margin above this minimum.","sub":"Glide ratio and glide distance"},{"id":"Aerodynamics_147","topic":"Aerodynamics","text":"A paraglider flies with a glide ratio of 9 in calm air with a sink rate of 1 m/s. What is its forwards speed?","options":["43.2 km/h (12 m/s)","32.4 km/h (9 m/s)","39.6 km/h (11 m/s)","36.0 km/h (10 m/s)"],"correct":1,"exp":"Forward speed = glide ratio x sink rate = 9 x 1 m/s = 9 m/s. Converting: 9 x 3.6 = 32.4 km/h. Always remember the m/s to km/h conversion factor of 3.6 - critical for these questions.","sub":"Glide ratio and glide distance"},{"id":"Aerodynamics_148","topic":"Aerodynamics","text":"A paraglider flies with a forward speed of 32.4 km/h (9 m/s) in calm air with a sink rate of 1.5 m/s. What is its glide ratio?","options":["6.0","5.5","7.0","6.5"],"correct":0,"exp":"Glide ratio = forward speed / sink rate = 9 / 1.5 = 6.0. Straight application of the definition. Don't be fooled by km/h - first convert both speeds to the same units, or note that 32.4 km/h divided by something in km/h gives the same ratio as the m/s calculation.","sub":"Glide ratio and glide distance"},{"id":"Aerodynamics_149","topic":"Aerodynamics","text":"The flight-speed for minimum sink is","options":["Slightly less in a rising air current and slightly more in a descending air current than in calm air.","The same in a rising or descending air current as in calm air.","Slightly less in a rising and a descending air current than in calm air.","Slightly more in a rising air current and slightly less in a descending air current than in calm air."],"correct":1,"exp":"Airspeed at a given angle of attack depends only on wing loading and the air around it - not on whether the whole air mass is rising or sinking. So the airspeed for minimum sink is the same in lift, sink and calm air. What changes is the ground-relative sink rate, not the airspeed.","sub":"Polar curve and speed selection"},{"id":"Aerodynamics_150","topic":"Aerodynamics","text":"The term \"load factor\" defines","options":["the relationship between the minimum and maximum loading on a paraglider.","the relationship between the actual loading of a glider in flight compared with the total weight on the ground.","the wing loading.","the inbuilt extra load carrying capacity the manufacturer has included for safety."],"correct":1,"exp":"Load factor (in G) is the ratio of the actual loading on the glider during a manoeuvre to the static weight at rest on the ground. In a tight turn the centrifugal force adds to weight, so the wing 'feels' heavier; the load factor measures that increase.","sub":"Axes, stability, and turns"},{"id":"Aerodynamics_151","topic":"Aerodynamics","text":"A paraglider's total weight (pilot and glider) is 100 kg. In a tight turn, the glider is subject to a load of kg. What is its load factor? 025","options":["250","0.25","2.5","25"],"correct":2,"exp":"Load factor = actual load / normal weight = 250 kg / 100 kg = 2.5 G. The wing carries 2.5 times its straight-flight weight - corresponding to a bank angle around 65 degrees. Load factor is dimensionless (always expressed as a multiple of G).","sub":"Axes, stability, and turns"},{"id":"Aerodynamics_152","topic":"Aerodynamics","text":"What happens when a glider in straight, stable flight enters a turn? < >","options":["There is no change in wing loading and minimum speed.","The wing loading and minimum speed increase.","The wing loading increases and the minimum speed remains the same.","The wing loading remains the same and the minimum speed increase.",">>>"],"correct":1,"exp":"Entering a turn introduces centrifugal force, which adds to weight - the effective load on the wing increases. To balance this larger 'effective weight', the wing must fly faster, which shifts the entire speed polar up: trim speed, max speed AND minimum (stall) speed all increase. Wing loading rises proportionally to the load factor.","sub":"Axes, stability, and turns"},{"id":"Legislation_3","topic":"Legislation","text":"The legal regulations applying to the sport of hang gliding and paragliding are found","options":["in the regulations for aircraft in special categories (VLK) from 24 November 2022, SR 748.941.","in the regulations for hang gliders and other specific aircraft (VHG) from 14 March 1988, SR 748.941.","in the regulations for specific aircraft and flying bodies (VFF) from 6 September 1976, SR 748.941.","in the regulations for aviation (LFV) from 14 November 1973, SR 748.01."],"correct":0,"exp":"Free flight in Switzerland is governed by the Ordinance on Aircraft of Special Categories (German VLK, French OACS), which entered into force in 1994. This federal ordinance is the specific text that covers hang gliders and paragliders - it defines who may fly, what equipment is required, the insurance minimum and the marking obligation. The Confederation alone has the authority to legislate on the use of Swiss airspace.","sub":"Legal framework (OACS/VLK)"},{"id":"Legislation_4","topic":"Legislation","text":"What is the legal definition of the term \"hang glider\"?","options":["Unpowered craft which can fly at a minimum speed of 30 km/h with maximum loading.","Foot launched craft where the pilot hangs below the wing.","Foot launchable craft which can be used for gliding and soaring immediately after takeoff.","Unpowered craft with a wing loading of less than 20 kg/m2."],"correct":2,"exp":"The OACS defines a hang glider (which legally includes paragliders) as a foot-launched aircraft that, immediately after the running start, performs gliding or soaring flights along a slope. No motor, no wheeled launch - the body and the slope are the only means of getting airborne.","sub":"Legal framework (OACS/VLK)"},{"id":"Legislation_5","topic":"Legislation","text":"Hang gliders and paragliders are < >","options":["registered in the Swiss aircraft register, as long as they are recognised by SHV as having been tested for airworthiness.","required by law to be registered by the SHV. An up to date list can be aquired from the SHV.","registered in the Swiss aircraft register, as long as they are recognised by BAZL as having been tested for airworthiness.","not entered into the Swiss aircraft register.",">>>"],"correct":3,"exp":"Hang gliders and paragliders are explicitly NOT entered in the Swiss aircraft register - this is one of the legal peculiarities of free flight. Every other category of aircraft has a federal registration; for paragliders the only obligation is the SHV-issued identification number affixed to the underside of the wing.","sub":"Legal framework (OACS/VLK)"},{"id":"Legislation_6","topic":"Legislation","text":"According to the regulation for special categories of aircraft (VLK) the airworthiness of a hang glider or paraglider","options":["is not required to be tested by any authority.","must be tested by SHV.","must be tested by BAZL.","must be guaranteed by the manufacturer."],"correct":0,"exp":"Under the OACS no authority is required to test or certify the airworthiness of a paraglider - unlike a car there is no mandatory periodic check. Swiss free-flight law leaves a lot to personal responsibility; it is only recommended (not required) to have your wing checked roughly every two years.","sub":"Legal framework (OACS/VLK)"},{"id":"Legislation_7","topic":"Legislation","text":"Who is first and foremost responsible for the airworthiness of a hang glider or a paraglider?","options":["BAZL.","The manufacturer.","The pilot.","The testing department of SHV."],"correct":2,"exp":"Because no authority tests the wing, the pilot bears the primary, first-line responsibility for the airworthiness of the equipment. Every flight begins with the pilot's own check of lines, risers, harness and reserve - and the legal consequence of any defect that should have been spotted falls on the pilot.","sub":"Legal framework (OACS/VLK)"},{"id":"Legislation_9","topic":"Legislation","text":"Wearing a helmet while flying a hang glider or a paraglider","options":["is required for all flights.","is only required for hang glider flights.","is required for high flights during a pilot's training.","is required during practical flying exams."],"correct":3,"exp":"Astonishingly, Swiss law only requires a helmet (and reserve parachute) for the official practical flying exam. Outside the exam they are not legally mandatory, although every responsible pilot wears them and most competition organisers require them for safety reasons.","sub":"Insurance, liability & equipment"},{"id":"Legislation_10","topic":"Legislation","text":"What type of insurance is required by law for hang gliding or paragliding?","options":["Private third party liability insurance.","Insurance against theft.","Accident insurance.","Hang glider / paraglider third party liability insurance."],"correct":3,"exp":"The OACS makes only ONE type of insurance compulsory: hang-glider/paraglider third-party liability insurance. Your personal accident or health insurance covers injuries you suffer yourself, but damage you cause to others on the ground - branches falling on a car after landing, for example - is only covered by this specific paragliding liability policy.","sub":"Insurance, liability & equipment"},{"id":"Legislation_11","topic":"Legislation","text":"Flying hang gliders and paragliders is only allowed with liability insurance which must cover","options":["damages caused to other aircraft while in the air.","physical injuries sustained by the pilot while flying.","damages sustained by third parties in the air or on the ground.","damages sustained by third parties on the ground."],"correct":3,"exp":"The legally required liability insurance covers damages caused to uninvolved third parties on the ground - the classic case being objects or people on the landing field. Damage to other aircraft in flight is NOT covered by the legal minimum, although the SHV offers an enhanced policy that does include in-flight third-party damage.","sub":"Insurance, liability & equipment"},{"id":"Legislation_12","topic":"Legislation","text":"How high must the minimum cover be for public liability insurance for hang gliders and paragliders?","options":["CHF 2'000'000","CHF 500'000","CHF 1'500'000","CHF 1'000'000"],"correct":3,"exp":"The OACS sets the minimum cover of paraglider liability insurance at CHF 1,000,000 for third-party damages on the ground. SHV members get an enhanced policy that goes well beyond this; the federal minimum, however, is exactly one million Swiss francs.","sub":"Insurance, liability & equipment"},{"id":"Legislation_13","topic":"Legislation","text":"If the damages are greater than the insurance cover, who pays the difference?","options":["The person who caused the accident.","The victim.","The insurance company.","The SHV."],"correct":0,"exp":"Liability insurance is a cap, not a ceiling on legal responsibility. If the damages caused exceed the policy limit (CHF 1,000,000 minimum, or whatever higher cover the pilot took out), the person who caused the accident must pay the remainder out of their own pocket. That is exactly why pilots commonly take the SHV's enhanced policy.","sub":"Insurance, liability & equipment"},{"id":"Legislation_14","topic":"Legislation","text":"In Switzerland, all hang gliders and paragliders must have the following markings","options":["SHV airworthiness label; SHV issued identification number.","SHV issued identification number; owner's name and address.","SHV issued identification number; manufacturer's label.","Manufacturer's label; SHV airworthiness label."],"correct":2,"exp":"Every Swiss hang glider or paraglider must carry two sets of markings: (1) the SHV-issued identification number on the underside of the wing, and (2) the manufacturer's plaque sewn into an edge or wingtip with the basic data of the wing. Both are required by the OACS / VKZ.","sub":"Aircraft identification & markings"},{"id":"Legislation_15","topic":"Legislation","text":"According to Art. 11a of the regulations for identification of aircraft (VKZ) from 6. September 1984, SR 748.216.1, each hang glider and paraglider must have the following identification","options":["An easily identifiable number with a maximum of 5 digits on the upper side of the load-bearing surface of the wing.","An easily identifiable number with a maximum of 5 digits on both the upper and lower side of the load-bearing surface of the wing.","An easily identifiable number with a maximum of 5 digits on the underside of the load-bearing surface of the wing.","An easily identifiable number with a maximum of 5 digits on either the upper or lower side of the load-bearing surface of the wing."],"correct":2,"exp":"Article 11a VKZ requires an easily recognisable identification number (commonly written as 'max 5 digits' on the question) affixed to the underside of the load-bearing surface of the wing. The digits must be on the lower surface so that the wing can be identified from the ground in flight.","sub":"Aircraft identification & markings"},{"id":"Legislation_16","topic":"Legislation","text":"Who issues a hang glider’s / paraglider's identification number?","options":["The Federal Office for Civil Aviation (BAZL)","The companies providing liability insurance","Flight instructors","The Swiss Hang Gliding Association (SHV)"],"correct":3,"exp":"The SHV/FSVL (Swiss Hang Gliding Association) is the body mandated to manage and allocate identification numbers to pilots. In practice the number is usually identical to the pilot's SHV licence number - one personal number that follows the pilot to every wing he or she flies.","sub":"Aircraft identification & markings"},{"id":"Legislation_17","topic":"Legislation","text":"According to Art. 11a of the regulations for identification of aircraft (VKZ) from 6. September 1984, SR 748.216.1 how large must the numbers of the registration number be?","options":["There is no defined size.","30 cm high","40 cm high","50 cm high"],"correct":2,"exp":"Article 11a VKZ fixes the height of the identification digits at 40 cm - that is large enough to be read from the ground when the wing passes overhead. The numbers are usually adhered as iron-on or sewn-on numerals to the underside of the wing.","sub":"Aircraft identification & markings"},{"id":"Legislation_18","topic":"Legislation","text":"If a pilot is the owner of more than one hang glider or paraglider, how must he/she identify them?","options":["In order to distinguish the gliders, they should have different capital letters of the alphabet as their ID.","All gliders must have the same number.","Only one glider requires an ID, the others can be flown without one.","Each glider must have its own unique number."],"correct":1,"exp":"The identification number belongs to the pilot, not to the wing. A pilot who owns several wings must use the SAME number on every one of them - and that number must match the one on the liability-insurance certificate carried on every flight.","sub":"Aircraft identification & markings"},{"id":"Legislation_19","topic":"Legislation","text":"According to Art. 11a of the regulations for identification of aircraft (VKZ) from 6. September 1984, SR 748.216.1, each hang glider and paraglider must have an easily visible label with the following information","options":["Manufacturer, type, year of manufacture, manufacturer defined minimum and maximum load.","Manufacturer, type, serial number, manufacturer defined minimum and maximum load.","Manufacturer, type, year of manufacture, classification according to SHV defined categories.","Manufacturer, serial number, classification according to SHV defined categories, manufacturer defined minimum and maximum load."],"correct":0,"exp":"The manufacturer's plaque - a small fabric label sewn into the edge or wingtip - must list four data: manufacturer name, type of wing, year of manufacture, and the minimum and maximum loads specified by the manufacturer. Serial numbers or certification class are NOT legally required on the label (although usually present).","sub":"Aircraft identification & markings"},{"id":"Legislation_20","topic":"Legislation","text":"The legally required identification of a hang glider or paraglider","options":["is only mandatory for holders of a hang gliding pilot's licence.","is only mandatory for members of SHV.","is mandatory for all users of Swiss airspace.","is only mandatory within for exams organised by SHV."],"correct":2,"exp":"The marking obligation applies to ALL users of Swiss airspace - including foreign pilots flying here. There is no exemption: anyone launching a paraglider in Switzerland must have an identification number visible on the underside of the wing.","sub":"Aircraft identification & markings"},{"id":"Legislation_21","topic":"Legislation","text":"The minimum age to attain the Swiss licence for hang gliding is?","options":["12 years","18 years","14 years","16 years"],"correct":3,"exp":"The OACS sets the minimum age for the Swiss free-flight licence at 16. A student may start instruction at 15, but the licence itself cannot be issued earlier. There is no maximum age and no medical examination is required.","sub":"Brevet, licensing & exam"},{"id":"Legislation_22","topic":"Legislation","text":"What does the abbreviation HX mean?","options":["No specific operating hours, activation possible at any time","Activation via DABS/Notam","None of the other answers is correct","Permanently in operation"],"correct":0,"exp":"On the glider chart, HX next to a CTR or TMA means the airspace has no fixed operating hours - activation is possible at any time. You must therefore assume the airspace may be live and query its status before flying (via DABS, NOTAM or radio). The other activity codes are 9 (permanently active) and temporary zones announced on the DABS.","sub":"Restricted, danger & glider zones"},{"id":"Legislation_23","topic":"Legislation","text":"Who is allowed to fly in Swiss airspace without being in possession of a Swiss licence?","options":["Pilots who hold an equivalent foreign licence.","Pilots who live abroad and hold an APPI licence.","Pilots who live abroad and hold an international FAI competition licence.","Pilots who live abroad and hold an equivalent foreign licence."],"correct":3,"exp":"Only foreign pilots domiciled abroad who hold an equivalent foreign licence (or the international IPPI) may fly in Swiss airspace without a Swiss licence. Anyone domiciled in Switzerland - Swiss or foreign - must hold a Swiss SHV licence to fly here, even occasionally.","sub":"Brevet, licensing & exam"},{"id":"Legislation_24","topic":"Legislation","text":"Training flights can only be carried out under the direct supervision of a person","options":["who is employed by a flight school.","who has a valid official flight instructor's licence.","who has been entrusted by an official flying instructor to carry out the supervision.","who has held their licence for at least 3 years."],"correct":1,"exp":"Flight training of unqualified students is only permitted under the direct supervision of a person holding a valid flight-instructor licence recognised in Switzerland. A regular pilot's licence does not allow you to teach others to fly.","sub":"Brevet, licensing & exam"},{"id":"Legislation_25","topic":"Legislation","text":"Training flights before an exam","options":["should only be carried out under the supervision of an experienced pilot.","are only possible for members of the SHV/FSVL.","can only be carried out under the direct supervision of a flying instructor with a valid swiss licence.","can also be carried out without direct supervision of a 3rd party."],"correct":2,"exp":"Training flights leading up to the exam must be supervised directly by an instructor whose licence is valid in Switzerland - a foreign instructor without a recognised Swiss licence cannot validly supervise a Swiss exam candidate.","sub":"Brevet, licensing & exam"},{"id":"Legislation_26","topic":"Legislation","text":"Flights with a passenger (tandem flights) can only be carried out by","options":["holders of the appropriate official licence.","pilots who have held their licence for at least 3 years.","pilots who have special permission from BAZL.","holders of an official instructors licence."],"correct":0,"exp":"Tandem (two-person) flights may only be performed by a pilot holding the appropriate official tandem licence. A solo pilot's licence does not allow you to carry a passenger - the tandem licence is a distinct qualification.","sub":"Brevet, licensing & exam"},{"id":"Legislation_27","topic":"Legislation","text":"Commercial flights with a passenger having no knowledge of flying","options":["are reserved for pilots with a tandem 1 licence.","are reserved for pilots with a tandem 3 licence.","are reserved for pilots with a tandem 2 licence.","can be carried out basically by any experienced pilot. The SHV however strongly recommends attendance at the appropriate training courses."],"correct":1,"exp":"Commercial tandem flights with passengers who have no flying knowledge of their own require a tandem 3 / Licence A. The Licence A holder may take any passenger; lower-tier tandem licences are restricted to passengers who themselves hold a pilot certificate in the same category.","sub":"Brevet, licensing & exam"},{"id":"Legislation_28","topic":"Legislation","text":"A tandem 1 licence allows flights","options":["of a commercial nature with paying passengers.","of a non-commercial nature with paying passengers.","with passengers for which no payment is taken.","with licenced pilots of the same category as well as flying students while under the supervision of a flight instructor."],"correct":3,"exp":"A Tandem 1 licence is the entry-level tandem rating: it allows flights only with passengers who themselves hold a paraglider pilot licence in the same category, as well as flight students under the supervision of an instructor. Carrying a member of the public requires a higher tandem rating.","sub":"Brevet, licensing & exam"},{"id":"Legislation_29","topic":"Legislation","text":"After acquiring an official Swiss hang glider pilots licence,","options":["Answers a, b and c are correct.","It is recommended to record your flights in a log book, as your need to prove that you have completed 200 flights before beginning training to be a tandem pilot.","there is basically no obligation to record your flights in a log book.","It is recommended to record your flights in a log book, as you need to prove that you have completed 200 flights before the practical flight instructor exam."],"correct":0,"exp":"Several rules apply simultaneously after licensing: the SHV licence has unlimited validity for solo pilots, no minimum number of flights per year is required, and no medical exam is needed. All of these statements are correct - hence the 'all of the above' answer.","sub":"Brevet, licensing & exam"},{"id":"Legislation_30","topic":"Legislation","text":"The contents of the examinations for the official licences","options":["are stipulated in the BAZL approved regulations of the SHV.","are approved by the international aviation authority.","are determined solely by the SHV.","are determined by a BAZL recognised expert."],"correct":0,"exp":"The detailed programme of the theory and practical exams is laid down in the SHV directives, which are approved by the BAZL/OFAC (Federal Office of Civil Aviation). The Confederation thus retains oversight while delegating the day-to-day content to the federation of pilots.","sub":"Brevet, licensing & exam"},{"id":"Legislation_32","topic":"Legislation","text":"What are the normal military operating hours?","options":["MO-FR 07:15 - 12.05 and 13:15 till 17.05 UTC","MO-FR 07:30 - 12.05 and 13:15 till 17.05 LT","MO-FR 07:15 - 12.05 and 13:15 till 17.05 LT","MO-FR 07:30 - 12.05 and 13:15 till 17.05 UTC"],"correct":1,"exp":"Swiss Air Force operating hours are Monday to Friday, 07:35-12:05 and 13:15-17:05 local time. The five-minute buffers at start and end are deliberate to avoid overlap with civil traffic. Outside these hours - including all weekends and public holidays - MIL OFF applies, and the alpine E ceiling rises from 3950 m to 4550 m AMSL.","sub":"Restricted, danger & glider zones"},{"id":"Legislation_34","topic":"Legislation","text":"From march until 31 October, an LS-R for gliders with the notation “MA” is","options":["active only in the mornings.","active during MIL-OFF, inactive during MIL-ON.","active during MIL-OFF. During MIL-ON it can be activated upon request by the appropriate authority.","permanently active."],"correct":2,"exp":"An LS-R-for-Gliders zone with the 'MA' suffix is automatically active during MIL OFF (evenings, weekends, holidays). When the military is active (MIL ON), the zone is normally closed - but you may CALL the responsible authority and request that it be opened, because the military might not actually be using that piece of airspace. The 'MO' suffix, by contrast, is active only during MIL OFF with no possibility of request.","sub":"Restricted, danger & glider zones"},{"id":"Legislation_35","topic":"Legislation","text":"Open air gatherings of people, buildings, public roads and ski pistes, public transport as well as electrical power lines and other cables","options":["must be flown over or around with a minimum clearance of at least 60m.","must be flown around and not over.","must be flown over or around with a minimum clearance of at least 300m.","must be flown over or around with a clearance to provide a sufficient degree of safety."],"correct":3,"exp":"Open-air gatherings, buildings, roads, ski pistes, public transport, power lines and cables must be circumnavigated or flown over at a SAFE distance - the OACS does not prescribe a numerical minimum height. The pilot is required to maintain a sufficient safety margin using common sense.","sub":"Operating rules & ground distances"},{"id":"Legislation_36","topic":"Legislation","text":"On the condition that no goods are transported, and the required documents are carried, hang gliders and paragliders may","options":["fly over country borders without limitation.","fly over country and customs borders if the pilot is in possession of a competition licence.","enter and leave Swiss airspace according to VLK regulations, as long as foreign laws are also respected.","fly over country and customs borders after applying to the Swiss customs office in Bern."],"correct":2,"exp":"Provided you carry no goods and have the required documents (pilot licence, insurance certificate), you may enter and leave Swiss airspace freely under the OACS. Naturally the laws of the country you fly into must also be respected.","sub":"Legal framework (OACS/VLK)"},{"id":"Legislation_37","topic":"Legislation","text":"Starts and landings on public waterways","options":["are allowed without restriction if the appropriate equipment is used.","are forbidden.","require the permission of the canton's shipping administrator.","require permission from BAZL."],"correct":2,"exp":"Take-offs and landings on public waters require prior authorisation from the cantonal navigation administration. Like other public-property launch sites, the basic federal rule is supplemented by local consent.","sub":"Operating rules & ground distances"},{"id":"Legislation_39","topic":"Legislation","text":"What minimum horizontal distance must be maintained to the runways of civil aerodromes without a control zone (CTR) and aerodromes with CTRs which are inactive? (up to 600m above the aerodrome)","options":["5 km","10 km","8 km","2.5 km"],"correct":0,"exp":"You must keep a horizontal distance of 5 km from the runway of any civil or military airfield without an active control zone (CTR), up to 600 m above the aerodrome. For heliports the protective cylinder is smaller: 2.5 km. The 5 km figure is the default - some sites (e.g. Trogen) have local SHV agreements that cut a wedge out of the cylinder.","sub":"Operating rules & ground distances"},{"id":"Legislation_42","topic":"Legislation","text":"According to VLK, to what altitude must the minimum distance to aerodromes and heliports be maintained?","options":["600m above the aerodrome reference point.","300m above the aerodrome reference point.","600m above ground.","300m above ground."],"correct":0,"exp":"The protective cylinder around aerodromes and heliports only extends 600 m above the aerodrome reference point. Above that the airspace opens up again - so you are NOT violating the distance rule by overflying an airfield at, say, 1000 m AGL. The 5 km / 2.5 km radius and the 600 m vertical cap together form a tin-can shape.","sub":"Operating rules & ground distances"},{"id":"Legislation_43","topic":"Legislation","text":"Under what conditions is it legal to land with a hang glider or paraglider on a fixed wing aircraft runway?","options":["When there are no aircraft on approach and the runway is clear.","Never","With the permission of the aerodrome director.","When landing witnesses are urgently required after a cross-country flight."],"correct":2,"exp":"Landing a paraglider on or beside a fixed-wing aerodrome runway is only legal with the permission of the aerodrome director (chief). Without that explicit authorisation it is forbidden by the OACS.","sub":"Operating rules & ground distances"},{"id":"Legislation_44","topic":"Legislation","text":"At what interval must holders of a hang gliding licence have a medical examination?","options":["Every 5 years.","Under 40: every 4 years, over 40: every 2 years.","Eye and hearing test every 4 years.","There are no laws applying to this."],"correct":3,"exp":"No law requires a medical examination for the issue or renewal of a Swiss paraglider licence - neither at the start nor at any later interval. This is unusual compared to motorised aviation; the responsibility for being fit to fly lies with the pilot.","sub":"Brevet, licensing & exam"},{"id":"Legislation_45","topic":"Legislation","text":"What is the minimum number of flights required each year for a pilot to maintain his licence?","options":["20","30","40","No minimum number."],"correct":3,"exp":"The Swiss licence has unlimited validity for solo pilots and no minimum number of flights per year is prescribed. The OACS leaves it to the pilot to stay current; a refresher course is recommended after a long break but not legally required.","sub":"Brevet, licensing & exam"},{"id":"Legislation_46","topic":"Legislation","text":"How long is a paragliding gliding licence valid?","options":["For the categories of pilot as well as tandem 1 and 2: unlimited. For the categories of tandem 3 and flight instructor: 3 years.","For the categories of pilot as well as tandem 1 and 2: unlimited. For the categories of tandem 3 and flight instructor: 5 years.","All categories: unlimited.","All categories: 3 years."],"correct":0,"exp":"For solo (Pilot) and Tandem 1/2 the Swiss licence has unlimited validity. For Tandem 3 (commercial tandem) and Flight Instructor the licence must be renewed every 3 years, reflecting the higher responsibility carried by pilots who fly passengers commercially or train others.","sub":"Brevet, licensing & exam"},{"id":"Legislation_47","topic":"Legislation","text":"Is a pilot obligated by law to log his flights in a logbook?","options":["No, but It is recommended to record your flights in a log book, as you need to prove that you have completed 200 flights before beginning training to be a flight instructor or tandem pilot","Yes.","Only the minimum required for renewal of the licence.","Only the first 500."],"correct":0,"exp":"The OACS does NOT require pilots to keep a flight logbook. However it is strongly recommended, because to begin instructor training you must later prove 200 flights - which is impossible without contemporaneous records. A logbook is also the simplest way to track the 40+ flights needed for the practical exam.","sub":"Brevet, licensing & exam"},{"id":"Legislation_50","topic":"Legislation","text":"Which flight radio frequency is especially reserved for communication between hang glider / paraglider pilots in the air?","options":["123.430 MHz","122.955 MHz","124.855 MHz","130.930 MHz"],"correct":3,"exp":"The radio frequency 130.930 MHz is the one specifically reserved for air-to-air communication between hang glider and paraglider pilots in Switzerland. Use of this frequency does NOT require any special radio training. A separate frequency (123.425 MHz) is used for student training.","sub":"Operating rules & ground distances"},{"id":"Legislation_51","topic":"Legislation","text":"For the use of a flight radio on frequency 130.930 MHz","options":["a radiophone operator's licence is required.","a radio communication licence is required.","a flight instructor licence is required.","no special training is required."],"correct":3,"exp":"Operating on the dedicated free-flight frequency 130.930 MHz does NOT require any special radio licence or training. Only when you intend to call air-traffic-control units (controlled airspace) would a separate aeronautical-radio qualification be relevant.","sub":"Operating rules & ground distances"},{"id":"Legislation_52","topic":"Legislation","text":"The abbreviation \"ICAO\" stands for","options":["Swiss Traffic and Energy Department.","Swiss Hang Gliding Association.","International Civil Aviation Authority.","Federal Office for Civil Aviation."],"correct":2,"exp":"ICAO stands for International Civil Aviation Organization - the UN agency that codifies the standards used worldwide, including the A-G classification of airspace classes that Switzerland uses (only C, D, E and G are applied in practice).","sub":"Aviation abbreviations"},{"id":"Legislation_54","topic":"Legislation","text":"The abbreviation \"AIP\" stands for","options":["the Pilots’ Handbook of Switzerland.","the Notice to Airmen.","the Coordination Office for Military Firing and Air Traffic Control.","the glider map."],"correct":0,"exp":"AIP stands for Aeronautical Information Publication - Skyguide's master document for Swiss aviation. It is the long-form 'pilots' handbook' that contains all general, persistent information on Swiss airspace, navaids, aerodromes and procedures; it is updated monthly.","sub":"Information sources & publications"},{"id":"Legislation_55","topic":"Legislation","text":"The AIP","options":["is a topographical map showing the different categories of airspace, dangerous and restricted areas, aerial obstructions, sailplane/glider zones (LS-R for gliders) and military operating hours.","is a weekly summary of all information published for VFR aviation.","contains the latest information about the location and times of military firing practice and is issued daily.","contains general information for users of Swiss airspace."],"correct":3,"exp":"The AIP contains the general, persistent information for all users of Swiss airspace - airspace descriptions, aerodrome procedures, navaids and similar reference material that doesn't change daily. Short-term changes go into the NOTAM and DABS instead.","sub":"Information sources & publications"},{"id":"Legislation_56","topic":"Legislation","text":"The abbreviation \"GLDK\" or \"GLDC\" stands for","options":["the glider map.","the Pilots’ Handbook of Switzerland.","the Coordination Office for Military Firing and Air Traffic Control.","the Notice to Airmen."],"correct":0,"exp":"GLDK / GLDC stands for Glider Chart - Skyguide's special VFR map for sailplanes and paragliders. A new edition is published every March; many pilots keep a paper copy for overview and re-check the digital version at map.geo.admin.ch before each flight.","sub":"Information sources & publications"},{"id":"Legislation_57","topic":"Legislation","text":"The GLDK or GLDC","options":["is a weekly summary of all information published for VFR aviation.","contains the latest information about the location and times of military firing practice and is issued daily.","is a topographical map showing the different categories of airspace, dangerous and restricted areas, aerial obstructions, sailplane/glider zones (LS-R for gliders) and military operating hours.","contains general information for users of Swiss airspace."],"correct":2,"exp":"The Glider Chart is a topographical map specially produced for sailplanes and paragliders. It shows airspace classes (C/D/E/G), restricted/danger areas (LS-R/LS-D), prominent obstacles, LS-R for Gliders soaring zones, the Mittelland-Alps dividing line, military flight hours and aerodrome cylinders. It is the single most important map for free-flight planning.","sub":"Information sources & publications"},{"id":"Legislation_58","topic":"Legislation","text":"The abbreviation \"NOTAM\" stands for","options":["the Coordination Office for Military Firing and Air Traffic Control.","the glider map.","the Notice to Airmen.","the Pilots’ Handbook of Switzerland."],"correct":2,"exp":"NOTAM stands for Notice to Airmen - a daily bulletin used in aviation worldwide that lists short-term changes: airspace restrictions, hazards on the ground, obstacles, etc. For VFR free flight the relevant subset is published as the VFR-NOTAM.","sub":"Information sources & publications"},{"id":"Legislation_59","topic":"Legislation","text":"NOTAM","options":["is a weekly summary of all information published for VFR aviation.","contains the latest information about the location and times of military firing practice and is issued daily.","contains general information for users of Swiss airspace.","is a topographical map showing the different categories of airspace, dangerous and restricted areas, aerial obstructions, sailplane/glider zones (LS-R for gliders) and military operating hours."],"correct":0,"exp":"The NOTAM is the standard short-term aeronautical bulletin listing airspace restrictions, hazards and ground obstacles. (The SHV booklet's 'weekly' wording is a quirk of the question; in practice the NOTAM is published continuously and read daily before flying alongside the DABS.)","sub":"Information sources & publications"},{"id":"Legislation_60","topic":"Legislation","text":"The abbreviation \"DABS\" stands for","options":["the Notice to Airmen.","\"Daily Airspace Bulletin Switzerland\", an official aeronautical publication of Switzerland which provides pilots with a graphical overview of the latest airspace status.","the Pilots’ Handbook of Switzerland.","the glider map."],"correct":1,"exp":"DABS stands for Daily Airspace Bulletin Switzerland - the official Skyguide publication at www.skybriefing.com that gives pilots a graphical, day-by-day overview of which Swiss airspaces are active. Before reading it, ALWAYS verify the displayed date matches the day you intend to fly.","sub":"Information sources & publications"},{"id":"Legislation_61","topic":"Legislation","text":"DABS","options":["contains general information for users of Swiss airspace.","is a topographical map showing the different categories of airspace, danger zones, aerial obstructions, sailplane/glider zones and military operating hours.","is a weekly summary of all information published for VFR aviation.","contains daily up-to-date information about dangers, restrictions and changes to Swiss airspace including activation of TEMPO TMA and CTRs."],"correct":3,"exp":"The DABS contains daily, up-to-date information on Swiss airspace: active LS-R restrictions, temporary TMA/CTR extensions (Sion and Alpnach being the only two temporaries in Switzerland), MIL ON status, parachute drops, firing ranges and similar short-term activations.","sub":"Information sources & publications"},{"id":"Legislation_62","topic":"Legislation","text":"The abbreviation \"IFR\" stands for","options":["Instrument Flight Rules.","International Flight Region.","Instrument Flight Region.","International Flight Rules."],"correct":0,"exp":"IFR stands for Instrument Flight Rules - the regime used by aircraft equipped for instrument flight and flown by pilots holding the corresponding rating. Paragliders cannot fly IFR no matter how much GPS or instrumentation they carry: under Swiss law a paraglider always operates under VFR only.","sub":"Aviation abbreviations"},{"id":"Legislation_63","topic":"Legislation","text":"The abbreviation \"VFR\" stands for","options":["Visual Flight Rules","Variable Flight Rules","Visual Flight Region","Variable Flight Region"],"correct":0,"exp":"VFR stands for Visual Flight Rules - the 'fly by sight' regime that applies to any aircraft operating visually. It defines the minimum visibility, the safe distance from cloud and the right-of-way rules. All paragliders fly under VFR at all times.","sub":"Aviation abbreviations"},{"id":"Legislation_64","topic":"Legislation","text":"IFR flights","options":["are reserved for aircraft with the necessary equipment and permission.","are possible with a hang glider or paraglider when equipped with a compass, altimeter and radio.","are carried out exclusively at an altitude higher than FL 195.","occur as soon as the visibility drops below a predetermined minimum and you are dependent upon your instruments."],"correct":0,"exp":"IFR flight requires both the right equipment (instruments for blind flight, attitude reference, navigation) AND a pilot with an instrument rating. Without both, you may not file or fly IFR - which is why paragliders are confined to VFR.","sub":"Aviation abbreviations"},{"id":"Legislation_66","topic":"Legislation","text":"When can hang gliders and paragliders fly?","options":["Neither in VFR or IFR conditions, as they apply only to commercial aviation.","Exclusively in IFR conditions.","According to the visibility in IFR as well as VFR flight conditions.","Exclusively in VFR conditions."],"correct":3,"exp":"Hang gliders and paragliders are restricted by law to VFR (Visual Flight Rules). That means visibility minima, distance from cloud, and the inability to fly into or through cloud - regardless of how sophisticated your instruments are.","sub":"Cloud clearance & VFR visibility"},{"id":"Legislation_67","topic":"Legislation","text":"The abbreviation \"GND\" stands literally for","options":["Altitude above ground.","Ground.","Flight level.","Altitude above mean sea level."],"correct":1,"exp":"GND on the glider chart simply stands for Ground. It is the lower limit of an airspace whose floor sits on the terrain (a CTR for example, which extends from GND upwards).","sub":"Aviation abbreviations"},{"id":"Legislation_68","topic":"Legislation","text":"The abbreviation \"AMSL\" stands for","options":["Ground.","Altitude above ground.","Altitude above mean sea level.","Flight level."],"correct":2,"exp":"AMSL stands for Altitude (or 'above') Mean Sea Level - the absolute altitude relative to global sea level (e.g. the elevation written on a summit marker). On the glider chart, AMSL numbers are shown in italic font.","sub":"Aviation abbreviations"},{"id":"Legislation_69","topic":"Legislation","text":"The abbreviation \"AGL\" stands for","options":["Flight level.","Altitude above ground.","Ground.","Altitude above mean sea level."],"correct":1,"exp":"AGL stands for Altitude Above Ground Level - your altitude measured relative to the terrain directly below you. AGL ceilings (like the 600 m AGL top of airspace G) therefore rise and fall with topography. On the glider chart AGL numbers are shown in UPRIGHT font, AMSL in italics.","sub":"Aviation abbreviations"},{"id":"Legislation_71","topic":"Legislation","text":"What altitude corresponds approximately to FL 30?","options":["900m above sea level.","600m above ground.","3'050m above sea level.","300m above sea level."],"correct":0,"exp":"A Flight Level is 100 feet referenced to the standard atmosphere (1013.25 hPa). One foot is 30.48 cm, so FL 30 = 3000 ft = 914 m, which the SHV booklet rounds to 900 m. Quick mental shortcut: multiply the FL number by 30 to get metres.","sub":"Aviation abbreviations"},{"id":"Legislation_72","topic":"Legislation","text":"What altitude corresponds approximately to FL 100?","options":["4'550m above sea level.","1'000m above ground.","1'000m above sea level.","3'050m above sea level."],"correct":3,"exp":"FL 100 = 10,000 ft. One foot = 30.48 cm, so 10,000 ft = 3,048 m, rounded to 3050 m in the booklet. This is exactly the upper limit of airspace E over the Jura and the Mittelland - the boundary at which paragliders enter airspace C.","sub":"Aviation abbreviations"},{"id":"Legislation_73","topic":"Legislation","text":"What altitude corresponds approximately to FL 150?","options":["1'500 m above sea level.","5'950 m above sea level.","1'500 m above ground level.","4'550 m above sea level."],"correct":3,"exp":"FL 150 = 15,000 ft = 4,572 m, rounded to 4,550 m in the booklet. This is the upper limit of airspace E in the Alps when the military is OFF (evenings, weekends, holidays) - the highest you may fly without entering airspace C.","sub":"Aviation abbreviations"},{"id":"Legislation_74","topic":"Legislation","text":"What altitude corresponds approximately to FL 195?","options":["1'950 m above sea level.","5'950 m above sea level.","1'950 m above ground.","4'550 m above sea level."],"correct":1,"exp":"FL 195 = 19,500 ft = 5,944 m, rounded to 5,950 m. FL 195 is the upper limit of Swiss airways (AWY); above it sits Class A airspace where free flight is not relevant in practice.","sub":"Aviation abbreviations"},{"id":"Legislation_75","topic":"Legislation","text":"The abbreviation \"AWY\" stands for","options":["Terminal control area.","Airway.","Control Zone.","Flight information region."],"correct":1,"exp":"AWY stands for Airway - a controlled corridor connecting TMAs, used by long-distance instrument traffic. Swiss airways extend up to FL 195 with a defined lower limit (often a flight level) and clear lateral boundaries on the glider chart.","sub":"Aviation abbreviations"},{"id":"Legislation_76","topic":"Legislation","text":"An AWY","options":["is generally found at the junction of ATS routes in the vicinity of one or more major airports. Upper and lower levels are noted on the glider map.","is the entire airspace above Switzerland.","encircles an aerodrome. Its lower level is GND. The upper level is bounded by the terminal control area.","links various airports to each other, has clearly defined side and lower limits."],"correct":3,"exp":"An airway connects various airports along a defined corridor: it has clearly defined lateral and lower limits (the upper limit is generally FL 195). Inside an active AWY only IFR traffic is normally found - paragliders should avoid it.","sub":"Aviation abbreviations"},{"id":"Legislation_77","topic":"Legislation","text":"The abbreviation \"CTR\" stands for","options":["Flight information region.","Terminal control area.","Control Zone.","Airway."],"correct":2,"exp":"CTR stands for Control Zone - controlled airspace (class D in Switzerland) extending from the GROUND around a runway up to a defined altitude. It encircles the aerodrome and is reserved for traffic that has a clearance and, normally, radio contact.","sub":"Aviation abbreviations"},{"id":"Legislation_78","topic":"Legislation","text":"A CTR","options":["links various airports to each other, has a clearly defined lower limit and an upper limit of FL 195.","is the entire airspace above Switzerland.","is generally found at the junction of ATS routes in the vicinity of one or more major airports. Upper and lower limits are noted on the glider map.","encircles an aerodrome. Its lower level is GND. The upper limit is defined on the glider map."],"correct":3,"exp":"A CTR encircles the aerodrome runway, starts at the ground and extends to an upper limit defined on the glider chart. Its shape is dictated by topography and approach corridors and is rarely circular - the chart shows the precise boundary.","sub":"Airspace classes & structure"},{"id":"Legislation_79","topic":"Legislation","text":"The abbreviation \"TMA\" stands for","options":["Control Zone.","Airway.","Flight information region.","Terminal control area."],"correct":3,"exp":"TMA stands for Terminal Maneuvering Area (also called Terminal Control Area) - controlled airspace stacked above the CTR and used by approach and departure traffic. Its lower limit is FIXED (an altitude, not a flight level) because of terrain; its upper limit is a flight level.","sub":"Aviation abbreviations"},{"id":"Legislation_80","topic":"Legislation","text":"A TMA","options":["encircles an aerodrome. It extends from the ground to an altitude shown on the glider map.","is the entire airspace above Switzerland.","is found in the wider area of larger airports. The extent and lower limit are shown on the sailplane/glider map.","links various airports to each other, has a clearly defined lower limit and an upper limit of FL 195."],"correct":2,"exp":"A TMA is found in the wider vicinity of larger airports, stacked above the CTR in stepped boxes. Its lateral extent and lower limit are shown on the glider chart - the lower limit is fixed because the box must not cut into terrain.","sub":"Airspace classes & structure"},{"id":"Legislation_81","topic":"Legislation","text":"A TMA south of the Jura-Swiss Plateau/Alps dividing line","options":["is no different to TMAs north of this dividing line.","may be flown under at 300m AGL.","extends to the specified lower limit in all cases.","always starts at 600m above ground."],"correct":1,"exp":"A very practical special rule applies only SOUTH of the Mittelland-Alps dividing line: paragliders may fly UNDER a TMA up to 300 m above ground without clearance. This is essential in alpine valleys (e.g. Meiringen) where a TMA would otherwise box the airspace shut. It is also a frequent exam trap - the rule does NOT apply in the Jura/Mittelland.","sub":"Airspace classes & structure"},{"id":"Legislation_82","topic":"Legislation","text":"How many classes of airspace has the ICAO defined? 24","options":["2","4","7","9"],"correct":2,"exp":"The ICAO defined seven airspace classes (A-G). Switzerland only uses four of them in practice: C, D, E and G. The full set worldwide includes A and B (high-altitude IFR-only/limited VFR) and F (advisory) which simply do not exist in Swiss airspace.","sub":"Airspace classes & structure"},{"id":"Legislation_84","topic":"Legislation","text":"The airspace classes found in Switzerland are","options":["categories C, D, E and G.","categories A, C, E and G.","categories A, D, E and G.","categories B, C, E and G."],"correct":0,"exp":"Of the seven ICAO airspace classes, only C, D, E and G are used in Switzerland - 'Ceiling Defines Every Glide' is the memory aid. E and G are uncontrolled (paragliders may use them freely); C and D are controlled and require clearance.","sub":"Airspace classes & structure"},{"id":"Legislation_85","topic":"Legislation","text":"Which classes of airspace in Switzerland can hang gliders and paragliders use without seeking prior permission?","options":["C and E.","D and E.","E and G.","F and G."],"correct":2,"exp":"Paragliders may use airspaces E and G without any prior permission - these are the uncontrolled spaces. C and D are controlled and require a clearance (C additionally needs constant radio contact); paragliders normally avoid them entirely.","sub":"Airspace classes & structure"},{"id":"Legislation_86","topic":"Legislation","text":"In which classes of airspace does legislation not require permanent radio contact?","options":["D and E.","C and D.","G and C.","E and G."],"correct":3,"exp":"Permanent radio contact is required in airspace C only. Airspaces E and G are uncontrolled and you fly them without any radio obligation; in D you need clearance but not strictly permanent radio. The simplest memory: only C demands continuous radio.","sub":"Airspace classes & structure"},{"id":"Legislation_87","topic":"Legislation","text":"For which classes of airspace do all aircraft require clearance or permission to enter?","options":["C and D","E and G","D and E","G and C"],"correct":0,"exp":"All aircraft - paragliders included - need clearance to enter Class C or D airspace. Class C additionally requires continuous radio contact; Class D requires clearance even without continuous radio. E and G are uncontrolled and clearance-free.","sub":"Airspa
