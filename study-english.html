<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cloudbase · SHV Paragliding Theory Trainer</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪂</text></svg>">
<style>
:root{
  --sky-top:#9fd0f2; --sky-bot:#eaf6ff;
  --ink:#10304e; --muted:#5b7a96; --faint:#8aa7c0;
  --card:rgba(255,255,255,.88); --card-solid:#ffffff; --line:#d8e8f6;
  --accent:#0284c7; --accent-deep:#075985; --accent-soft:#e0f2fe;
  --amber:#f59e0b; --amber-soft:#fef3c7;
  --good:#15803d; --good-soft:#dcfce7; --bad:#b91c1c; --bad-soft:#fee2e2;
  --shadow:0 10px 30px -12px rgba(16,64,108,.25);
  --r:18px;
}
@media (prefers-color-scheme: dark){
  :root{
    --sky-top:#0b1c31; --sky-bot:#13304f;
    --ink:#e8f3fd; --muted:#9db9d2; --faint:#6f8eaa;
    --card:rgba(18,42,68,.92); --card-solid:#16334f; --line:#274b6e;
    --accent:#38bdf8; --accent-deep:#7dd3fc; --accent-soft:#0c2f47;
    --amber:#fbbf24; --amber-soft:#3a2e10;
    --good:#4ade80; --good-soft:#10311e; --bad:#f87171; --bad-soft:#3d1414;
    --shadow:0 10px 30px -12px rgba(0,0,0,.5);
  }
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  margin:0; color:var(--ink);
  font:16px/1.55 ui-rounded,-apple-system,"SF Pro Rounded","Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  background:linear-gradient(180deg,var(--sky-top),var(--sky-bot) 420px,var(--sky-bot));
  min-height:100vh;
}
.wrap{max-width:1020px;margin:0 auto;padding:18px 18px 80px}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;padding:0}
button:focus-visible,summary:focus-visible{outline:3px solid var(--accent);outline-offset:2px;border-radius:8px}
h1,h2,h3{line-height:1.25;margin:0 0 6px}
.muted{color:var(--muted)}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);backdrop-filter:blur(6px)}

/* ---------- header ---------- */
.top{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.brand{font-size:20px;font-weight:800;letter-spacing:.2px;display:flex;align-items:center;gap:8px}
.brand small{font-size:11px;font-weight:600;color:var(--muted);display:block;letter-spacing:.4px}
.top nav{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
.navbtn{padding:8px 14px;border-radius:999px;font-weight:650;color:var(--muted)}
.navbtn:hover{background:var(--card);color:var(--ink)}
.navbtn.on{background:var(--accent);color:#fff}
@media (prefers-color-scheme: dark){.navbtn.on{color:#06283d}}
.streakchip{padding:7px 12px;border-radius:999px;background:var(--amber-soft);color:var(--amber);font-weight:800;border:1px solid var(--amber);white-space:nowrap}

/* ---------- hero / altimeter ---------- */
.hero{display:grid;grid-template-columns:1.1fr .9fr;overflow:hidden}
.hero-left{padding:26px 28px;display:flex;flex-direction:column;gap:14px}
.kicker{font-size:12px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:var(--accent)}
.alt-value{font-size:52px;font-weight:850;line-height:1}
.alt-value small{font-size:22px;color:var(--muted);font-weight:700}
.alt-sub{color:var(--muted);font-weight:600}
.alt-sub b{color:var(--ink)}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 18px;border-radius:14px;font-weight:750;
  background:var(--accent);color:#fff;box-shadow:0 6px 16px -6px rgba(2,132,199,.55);transition:transform .12s}
@media (prefers-color-scheme: dark){.btn{color:#06283d}}
.btn:hover{transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn.secondary{background:var(--card-solid);color:var(--ink);border:1.5px solid var(--line);box-shadow:none}
.btn.secondary:hover{border-color:var(--accent)}
.btn:disabled{opacity:.45;cursor:default;transform:none}
.btn .n{background:rgba(255,255,255,.25);border-radius:999px;padding:1px 8px;font-size:13px}
.btn.secondary .n{background:var(--accent-soft);color:var(--accent)}
.statline{display:flex;gap:18px;flex-wrap:wrap;color:var(--muted);font-size:13.5px;font-weight:600;margin-top:auto;padding-top:8px}
.statline b{color:var(--ink);font-size:15px}

.skybox{position:relative;min-height:300px;background:linear-gradient(180deg,#7ec3ee,#bfe2f8 65%,#d8efdf 92%,#9fce8f 92.5%);overflow:hidden}
@media (prefers-color-scheme: dark){.skybox{background:linear-gradient(180deg,#0d2742,#1a3c5e 65%,#1d3b2f 92%,#274d33 92.5%)}}
.cb-line{position:absolute;top:34px;left:0;right:0;border-top:2px dashed rgba(255,255,255,.85);font-size:11px;font-weight:800;color:#fff;text-shadow:0 1px 4px rgba(0,40,80,.4)}
.cb-line span{position:absolute;right:10px;top:3px;letter-spacing:.4px}
.tick{position:absolute;left:0;right:0;border-top:1px dashed rgba(255,255,255,.35)}
.tick span{position:absolute;left:8px;top:1px;font-size:10px;font-weight:700;color:rgba(255,255,255,.85);text-shadow:0 1px 3px rgba(0,40,80,.4)}
.cloud{position:absolute;width:70px;height:24px;background:rgba(255,255,255,.95);border-radius:24px;animation:drift 38s linear infinite}
.cloud::before,.cloud::after{content:'';position:absolute;background:inherit;border-radius:50%}
.cloud::before{width:30px;height:30px;top:-14px;left:12px}
.cloud::after{width:22px;height:22px;top:-9px;right:13px}
.cloud.c2{transform:scale(.7);animation-duration:55s;animation-delay:-20s;opacity:.85}
.cloud.c3{transform:scale(1.25);animation-duration:70s;animation-delay:-44s;opacity:.75}
@keyframes drift{from{left:-90px}to{left:110%}}
.sun{position:absolute;top:18px;left:22px;width:38px;height:38px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#fff7d6,#ffd75e 60%,#ffb52e);box-shadow:0 0 34px 10px rgba(255,205,80,.5)}
.glider{position:absolute;left:50%;transform:translateX(-50%);transition:bottom 1s cubic-bezier(.3,1.2,.4,1);animation:bob 4.5s ease-in-out infinite;text-align:center}
@keyframes bob{0%,100%{margin-bottom:0}50%{margin-bottom:9px}}
.alt-tag{margin-top:2px;font-size:11px;font-weight:800;color:#fff;background:rgba(8,60,100,.55);border-radius:999px;padding:2px 9px;display:inline-block;backdrop-filter:blur(2px)}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}

/* ---------- topic grid ---------- */
.section-title{margin:26px 4px 12px;font-size:15px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--muted)}
.topics{display:grid;grid-template-columns:repeat(auto-fit,minmax(176px,1fr));gap:12px}
.topic{padding:16px;text-align:left;display:flex;flex-direction:column;gap:10px;transition:transform .14s, box-shadow .14s}
.topic:hover{transform:translateY(-3px)}
.topic-head{display:flex;align-items:center;gap:9px;font-weight:750;font-size:14.5px}
.topic-head .em{font-size:20px}
.ringrow{display:flex;align-items:center;gap:12px}
.ring{transform:rotate(-90deg)}
.ring .track{stroke:var(--line);fill:none}
.ring .bar{fill:none;stroke-linecap:round;transition:stroke-dashoffset .8s ease}
.ringpct{font-weight:850;font-size:18px}
.topic .sub{font-size:12.5px;color:var(--muted);font-weight:600}
.topic .go{margin-top:auto;font-size:13px;font-weight:750;color:var(--accent)}
.first-run{padding:18px 22px;margin-top:14px;display:flex;gap:14px;align-items:flex-start}
.first-run .em{font-size:26px}
.lab-banner{display:flex;gap:12px;align-items:center;padding:14px 20px;margin-top:14px;text-decoration:none;color:inherit;font-weight:600}
.lab-banner .em{font-size:24px}
.lab-banner .go{margin-left:auto;color:var(--accent);font-weight:800;white-space:nowrap}
.lab-banner:hover{border-color:var(--accent)}

/* ---------- play (round/review) ---------- */
.play-head{display:flex;align-items:center;gap:14px;margin-bottom:14px;flex-wrap:wrap}
.ghost{color:var(--muted);font-weight:700;padding:8px 10px;border-radius:10px}
.ghost:hover{background:var(--card);color:var(--ink)}
.dots{display:flex;gap:5px;flex-wrap:wrap;flex:1;justify-content:center}
.dot{width:10px;height:10px;border-radius:50%;background:var(--line)}
.dot.cur{background:var(--accent);transform:scale(1.25)}
.dot.ok{background:var(--good)}
.dot.bad{background:var(--bad)}
.play-count{font-weight:800;color:var(--muted)}
.qcard{padding:24px 26px}
.qmeta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.chip{font-size:12px;font-weight:750;padding:3px 11px;border-radius:999px;background:var(--accent-soft);color:var(--accent)}
.chip.plain{background:var(--card-solid);border:1px solid var(--line);color:var(--muted)}
.qtext{font-size:19.5px;font-weight:700;margin-bottom:16px}
.qimg-wrap{margin:0 0 16px;text-align:center}
.qimg{max-width:100%;max-height:340px;border-radius:12px;border:1px solid var(--line);background:#fff}
.opts{display:grid;gap:9px}
.opt{display:flex;align-items:center;gap:12px;text-align:left;padding:13px 15px;border-radius:13px;
  background:var(--card-solid);border:1.5px solid var(--line);font-weight:600;transition:border-color .12s, transform .12s}
.opt:not(:disabled):hover{border-color:var(--accent);transform:translateX(3px)}
.opt .key{flex:none;width:26px;height:26px;border-radius:8px;background:var(--accent-soft);color:var(--accent);
  display:grid;place-items:center;font-size:13px;font-weight:800}
.opt.right{border-color:var(--good);background:var(--good-soft)}
.opt.right .key{background:var(--good);color:#fff}
.opt.wrong{border-color:var(--bad);background:var(--bad-soft)}
.opt.wrong .key{background:var(--bad);color:#fff}
.opt.pick{border-color:var(--accent);background:var(--accent-soft)}
.opt.dim{opacity:.55}
.verdict{margin-top:16px;font-weight:800;font-size:17px}
.verdict.ok{color:var(--good)}
.verdict.bad{color:var(--bad)}
.explain{margin-top:10px;padding:14px 16px;border-radius:13px;background:var(--accent-soft);border:1px solid var(--line);font-size:15px}
.explain .chip{margin-top:8px}
.nextrow{margin-top:16px;display:flex;justify-content:flex-end;gap:10px}
.kbd-hint{font-size:12px;color:var(--faint);margin-top:14px;text-align:center}
kbd{background:var(--card-solid);border:1px solid var(--line);border-bottom-width:2px;border-radius:5px;padding:0 5px;font-size:11.5px;font-family:inherit}

/* ---------- round end ---------- */
.endcard{padding:30px;text-align:center}
.end-alt{font-size:42px;font-weight:850;color:var(--accent)}
.end-meters{font-size:17px;font-weight:750;color:var(--good)}
.recap{margin-top:18px;text-align:left;display:grid;gap:6px}
.rq{border:1px solid var(--line);border-radius:12px;background:var(--card-solid);overflow:hidden}
.rq summary{padding:10px 14px;cursor:pointer;font-weight:650;list-style:none;display:flex;gap:10px;align-items:center}
.rq summary::-webkit-details-marker{display:none}
.rq .mark{flex:none;font-weight:900}
.rq.ok .mark{color:var(--good)}
.rq.bad .mark{color:var(--bad)}
.rq-body{padding:4px 16px 14px;border-top:1px solid var(--line);font-size:14.5px}
.rq-body .ansline{margin:6px 0}
.rq-body .ansline b{color:var(--good)}
.rq-body .ansline .you{color:var(--bad);font-weight:700}

/* ---------- exam ---------- */
.exam-layout{display:grid;grid-template-columns:1fr 270px;gap:16px;align-items:start}
.exam-side{position:sticky;top:14px;display:flex;flex-direction:column;gap:12px}
.clockcard{padding:16px;text-align:center}
.clock{font-size:34px;font-weight:850;font-variant-numeric:tabular-nums}
.clock.low{color:var(--bad);animation:pulse 1s ease-in-out infinite}
@keyframes pulse{50%{opacity:.55}}
.navgrid-topic{font-size:11px;font-weight:800;color:var(--muted);margin:8px 2px 4px;letter-spacing:.4px}
.navgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.cell{aspect-ratio:1;border-radius:8px;border:1.5px solid var(--line);background:var(--card-solid);
  font-size:12px;font-weight:750;color:var(--muted);position:relative}
.cell.done{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}
.cell.cur{outline:2.5px solid var(--accent);outline-offset:1px}
.cell.flagged::after{content:'';position:absolute;top:2px;right:2px;width:7px;height:7px;border-radius:50%;background:var(--amber)}
.examfoot{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.flagbtn{margin-left:auto}
.flagbtn.on{background:var(--amber-soft);border-color:var(--amber);color:var(--amber)}

/* exam result */
.result-banner{padding:28px;text-align:center}
.result-banner .big{font-size:40px;font-weight:850}
.result-banner.pass .big{color:var(--good)}
.result-banner.fail .big{color:var(--bad)}
.bars{margin-top:18px;display:grid;gap:10px;text-align:left}
.bar-row{display:grid;grid-template-columns:160px 1fr 84px;gap:12px;align-items:center;font-weight:650;font-size:14.5px}
.bar{position:relative;height:14px;border-radius:99px;background:var(--line);overflow:visible}
.bar .fill{position:absolute;inset:0;right:auto;border-radius:99px;background:var(--good);transition:width .8s ease}
.bar.fail .fill{background:var(--bad)}
.bar .thresh{position:absolute;top:-4px;bottom:-4px;left:80%;width:2.5px;background:var(--ink);opacity:.5;border-radius:2px}
.bar-score{font-variant-numeric:tabular-nums;text-align:right}
.bar-score .pf{margin-left:5px}
.histlist{display:grid;gap:7px;margin-top:10px}
.hist{display:flex;gap:12px;align-items:center;padding:9px 14px;border:1px solid var(--line);border-radius:11px;background:var(--card-solid);font-size:14px;font-weight:600}
.hist .pf{font-weight:850}
.pf.pass{color:var(--good)}
.pf.fail{color:var(--bad)}

/* setup */
.setup{padding:26px 28px}
.preset{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin:16px 0}
.preset .opt{flex-direction:column;align-items:flex-start;gap:4px;padding:16px}
.preset .opt b{font-size:17px}
.preset .opt span{font-size:13px;color:var(--muted);font-weight:600}
.rulebox{font-size:14px;color:var(--muted);background:var(--accent-soft);padding:12px 16px;border-radius:12px;margin-top:14px}
.rulebox b{color:var(--ink)}
.resume-banner{display:flex;gap:14px;align-items:center;padding:14px 18px;margin-bottom:16px;border:1.5px solid var(--amber);background:var(--amber-soft)}

/* ---------- flashcards ---------- */
.cats{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
.cat{padding:7px 13px;border-radius:999px;border:1.5px solid var(--line);background:var(--card-solid);font-weight:700;font-size:13.5px;color:var(--muted)}
.cat.on{background:var(--accent);border-color:var(--accent);color:#fff}
@media (prefers-color-scheme: dark){.cat.on{color:#06283d}}
.fc-stage{perspective:1400px;margin:6px auto;max-width:640px}
.fc{position:relative;width:100%;min-height:300px;cursor:pointer;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.3,1.1,.4,1)}
.fc.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:30px;text-align:center;border-radius:var(--r)}
.fc-face .label{font-size:11px;font-weight:800;letter-spacing:1.4px;color:var(--faint)}
.fc-face .txt{font-size:20px;font-weight:700}
.fc-back{transform:rotateY(180deg);border:2px solid var(--accent)}
.fc-back .txt{color:var(--accent-deep)}
.fc-foot{display:flex;gap:10px;justify-content:center;margin-top:18px}
.fc-meta{display:flex;justify-content:space-between;max-width:640px;margin:0 auto 10px;color:var(--muted);font-weight:700;font-size:13.5px}

/* ---------- modal & toast ---------- */
.overlay{position:fixed;inset:0;background:rgba(8,30,50,.45);display:grid;place-items:center;z-index:50;padding:20px}
.modal{max-width:420px;width:100%;padding:24px;text-align:center}
.modal .mtitle{font-weight:800;font-size:18px;margin-bottom:6px}
.modal .actions{justify-content:center;margin-top:18px}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:var(--ink);color:var(--sky-bot);
  padding:11px 20px;border-radius:999px;font-weight:700;box-shadow:var(--shadow);z-index:60;animation:toastin .25s ease}
@keyframes toastin{from{opacity:0;transform:translateX(-50%) translateY(12px)}}

footer{margin-top:46px;text-align:center;font-size:12.5px;color:var(--faint)}

@media (max-width:840px){
  .hero{grid-template-columns:1fr}
  .skybox{min-height:200px;order:-1}
  .exam-layout{grid-template-columns:1fr}
  .exam-side{position:static;order:-1}
  .navgrid{grid-template-columns:repeat(10,1fr)}
  .bar-row{grid-template-columns:110px 1fr 76px;font-size:13px}
  .alt-value{font-size:42px}
}
</style>
</head>

<script>
window.QUESTIONS=[{"id":"Aerodynamics_1","topic":"Aerodynamics","text":"Forces F1 and F2 are applied to a body. They have the same point of application. What is the resultant R of the two forces?","options":["R3","R4","R2","R1"],"correct":0,"img":"assets/shv_images/aerodynamics_1.jpg","exp":"Forces F1 and F2 point in the same direction, so they are a special case of vector addition: you can simply add their magnitudes (count the squares). Two parallel forces in the same direction yield a vector of the same direction but with a length equal to their sum.","sub":"Vectors and forces"},{"id":"Aerodynamics_2","topic":"Aerodynamics","text":"Forces F1 and F3 are applied to a body. They have the same point of application. What is the resultant R of the two forces?","options":["R2","R3","R1","R4"],"correct":3,"img":"assets/shv_images/aerodynamics_2.jpg","exp":"F1 and F3 are parallel but point in opposite directions, so this is the special case where you subtract their magnitudes. The smaller force weakens the larger one, and the resultant points in the direction of the stronger force with a length equal to the difference between them.","sub":"Vectors and forces"},{"id":"Aerodynamics_3","topic":"Aerodynamics","text":"Forces F1 and F4 are applied to a body. They have the same point of application. What is the resultant R of the two forces?","options":["R2","R3","R4","R1"],"correct":0,"img":"assets/shv_images/aerodynamics_3.jpg","exp":"F1 and F4 point in different (non-parallel) directions, so apply the parallelogram rule: translate F4's origin to the tip of F1, then draw the diagonal from the original origin to the new tip of F4. That diagonal is the resultant - in this case R2. Always preserve both magnitude and direction when adding vectors graphically.","sub":"Vectors and forces"},{"id":"Aerodynamics_4","topic":"Aerodynamics","text":"Forces F1 and F5 are applied to a body. They have the same point of application. What is the resultant R of the two forces?","options":["R2","R1","R4","R3"],"correct":1,"img":"assets/shv_images/aerodynamics_4.jpg","exp":"F1 and F5 are not parallel, so use tip-to-tail chaining: place F5's origin at the tip of F1 and the diagonal from F1's start point to F5's end point is the resultant. The graphical construction gives R1 - vector addition cannot be done by simply summing lengths because direction matters.","sub":"Vectors and forces"},{"id":"Aerodynamics_5","topic":"Aerodynamics","text":"Forces F4 and F5 are applied to a body. They have the same point of application. What is the resultant R of the two forces?","options":["R4","R2","R1","R3"],"correct":0,"img":"assets/shv_images/aerodynamics_5.jpg","exp":"F4 and F5 act on the same point, but apply the same tip-to-tail rule: translate one vector's origin to the tip of the other and draw the diagonal. The resultant in this geometric construction is R4. Remember vector addition is never just adding lengths - you must preserve direction.","sub":"Vectors and forces"},{"id":"Aerodynamics_6","topic":"Aerodynamics","text":"Which of the following has the most influence on the drag of a body?","options":["The size of the body.","The weight of the body.","The mass of the body.","The material characteristics of the body."],"correct":0,"exp":"Drag depends on exactly four factors: exposed surface, airflow speed, air density and shape (Cd). Weight, mass and material properties do NOT influence drag - a heavy lead ball and a light wooden ball of the same size in the same airflow experience identical drag. Size (frontal area) is one of the dominant influences.","sub":"Drag fundamentals and drag coefficient"},{"id":"Aerodynamics_7","topic":"Aerodynamics","text":"What is the effect on the drag of a body if you double its frontal area relative to the airflow?","options":["It is multiplied by 4.","It does not change.","It is divided by 2.","It doubles."],"correct":3,"exp":"The relationship between drag and exposed frontal area is strictly linear. Doubling the area exposed to the airflow doubles the drag force. This makes intuitive sense: twice as many air molecules collide with the object per second, so the retarding force is twice as large.","sub":"Drag scaling with area and speed"},{"id":"Aerodynamics_8","topic":"Aerodynamics","text":"What is the effect on the drag of a body if you quadruple its frontal area relative to the airflow?","options":["It is multiplied by 4.","It is multiplied by 16.","It is divided by 4.","It does not change."],"correct":0,"exp":"Drag scales linearly with exposed frontal area, so quadrupling the area multiplies the drag by exactly 4 (not 16 - that quadratic scaling only applies to speed). The trap in these questions is mixing up the linear factors (area, density) with the quadratic one (speed).","sub":"Drag scaling with area and speed"},{"id":"Aerodynamics_9","topic":"Aerodynamics","text":"What is the effect on the drag of a body if you halve its frontal area relative to the airflow?","options":["It is divided by 2.","It doubles.","It is multiplied by 4.","It does not change."],"correct":0,"exp":"Halving the exposed frontal area halves the drag - a straight linear relationship. Each square metre of frontal area contributes its own share of drag, so removing half of the area removes half of the drag. This is one of the easier scaling questions; the tricky ones involve speed (which scales as the square).","sub":"Drag scaling with area and speed"},{"id":"Aerodynamics_10","topic":"Aerodynamics","text":"An object with a frontal area of 2m² exposed to an airflow of 30km/h produces a drag of 300N (approx. 30kp) at sea level. Under the same conditions, how much drag is produced by an object of similar shape but with a frontal area of 4m²?","options":["about 300 N","about 600 N","about 900 N","about 150 N"],"correct":1,"exp":"Only the change in frontal area matters here - speed (30 km/h) and conditions (sea level) stay the same, so they are red herrings included to test whether you can ignore irrelevant data. Doubling the area from 2 to 4 m squared doubles the drag linearly, so 300 N becomes 600 N.","sub":"Drag scaling with area and speed"},{"id":"Aerodynamics_11","topic":"Aerodynamics","text":"An object with a frontal area of 2m² exposed to an airflow of 30km/h produces a drag of 300N (approx. 30kp) at sea level. Under the same conditions, how much drag is produced by an object of similar shape but with a frontal area of 1m²?","options":["about 600 N","about 300 N","about 150 N","about 900 N"],"correct":2,"exp":"The wind speed and altitude information is irrelevant - only the area change matters. Halving the exposed area from 2 to 1 m squared cuts the drag in half, from 300 N to 150 N. Drag scales linearly with exposed surface area.","sub":"Drag scaling with area and speed"},{"id":"Aerodynamics_12","topic":"Aerodynamics","text":"An object with a frontal area of 8m² exposed to an airflow of 30km/h produces a drag of 1,200N (approx. 120kp) at sea level. Under the same conditions, how much drag is produced by an object of similar shape but with a frontal area of 2m²?","options":["about 300 N","about 600 N","about 150 N","about 900 N"],"correct":0,"exp":"Reducing the area by a factor of 4 (from 8 to 2 m squared) reduces drag by the same factor of 4: 1200 N / 4 = 300 N. Drag is linear in exposed surface area - the same proportional change applies to both.","sub":"Drag scaling with area and speed"},{"id":"Aerodynamics_13","topic":"Aerodynamics","text":"An object with a frontal area of 0.5m² exposed to an airflow of 30km/h produces a drag of 150N (approx. 15kp) at sea level. Under the same conditions, how much drag is produced by an object of similar shape but with a frontal area of 3m²?","options":["about 150 N","about 300 N","about 900 N","about 600 N"],"correct":2,"exp":"Going from 0.5 m squared to 3 m squared is a 6-fold increase in exposed area. Because drag is linear in area, the drag also increases 6 times: 150 N x 6 = 900 N. Speed and conditions are unchanged so they drop out of the calculation.","sub":"Drag scaling with area and speed"},{"id":"Aerodynamics_14","topic":"Aerodynamics","text":"Which of the following factors has a significant effect on the drag of an object ?","options":["The relative humidity of the air.","The speed of the airflow.","The material characteristics of the object.","The weight of the object."],"correct":1,"exp":"Of the four drag factors (surface area, airflow speed, air density, shape), the speed of the airflow is the only one listed among the options. Relative humidity, material properties and weight have no effect on drag. Crucially, speed enters the drag equation as v squared, so it dominates: doubling speed quadruples drag.","sub":"Drag fundamentals and drag coefficient"},{"id":"Aerodynamics_15","topic":"Aerodynamics","text":"If the speed of the airflow to which a body is exposed doubles,","options":["the drag will be multiplied by 4.","the drag will be multiplied by 16.","the drag will be multiplied by 8.","the drag will double."],"correct":0,"exp":"Speed enters the drag equation squared, so doubling the airflow speed multiplies the drag by 2 squared = 4. This is one of the most-tested concepts on the SHV exam - the big red exclamation mark, as the instructor puts it. Linear scaling (area, density) versus quadratic scaling (speed) is what catches most candidates out.","sub":"Drag scaling with area and speed"},{"id":"Aerodynamics_16","topic":"Aerodynamics","text":"If the speed of the airflow to which a body is exposed is tripled,","options":["the drag will be multiplied by 12.","the drag will be multiplied by 9.","the drag will be multiplied by 6.","the drag will be multiplied by 3."],"correct":1,"exp":"Drag scales with the square of speed: tripling the airflow speed multiplies drag by 3 squared = 9. So a 30 km/h wind generating some drag F becomes 9F at 90 km/h. The exam trap is offering '12' (which would be 3 times 4) or '6' (which would be 3 times 2); only the squared scaling gives the right answer.","sub":"Drag scaling with area and speed"},{"id":"Aerodynamics_17","topic":"Aerodynamics","text":"If the speed of the airflow to which a body is exposed is quadrupled,","options":["the drag will be multiplied by 4.","the drag will double.","the drag will be multiplied by 8.","the drag will be multiplied by 16."],"correct":3,"exp":"Drag is proportional to v squared, so quadrupling the speed multiplies drag by 4 squared = 16. The most common wrong answer is 8 (mistakenly thinking 4 x 2) or 4 (forgetting the square altogether). Always square the speed factor when calculating drag changes.","sub":"Drag scaling with area and speed"},{"id":"Aerodynamics_18","topic":"Aerodynamics","text":"If the speed of the airflow to which a body is exposed is divided by 2,","options":["the drag will be divided by 4.","the drag will be divided by 2.","the drag will double.","the drag will be multiplied by 4."],"correct":0,"exp":"The same squared relationship works downward: halving the speed multiplies drag by (1/2) squared = 1/4. So drag drops to one quarter when wind speed is cut in half. The v-squared rule applies in both directions.","sub":"Drag scaling with area and speed"},{"id":"Aerodynamics_19","topic":"Aerodynamics","text":"An object with a frontal area of 2m² exposed to an airflow of 30km/h produces a drag of 300N (approx. 30kp) at sea level. What will the drag be of the same body in an airflow of 60km/h?","options":["about 900N","about 300N","about 600N","about 1200N"],"correct":3,"exp":"Wind speed doubles from 30 to 60 km/h, and drag scales as v squared, so drag is multiplied by 4: 300 N becomes 1200 N. The area and altitude information is unchanged in this question - only speed changes, and speed dominates because it is squared.","sub":"Drag scaling with area and speed"},{"id":"Aerodynamics_20","topic":"Aerodynamics","text":"An object with a frontal area of 0.75m² exposed to an airflow of 30km/h produces a drag of 100N (approx. 10kp) at sea level. What will the drag be of the same body in an airflow of 90km/h?","options":["about 600N","about 300N","about 1200N","about 900N"],"correct":3,"exp":"Tripling the wind speed from 30 to 90 km/h multiplies drag by 3 squared = 9. So 100 N becomes 900 N. The exact same example is used by the instructor in the SHV video to warn against the temptation to answer '300 N' by accidentally using linear scaling.","sub":"Drag scaling with area and speed"},{"id":"Aerodynamics_21","topic":"Aerodynamics","text":"An object with a frontal area of 2m² exposed to an airflow of 80km/h produces a drag of 1,200N (approx. 120kp) at sea level. What will the drag be of the same body in an airflow of 40km/h?","options":["about 900N","about 300N","about 600N","about 1200N"],"correct":1,"exp":"Halving the wind speed from 80 to 40 km/h means drag is multiplied by (1/2) squared = 1/4: 1200 N / 4 = 300 N. Speed scales quadratically in the drag equation, so cutting speed in half reduces drag by a factor of four.","sub":"Drag scaling with area and speed"},{"id":"Aerodynamics_22","topic":"Aerodynamics","text":"An object with a frontal area of 0.75m² exposed to an airflow of 20km/h produces a drag of 100N (approx. 10kp) at sea level. What will the drag be of the same body in an airflow of 60km/h?","options":["about 600N","about 900N","about 300N","about 1200N"],"correct":1,"exp":"Wind speed triples from 20 to 60 km/h, so drag is multiplied by 3 squared = 9: 100 N becomes 900 N. Surface area is irrelevant because it does not change. The squared relationship makes speed the most aggressive driver of drag.","sub":"Drag scaling with area and speed"},{"id":"Aerodynamics_23","topic":"Aerodynamics","text":"Which of the following has the most effect on drag on a body?","options":["The difference between temperature and dew point.","The pressure gradient.","The absolute humidity of the air.","The density of the air."],"correct":3,"exp":"The four factors that influence drag are surface area, airflow speed, air density and shape. Air density is the only one of the listed options. Humidity, dew point and pressure gradient do not enter the drag equation. Density matters because there are more (or fewer) air molecules per cubic metre colliding with the object.","sub":"Drag fundamentals and drag coefficient"},{"id":"Aerodynamics_24","topic":"Aerodynamics","text":"If the density of the airflow to which a body is exposed doubles,","options":["there is no change in the drag.","the drag will be quadrupled.","the drag is halved.","the drag will double."],"correct":3,"exp":"Air density appears linearly in the drag equation, so doubling the density doubles the drag. Twice as many air molecules per cubic metre means twice the collisions per second and twice the retarding force. The same logic applies to halving density.","sub":"Drag scaling with area and speed"},{"id":"Aerodynamics_25","topic":"Aerodynamics","text":"If the density of the airflow to which a body is exposed is halved,","options":["the drag is halved.","the drag will be quadrupled.","the drag will double.","there is no change in the drag."],"correct":0,"exp":"Air density is linear in the drag equation: halving density halves the drag. This is why drag drops as you fly higher - at altitude there are fewer air molecules to resist motion. Note the contrast with speed, which is squared, not linear.","sub":"Drag scaling with area and speed"},{"id":"Aerodynamics_26","topic":"Aerodynamics","text":"If a body exposed to an airflow moves further away from the earth's surface,","options":["its drag will diminish.","this factor has no influence on its drag.","its drag will decrease just up to the troposphere and increase thereafter due to the change in temperature.","its drag will increase."],"correct":0,"exp":"Air density decreases with altitude, and drag depends linearly on density. So the higher the body, the lower the drag - fewer air molecules to push against. This is why launching from a high mountain requires a longer takeoff run: less drag means less lift at any given speed, so the wing has to move faster through the air.","sub":"Air density and altitude"},{"id":"Aerodynamics_27","topic":"Aerodynamics","text":"If a body exposed to an airflow moves further away from the earth's surface,","options":["its drag diminishes linearly.","its drag diminishes faster in the lower layers of the atmosphere than in the higher layers.","its drag diminishes faster in the higher layers of the atmosphere than in the lower layers.","its drag diminishes in the lower layers of the atmosphere and increases in the higher layers."],"correct":1,"exp":"Air density falls exponentially with altitude (halving roughly every 6600 m), not linearly. That means the absolute drop is steepest in the lower atmosphere - the first 1000 m sees a bigger density change than the kilometre from 9000 to 10000 m. So drag also diminishes faster in the lower layers than the upper ones.","sub":"Air density and altitude"},{"id":"Aerodynamics_28","topic":"Aerodynamics","text":"A body exposed to an airflow at 4400m above sea level will have,","options":["approx. 81% of the drag at sea level.","approx. 72% of the drag at sea level.","approx. 64% of the drag at sea level.","approx. 90% of the drag at sea level."],"correct":2,"exp":"The SHV memory aid for air density: at 1100 m density is ~90% of sea-level, at 2200 m ~81%, at 3300 m ~72%, at 4400 m ~64%. Each step is roughly the previous value times 0.9. Drag is linear in density, so the body experiences about 64% of its sea-level drag at 4400 m.","sub":"Air density and altitude"},{"id":"Aerodynamics_29","topic":"Aerodynamics","text":"A body exposed to an airflow at 3300m above sea level will have","options":["approx. 72% of the drag at sea level.","approx. 81% of the drag at sea level.","approx. 64% of the drag at sea level.","approx. 90% of the drag at sea level."],"correct":0,"exp":"Using the SHV mnemonic - 1100 m gives 90%, 2200 m gives 81%, 3300 m gives 72%, 4400 m gives 64% - at 3300 m above sea level the air density is about 72% of sea-level density. Drag scales linearly with density, so the drag is also about 72% of the sea-level value.","sub":"Air density and altitude"},{"id":"Aerodynamics_30","topic":"Aerodynamics","text":"A body exposed to an airflow at 2200m above sea level will have","options":["approx. 90% of the drag at sea level.","approx. 64% of the drag at sea level.","approx. 72% of the drag at sea level.","approx. 81% of the drag at sea level."],"correct":3,"exp":"Each 1100 m step multiplies density by ~0.9: at 1100 m it is 0.9 = 90% of sea level, at 2200 m it is 0.9 squared = 0.81 = 81%. Drag depends linearly on air density, so drag at 2200 m is approximately 81% of the sea-level value.","sub":"Air density and altitude"},{"id":"Aerodynamics_31","topic":"Aerodynamics","text":"A body exposed to an airflow at 1100m above sea level will have","options":["approx. 64% of the drag at sea level.","approx. 90% of the drag at sea level.","approx. 81% of the drag at sea level.","approx. 72% of the drag at sea level."],"correct":1,"exp":"The SHV altitude-density ladder: every 1100 m up reduces density by a further 10%. So at 1100 m above sea level the air is about 90% as dense, and drag - which is linear in density - is about 90% of its sea-level value.","sub":"Air density and altitude"},{"id":"Aerodynamics_32","topic":"Aerodynamics","text":"Which of the following has the most influence on the drag of a body?","options":["the weight.","the material characteristics of the body.","the shape.","the mass."],"correct":2,"exp":"Among the listed options, only shape influences drag. Weight, mass and material properties have no aerodynamic effect: a feather and a coin of the same frontal area and shape would see the same drag force. The shape factor is captured by the drag coefficient Cd - ranging from ~0.08 for a teardrop to over 1.3 for a hollow hemisphere.","sub":"Drag fundamentals and drag coefficient"},{"id":"Aerodynamics_33","topic":"Aerodynamics","text":"Which of the following coefficients relates to the drag of a body?","options":["The CY coefficient.","The CD coefficient.","The CB coefficient.","The CL coefficient."],"correct":1,"exp":"The drag coefficient is called Cd (or Cw in German, for Widerstand). The lift coefficient is Cl (or Cz). Both depend on shape and angle of attack but are otherwise independent. Cb and Cy are not standard aerodynamic coefficients.","sub":"Drag fundamentals and drag coefficient"},{"id":"Aerodynamics_34","topic":"Aerodynamics","text":"A body with a CD of 1.3 has in relation to a body with a CD of 1 in the same conditions","options":["approx. 3 times less drag.","approx. 3 times more drag.","approx. 30% less drag.","approx. 30% more drag."],"correct":3,"exp":"Cd is a multiplier on drag, so a body with Cd = 1.3 generates 1.3 / 1.0 = 1.3 times the drag of an object with Cd = 1.0 in identical conditions - that's 30% more drag. The ratio of Cd values is the ratio of drag forces when surface area, density and speed are equal.","sub":"Drag fundamentals and drag coefficient"},{"id":"Aerodynamics_35","topic":"Aerodynamics","text":"A body with a CD of 0.33 has in relation to a body with a CD of 1 in the same conditions","options":["approx. 30% more drag.","approx. 3 times more drag.","approx. 30% less drag.","approx. 3 times less drag."],"correct":3,"exp":"A Cd of 0.33 versus 1.0 means the streamlined body has roughly 1/3 the drag of the blunt one (0.33 is approximately 1/3). The Cd is a direct linear multiplier on the drag force, so the ratio of Cd values is the ratio of drag forces under matched conditions.","sub":"Drag fundamentals and drag coefficient"},{"id":"Aerodynamics_36","topic":"Aerodynamics","text":"A body with a CD of 0.05 has in relation to a body with a CD of 1 in the same conditions","options":["approx. 50 times less drag.","approx. 20 times less drag.","approx. 5 times more drag.","approx. 2 times less drag."],"correct":1,"exp":"Cd 0.05 is 1/20 of Cd 1.0, so the streamlined body has approximately 20 times less drag in the same conditions. Cd is a linear multiplier in the drag equation - the ratio of Cd values is exactly the ratio of drag forces.","sub":"Drag fundamentals and drag coefficient"},{"id":"Aerodynamics_37","topic":"Aerodynamics","text":"The bodies depicted below have a CD (drag coefficient) of 0.08, 0.17, 1 and 1.. Which has a CD of 0.08? 312","options":["3","1","4","2"],"correct":0,"img":"assets/shv_images/aerodynamics_37.jpg","exp":"The teardrop / streamlined shape has the lowest drag coefficient because it lets the airflow follow the body smoothly with little separation. Of the four shapes (sphere, half-shell open, half-shell closed, teardrop), the teardrop has Cd around 0.08 - the smallest value.","sub":"Drag fundamentals and drag coefficient"},{"id":"Aerodynamics_38","topic":"Aerodynamics","text":"The bodies depicted below have a CD of 0.08, 0.17, 1 and 1.. Which has a CD of 0.17? 213","options":["2","1","3","4"],"correct":3,"img":"assets/shv_images/aerodynamics_38.jpg","exp":"Cd of 0.17 corresponds to a streamlined but not quite optimal shape - between a true teardrop (0.08) and a sphere (around 0.4). The classic SHV diagram uses these four shapes to illustrate how dramatically shape affects drag.","sub":"Drag fundamentals and drag coefficient"},{"id":"Aerodynamics_39","topic":"Aerodynamics","text":"The bodies depicted below have a CD of 0.08, 0.17, 1 and 1.. Which has a CD of 1.00? 312","options":["4","3","1","2"],"correct":2,"img":"assets/shv_images/aerodynamics_39.jpg","exp":"A flat plate facing the airflow head-on has a drag coefficient of about 1.0 - the reference value most other shapes are compared against. The flow can't follow the abrupt edge and separates immediately, producing a wide turbulent wake.","sub":"Drag fundamentals and drag coefficient"},{"id":"Aerodynamics_40","topic":"Aerodynamics","text":"The bodies depicted below have a CD of 0.08, 0.17, 1 and 1.. Which has a CD of 1.3? 231","options":["2","3","1","4"],"correct":0,"img":"assets/shv_images/aerodynamics_40.jpg","exp":"A hollow hemisphere (half-shell, open side into the wind) has the highest drag coefficient of the four - around 1.3. This is exactly why anemometers use cup shapes: the open cup catches more air than the convex back, creating an unbalanced force that turns the rotor.","sub":"Drag fundamentals and drag coefficient"},{"id":"Aerodynamics_41","topic":"Aerodynamics","text":"Which of the following parameters will have the most influence on a streamlined body?","options":["the characteristics of the body's surface.","the mass of the body.","the specific weight of the body.","the molecular density of the body."],"correct":0,"exp":"For a streamlined body, residual drag comes from skin friction in the boundary layer, so the surface characteristics (smoothness, roughness, texture) become the dominant factor. Mass and material density don't affect drag at all on any body - they are red herrings.","sub":"Drag fundamentals and drag coefficient"},{"id":"Aerodynamics_42","topic":"Aerodynamics","text":"Which of the following numbers represents the chord of the profile? 21","options":["4","3","2","1"],"correct":2,"img":"assets/shv_images/aerodynamics_42.jpg","exp":"The chord of a profile is the straight line connecting the leading edge to the trailing edge - the geometric reference line of the airfoil. It is used to define the angle of attack (chord vs relative wind) and to measure profile properties like camber and thickness.","sub":"Wing profile and lift generation"},{"id":"Aerodynamics_43","topic":"Aerodynamics","text":"Which of the following numbers represents the thickness of the profile? 12","options":["3","1","2","4"],"correct":0,"img":"assets/shv_images/aerodynamics_43.jpg","exp":"The thickness of the profile is the perpendicular distance between the upper and lower surfaces of the wing - the 'fatness' of the airfoil. Modern paraglider profiles are relatively thick and asymmetric because slow-flying aircraft need lots of lift at low airspeed.","sub":"Wing profile and lift generation"},{"id":"Aerodynamics_44","topic":"Aerodynamics","text":"Which of the following numbers represents the depth of the profile? 123","options":["1","2","3","4"],"correct":0,"img":"assets/shv_images/aerodynamics_44.jpg","exp":"Profile depth (also called profile length or chord length) is the distance from the leading edge to the trailing edge measured along the chord - essentially the 'length' of the airfoil section. Not to be confused with the chord line itself, which is a geometric reference, or with the mean chord, which is the average across the whole wing.","sub":"Wing profile and lift generation"},{"id":"Aerodynamics_45","topic":"Aerodynamics","text":"Which of the following numbers represents the leading edge? 412","options":["3","4","1","2"],"correct":3,"img":"assets/shv_images/aerodynamics_45.jpg","exp":"The leading edge is the front-most point of the wing profile - the rounded edge that meets the airflow first. In normal flight the stagnation point sits just behind the leading edge on the underside, which is why paraglider cell openings are placed there.","sub":"Wing profile and lift generation"},{"id":"Aerodynamics_46","topic":"Aerodynamics","text":"Which of the following numbers represents the trailing edge? 21","options":["2","4","3","1"],"correct":2,"img":"assets/shv_images/aerodynamics_46.jpg","exp":"The trailing edge is the rear-most, sharp edge of the wing profile - where the airflows from above and below rejoin and where the brake line pulls down to change the angle of attack. The starting vortex forms at the trailing edge and contributes to lift through the circulation theory.","sub":"Wing profile and lift generation"},{"id":"Aerodynamics_47","topic":"Aerodynamics","text":"The profile of an airfoil","options":["is purely determined by the angle of attack.","has little influence on the performance of the aircraft, as this is primarily determined by the total weight.","is determined for each aircraft to the suit the desired flight characteristics.","is practically identical on all non-motorised aircraft."],"correct":2,"exp":"Each aircraft uses a specific profile chosen to match its desired flight characteristics: a slow paraglider uses a thick, asymmetric profile for high lift at low speed; a fighter jet uses a thin, less asymmetric profile optimised for high speed. The profile is one of the most important design decisions of a wing - it strongly affects performance and handling.","sub":"Wing profile and lift generation"},{"id":"Aerodynamics_48","topic":"Aerodynamics","text":"The airfoils of slow flying aircraft such as foot launched aircraft are for the most part","options":["relatively thick and symmetrical profiles.","relatively thick and asymmetrical.","thin and asymmetrical.","thin and symmetrical."],"correct":1,"exp":"Foot-launched aircraft (paragliders, hang gliders) need to produce significant lift at very low airspeeds, since the pilot can only run so fast. The solution is a relatively thick, asymmetric profile with a strongly curved upper surface - this maximises lift coefficient at low speed. Fast aircraft use thin, less asymmetric profiles instead.","sub":"Wing profile and lift generation"},{"id":"Aerodynamics_49","topic":"Aerodynamics","text":"The term \"angle of attack\" represents the angle between","options":["the chord of the profile and the relative airflow.","the chord of the profile and horizontal.","the upper and lower wing surfaces at the trailing edge.","horizontal and the relative air flow."],"correct":0,"exp":"Angle of attack is the angle between the chord line (a geometric property of the airfoil) and the relative airflow (the air meeting the wing). Crucially it is NOT measured against the horizon - because a paraglider always sinks slightly, the relative airflow comes slightly from below, not horizontally.","sub":"Angle of attack and stall"},{"id":"Aerodynamics_50","topic":"Aerodynamics","text":"Whether an airfoil produces lift on not depends significantly on","options":["its weight.","its Cd of drag.","the angle of attack.","its wing surface area."],"correct":2,"exp":"Whether an airfoil produces lift at all is primarily determined by the angle of attack. At zero angle of attack on a symmetric profile there is essentially no lift; at the stall angle (~25 degrees) lift collapses. Weight, drag coefficient and wing area affect the amount of lift, but the angle of attack is the on/off switch.","sub":"Angle of attack and stall"},{"id":"Aerodynamics_51","topic":"Aerodynamics","text":"Which of the following profiles is exposed to an airflow with the largest angle of attack? 12","options":["3","1","4","2"],"correct":1,"img":"assets/shv_images/aerodynamics_51.jpg","exp":"The angle of attack is measured between the chord line and the relative airflow. The profile in the figure showing the chord most steeply pitched up relative to the airflow has the largest positive angle of attack. Look for the profile where the leading edge is highest above the airflow direction.","sub":"Angle of attack and stall"},{"id":"Aerodynamics_52","topic":"Aerodynamics","text":"Which of the following profiles is exposed to an airflow with a negative angle of attack of -10°? 412","options":["4","3","1","2"],"correct":3,"img":"assets/shv_images/aerodynamics_52.jpg","exp":"A negative angle of attack means the chord line is below the relative airflow direction - the leading edge points below the airflow. In the diagram set, the profile where the leading edge sits lower than the trailing edge relative to the airflow has the negative AoA.","sub":"Angle of attack and stall"},{"id":"Aerodynamics_53","topic":"Aerodynamics","text":"Which of the following profiles is exposed to an airflow with an angle of attack of 0° ? 123","options":["4","1","2","3"],"correct":0,"img":"assets/shv_images/aerodynamics_53.jpg","exp":"An angle of attack of 0 degrees means the chord line is exactly aligned with the relative airflow. There is still some drag and even a small lift on an asymmetric profile, but the chord and the airflow run parallel. The profile drawn flat to the wind is the answer.","sub":"Angle of attack and stall"},{"id":"Aerodynamics_54","topic":"Aerodynamics","text":"What is more or less the spread of lift over a wing which is exposed to an airflow with an angle of attack of + 10° ?","options":["2/3 on the upper surface, 1/3 on the lower surface.","1/3 on the upper surface, 2/3 on the lower surface.","1/2 on the upper surface, 1/2 on the lower surface.","1/4 on the upper surface, 3/4 on the lower surface."],"correct":0,"exp":"At a typical operating angle of attack of around 10 degrees, the upper surface generates about 2/3 of the total lift (through suction / low pressure) and the lower surface about 1/3 (through positive pressure). This 2-to-1 ratio is a standard SHV exam fact and is easy to confuse: most lift comes from the suction on top, not the push from below.","sub":"Wing profile and lift generation"},{"id":"Aerodynamics_55","topic":"Aerodynamics","text":"Which of the following statements about the lift distribution is correct for a cambered wing flying an airflow with a positive angle of attack of 10° ?","options":["1/2 of the lift is created on the first third of the wing.","2/3 of the lift is created on the second third of the wing.","1/3 of the lift is created on the first third of the wing.","2/3 of the lift is created on the first third of the wing."],"correct":3,"exp":"On a cambered wing at positive angle of attack, lift is distributed very asymmetrically along the chord: about 2/3 of the total lift is generated on the front third of the wing, where the airfoil curvature is greatest and the suction peak is highest. The remaining 1/3 is spread across the rest of the chord.","sub":"Wing profile and lift generation"},{"id":"Aerodynamics_56","topic":"Aerodynamics","text":"Which of the following sets of four factors effect the amount of lift generated by a wing? < >","options":["wing surface area, lift coefficient, air density, speed of airflow.","air density, speed of airflow, lift coefficient, drag coefficient.","lift coefficient, air density, speed of airflow, weight.","wing surface area, lift coefficient, drag coefficient, air densitiy.",">>>"],"correct":0,"exp":"Lift depends on the same four factors as drag: exposed wing area, lift coefficient Cl, air density and the square of the airflow speed. Note that the drag coefficient is NOT a lift factor - the two coefficients are independent. Weight doesn't enter the formula either; it's what lift has to overcome, not what produces it.","sub":"Wing profile and lift generation"},{"id":"Aerodynamics_57","topic":"Aerodynamics","text":"If the angle of attack of a paraglider flying at best glide is reduced by 2° from the angle for best glide then","options":["the speed of flight increases initially and then stabilizes at the original value.","the speed of flight increases.","the flight speed reduces.","the speed of flight does not change."],"correct":1,"exp":"Reducing the angle of attack means accelerating: the wing pitches forward, more like a dart, and flies faster. From best glide, a 2-degree reduction in AoA brings the wing into accelerated trim - the trade-off is more speed but a worse glide ratio.","sub":"Angle of attack and stall"},{"id":"Aerodynamics_58","topic":"Aerodynamics","text":"If the angle of attack of a paraglider flying at best glide is reduced by 2° then","options":["the lift coefiicient (CL) decreases.","the lift coefiicient (CL) increases.","the lift coefiicient (CL) doesn't change.","the lift coefficient (CL) initially increases momentarily before stabilizing at its original value."],"correct":0,"exp":"On the polar curve of forces, the lift coefficient Cl rises monotonically from low AoA up to ~20 degrees (where Cl is maximum at minimum sink). So reducing the AoA from best glide brings you down the Cl curve - the lift coefficient drops. Conversely, you have to fly faster (with higher speed squared) to generate the same total lift force.","sub":"Angle of attack and stall"},{"id":"Aerodynamics_59","topic":"Aerodynamics","text":"If the angle of attack of a paraglider flying at best glide is increased by 2° then","options":["the speed of flight increases.","the speed of flight increases initially before stabilizing at the original value.","the speed of flight does not change.","the speed of flight reduces"],"correct":3,"exp":"Increasing the angle of attack is what braking does: the wing pitches up, the lift coefficient rises, and the wing slows down. From best glide a 2-degree increase brings you closer to minimum sink - slower forward speed but longer airtime per metre of altitude.","sub":"Angle of attack and stall"},{"id":"Aerodynamics_60","topic":"Aerodynamics","text":"If the angle of attack of a paraglider flying at best glide is increased by 2° then","options":["the lift coefficient (CL) initially increases momentarily before returning at the original value.","the lift coefficient (CL) decreases.","the lift coefficient (CL) increases.","the lift coefficient (CL) doesn't change."],"correct":2,"exp":"Above zero AoA up to about 20 degrees, the lift coefficient Cl increases with AoA. So going from best glide (~10 degrees) up to ~12 degrees moves Cl up the curve - it rises. The wing generates more lift per unit speed, which is why you can fly slower without losing altitude as fast (until you push past Tmin).","sub":"Angle of attack and stall"},{"id":"Aerodynamics_61","topic":"Aerodynamics","text":"The relationship between lift and drag of a wing is mainly dependent on","options":["the angle of attack.","the wing surface area.","the air density.","the speed of airflow."],"correct":0,"exp":"The lift-to-drag ratio (Cl / Cd, i.e. the glide ratio) is primarily a function of angle of attack. The polar curve of forces shows that the ratio peaks around 10 degrees AoA - the best glide angle. Wing area, density and airspeed scale both lift and drag together, so they don't affect the ratio between them.","sub":"Angle of attack and stall"},{"id":"Aerodynamics_62","topic":"Aerodynamics","text":"Which letter in the following diagram indicates the stagnation point? 21","options":["4","2","1","3"],"correct":2,"img":"assets/shv_images/aerodynamics_62.jpg","exp":"The stagnation point is on the leading edge where the airflow divides between the upper and lower surfaces. In the SHV diagram it is marked at the front of the wing. In normal flight it sits just under the leading edge, which is why cell openings are placed there.","sub":"Wing profile and lift generation"},{"id":"Aerodynamics_63","topic":"Aerodynamics","text":"Aerodynamics From 15 Which letter in the following diagram indicates the centre of pressure? 213","options":["2","1","3","4"],"correct":2,"img":"assets/shv_images/aerodynamics_63.jpg","exp":"The centre of pressure (also called the centre of thrust) is the point on the profile where all the distributed aerodynamic forces - lift and drag - can be considered to act as a single resultant force. It lies on the upper surface roughly a third of the way back from the leading edge, where lift is concentrated.","sub":"Wing profile and lift generation"},{"id":"Aerodynamics_64","topic":"Aerodynamics","text":"Aerodynamics From 152 Which letter in the following diagram indicates the separation point? 12","options":["3","1","4","2"],"correct":2,"img":"assets/shv_images/aerodynamics_64.jpg","exp":"The separation point is where the boundary-layer airflow detaches from the upper surface of the wing - on the trailing edge side of the profile. Behind it the flow becomes turbulent and lift drops away. As the angle of attack increases (more brake), the separation point migrates forward; at stall it has reached the leading edge.","sub":"Wing profile and lift generation"},{"id":"Aerodynamics_65","topic":"Aerodynamics","text":"The term \"separation point\" describes?","options":["the point where the airflow is divided between the upper and lower wing surfaces.","the point of application of the resultant aerodynamic force.","the point where the airflow separates from the wing.","the point where the airflow on the wing upper surface rejoins the flow from the lower surface."],"correct":2,"exp":"The separation point is the position on the wing's upper surface where the airflow can no longer follow the profile curvature and detaches into the turbulent wake. It moves forward as the angle of attack increases - when it reaches the leading edge the wing is in a full stall.","sub":"Wing profile and lift generation"},{"id":"Aerodynamics_66","topic":"Aerodynamics","text":"When a glider is flown with maximum load, the point of stall","options":["occurs at the same speed and angle of attack independent of load.","occurs at a lower speed than with minimum load.","occurs at a higher speed than with minimum loading.","never occurs."],"correct":2,"exp":"Stall happens at a fixed angle of attack (around 25 degrees), but a heavily loaded glider must fly faster to generate the same lift force. So the speed at which Cl-max is reached is higher under maximum load. The stall AoA is the same, but the stall airspeed rises with wing loading.","sub":"Angle of attack and stall"},{"id":"Aerodynamics_67","topic":"Aerodynamics","text":"When a glider is flown with minimum load, the point of stall occurs","options":["at the same speed and angle of attack independent of load.","at a lower speed than with maximum load.","at a higher speed than with maximum load.","at a smaller angle of attack."],"correct":1,"exp":"Wing loading sets where the polar curve sits in the speed plane: lighter loading = lower stall speed (the whole polar shifts left and down). The stall angle of attack is the same, but a lightly loaded wing reaches that AoA at a slower airspeed. That's why a wing flown near min load is more docile and slower than the same wing flown at max load.","sub":"Angle of attack and stall"},{"id":"Aerodynamics_68","topic":"Aerodynamics","text":"The term stagnation point defines","options":["the point where the airflow separates from the wing.","the transition from the laminar to the turbulent boundary layer.","the point of application of the resultant aerodynamic force.","the point where the airflow is divided between the upper and lower wing surfaces."],"correct":3,"exp":"The stagnation point is the location on the leading edge where the oncoming air is brought to rest and divides into the streams that flow over the upper and lower surfaces. It's not the centre of pressure (that's where forces act) or the separation point (that's at the back) - it's the dividing point at the very front.","sub":"Wing profile and lift generation"},{"id":"Aerodynamics_69","topic":"Aerodynamics","text":"If the positive angle of attack of a wing in an airflow is increased, the stagnation point moves","options":["along the wing upper surface towards the trailing edge.","along the wing lower surface towards the leading edge.","along the wing lower surface towards the trailing edge.","along the wing upper surface towards the leading edge."],"correct":2,"exp":"When you increase the positive angle of attack (e.g. by braking), the wing pitches up so that more air now hits the underside. The stagnation point - the dividing line - moves rearward along the lower surface (toward the trailing edge). The separation point moves the opposite way: forward along the top surface.","sub":"Wing profile and lift generation"},{"id":"Aerodynamics_70","topic":"Aerodynamics","text":"If the positive angle of attack of a wing in an airflow is decreased, the stagnation point","options":["moves towards the leading edge on the wing upper surface.","moves towards the trailing edge on the wing lower surface.","remains stationary.","moves towards the leading edge on the wing lower surface."],"correct":3,"exp":"Decreasing the angle of attack (accelerating) tips the wing nose-down. The dividing stagnation point moves forward toward the leading edge on the lower surface - the air now splits earlier. The separation point on the upper surface moves rearward, restoring more attached flow.","sub":"Wing profile and lift generation"},{"id":"Aerodynamics_71","topic":"Aerodynamics","text":"The term \"center of pressure /thrust\" means","options":["the centre of mass of the pilot and all equipment combined.","the point where the airflow is divided between the upper and lower wing surfaces.","the point of application of the resultant aerodynamic force.","the transition from laminar to turbulent boundary layer flow."],"correct":2,"exp":"The centre of pressure (or centre of thrust) is the single point on the profile where the resultant aerodynamic force - the combined lift and drag - effectively acts. It is the mathematical centroid of the pressure distribution, not the centre of mass of pilot and gear and not the stagnation point at the front of the wing.","sub":"Wing profile and lift generation"},{"id":"Aerodynamics_72","topic":"Aerodynamics","text":"The term \"wing span\" is defined as","options":["the difference in angle of attack of the wing cross-section at different points along the wing.","the average loading per unit of wing surface area.","the average distance between the leading and trailing edges of a wing.","the distance between the left and right wing tips."],"correct":3,"exp":"Wing span (Spannweite) is simply the distance between the two wingtips - measured tip to tip, perpendicular to the flight direction. It can be measured either flat (wing on the ground) or projected (shadow of the inflated wing); flat is always longer.","sub":"Wing geometry and wing loading"},{"id":"Aerodynamics_73","topic":"Aerodynamics","text":"The term \"average chord\" is defined as","options":["the average distance between the leading and trailing edges of a wing.","the difference in angle of attack of the wing cross-section at different points along the wing.","the distance between both wing tips.","the average loading per unit of wing surface area."],"correct":0,"exp":"The average chord (mean chord) is the average distance between the leading edge and trailing edge across the wing's span. Because the chord varies along the span (it's smaller at the stabilo than in the middle), an average is taken. Mathematically: average chord = wing area / wing span.","sub":"Wing geometry and wing loading"},{"id":"Aerodynamics_74","topic":"Aerodynamics","text":"The term \"wing loading\" is defined as","options":["the difference in angle of attack of the wing cross-section at different points along the wing.","the average distance between the leading and trailing edges of a wing.","the distance between the left and right wing tips.","the average loading per unit of wing surface area."],"correct":3,"exp":"Wing loading is the average weight carried per unit of wing surface area, typically in kg/m squared. It tells you how much each square metre of wing has to support, which directly drives how fast and agile - or slow and docile - the wing will feel.","sub":"Wing geometry and wing loading"},{"id":"Aerodynamics_75","topic":"Aerodynamics","text":"The wing loading of a paraglider is determined by","options":["(air pressure/2) x (airspeed)² .","total weight / wing surface area.","(pilot weight + equipment weight) / (wingspan)² .","load / wing surface area."],"correct":1,"exp":"Wing loading = total take-off weight / wing surface area. The total weight includes pilot, harness, reserve, instruments and the wing itself - everything that is in the air. Note: 'load' refers to what hangs below the wing while 'total weight' adds the wing itself, so the question's correct option uses 'total weight'.","sub":"Wing geometry and wing loading"},{"id":"Aerodynamics_76","topic":"Aerodynamics","text":"The term \"aspect ratio\" is defined as the relationship between","options":["the wing span and the average chord of the wing.","the profile depth and the average chord of the wing.","the largest and smallest chord of the wing.","the square of the span and the square of the average chord."],"correct":0,"exp":"Aspect ratio (Streckung) is the ratio of wing span to average chord. A wing with span = 10 m and average chord = 2 m has an aspect ratio of 5. Equivalently AR = span squared / area. High aspect ratio = long and slender wing (better glide, less induced drag, but more demanding to fly).","sub":"Wing geometry and wing loading"},{"id":"Aerodynamics_77","topic":"Aerodynamics","text":"The aspect ratio is calculated in the following way","options":["span x average chord.","average chord x wing surface area.","(span)² / wing surface area.","(average chord)² / wing surface area."],"correct":2,"exp":"Aspect ratio = (wing span) squared / wing surface area. This is the equivalent algebraic form of the simpler 'span / average chord' definition - they give the same number. A 10 m span over a 20 m squared wing gives AR = 100/20 = 5.","sub":"Wing geometry and wing loading"},{"id":"Aerodynamics_78","topic":"Aerodynamics","text":"Wings with a large aspect ratio have","options":["a small span and a small average chord.","a large span and a small average chord","a large span and a large average chord.","a small span and a large average chord."],"correct":1,"exp":"A large aspect ratio means a long, slender wing: large span and small average chord. Sailplanes and competition paragliders look like this - the wing is wide and narrow, like a sickle in the sky. This geometry reduces induced drag, the dominant component of total drag on a paraglider.","sub":"Wing geometry and wing loading"},{"id":"Aerodynamics_79","topic":"Aerodynamics","text":"Wings with a small aspect ratio have","options":["a large span and a large average chord.","a small span and a large average chord.","a small span and a small average chord.","a large span and a small average chord."],"correct":1,"exp":"A small aspect ratio means a 'stubby' wing - relatively small span paired with a large average chord. School wings sit on the lower end of the aspect-ratio range (around 5) because the deeper chord helps with stability and recovery, at the cost of glide performance.","sub":"Wing geometry and wing loading"},{"id":"Aerodynamics_80","topic":"Aerodynamics","text":"A wing's aspect ratio is 5. Which of the following statements is correct?","options":["Its average chord is five times larger than its span","Its surface area is five times larger than its span","Its span is five times larger than its surface area","Its span is five times larger than its average chord"],"correct":3,"exp":"Aspect ratio = wing span / average chord, so AR = 5 means the span is exactly 5 times the chord. For a wing with average chord 2 m, the span would be 10 m. This is just the definition restated in plain language.","sub":"Wing geometry and wing loading"},{"id":"Aerodynamics_81","topic":"Aerodynamics","text":"A wing's aspect ratio is 5. Which of the following statements is correct?","options":["Its surface area is five times smaller than its span","Its average chord is five times smaller that its span","Its span is five times smaller than its average chord","Its span is five times smaller than its surface area"],"correct":1,"exp":"Aspect ratio = span / average chord = 5 is equivalent to saying the chord is 1/5 of the span, i.e. five times smaller. It is the same statement as 'span is five times larger than average chord' - just rearranged.","sub":"Wing geometry and wing loading"},{"id":"Aerodynamics_82","topic":"Aerodynamics","text":"What is the aspect ratio of a glider with the following characteristics: Span: 10 m, Surface area: 25 m², Minimum load: 70 kg, Maximum load: 95 kg, Glider weight: 5 kg","options":["3.5","2.5","4.5","4.0"],"correct":3,"exp":"Using AR = span squared / area: AR = 10 squared / 25 = 100 / 25 = 4. The weight numbers in the question are distractors - aspect ratio only depends on wing geometry, not load.","sub":"Wing geometry and wing loading"},{"id":"Aerodynamics_83","topic":"Aerodynamics","text":"What is the average chord of a glider with the following characteristics: Span: 10 m, Surface area: 25 m², Minimum load: 70 kg, Maximum load: 95 kg, Glider weight: 5 kg","options":["2.5","4.0","3.5","4.5"],"correct":0,"exp":"Average chord = wing area / wing span = 25 m squared / 10 m = 2.5 m. The pilot weights are irrelevant - the chord is a pure geometric property of the wing. This relationship rearranges to area = average chord x span, useful for cross-checking.","sub":"Wing geometry and wing loading"},{"id":"Aerodynamics_84","topic":"Aerodynamics","text":"What is the wing loading of the following glider at maximum load? Span: 10 m, Surface area: 25 m², Minimum load: 70 kg, Maximum load: 95 kg, Glider weight: 5 kg","options":["4.0 kg/m²","3.5 kg/m²","4.5 kg/m²","3.0 kg/m²"],"correct":0,"exp":"Total take-off weight = max load + glider weight = 95 + 5 = 100 kg. Wing loading = 100 kg / 25 m squared = 4.0 kg/m squared. Always include the wing's own weight in the calculation - wing loading uses total flight weight, not just the payload hanging below.","sub":"Wing geometry and wing loading"},{"id":"Aerodynamics_85","topic":"Aerodynamics","text":"What is the wing loading of the following glider at minimum load? Span: 10 m, Surface area: 25 m², Minimum load: 70 kg, Maximum load: 95 kg, Glider weight: 5 kg","options":["4.5 kg/m²","3.0 kg/m²","3.5 kg/m²","4.0 kg/m²"],"correct":1,"exp":"Minimum total take-off weight = min load + glider = 70 + 5 = 75 kg. Wing loading = 75 kg / 25 m squared = 3.0 kg/m squared. A lower wing loading makes the wing slower and more docile - typical lower bound for a paraglider.","sub":"Wing geometry and wing loading"},{"id":"Aerodynamics_86","topic":"Aerodynamics","text":"What is the aspect ratio of the following glider? Span: m, Surface area: 12.5m², Minimum load: 0 kg, Maximum load: 0 kg, Glider weight: 30kg 1068","options":["10","4","6","8"],"correct":3,"exp":"AR = span squared / area = 10 squared / 12.5 = 100 / 12.5 = 8. With area 12.5 m squared and a 30 kg glider weight, this is clearly a hang glider, which typically has aspect ratios around 7-8 compared to ~5 for paragliders.","sub":"Wing geometry and wing loading"},{"id":"Aerodynamics_87","topic":"Aerodynamics","text":"What is the average chord of the following glider? Span: 10m, minimum load: 65kg, glider-weight: 35kg, surface: 12.5m², maximum load: 90kg","options":["0.75m","2.50m","1.75m","1.25m"],"correct":3,"exp":"Average chord = wing area / span = 12.5 / 10 = 1.25 m. The pilot and equipment weights in the question are red herrings - the chord is purely geometric.","sub":"Wing geometry and wing loading"},{"id":"Aerodynamics_88","topic":"Aerodynamics","text":"What is the wing loading of the following glider at maximum load? Span: 10m , surface: 12.5m², minimum load: 65kg, maximum load: 90kg, weight: 35kg","options":["10 kg/m²","8 kg/m²","12 kg/m²","6 kg/m²"],"correct":0,"exp":"Total take-off weight = max load + glider weight = 90 + 35 = 125 kg. Wing loading = 125 / 12.5 = 10 kg/m squared. Hang gliders carry much higher wing loadings than paragliders (typically 8-12 kg/m squared vs 3-5).","sub":"Wing geometry and wing loading"},{"id":"Aerodynamics_89","topic":"Aerodynamics","text":"What is the wing loading of the following glider at minimum load? Span: 10m , surface: 12.5m², minimum load: 65kg, maximum load: 90kg, weight: 35kg","options":["8 kg/m²","10 kg/m²","12 kg/m²","6 kg/m²"],"correct":0,"exp":"Minimum total take-off weight = min load + glider weight = 65 + 35 = 100 kg. Wing loading = 100 / 12.5 = 8 kg/m squared. The same wing flown lightly is still much more loaded than a typical paraglider - hang gliders fly considerably faster as a result.","sub":"Wing geometry and wing loading"},{"id":"Aerodynamics_90","topic":"Aerodynamics","text":"What is the aspect ratio of a modern intermediate paraglider?","options":["approximately 12-14","approximately 3-4","approximately 5-6","approximately 8-10"],"correct":2,"exp":"Modern intermediate paragliders sit in the aspect-ratio range of approximately 5-6. Beginner / school wings are lower (4.5-5), and high-performance wings reach 7+. Numbers like 12-14 are typical of competition sailplanes, not paragliders.","sub":"Wing geometry and wing loading"},{"id":"Aerodynamics_91","topic":"Aerodynamics","text":"What is a common aspect ratio on a modern intermediate hang glider?","options":["around 7","around 12","around 3","around 20"],"correct":0,"exp":"Modern intermediate hang gliders have aspect ratios around 7. Hang glider wings are stiffer and longer relative to their chord than paraglider wings, which is why their aspect ratios sit higher than paragliders (~5) but well below sailplanes (~20).","sub":"Wing geometry and wing loading"},{"id":"Aerodynamics_92","topic":"Aerodynamics","text":"Which of the following gliders has the largest aspect ratio?","options":["surface area: 32m², span: 8m","surface area: 24m², span: 12m","surface area: 25m², span: 10m","surface area: 20m², span: 10m"],"correct":1,"exp":"Compute AR = span squared / area for each option. With span 12 m and area 24 m squared, AR = 144 / 24 = 6 - the highest of the four. Always use the formula consistently when comparing wings of different sizes.","sub":"Wing geometry and wing loading"},{"id":"Aerodynamics_93","topic":"Aerodynamics","text":"Which of the following gliders has the smallest aspect ratio?","options":["surface area: 24m², span: 12m","surface area: 32m², span: 8m","surface area: 25m², span: 10m","surface area: 20m², span: 10m"],"correct":1,"exp":"AR = span squared / area. With span 8 m and area 32 m squared, AR = 64 / 32 = 2 - by far the smallest. A stubby, low-AR wing like this would have lots of induced drag and a poor glide ratio.","sub":"Wing geometry and wing loading"},{"id":"Aerodynamics_94","topic":"Aerodynamics","text":"Which of the following gliders has the largest aspect ratio?","options":["surface area: 16m², span: 12m","surface area: 12m², span: 12m","surface area: 20m², span: 10m","surface area: 12.5m², span: 10m"],"correct":1,"exp":"AR = span squared / area. With span 12 m and area 12 m squared, AR = 144 / 12 = 12 - the largest of the four options. A wing this slender would be high-performance, with very low induced drag but demanding to fly.","sub":"Wing geometry and wing loading"},{"id":"Aerodynamics_95","topic":"Aerodynamics","text":"Which of the following gliders has the smallest aspect ratio?","options":["surface area: 12.5m², span: 10m","surface area: 12m², span: 12m","surface area: 16m², span: 12m","surface area: 20m², span: 10m"],"correct":3,"exp":"AR = span squared / area. The 20 m squared area paired with 10 m span gives AR = 100/20 = 5 - the smallest of the four. Lower aspect ratio means a wider chord and more induced drag, but generally a more forgiving wing.","sub":"Wing geometry and wing loading"},{"id":"Aerodynamics_96","topic":"Aerodynamics","text":"Tip vortices occur during flight because","options":["the cables and suspension lines produce eddies that are deflected upward.","there is a difference of pressure between the lower and upper surfaces.","the wingtips are poorly designed.","the boundary layer behind the transition point changes to turbulent flow."],"correct":1,"exp":"Tip vortices arise because there is high pressure on the underside of the wing and low pressure (suction) on the upper side. Nature tries to equalise pressure differences, so high-pressure air spills around the wingtip toward the suction side, creating a spiral vortex. The bigger the pressure difference (heavier wing loading), the stronger the vortex.","sub":"Wing profile and lift generation"},{"id":"Aerodynamics_97","topic":"Aerodynamics","text":"Where should we expect to find vortices near a glider when it is flying?","options":["up to one wing span above the centre of pressure/thrust.","behind the trailing edge.","in the middle of the glider in front of the leading edge.","at the edges of the wing in front of the leading edge."],"correct":1,"exp":"Wake turbulence and vortices form behind the wing - mainly behind the trailing edge and wingtips. This is why pilots are warned not to fly close behind a heavier glider on landing: the trailing vortex can shake or even collapse a following wing.","sub":"Wing profile and lift generation"},{"id":"Aerodynamics_98","topic":"Aerodynamics","text":"If the drag of a glider is increased","options":["the glide angle increases.","the glide angle decreases.","the glide angle decreases to a point and then increases abruptly.","this has no effect on the glide angle."],"correct":0,"exp":"Glide ratio = lift / drag. If drag goes up while lift stays the same, the ratio falls. A smaller glide ratio means a steeper glide angle (the wing sinks more per metre of forward travel). So 'more drag' = 'steeper glide' = 'larger glide angle'.","sub":"Glide ratio and glide distance"},{"id":"Aerodynamics_99","topic":"Aerodynamics","text":"If the drag of a glider is reduced","options":["the glide ratio decreases to a point and then increases abruptly.","this has no effect on the glide ratio.","the glide ratio decreases.","the glide ratio increases."],"correct":3,"exp":"Glide ratio = lift / drag. Reducing drag while keeping lift the same makes the ratio bigger - a larger glide ratio means the wing flies further per metre of altitude lost. This is exactly why pod harnesses, slim profiles and few thin lines all help: every bit of drag cut translates directly into more glide.","sub":"Glide ratio and glide distance"},{"id":"Aerodynamics_100","topic":"Aerodynamics","text":"The projected surface area is","options":["larger than the actual surface area.","on a hang glider smaller, on a paraglider larger than the actual surface area.","on hang glider larger, on a paraglider smaller than the actual surface area.","smaller or identical to the actual surface area."],"correct":3,"exp":"The projected area is the shadow of the inflated wing on the ground - it is always smaller than (or at most equal to) the flat area you measure wit
