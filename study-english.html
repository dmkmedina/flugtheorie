      <div class="card clockcard">
        <div class="clock" id="clock">${mmss(examRemaining(ex))}</div>
        <div class="muted" style="font-size:13px;font-weight:700">${answered}/${ex.qs.length} answered</div>
      </div>
      <div class="card" style="padding:12px">${grid}</div>
      <button class="btn" data-action="exam-submit" style="justify-content:center">Submit exam</button>
      <button class="ghost" data-action="exam-abort" style="text-align:center">Abandon exam</button>
    </div>
  </div>`;
}

function renderExamResult(){
  const { ex, g, auto } = S.examResult;
  const bars = TOPICS.map(t => {
    const [r, k] = g.per[t];
    if (!k) return '';
    const ok = r / k >= PASS_FRACTION;
    const need = Math.ceil(k * PASS_FRACTION);
    return `<div class="bar-row">
      <span>${META[t].em} ${esc(t)}</span>
      <div class="bar ${ok ? '' : 'fail'}"><div class="fill" style="width:${(100 * r / k).toFixed(1)}%"></div><div class="thresh" title="pass mark"></div></div>
      <span class="bar-score">${r}/${k}<span class="pf ${ok ? 'pass' : 'fail'}">${ok ? '✓' : '✗'}</span></span>
    </div>`;
  }).join('');

  const review = ex.qs.map((q, i) => {
    const ok = ex.ans[i] === q.correct;
    if (S.examResult.showAll !== true && ok) return '';
    return `<details class="rq ${ok ? 'ok' : 'bad'}">
      <summary><span class="mark">${ok ? '✓' : '✗'}</span><span>Q${i + 1} · ${META[q.topic].em} ${esc(q.text.length > 80 ? q.text.slice(0, 80) + '…' : q.text)}</span></summary>
      <div class="rq-body">
        <div style="margin:8px 0 6px;font-weight:700">${esc(q.text)}</div>
        ${imgHtml(q)}
        <div class="ansline">${ex.ans[i] == null ? '<span class="you">Not answered.</span><br>' : ok ? '' : `<span class="you">Your answer: ${esc(q.options[ex.ans[i]])}</span><br>`}
          Correct: <b>${esc(q.options[q.correct])}</b></div>
        ${q.exp ? `<div class="explain">💡 ${esc(q.exp)}</div>` : ''}
      </div>
    </details>`;
  }).join('');
  const wrongCount = ex.qs.filter((q, i) => ex.ans[i] !== q.correct).length;

  return `<div class="card result-banner ${g.pass ? 'pass' : 'fail'}">
    ${auto ? '<div class="chip plain" style="margin-bottom:8px">⏰ time expired — auto-submitted</div>' : ''}
    <div class="big">${g.pass ? '✅ PASSED' : '❌ Not yet'}</div>
    <h2 style="margin-top:4px">${g.right}/${g.total} correct · ${g.pct}%</h2>
    <div class="muted">Time used ${mmss(g.secs)} of ${mmss(ex.dur)} · pass needs ≥ ${Math.round(PASS_FRACTION * 100)}% in every section</div>
    <div class="bars">${bars}</div>
    <div class="actions" style="justify-content:center;margin-top:22px">
      <button class="btn" data-action="exam-setup">Take another</button>
      ${wrongCount ? `<button class="btn secondary" data-action="review">🔁 Drill the ${wrongCount} missed</button>` : ''}
      <button class="btn secondary" data-action="home">Home</button>
    </div>
  </div>
  <div class="section-title">${S.examResult.showAll ? 'All questions' : `Missed questions (${wrongCount})`}
    <button class="ghost" data-action="exam-toggle-all" style="font-size:13px">${S.examResult.showAll ? 'show missed only' : 'show all'}</button>
  </div>
  <div class="recap">${review || '<div class="muted" style="padding:10px">Nothing missed — outstanding! 🎉</div>'}</div>`;
}

/* ---------- flashcards ---------- */
function renderCards(){
  const c = S.cards;
  const cats = ['all', ...new Set(CARDS.map(x => x.cat))];
  const chips = cats.map(cat =>
    `<button class="cat ${c.cat === cat ? 'on' : ''}" data-action="cards-cat" data-cat="${esc(cat)}">${cat === 'all' ? `All (${CARDS.length})` : `${esc(cat)} (${CARDS.filter(x => x.cat === cat).length})`}</button>`).join('');

  if (c.i >= c.deck.length){
    return `<div class="cats">${chips}</div>
    <div class="card endcard">
      <h2>🃏 Deck done!</h2>
      <p class="muted">${c.got} knew it · ${c.again} repeated until they stuck.</p>
      <div class="actions" style="justify-content:center">
        <button class="btn" data-action="cards-cat" data-cat="${esc(c.cat)}">Shuffle &amp; go again</button>
        <button class="btn secondary" data-action="home">Home</button>
      </div>
    </div>`;
  }

  const card = c.deck[c.i];
  return `<div class="cats">${chips}</div>
  <div class="fc-meta"><span>Card ${c.i + 1} of ${c.deck.length}</span><span>✓ ${c.got} · ↻ ${c.again}</span></div>
  <div class="fc-stage">
    <div class="fc ${c.flipped ? 'flipped' : ''}" data-action="flip" role="button" aria-label="Flip card" tabindex="0">
      <div class="fc-face card">
        <span class="label">QUESTION · ${esc(card.cat).toUpperCase()}</span>
        <span class="txt">${esc(card.q)}</span>
        <span class="muted" style="font-size:13px">tap or <kbd>Space</kbd> to reveal</span>
      </div>
      <div class="fc-face fc-back card">
        <span class="label">ANSWER</span>
        <span class="txt">${esc(card.a)}</span>
      </div>
    </div>
  </div>
  <div class="fc-foot">
    <button class="btn secondary" data-action="card-again" ${c.flipped ? '' : 'disabled'}>↻ Show again (A)</button>
    <button class="btn" data-action="card-got" ${c.flipped ? '' : 'disabled'}>✓ Knew it (G)</button>
  </div>`;
}

/* ---------- modal ---------- */
function modalHtml(){
  if (!S.modal) return '';
  return `<div class="overlay" data-action="modal-cancel-bg">
    <div class="card modal">
      <div class="mtitle">${esc(S.modal.title)}</div>
      <div class="muted">${esc(S.modal.body)}</div>
      <div class="actions">
        <button class="btn" data-action="modal-ok">${esc(S.modal.okLabel)}</button>
        <button class="btn secondary" data-action="modal-cancel">Cancel</button>
      </div>
    </div>
  </div>`;
}

/* ================= render & events ================= */
function render(keepScroll){
  const y = window.scrollY;
  let html = '';
  if (S.view !== 'exam-live') html += headerHtml();
  switch (S.view){
    case 'home':        html += renderHome(); break;
    case 'round':       html += renderRound(); break;
    case 'round-end':   html += renderRoundEnd(); break;
    case 'exam-setup':  html += renderExamSetup(); break;
    case 'exam-live':   html += renderExamLive(); break;
    case 'exam-result': html += renderExamResult(); break;
    case 'cards':       html += renderCards(); break;
  }
  document.getElementById('app').innerHTML = `<div class="wrap">${html}</div>${modalHtml()}`;
  if (S.view === 'exam-live') startTick(); else stopTick();
  window.scrollTo(0, keepScroll ? y : 0);
}

document.addEventListener('click', e => {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const act = el.dataset.action;
  switch (act){
    case 'home':        S.view = 'home'; render(); break;
    case 'quick':       startPractice('mix'); break;
    case 'topic':       startPractice(el.dataset.topic); break;
    case 'review': {
      const q = shuffle(reviewQueue()).slice(0, 10);
      if (q.length) startRound('review', 'review', q);
      break;
    }
    case 'cards':       startCards(S.cards ? S.cards.cat : 'all'); break;
    case 'exam-setup':  S.view = 'exam-setup'; render(); break;

    case 'answer':      onAnswer(+el.dataset.i); break;
    case 'round-next':  nextQ(); break;
    case 'round-quit':
      if (S.round && S.round.done.length && S.round.i < S.round.qs.length){
        S.round.qs = S.round.qs.slice(0, S.round.done.length);
        S.view = 'round-end';
      } else S.view = 'home';
      render(); break;
    case 'round-again': startRound(S.round.mode, S.round.topic,
        S.round.topic === 'review' ? shuffle(reviewQueue()).slice(0, 10) : pickPractice(S.round.topic, 10)); break;
    case 'round-retry': startRound('practice', S.round.topic, shuffle(S.round.done.filter(d => !d.ok).map(d => d.q))); break;

    case 'start-exam':  startExam(+el.dataset.n); break;
    case 'exam-answer': {
      const ex = S.exam;
      ex.ans[ex.i] = +el.dataset.i;
      saveLive();
      if (ex.i < ex.qs.length - 1) ex.i++;
      render(true); break;
    }
    case 'exam-jump':   S.exam.i = +el.dataset.i; render(true); break;
    case 'exam-prev':   if (S.exam.i > 0){ S.exam.i--; render(true); } break;
    case 'exam-next':   if (S.exam.i < S.exam.qs.length - 1){ S.exam.i++; render(true); } break;
    case 'exam-flag':   S.exam.flags[S.exam.i] = !S.exam.flags[S.exam.i]; saveLive(); render(true); break;
    case 'exam-submit': {
      const left = S.exam.qs.length - Object.keys(S.exam.ans).length;
      if (left) openModal('Submit with gaps?', `${left} question${left === 1 ? ' is' : 's are'} unanswered and will count as wrong.`, 'Submit anyway', () => submitExam(false));
      else openModal('Submit exam?', 'Lock in your answers and see the result.', 'Submit', () => submitExam(false));
      break;
    }
    case 'exam-abort':  openModal('Abandon exam?', 'This attempt will be discarded — nothing is recorded.', 'Abandon', () => { stopTick(); S.exam = null; P.live = null; save(); S.view = 'home'; render(); }); break;
    case 'exam-toggle-all': S.examResult.showAll = !S.examResult.showAll; render(true); break;

    case 'resume-exam':  resumeExam(); break;
    case 'expire-exam': {
      const L = P.live;
      S.exam = { n: L.n, qs: L.ids.map(id => byId[id]).filter(Boolean), i:0, ans: L.ans || {}, flags: L.flags || {}, started: L.started, dur: L.dur };
      submitExam(true); break;
    }
    case 'discard-exam': openModal('Discard saved exam?', 'The in-progress exam will be lost.', 'Discard', () => { P.live = null; save(); render(); }); break;

    case 'cards-cat':   startCards(el.dataset.cat); break;
    case 'flip':        S.cards.flipped = !S.cards.flipped; render(true); break;
    case 'card-got':    gradeCard(true); break;
    case 'card-again':  gradeCard(false); break;

    case 'modal-ok': {
      const fn = S.modal && S.modal.onOk;
      S.modal = null;
      if (fn) fn(); else render(true);
      break;
    }
    case 'modal-cancel': closeModal(); break;
    case 'modal-cancel-bg': if (e.target === el) closeModal(); break;
  }
});

document.addEventListener('keydown', e => {
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  if (S.modal){
    if (e.key === 'Enter'){ e.preventDefault(); const fn = S.modal.onOk; S.modal = null; if (fn) fn(); else render(true); }
    if (e.key === 'Escape') closeModal();
    return;
  }
  if (S.view === 'round'){
    const r = S.round, q = r.qs[r.i];
    const d = parseInt(e.key, 10);
    if (!r.revealed && d >= 1 && d <= q.options.length){ e.preventDefault(); onAnswer(d - 1); }
    else if (r.revealed && e.key === 'Enter'){ e.preventDefault(); nextQ(); }
  } else if (S.view === 'exam-live'){
    const ex = S.exam, q = ex.qs[ex.i];
    const d = parseInt(e.key, 10);
    if (d >= 1 && d <= q.options.length){
      e.preventDefault();
      ex.ans[ex.i] = d - 1; saveLive();
      if (ex.i < ex.qs.length - 1) ex.i++;
      render(true);
    }
    else if (e.key === 'ArrowLeft' && ex.i > 0){ ex.i--; render(true); }
    else if (e.key === 'ArrowRight' && ex.i < ex.qs.length - 1){ ex.i++; render(true); }
    else if (e.key === 'f' || e.key === 'F'){ ex.flags[ex.i] = !ex.flags[ex.i]; saveLive(); render(true); }
  } else if (S.view === 'cards'){
    if (e.key === ' '){ e.preventDefault(); S.cards.flipped = !S.cards.flipped; render(true); }
    else if ((e.key === 'g' || e.key === 'G') && S.cards.flipped) gradeCard(true);
    else if ((e.key === 'a' || e.key === 'A') && S.cards.flipped) gradeCard(false);
  }
});

render();
</script>
</body>
</html>
